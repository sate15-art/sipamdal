// Hitung regu berikutnya berdasarkan urutan rotasi [1,2,3]
function getNextRegu(regu) {
  const urut = [1,2,3];
  const idx = urut.indexOf(Number(regu));
  return urut[(idx + 1) % 3];
}

function MutTab({mutations,setMutations,reguHari,toast,canEdit,patrols=[],incidents=[],packages=[],guests=[],currentUser,standJaga=[],rollings=[],inventarisDaftar=[],inventarisCek={}}) {
  const [open,setOpen]=useState(false);
  const [photo,setPhoto]=useState(null);
  const [viewPhoto,setViewPhoto]=useState(null);
  const [printMut,setPrintMut]=useState(null);
  const [cekOpen,setCekOpen]=useState(null);
  const [cekCatatan,setCekCatatan]=useState("");
  const toReguAuto = String(getNextRegu(reguHari));
  const [fm,setFm]=useState({content:"",fromRegu:String(reguHari),toRegu:toReguAuto,incidents:"",packages:"",guests:"",notes:""});
  const f=(k,v)=>setFm(p=>({...p,[k]:v}));

  const myRegu = currentUser ? String(currentUser.regu) : null;
  const bisaCekTerima = (m) => myRegu && String(m.toRegu) === myRegu && !m.konfirmasi;

  const konfirmasiTerima = (m) => {
    const updated = mutations.map(x => x.id === m.id ? {
      ...x,
      konfirmasi: {
        status: "Diterima",
        oleh: currentUser?.name || "—",
        regu: myRegu,
        catatan: cekCatatan.trim(),
        ts: Date.now()
      }
    } : x);
    setMutations(updated);
    setCekOpen(null);
    setCekCatatan("");
    toast("Serah terima dikonfirmasi!");
  };

  // ── Auto-isi SEMUA aktivitas hari ini ───────────────────────────────────
  const buatAutoLaporan = () => {
    const today = new Date().toDateString();
    const nama = currentUser?.name || "";

    // Patroli
    const patrolHari = patrols.filter(p => new Date(p.ts).toDateString() === today);
    const patrolSaya = patrolHari.filter(p => p.officer && p.officer.includes(nama));

    // Insiden hari ini
    const insidenHari = incidents.filter(i => new Date(i.ts).toDateString() === today);
    const insidenAktif = incidents.filter(i => i.status !== "Selesai");
    const insidenSelesaiHari = incidents.filter(i => i.status === "Selesai" && new Date(i.ts).toDateString() === today);

    // Paket hari ini
    const paketMasukHari = packages.filter(p => new Date(p.ts).toDateString() === today);
    const paketDiambilHari = packages.filter(p => p.takenAt && new Date(p.takenAt).toDateString() === today);
    const paketPending = packages.filter(p => p.status === "Belum Diambil");

    // Tamu hari ini
    const tamuMasukHari = guests.filter(g => new Date(g.ts).toDateString() === today);
    const tamuKeluarHari = guests.filter(g => g.checkOut && new Date(g.checkOut).toDateString() === today);
    const tamuAda = guests.filter(g => g.status === "Masih Ada");

    let isi = "═══ LAPORAN SHIFT " + new Date().toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) + " ═══\n\n";

    // 1. PATROLI
    isi += "📡 PATROLI (" + patrolHari.length + "x hari ini):\n";
    if (patrolHari.length > 0) {
      patrolHari.forEach((p, i) => {
        isi += "  " + (i+1) + ". " + (p.areas||[]).join(", ") + " — " + fmtT(p.ts) + " — " + (p.officer||"—");
        if (p.notes) isi += " — Ket: " + p.notes;
        isi += "\n";
      });
    } else {
      isi += "  Belum ada patroli tercatat.\n";
    }
    isi += "\n";

    // 2. INSIDEN
    isi += "⚠️ INSIDEN:\n";
    if (insidenHari.length > 0) {
      insidenHari.forEach(inc => {
        isi += "  - [" + inc.category + "] " + inc.title + " — " + inc.pos + " — " + fmtT(inc.ts) + " — Status: " + inc.status + "\n";
        if (inc.desc) isi += "    Ket: " + inc.desc + "\n";
      });
    } else {
      isi += "  Tidak ada insiden.\n";
    }
    if (insidenAktif.length > 0) {
      isi += "  ⚡ Masih aktif: " + insidenAktif.map(i => i.title).join(", ") + "\n";
    }
    isi += "\n";

    // 3. PAKET & KURIR
    isi += "📦 PAKET & KURIR:\n";
    if (paketMasukHari.length > 0) {
      isi += "  Masuk hari ini (" + paketMasukHari.length + "):\n";
      paketMasukHari.forEach(p => {
        isi += "  - " + p.type + " untuk " + p.recipient + " dari " + (p.sender||"—") + " — " + fmtT(p.ts) + " — " + p.status + "\n";
      });
    } else {
      isi += "  Tidak ada paket masuk.\n";
    }
    if (paketDiambilHari.length > 0) {
      isi += "  Diambil/diantar (" + paketDiambilHari.length + "): " + paketDiambilHari.map(p=>p.recipient).join(", ") + "\n";
    }
    if (paketPending.length > 0) {
      isi += "  ⏳ Belum diambil: " + paketPending.map(p=>p.recipient+" ("+p.type+")").join(", ") + "\n";
    }
    isi += "\n";

    // 4. TAMU & PESERTA
    isi += "🏠 TAMU & PESERTA:\n";
    if (tamuMasukHari.length > 0) {
      isi += "  Masuk hari ini (" + tamuMasukHari.length + "):\n";
      tamuMasukHari.forEach(g => {
        isi += "  - " + g.name + " (" + g.type + ")" + (g.institution ? " — " + g.institution : "") + (g.room ? " — " + g.room : "") + " — " + fmtT(g.ts) + "\n";
        if (g.purpose) isi += "    Keperluan: " + g.purpose + "\n";
      });
    } else {
      isi += "  Tidak ada tamu masuk.\n";
    }
    if (tamuKeluarHari.length > 0) {
      isi += "  Keluar hari ini (" + tamuKeluarHari.length + "): " + tamuKeluarHari.map(g=>g.name).join(", ") + "\n";
    }
    if (tamuAda.length > 0) {
      isi += "  ⏳ Masih di dalam (" + tamuAda.length + "): " + tamuAda.map(g=>g.name+(g.room?" ("+g.room+")":"")).join(", ") + "\n";
    } else {
      isi += "  Tidak ada tamu/peserta yang masih di dalam.\n";
    }
    isi += "\n";

    // 5. STAND JAGA
    const standHari = standJaga.filter(s => new Date(s.ts).toDateString() === today);
    if (standHari.length > 0) {
      isi += "\ud83d\udee1 STAND JAGA (" + standHari.length + "x):\n";
      standHari.forEach(s => {
        isi += "  - " + s.area + " \u2014 " + fmtT(s.ts) + " \u2014 " + (s.officer||"\u2014") + "\n";
      });
      isi += "\n";
    }

    // 6. ROLLING SHIFT
    const rollingHari = rollings.filter(r => new Date(r.ts).toDateString() === today);
    if (rollingHari.length > 0) {
      isi += "🔄 ROLLING SHIFT (" + rollingHari.length + "x):\n";
      rollingHari.forEach(r => {
        isi += "  - Jam " + (r.time||fmtT(r.ts)) + " — Regu " + r.fromRegu + (r.toRegu ? " → Regu " + r.toRegu : "") + "\n";
        if (r.notes) isi += "    Ket: " + r.notes + "\n";
      });
      isi += "\n";
    }

    // Ringkasan
    isi += "─── RINGKASAN ───\n";
    isi += "Patroli: " + patrolHari.length + "x | Stand: " + standHari.length + "x | Insiden: " + insidenHari.length + " (" + insidenAktif.length + " aktif) | Paket: " + paketMasukHari.length + " masuk/" + paketPending.length + " pending | Tamu: " + tamuMasukHari.length + " masuk/" + tamuAda.length + " masih ada";

    f("content", isi.trim());
    f("incidents", insidenAktif.length > 0 ? insidenAktif.length + " aktif — " + insidenAktif.map(i=>i.title).join(", ") : "Tidak ada");
    f("packages", paketPending.length > 0 ? paketPending.length + " belum diambil — " + paketPending.map(p=>p.recipient).join(", ") : "Tidak ada");
    f("guests", tamuAda.length > 0 ? tamuAda.length + " orang — " + tamuAda.map(g=>g.name).join(", ") : "Tidak ada");
    toast("Laporan lengkap berhasil diisi otomatis!");
  };

  const submit=()=>{
    if(!fm.content){toast("Isi laporan!",false);return;}
    setMutations([...mutations,{...fm,photo,id:Date.now(),ts:Date.now()}]);
    setFm({content:"",fromRegu:String(reguHari),toRegu:toReguAuto,incidents:"",packages:"",guests:"",notes:""}); setPhoto(null);
    setOpen(false); toast("Mutasi disimpan!");
  };
  return (
    <div>
      <PH title="Serah Terima Mutasi" sub="Laporan pergantian shift antar regu" action={canEdit&&(
        <div style={{display:"flex",gap:7}}>
          <Btn onClick={()=>{setOpen(true);setTimeout(buatAutoLaporan,100);}} color="var(--ok)" size="sm">⚡ Auto</Btn>
          <Btn onClick={()=>setOpen(true)} color="var(--accent)"><IC n="plus" s={13}/> Buat Manual</Btn>
        </div>
      )}/>
      {!canEdit&&<ReadOnlyBanner reguHari={reguHari}/>}
      {mutations.length===0&&<div style={{color:"var(--tx3)",fontSize:13}}>Belum ada mutasi.</div>}
      {[...mutations].reverse().map(m=>(
        <div key={m.id} style={{background:"var(--card-solid)",border:`1.5px solid ${m.konfirmasi?"var(--green-border)":"var(--card-solid)"}`,borderRadius:12,padding:"12px 14px",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:4}}>
            <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
              <Bdg text={`Regu ${m.fromRegu}`} color="var(--accent)"/>
              <IC n="arr" s={13} c="var(--tx4)"/>
              {m.toRegu&&<Bdg text={`Regu ${m.toRegu}`} color="var(--ok)"/>}
              {m.photo&&<Bdg text="📷" color="#a78bfa"/>}
              {m.konfirmasi
                ? <span style={{fontSize:10,background:"var(--green-card)",border:"1px solid #86efac",borderRadius:6,padding:"2px 7px",color:"var(--ok)",fontWeight:700}}>✅ Diterima Regu {m.konfirmasi.regu}</span>
                : <span style={{fontSize:10,background:"rgba(255,204,0,.07)",border:"1px solid #fcd34d",borderRadius:6,padding:"2px 7px",color:"#ffcc00",fontWeight:700}}>⏳ Belum Dikonfirmasi</span>
              }
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{fontSize:10.5,color:"var(--tx3)"}}>{fmtDT(m.ts)}</span>
              <Btn onClick={()=>setPrintMut(m)} color="var(--accent)" variant="outline" size="sm"><IC n="print" s={11}/> Cetak</Btn>
            </div>
          </div>
          <div style={{background:"var(--card-solid)",borderRadius:8,padding:"8px 10px",marginBottom:7,fontSize:12.5,color:"var(--tx)",whiteSpace:"pre-wrap",lineHeight:1.65}}>{m.content}</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:m.photo?7:0}}>
            {m.incidents&&<div style={{background:"rgba(255,50,50,.1)",border:"1px solid #fca5a5",borderRadius:6,padding:"4px 8px"}}><div style={{fontSize:9.5,color:"var(--tx3)"}}>INSIDEN</div><div style={{fontSize:11.5,color:"#dc2626",fontWeight:700}}>{m.incidents}</div></div>}
            {m.packages&&<div style={{background:"rgba(255,204,0,.07)",border:"1px solid #fcd34d",borderRadius:6,padding:"4px 8px"}}><div style={{fontSize:9.5,color:"var(--tx3)"}}>PAKET</div><div style={{fontSize:11.5,color:"#ffcc00",fontWeight:700}}>{m.packages}</div></div>}
            {m.guests&&<div style={{background:"rgba(167,139,250,.1)",border:"1px solid #c4b5fd",borderRadius:6,padding:"4px 8px"}}><div style={{fontSize:9.5,color:"var(--tx3)"}}>TAMU</div><div style={{fontSize:11.5,color:"#a78bfa",fontWeight:700}}>{m.guests}</div></div>}
          </div>
          {m.photo&&<button onClick={()=>setViewPhoto(m.photo)} style={{display:"flex",alignItems:"center",gap:5,background:"rgba(167,139,250,.1)",border:"1px solid #c4b5fd",borderRadius:6,padding:"4px 9px",fontSize:11,color:"#a78bfa",fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:6}}>
            <img src={m.photo} alt="" style={{width:30,height:20,objectFit:"cover",borderRadius:3}}/> Lihat Foto
          </button>}
          {m.notes&&<div style={{fontSize:11.5,color:"var(--tx3)",marginTop:4}}>📝 {m.notes}</div>}
          {m.konfirmasi?.catatan&&<div style={{marginTop:6,background:"rgba(255,204,0,.07)",border:"1px solid #fcd34d",borderRadius:8,padding:"6px 10px",fontSize:11.5,color:"#ffcc00"}}>📋 <b>Catatan Regu {m.konfirmasi.regu}:</b> {m.konfirmasi.catatan}</div>}
          {bisaCekTerima(m)&&(
            <button onClick={()=>{setCekOpen(m);setCekCatatan("");}} style={{marginTop:8,width:"100%",padding:"8px",background:"var(--green-card)",border:"1.5px solid #86efac",borderRadius:8,color:"var(--ok)",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
              ✅ Konfirmasi Terima Serah Terima
            </button>
          )}
        </div>
      ))}
      <Modal open={!!viewPhoto} onClose={()=>setViewPhoto(null)} title="Foto Mutasi">
        {viewPhoto&&<div style={{textAlign:"center"}}><img src={viewPhoto} alt="mutasi" style={{width:"100%",maxHeight:400,objectFit:"contain",borderRadius:10,marginBottom:14}}/><Btn onClick={()=>setViewPhoto(null)} color="var(--accent)">Tutup</Btn></div>}
      </Modal>
      <Modal open={!!printMut} onClose={()=>setPrintMut(null)} title="Laporan Mutasi" wide noPad>
        {printMut&&<MutPrint m={printMut} onClose={()=>setPrintMut(null)} inventarisDaftar={inventarisDaftar} inventarisCek={inventarisCek}/>}
      </Modal>
      {/* Modal Konfirmasi Serah Terima */}
      <Modal open={!!cekOpen} onClose={()=>setCekOpen(null)} title="Konfirmasi Serah Terima">
        {cekOpen&&<div>
          <div style={{background:"var(--card-solid)",borderRadius:10,padding:"10px 12px",marginBottom:12}}>
            <div style={{fontSize:12,fontWeight:700,color:"var(--tx2)",marginBottom:6}}>📋 Laporan dari Regu {cekOpen.fromRegu}</div>
            <div style={{fontSize:11.5,color:"var(--tx)",whiteSpace:"pre-wrap",lineHeight:1.6,maxHeight:180,overflowY:"auto"}}>{cekOpen.content}</div>
            {cekOpen.incidents&&<div style={{marginTop:6,fontSize:11,color:"#dc2626"}}>⚠️ Insiden: {cekOpen.incidents}</div>}
            {cekOpen.packages&&<div style={{fontSize:11,color:"#ffcc00"}}>📦 Paket: {cekOpen.packages}</div>}
            {cekOpen.guests&&<div style={{fontSize:11,color:"#a78bfa"}}>🏠 Tamu: {cekOpen.guests}</div>}
            {cekOpen.notes&&<div style={{fontSize:11,color:"var(--tx3)"}}>📝 Catatan: {cekOpen.notes}</div>}
          </div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:700,color:"var(--tx)",display:"block",marginBottom:6}}>📝 Catatan Temuan (opsional)</label>
            <textarea value={cekCatatan} onChange={e=>setCekCatatan(e.target.value)}
              placeholder="Tulis temuan atau catatan saat cek serah terima... (kosongkan jika tidak ada)"
              style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid var(--border)",fontSize:12.5,fontFamily:"inherit",resize:"vertical",minHeight:80,boxSizing:"border-box",color:"var(--tx)"}}/>
          </div>
          <div style={{background:"var(--green-card)",border:"1px solid #86efac",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:11.5,color:"var(--ok)"}}>
            ✅ Dengan konfirmasi ini, Regu {myRegu} menyatakan telah menerima serah terima dari Regu {cekOpen.fromRegu}.
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={()=>konfirmasiTerima(cekOpen)} color="var(--ok)" size="lg">Konfirmasi Diterima</Btn>
            <Btn onClick={()=>setCekOpen(null)} color="var(--tx4)" variant="outline" size="lg">Batal</Btn>
          </div>
        </div>}
      </Modal>
      <Modal open={open} onClose={()=>{setOpen(false);setPhoto(null);}} title="Buat Laporan Mutasi">
        {/* Info regu + auto-isi dalam satu baris */}
        <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"stretch"}}>
          <div style={{flex:1,background:"var(--green-card)",border:"1.5px solid #86efac",borderRadius:10,padding:"8px 12px",display:"flex",gap:8,alignItems:"center"}}>
            <span style={{fontSize:16}}>🔄</span>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:700,color:"var(--ok)"}}>Serah Terima Otomatis</div>
              <div style={{fontSize:10.5,color:"var(--tx)"}}>Regu <b>{reguHari}</b> → Regu <b>{toReguAuto}</b></div>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <Btn onClick={buatAutoLaporan} color="var(--accent)" size="sm">⚡ Isi Otomatis</Btn>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}><Inp label="Dari Regu" value={fm.fromRegu} onChange={e=>f("fromRegu",e.target.value)} as="select" half>{[1,2,3].map(r=><option key={r} value={r}>Regu {r}</option>)}</Inp><Inp label="Kepada Regu" value={fm.toRegu} onChange={e=>f("toRegu",e.target.value)} as="select" half><option value="">— Pilih —</option>{[1,2,3].map(r=><option key={r} value={r}>Regu {r}</option>)}</Inp></div>
        <Inp label="Laporan Kejadian" value={fm.content} onChange={e=>f("content",e.target.value)} as="textarea" placeholder="Klik 'Isi Otomatis' atau ketik manual..."/>
        <div style={{display:"flex",gap:10}}><Inp label="Insiden" value={fm.incidents} onChange={e=>f("incidents",e.target.value)} placeholder="Detail" half/><Inp label="Paket" value={fm.packages} onChange={e=>f("packages",e.target.value)} placeholder="Jumlah" half/><Inp label="Tamu" value={fm.guests} onChange={e=>f("guests",e.target.value)} placeholder="Nama" half/></div>
        <Inp label="Catatan Tambahan" value={fm.notes} onChange={e=>f("notes",e.target.value)} as="textarea" placeholder="Pesan untuk regu berikutnya..."/>
        <PhotoPicker photo={photo} setPhoto={setPhoto} label="📷 Foto Kondisi Laporan" color="var(--accent)"/>
        <div style={{display:"flex",gap:8}}><Btn onClick={submit} color="var(--accent)" size="lg">Simpan</Btn><Btn onClick={()=>setOpen(false)} color="var(--tx4)" variant="outline" size="lg">Batal</Btn></div>
      </Modal>
    </div>
  );
}

// ─── ABSEN TAB ────────────────────────────────────────────────────────────────
function AbsenTab({absen,setAbsen,liburData,setLiburData,reguHari,toast,canEdit,isAdmin,now}) {
  const todayKey = now.toISOString().slice(0,10);
  const todayLabel = now.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const members = REGU[reguHari]||[];
  const [viewDate,setViewDate] = useState(todayKey);

  // absen structure: { "YYYY-MM-DD": { "Nama": {status:"Hadir"|"Izin"|"Sakit"|"Alpa"|"Libur", ket:"..."} } }
  const todayAbsen = absen[viewDate] || {};
  const isToday = viewDate === todayKey;
  const isHarilibur = isHariLibur(new Date(viewDate));

  // Set status absen anggota
  const setStatus=(nama,status,ket="")=>{
    if(!canEdit&&!isAdmin){toast("Tidak bisa edit",false);return;}
    const updated={...absen,[viewDate]:{...todayAbsen,[nama]:{status,ket,ts:Date.now()}}};
    setAbsen(updated); toast(`${nama}: ${status}`);
  };

  // Set libur tambahan manual untuk tanggal tertentu
  const toggleLiburTambahan=(nama)=>{
    if(!isAdmin){toast("Hanya admin yang bisa menetapkan libur tambahan",false);return;}
    const cur=liburData[viewDate]||[];
    const next=cur.includes(nama)?cur.filter(x=>x!==nama):[...cur,nama];
    setLiburData({...liburData,[viewDate]:next});
    toast(cur.includes(nama)?`${nama} dihapus dari libur tambahan`:`${nama} ditetapkan libur tambahan`);
  };

  const STATUS_COL={Hadir:"var(--ok)",Izin:"#ffcc00",Sakit:"#a78bfa",Alpa:"#dc2626",Libur:"var(--accent)"};
  const STATUS_BG ={Hadir:"var(--green-card)",Izin:"rgba(255,204,0,.07)",Sakit:"rgba(167,139,250,.1)",Alpa:"rgba(255,50,50,.1)",Libur:"rgba(0,170,255,.1)"};
  const statusList=["Hadir","Izin","Sakit","Alpa","Libur"];

  // Statistik
  const allDays=Object.keys(absen).sort();
  const allMembers=Object.values(REGU).flat();

  // Buat daftar tanggal 7 hari terakhir untuk navigasi
  const navDays=[];
  for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);navDays.push(d.toISOString().slice(0,10));}

  const liburTambahanHari=liburData[viewDate]||[];
  const reguViewDate = getReguHari(new Date(viewDate));
  const membersView = REGU[reguViewDate]||[];

  // Rekap bulan ini
  const thisMonth = now.toISOString().slice(0,7);
  const rekapBulan = {};
  allMembers.forEach(nm=>{
    rekapBulan[nm]={Hadir:0,Izin:0,Sakit:0,Alpa:0,Libur:0};
    Object.entries(absen).forEach(([dt,da])=>{
      if(dt.startsWith(thisMonth)&&da[nm]) rekapBulan[nm][da[nm].status]=(rekapBulan[nm][da[nm].status]||0)+1;
    });
  });

  return (
    <div>
      <PH title="Absensi Anggota" sub={`Regu ${reguHari} · ${todayLabel}`}/>
      {!canEdit&&!isAdmin&&<ReadOnlyBanner reguHari={reguHari}/>}

      {/* Navigasi tanggal */}
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:14,paddingBottom:2}}>
        {navDays.map(d=>{
          const isS=d===viewDate;
          const libH=isHariLibur(new Date(d));
          return (
            <button key={d} onClick={()=>setViewDate(d)} style={{flexShrink:0,padding:"6px 10px",borderRadius:9,border:`1.5px solid ${isS?"var(--accent)":libH?"#ffcc00":"var(--border)"}`,background:isS?"var(--accent)":libH?"rgba(255,204,0,.1)":"var(--card-solid)",color:isS?"var(--card-solid)":libH?"#ffcc00":"var(--tx)",fontWeight:isS?800:600,fontSize:11.5,cursor:"pointer",fontFamily:"inherit"}}>
              <div>{new Date(d).toLocaleDateString("id-ID",{day:"numeric",month:"short"})}</div>
              <div style={{fontSize:9,opacity:.7}}>{new Date(d).toLocaleDateString("id-ID",{weekday:"short"})}</div>
            </button>
          );
        })}
      </div>

      {/* Header tanggal yang dipilih */}
      <div style={{background:isHarilibur?"linear-gradient(135deg,rgba(255,200,0,.15),rgba(255,200,0,.25))":"var(--admin-card-bg)",borderRadius:12,padding:"12px 16px",marginBottom:14,color:isHarilibur?"#ffcc00":"var(--tx)"}}>
        <div style={{fontSize:11,opacity:.7}}>Tanggal</div>
        <div style={{fontSize:16,fontWeight:900}}>{new Date(viewDate).toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
        <div style={{fontSize:11,marginTop:4,opacity:.8}}>Regu {reguViewDate} piket{isHarilibur?" · 🌴 Hari Libur":""}</div>
        {liburTambahanHari.length>0&&<div style={{marginTop:6,fontSize:11.5,fontWeight:700}}>🏖 Libur tambahan: {liburTambahanHari.join(", ")}</div>}
      </div>

      {/* Daftar absen anggota */}
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden",marginBottom:14}}>
        <div style={{background:"var(--accent)",padding:"8px 14px",display:"grid",gridTemplateColumns:"1fr auto",alignItems:"center"}}>

// Simpan PIN anggota ke Firestore (koleksi sipamdal_pins)
async function savePinToFS(name, pin) {
  const fb = window.__FB;
  if (!fb) return;
  const { db, doc, setDoc } = fb;
  await setDoc(doc(db, "sipamdal_pins", name), { pin, updatedAt: new Date().toISOString() });
}

// Baca PIN dari Firestore, fallback ke localStorage
async function getPinFromFS(name) {
  const fb = window.__FB;
  if (!fb) return null;
  try {
    const { db, doc, getDocs, collection } = fb;
    const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap = await getDoc(doc(db, "sipamdal_pins", name));
    if (snap.exists()) return snap.data().pin;
  } catch{}
  return null;
}

// Catat login ke Firestore
function recordLogin(name, regu, isAdmin) {
  const fb = window.__FB;
  if (!fb) return;
  fb.writeAuditLog({ action: "LOGIN", actor: name, regu: regu||0, isAdmin: !!isAdmin, detail: "Berhasil login" });
  // Simpan riwayat login ke koleksi login_history
  const { db, addDoc, collection, serverTimestamp } = fb;
  addDoc(collection(db, "sipamdal_login_history"), {
    name, regu: regu||0, isAdmin: !!isAdmin,
    ts: serverTimestamp(), tsLocal: new Date().toISOString(),
    device: navigator.userAgent.slice(0,80)
  }).catch(()=>{});
}

// Catat aksi data (patroli, insiden, dll)
function auditAction(actor, regu, action, detail) {
  const fb = window.__FB;
  if (!fb) return;
  fb.writeAuditLog({ action, actor, regu: regu||0, detail });
}

                style={{ background: pressedKey === String(d) ? "var(--card2)" : d === "⌫" ? "rgba(239,68,68,.15)" : d === "" ? "transparent" : "var(--card2)", border: `1.5px solid ${d === "" ? "transparent" : d === "⌫" ? "rgba(239,68,68,.4)" : "var(--border2)"}`, borderRadius: 12, height: 56, fontSize: d === "⌫" ? 18 : 22, fontWeight: 700, color: d === "⌫" ? "var(--r)" : "var(--tx)", cursor: d === "" ? "default" : "pointer", fontFamily: "inherit", transition: "all .12s", transform: pressedKey === String(d) ? "scale(.92)" : "scale(1)" }}>
                {d}
              </button>
            ))}
          </div>
          <div style={{ marginTop: 16, fontSize: 11, color: "var(--tx4)" }}>
            {selected.isAdmin ? "PIN Admin default: 000000" : "PIN default: 123456"}
          </div>
        </div>
      )}
      <div style={{ marginTop: 32, fontSize: 11, color: "var(--tx4)", textAlign: "center", letterSpacing: .5 }}>
        Dikembangkan oleh <span style={{ color: "var(--accent-light)", fontWeight: 700 }}>Rukman Abu Hamzah</span>
      </div>
      <style>{`
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
        
        @keyframes logoPulse{0%,100%{box-shadow:0 6px 24px rgba(0,0,0,.35),0 0 0 0 rgba(255,255,255,.15)}60%{box-shadow:0 6px 24px rgba(0,0,0,.35),0 0 0 10px rgba(255,255,255,0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes avatarPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
      `}</style>
    </div>
  );
}

// ─── PROFILE / PROGRES TAB ────────────────────────────────────────────────────
function ProfileTab({ currentUser, patrols, standJaga, incidents, mutations, onLogout, onChangePin, toast, userPins, setUserPins }) {
  const [changePinOpen, setChangePinOpen] = useState(false);
  const [oldPin, setOldPin] = useState("");
  const [newPin, setNewPin] = useState("");
  const [confirmPin, setConfirmPin] = useState("");
  // userPins & setUserPins passed as props

  const name = currentUser.name;
  const today = new Date();

  // Statistik aktivitas user ini
  const myPatrols = patrols.filter(p => p.officer && p.officer.includes(name));
  const myPatrolsToday = myPatrols.filter(p => new Date(p.ts).toDateString() === today.toDateString());
  const myStand = standJaga.filter(s => s.officer && s.officer.includes(name));
  const myStandToday = myStand.filter(s => new Date(s.ts).toDateString() === today.toDateString());
  const myIncidents = incidents.filter(i => i.officer && i.officer.includes(name));
  const myMutations = mutations.filter(m => m.fromRegu === currentUser.regu);

  const reguColors = { 1: "var(--accent)", 2: "var(--ok)", 3: "#a78bfa" };
  const col = reguColors[currentUser.regu] || "var(--accent)";

  // Hitung skor keaktifan (hari ini)
  const score = myPatrolsToday.length * 10 + myStandToday.length * 5;

  const handleChangePin = async () => {
    let freshPins = { ...DEFAULT_PINS };
    try { const s = localStorage.getItem("pad_pins"); if (s) freshPins = { ...DEFAULT_PINS, ...JSON.parse(s) }; } catch {}
    let correctOld = await getPinFromFS(name).catch(()=>null);
    if (!correctOld) correctOld = (freshPins[name] || "123456").trim();
    const inputOld = oldPin.trim();
    if (inputOld !== correctOld) { toast("PIN lama salah! (default: 123456)", false); return; }
    if (newPin.trim().length !== 6 || !/^\d{6}$/.test(newPin.trim())) { toast("PIN baru harus 6 angka!", false); return; }
    if (newPin.trim() !== confirmPin.trim()) { toast("Konfirmasi PIN tidak cocok!", false); return; }
    await savePinToFS(name, newPin.trim()).catch(()=>{});
    const updated = { ...freshPins, [name]: newPin.trim() };
    setUserPins(updated);
    auditAction(name, currentUser.regu, "GANTI_PIN", "PIN berhasil diubah");
    setChangePinOpen(false); setOldPin(""); setNewPin(""); setConfirmPin("");
    toast("PIN berhasil diubah!");
  };

  const statCard = (label, value, sub, color, bg) => (
    <div style={{ background: bg, border: `1.5px solid ${color}20`, borderRadius: 12, padding: "12px 14px", textAlign: "center" }}>
      <div style={{ fontSize: 28, fontWeight: 900, color }}>{value}</div>
      <div style={{ fontSize: 10.5, fontWeight: 700, color, marginBottom: 2 }}>{label}</div>
      {sub && <div style={{ fontSize: 10, color: "var(--tx4)" }}>{sub}</div>}
    </div>
  );

  return (
    <div>
      {/* Profile Card */}
      <div style={{ background: `linear-gradient(135deg,${col},${col}cc)`, borderRadius: 16, padding: "20px", marginBottom: 16, color: "#fff", position: "relative" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 56, height: 56, background: "rgba(255,255,255,.25)", borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>👤</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 20, fontWeight: 700 }}>{name}</div>
            <div style={{ fontSize: 12, opacity: .8, marginTop: 2 }}>Regu {currentUser.regu} · BBPKA II Jatinangor</div>
            <div style={{ marginTop: 6, display: "inline-block", background: "rgba(255,255,255,.2)", borderRadius: 7, padding: "3px 10px", fontSize: 11, fontWeight: 700 }}>
              🏆 Skor Hari Ini: {score} poin
            </div>
          </div>
        </div>
      </div>

      {/* Statistik Hari Ini */}
      <div style={{ fontSize: 12, fontWeight: 800, color: "var(--accent)", marginBottom: 8 }}>📊 Aktivitas Hari Ini</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
        {statCard("Patroli", myPatrolsToday.length, "scan hari ini", "var(--ok)", "var(--green-card)")}
        {statCard("Stand Jaga", myStandToday.length, "pos hari ini", "var(--accent)", "var(--green-card)")}
      </div>

      {/* Statistik Total */}
      <div style={{ fontSize: 12, fontWeight: 800, color: "var(--accent)", marginBottom: 8 }}>📈 Total Rekap</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
        {statCard("Patroli", myPatrols.length, "semua waktu", "var(--ok)", "var(--green-card)")}
        {statCard("Stand Jaga", myStand.length, "semua waktu", "var(--accent)", "rgba(0,170,255,.1)")}
        {statCard("Insiden", myIncidents.length, "dilaporkan", "#dc2626", "rgba(255,50,50,.1)")}
      </div>

      {/* Log Patroli Terbaru */}
      <div style={{ background: "var(--card-solid)", border: "1.5px solid #081510", borderRadius: 12, padding: "12px 14px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: "var(--accent)", marginBottom: 10 }}>🗓 Log Patroli Terbaru</div>
        {myPatrols.length === 0 && <div style={{ fontSize: 12, color: "var(--tx4)" }}>Belum ada patroli</div>}
        {[...myPatrols].reverse().slice(0, 8).map(p => (
          <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 9, padding: "6px 0", borderBottom: "1px solid var(--border)" }}>
            <div style={{ width: 30, height: 30, background: p.photo?"rgba(167,139,250,.1)":"var(--green-card)", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              {p.photo?<span style={{fontSize:14}}>📷</span>:<IC n="qr" s={13} c="var(--ok)" />}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "var(--tx)" }}>{p.areas?.join(", ")}</div>
              <div style={{ fontSize: 10.5, color: "var(--tx4)" }}>{p.pos}{p.photo&&<span style={{color:"#a78bfa",marginLeft:6}}>📷 Ada foto</span>}</div>
            </div>
            <div style={{ fontSize: 10.5, fontWeight: 700, color: "var(--ok)" }}>{fmtDT(p.ts)}</div>
          </div>
        ))}
      </div>

      {/* Log Stand Jaga Terbaru */}
      <div style={{ background: "var(--card-solid)", border: "1.5px solid #081510", borderRadius: 12, padding: "12px 14px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: "var(--accent)", marginBottom: 10 }}>🛡 Log Stand Jaga Terbaru</div>
        {myStand.length === 0 && <div style={{ fontSize: 12, color: "var(--tx4)" }}>Belum ada stand jaga</div>}
        {[...myStand].reverse().slice(0, 5).map(s => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 9, padding: "6px 0", borderBottom: "1px solid var(--border)" }}>
            <div style={{ width: 30, height: 30, background: "var(--green-card)", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><IC n="shield" s={13} c="var(--accent)" /></div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "var(--tx)" }}>{s.area}</div>
              <div style={{ fontSize: 10.5, color: "var(--tx4)" }}>{s.pos}</div>
            </div>
            <div style={{ fontSize: 10.5, fontWeight: 700, color: "var(--accent)" }}>{fmtDT(s.ts)}</div>
          </div>
        ))}
      </div>

      {/* Aksi */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        <Btn onClick={() => setChangePinOpen(true)} color="#a78bfa" variant="outline" full>🔑 Ganti PIN</Btn>
        <Btn onClick={onLogout} color="#dc2626" variant="outline" full>Keluar</Btn>
      </div>

      <Modal open={changePinOpen} onClose={() => setChangePinOpen(false)} title="Ganti PIN">
        <Inp label="PIN Lama" value={oldPin} onChange={e => setOldPin(e.target.value.replace(/[^0-9]/g,"").slice(0,6))} type="tel" placeholder="Ketik 6 angka" />
        <Inp label="PIN Baru (6 digit)" value={newPin} onChange={e => setNewPin(e.target.value.replace(/[^0-9]/g,"").slice(0,6))} type="tel" placeholder="Ketik 6 angka" />
        <Inp label="Konfirmasi PIN Baru" value={confirmPin} onChange={e => setConfirmPin(e.target.value.replace(/[^0-9]/g,"").slice(0,6))} type="tel" placeholder="Ulangi PIN baru" />
        <div style={{ display: "flex", gap: 8 }}><Btn onClick={handleChangePin} color="#a78bfa" size="lg">Simpan</Btn><Btn onClick={() => setChangePinOpen(false)} color="var(--tx4)" variant="outline" size="lg">Batal</Btn></div>
      </Modal>
    </div>
  );
}

// ─── ADMIN MEMBER PROGRESS VIEW ───────────────────────────────────────────────
function AdminMemberTab({ patrols, standJaga, incidents, mutations }) {
  const [selectedMember, setSelectedMember] = useState(null);
  const [activeTab, setActiveTab] = useState("progres");
  const [auditLogs, setAuditLogs] = useState([]);
  const [loginHistory, setLoginHistory] = useState([]);
  const [loadingAudit, setLoadingAudit] = useState(false);
  const [resetTarget, setResetTarget] = useState(null);
  const [newResetPin, setNewResetPin] = useState("");
  const [pinMap, setPinMap] = useState({});
  const [resetDataOpen, setResetDataOpen] = useState(false);
  const [resetDataPin, setResetDataPin] = useState("");
  const [resetDataLoading, setResetDataLoading] = useState(false);
  const [resetDataItems, setResetDataItems] = useState({
    patroli: true, insiden: true, paket: true, tamu: true,
    mutasi: true, stand: true, absen: true, instruksi: false,
    inventaris: false, libur: false, pos: true, audit: true, login: true, pins: false,
  });
  const today = new Date();
  const reguColors = { 1: "var(--accent)", 2: "var(--ok)", 3: "#a78bfa" };

  const loadAudit = async () => {
    setLoadingAudit(true);
    const fb = window.__FB;
    if (!fb) { setLoadingAudit(false); return; }
    try {
      const { db, collection, query, orderBy, limit, getDocs } = fb;
      const q = query(collection(db, "sipamdal_audit"), orderBy("tsLocal","desc"), limit(50));
      const snap = await getDocs(q);
      setAuditLogs(snap.docs.map(d=>({id:d.id,...d.data()})));
      const q2 = query(collection(db, "sipamdal_login_history"), orderBy("tsLocal","desc"), limit(30));
      const snap2 = await getDocs(q2);
      setLoginHistory(snap2.docs.map(d=>({id:d.id,...d.data()})));
    } catch(e) {}
    setLoadingAudit(false);
  };

  useEffect(() => { if (activeTab==="audit") loadAudit(); }, [activeTab]);
  useEffect(() => {
    try { const s = localStorage.getItem("pad_pins"); if(s) setPinMap(JSON.parse(s)); } catch{}
  }, []);

  const handleResetPin = async () => {
    if (!resetTarget) return;
    if (newResetPin.length !== 6 || !/^\d{6}$/.test(newResetPin)) { alert("PIN harus 6 angka!"); return; }
    await savePinToFS(resetTarget.name, newResetPin).catch(()=>{});
    const updated = { ...pinMap, [resetTarget.name]: newResetPin };
    setPinMap(updated);
    try { localStorage.setItem("pad_pins", JSON.stringify(updated)); } catch{}
    auditAction("Admin", 0, "RESET_PIN", "Reset PIN " + resetTarget.name);
    alert("PIN " + resetTarget.name + " berhasil direset ke " + newResetPin);
    setResetTarget(null); setNewResetPin("");
  };

  const handleResetData = async () => {
    const fb = window.__FB;
    const savedPin = pinMap["Admin"] || localStorage.getItem("pad_admin_pin") || "000000";
    if (resetDataPin !== savedPin) { alert("PIN Admin salah!"); return; }
    setResetDataLoading(true);
    const LS_MAP = {
      patroli:"pad_patrol", insiden:"pad_inc", paket:"pad_pkg", tamu:"pad_guest",
      mutasi:"pad_mut", stand:"pad_stand", absen:"pad_absen", instruksi:"pad_instruksi",
      inventaris:"pad_inv_cek", libur:"pad_libur", pos:"pad_pos_",
    };
    const FS_COLLECTIONS = {
      audit:"sipamdal_audit", login:"sipamdal_login_history",
    };
    let fsError = false;
    try {
      // Hapus localStorage dulu (selalu berhasil)
      for (const [key, lsKey] of Object.entries(LS_MAP)) {
        if (!resetDataItems[key]) continue;
        if (key === "pos") {
          Object.keys(localStorage).filter(k=>k.startsWith("pad_pos_")).forEach(k=>localStorage.removeItem(k));
        } else {
          localStorage.removeItem(lsKey);
        }
      }
      if (resetDataItems.pins) {
        localStorage.removeItem("pad_pins");
        localStorage.removeItem("pad_admin_pin");
      }
      // Coba hapus Firestore (mungkin gagal karena rules)
      if (fb) {
        const { db, collection, getDocs, deleteDoc } = fb;
        for (const [key, colName] of Object.entries(FS_COLLECTIONS)) {
          if (!resetDataItems[key]) continue;
          try {
            const snap = await getDocs(collection(db, colName));
            await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
          } catch { fsError = true; }
        }
        const mainKeys = [];
        if (resetDataItems.patroli) mainKeys.push("pad_patrol");
        if (resetDataItems.insiden) mainKeys.push("pad_inc");
        if (resetDataItems.paket) mainKeys.push("pad_pkg");
        if (resetDataItems.tamu) mainKeys.push("pad_guest");
        if (resetDataItems.mutasi) mainKeys.push("pad_mut");
        if (resetDataItems.stand) mainKeys.push("pad_stand");
        if (resetDataItems.absen) mainKeys.push("pad_absen");
        if (resetDataItems.instruksi) mainKeys.push("pad_instruksi");
        if (resetDataItems.libur) mainKeys.push("pad_libur");
        if (resetDataItems.inventaris) mainKeys.push("pad_inv_daftar","pad_inv_cek");
        for (const k of mainKeys) {
          try { await fb.setDoc(fb.doc(db,"sipamdal",k),{items:[]}); } catch{ fsError = true; }
        }
        if (resetDataItems.pos) {
          try {
            const snap = await getDocs(collection(db, "sipamdal"));
            await Promise.all(snap.docs.filter(d=>d.id.startsWith("pad_pos_")).map(d=>deleteDoc(d.ref)));
          } catch { fsError = true; }
        }
      }
      setResetDataLoading(false);
      setResetDataOpen(false);
      setResetDataPin("");
      if (fsError) {
        alert("✅ Data lokal berhasil dihapus!\n\n⚠️ Sebagian data Firebase tidak dapat dihapus (izin terbatas). Data di perangkat ini sudah bersih. Refresh halaman untuk melanjutkan.");
      } else {
        alert("✅ Data berhasil dihapus! Silakan refresh halaman.");
      }
      window.location.reload();
    } catch(e) {
      setResetDataLoading(false);
      alert("❌ Terjadi kesalahan: " + e.message);
    }
  };

  const ACTION_COL = { LOGIN:"var(--ok)", LOGOUT:"var(--tx4)", AUTO_LOGOUT:"#ffcc00", GANTI_PIN:"#a78bfa", RESET_PIN:"#dc2626" };
  const ACTION_ICON = { LOGIN:"🔐", LOGOUT:"🚪", AUTO_LOGOUT:"⏱", GANTI_PIN:"🔑", RESET_PIN:"🛠" };

  const getMemberStats = (name) => {
    const myP = patrols.filter(p => p.officer && p.officer.includes(name));
    const myPT = myP.filter(p => new Date(p.ts).toDateString() === today.toDateString());
    const myS = standJaga.filter(s => s.officer && s.officer.includes(name));
    const myST = myS.filter(s => new Date(s.ts).toDateString() === today.toDateString());
    const myI = incidents.filter(i => i.officer && i.officer.includes(name));
    return { patrols: myP.length, patrolsToday: myPT.length, stand: myS.length, standToday: myST.length, incidents: myI.length, score: myPT.length * 10 + myST.length * 5 };
  };

  if (selectedMember) {
    const m = selectedMember;
    const stats = getMemberStats(m.name);
    const myP = patrols.filter(p => p.officer && p.officer.includes(m.name));
    const myS = standJaga.filter(s => s.officer && s.officer.includes(m.name));
    const col = reguColors[m.regu];
    return (
      <div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
          <button onClick={() => setSelectedMember(null)} style={{ background: "var(--green-card)", border: "1px solid var(--border)", borderRadius: 8, padding: "6px 12px", fontSize: 12, color: "var(--accent)", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>← Kembali</button>
          <h2 style={{ margin: 0, fontSize: 16, fontWeight: 900, color: "var(--tx)" }}>{m.name}</h2>
        </div>
        <div style={{ background: `linear-gradient(135deg,${col},${col}bb)`, borderRadius: 14, padding: "16px 18px", marginBottom: 14, color: "#fff" }}>
          <div style={{ fontSize: 18, fontWeight: 900 }}>{m.name}</div>
          <div style={{ fontSize: 12, opacity: .8 }}>Regu {m.regu} · Skor Hari Ini: {stats.score} poin</div>
          <div style={{ display: "flex", gap: 10, marginTop: 10, flexWrap: "wrap" }}>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.patrolsToday}</div><div style={{ fontSize: 10 }}>Patroli Hari Ini</div></div>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.standToday}</div><div style={{ fontSize: 10 }}>Stand Hari Ini</div></div>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.patrols}</div><div style={{ fontSize: 10 }}>Total Patroli</div></div>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.incidents}</div><div style={{ fontSize: 10 }}>Insiden</div></div>
          </div>
        </div>
        <div style={{ background: "var(--card-solid)", border: "1.5px solid #081510", borderRadius: 12, padding: "12px 14px", marginBottom: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "var(--ok)", marginBottom: 8 }}>Log Patroli ({myP.length})</div>
          {myP.length === 0 && <div style={{ fontSize: 12, color: "var(--tx4)" }}>Belum ada</div>}
          {[...myP].reverse().slice(0, 10).map(p => (
            <div key={p.id} style={{ padding: "6px 0", borderBottom: "1px solid var(--border)", fontSize: 12 }}>
              <div style={{ fontWeight: 700, color: "var(--tx)" }}>{p.areas?.join(", ")}</div>
              <div style={{ color: "var(--tx4)", fontSize: 10.5 }}>{fmtDT(p.ts)} · {p.pos}</div>
            </div>
          ))}
        </div>
        <div style={{ background: "var(--card-solid)", border: "1.5px solid #081510", borderRadius: 12, padding: "12px 14px" }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "var(--accent)", marginBottom: 8 }}>Log Stand Jaga ({myS.length})</div>
          {myS.length === 0 && <div style={{ fontSize: 12, color: "var(--tx4)" }}>Belum ada</div>}
          {[...myS].reverse().slice(0, 10).map(s => (
            <div key={s.id} style={{ padding: "6px 0", borderBottom: "1px solid var(--border)", fontSize: 12 }}>
              <div style={{ fontWeight: 700, color: "var(--tx)" }}>{s.area}</div>
              <div style={{ color: "var(--tx4)", fontSize: 10.5 }}>{fmtDT(s.ts)} · {s.pos}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div>
      <PH title="Anggota & Keamanan" sub="Progres, audit log, dan manajemen PIN" />

      {/* Sub-tab */}
      <div style={{ display:"flex", gap:0, background:"var(--card-solid)", borderRadius:10, padding:3, marginBottom:14 }}>
        {[{id:"progres",label:"📊 Progres"},{id:"audit",label:"📋 Audit Log"},{id:"pin",label:"🔑 Reset PIN"},{id:"reset",label:"🗑 Reset Data"}].map(t=>(
          <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{ flex:1, border:"none", borderRadius:8, padding:"8px 4px", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit", background: activeTab===t.id?"var(--card-solid)":"transparent", color: activeTab===t.id?"var(--accent)":"var(--tx4)", boxShadow: activeTab===t.id?"0 1px 4px rgba(0,0,0,.08)":"none", transition:"all .2s" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* PROGRES TAB */}
      {activeTab==="progres" && [1,2,3].map(r => (
        <div key={r} style={{ marginBottom: 18 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: reguColors[r], marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: reguColors[r] }} />
            REGU {r}
          </div>
          {REGU[r].map(name => {
            const stats = getMemberStats(name);

              <div style={{ fontSize:10.5, color:"var(--tx3)", marginTop:1 }}>{log.isAdmin?"Admin":"Regu "+log.regu} · {(log.device||"").slice(0,40)}</div>
            </div>
          ))}
        </div>
      )}

      {/* RESET PIN TAB */}
      {activeTab==="pin" && (
        <div>

          </div>
          {[1,2,3].map(r=>(
            <div key={r} style={{ marginBottom:18 }}>
              <div style={{ fontSize:12, fontWeight:800, color:reguColors[r], marginBottom:8 }}>REGU {r}</div>
              {REGU[r].map(name=>(
                <div key={name} style={{ background:"var(--card-solid)", border:"1.5px solid var(--border2)", borderRadius:11, padding:"10px 14px", marginBottom:7, display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:18 }}>👤</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:800, color:"var(--tx2)" }}>{name}</div>
                    <div style={{ fontSize:10, color:"var(--tx3)" }}>PIN tersimpan di Firestore</div>
                  </div>
                  <button onClick={()=>setResetTarget({name,regu:r})} style={{ background:"rgba(255,50,50,.1)", border:"1.5px solid #fecaca", borderRadius:7, padding:"5px 11px", fontSize:11, fontWeight:700, color:"#dc2626", cursor:"pointer", fontFamily:"inherit" }}>Reset</button>
                </div>
              ))}
            </div>

          {resetTarget && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
              <div style={{ background:"var(--card-solid)", borderRadius:16, padding:20, width:"100%", maxWidth:320 }}>
                <div style={{ fontSize:16, fontWeight:900, color:"var(--tx2)", marginBottom:4 }}>Reset PIN</div>
                <div style={{ fontSize:12, color:"var(--tx3)", marginBottom:14 }}>{resetTarget.name} · Regu {resetTarget.regu}</div>
                <input value={newResetPin} onChange={e=>setNewResetPin(e.target.value.replace(/[^0-9]/g,"").slice(0,6))} type="tel" placeholder="PIN baru 6 digit" style={{ width:"100%", border:"1.5px solid var(--border2)", borderRadius:9, padding:"10px 12px", fontSize:15, fontFamily:"inherit", marginBottom:12, boxSizing:"border-box" }} />
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={handleResetPin} style={{ flex:1, background:"var(--r)", border:"none", borderRadius:9, padding:11, color:"#fff", fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>Simpan</button>
                  <button onClick={()=>{setResetTarget(null);setNewResetPin("");}} style={{ flex:1, background:"var(--card-solid)", border:"none", borderRadius:9, padding:11, color:"var(--tx3)", fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>Batal</button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
      {/* RESET DATA TAB */}
      {activeTab==="reset" && (
        <div>
          {/* Warning banner */}
          <div style={{background:"rgba(220,38,38,.08)",border:"1.5px solid #fca5a5",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:900,color:"#dc2626",marginBottom:4}}>⚠️ Zona Bahaya</div>
            <div style={{fontSize:11.5,color:"var(--tx2)",lineHeight:1.6}}>Fitur ini menghapus data permanen dari Firebase & perangkat. Gunakan sebelum launching untuk memulai dengan data bersih. Tindakan ini <strong>tidak dapat dibatalkan</strong>.</div>
          </div>

          {/* Pilih data yang dihapus */}
          <div style={{background:"var(--card-solid)",borderRadius:12,padding:"12px 14px",marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:800,color:"var(--tx2)",marginBottom:10}}>Pilih Data yang Dihapus:</div>
            {[
              {key:"patroli",label:"🔍 Data Patroli",desc:"Semua catatan patroli"},
              {key:"stand",label:"🛡️ Data Stand Jaga",desc:"Log stand jaga harian"},
              {key:"insiden",label:"🚨 Data Insiden",desc:"Semua laporan insiden"},
              {key:"paket",label:"📦 Data Paket",desc:"Riwayat paket masuk/keluar"},
              {key:"tamu",label:"👥 Data Tamu",desc:"Riwayat tamu menginap"},
              {key:"mutasi",label:"📋 Laporan Mutasi",desc:"Semua laporan serah terima"},
              {key:"pos",label:"🏠 Penempatan Pos",desc:"Semua data posisi anggota"},
              {key:"absen",label:"📅 Data Absensi",desc:"Riwayat kehadiran anggota"},
              {key:"audit",label:"📝 Audit Log",desc:"Log aktivitas sistem (Firestore)"},
              {key:"login",label:"🔐 Riwayat Login",desc:"Log login semua pengguna"},
              {key:"instruksi",label:"📢 Instruksi Pimpinan",desc:"Semua instruksi yang tersimpan"},
              {key:"libur",label:"🏖 Data Libur",desc:"Pengaturan hari libur tambahan"},
              {key:"inventaris",label:"📦 Cek Inventaris",desc:"Riwayat cek inventaris"},
              {key:"pins",label:"🔑 Semua PIN",desc:"Reset PIN ke default (hati-hati!)"},
            ].map(item=>(
              <label key={item.key} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--border)",cursor:"pointer"}}>
                <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${resetDataItems[item.key]?"#dc2626":"var(--border2)"}`,background:resetDataItems[item.key]?"#dc2626":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}
                  onClick={()=>setResetDataItems(p=>({...p,[item.key]:!p[item.key]}))}>
                  {resetDataItems[item.key]&&<span style={{color:"#fff",fontSize:12,fontWeight:900}}>✓</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12.5,fontWeight:700,color:resetDataItems[item.key]?"#dc2626":"var(--tx)"}}>{item.label}</div>
                  <div style={{fontSize:10.5,color:"var(--tx4)"}}>{item.desc}</div>
                </div>
              </label>
            ))}
          </div>

          {/* Tombol hapus */}
          <button onClick={()=>setResetDataOpen(true)}
            style={{width:"100%",padding:"13px",background:"#dc2626",border:"none",borderRadius:12,color:"#fff",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"inherit",letterSpacing:.5}}>
            🗑 Hapus Data Terpilih
          </button>

          {/* Modal konfirmasi PIN */}
          {resetDataOpen && (
            <div style={{position:"fixed",inset:0,background:"var(--scrim)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
              <div style={{background:"var(--card-solid)",borderRadius:18,padding:22,width:"100%",maxWidth:340,boxShadow:"var(--shadow-lg)"}}>
                <div style={{fontSize:18,fontWeight:900,color:"#dc2626",marginBottom:6}}>🗑 Konfirmasi Hapus</div>
                <div style={{fontSize:12,color:"var(--tx3)",marginBottom:16,lineHeight:1.6}}>
                  Masukkan <strong>PIN Admin</strong> untuk mengkonfirmasi penghapusan. Data yang dihapus tidak bisa dikembalikan.
                </div>
                <div style={{fontSize:11,fontWeight:700,color:"var(--tx2)",marginBottom:6}}>Data yang akan dihapus:</div>
                <div style={{background:"rgba(220,38,38,.06)",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:11,color:"#dc2626",lineHeight:1.8}}>
                  {Object.entries(resetDataItems).filter(([,v])=>v).map(([k])=>({
                    patroli:"🔍 Patroli",stand:"🛡️ Stand Jaga",insiden:"🚨 Insiden",paket:"📦 Paket",
                    tamu:"👥 Tamu",mutasi:"📋 Mutasi",pos:"🏠 Penempatan Pos",absen:"📅 Absensi",
                    audit:"📝 Audit Log",login:"🔐 Login History",instruksi:"📢 Instruksi",
                    libur:"🏖 Libur",inventaris:"📦 Inventaris",pins:"🔑 Semua PIN",
                  }[k]||k)).join(" · ")}
                </div>
                <input
                  type="tel" placeholder="PIN Admin (6 digit)"
                  value={resetDataPin}
                  onChange={e=>setResetDataPin(e.target.value.replace(/\D/g,"").slice(0,6))}
                  style={{width:"100%",border:"2px solid #dc2626",borderRadius:10,padding:"11px 14px",fontSize:16,fontFamily:"inherit",marginBottom:14,boxSizing:"border-box",textAlign:"center",letterSpacing:4,color:"var(--tx)",background:"var(--card2)"}}
                />
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>{setResetDataOpen(false);setResetDataPin("");}}
                    style={{flex:1,padding:11,background:"var(--card2)",border:"1.5px solid var(--border2)",borderRadius:10,color:"var(--tx3)",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                    Batal
                  </button>
                  <button onClick={handleResetData} disabled={resetDataLoading||resetDataPin.length!==6}
                    style={{flex:2,padding:11,background:resetDataLoading||resetDataPin.length!==6?"#999":"#dc2626",border:"none",borderRadius:10,color:"#fff",fontWeight:900,fontSize:13,cursor:resetDataLoading?"wait":"pointer",fontFamily:"inherit"}}>
                    {resetDataLoading?"⏳ Menghapus...":"🗑 Hapus Sekarang"}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
// ─── INSTRUKSI PIMPINAN ──────────────────────────────────────────────────────

function InstruksiTab({instruksi, setInstruksi, toast, isAdmin, currentUser}) {
  const [open, setOpen] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [showArsip, setShowArsip] = useState(false);
  const [fm, setFm] = useState({judul:"", isi:"", prioritas:"Normal", targetRegu:"Semua"});
  const f = (k,v) => setFm(p=>({...p,[k]:v}));

  const PRI_COL = {Penting:"#dc2626", Normal:"var(--accent)", Info:"var(--ok)"};
  const PRI_BG  = {Penting:"rgba(220,38,38,.08)", Normal:"var(--green-card)", Info:"var(--green-card)"};

  const openNew = () => { setEditItem(null); setFm({judul:"",isi:"",prioritas:"Normal",targetRegu:"Semua"}); setOpen(true); };
  const openEdit = (ins) => { setEditItem(ins); setFm({judul:ins.judul,isi:ins.isi,prioritas:ins.prioritas,targetRegu:ins.targetRegu}); setOpen(true); };

  const submit = () => {
    if(!fm.judul||!fm.isi){toast("Judul & isi wajib diisi!",false);return;}
    if(editItem){
      setInstruksi(instruksi.map(i=>i.id===editItem.id?{...i,...fm,editedAt:Date.now()}:i));
      toast("Instruksi diperbarui!");
    } else {
      setInstruksi([{...fm,id:Date.now(),ts:Date.now(),aktif:true,selesai:false},...instruksi]);
      toast("Instruksi berhasil dikirim!");
    }
    setOpen(false);
  };

  const toggleAktif = (id) => {
    setInstruksi(instruksi.map(i=>i.id===id?{...i,aktif:!i.aktif}:i));
    toast("Status arsip diperbarui");
  };

  // Status selesai / belum — bisa dilakukan semua anggota
  const toggleSelesai = (id) => {
    const ins = instruksi.find(i=>i.id===id);
    const next = !ins?.selesai;
    setInstruksi(instruksi.map(i=>i.id===id?{...i,selesai:next,selesaiBy:next?(currentUser?.name||"—"):null,selesaiAt:next?Date.now():null}:i));
    toast(next?"✓ Ditandai selesai":"Dikembalikan ke belum selesai");
  };

  const hapus = (id) => {
    if(!window.confirm("Hapus instruksi ini?")) return;
    setInstruksi(instruksi.filter(i=>i.id!==id));
    toast("Instruksi dihapus");
  };

  const myRegu = currentUser?.regu;
  const aktifList = instruksi.filter(i=>i.aktif&&(i.targetRegu==="Semua"||String(i.targetRegu)===String(myRegu)));
  const arsipList = instruksi.filter(i=>!i.aktif);
  const belumSelesai = aktifList.filter(i=>!i.selesai).length;

  return (
    <div>
      <PH title="Instruksi Pimpinan" sub="Perintah & arahan dari pimpinan untuk seluruh anggota pamdal"
        action={isAdmin&&<Btn onClick={openNew} color="#dc2626"><IC n="plus" s={13}/> Buat Instruksi</Btn>}
      />

      {/* Tab aktif / arsip */}
      <div style={{display:"flex",gap:0,marginBottom:14,background:"var(--card-solid)",borderRadius:10,padding:3}}>
        {[["aktif",`Aktif${belumSelesai>0?" ("+belumSelesai+" belum)":""}`],["arsip",`Arsip (${arsipList.length})`]].map(([v,l])=>(
          <button key={v} onClick={()=>setShowArsip(v==="arsip")} style={{flex:1,padding:"8px 0",fontSize:12,fontWeight:700,borderRadius:8,border:"none",cursor:"pointer",background:showArsip===(v==="arsip")?"var(--card-solid)":"transparent",color:showArsip===(v==="arsip")?"var(--accent)":"var(--tx4)",boxShadow:showArsip===(v==="arsip")?"0 1px 6px rgba(0,0,0,.08)":"none",fontFamily:"inherit"}}>
            {l}
          </button>
        ))}
      </div>

      {/* Instruksi aktif */}
      {!showArsip&&(
        <>
          {aktifList.length===0&&(
            <div style={{background:"var(--green-card)",border:"1.5px solid #86efac",borderRadius:12,padding:"20px",textAlign:"center",color:"var(--ok)",fontSize:13,fontWeight:700}}>
              ✅ Tidak ada instruksi aktif saat ini
            </div>
          )}
          {aktifList.map(ins=>(
            <div key={ins.id} style={{background:ins.selesai?"var(--card-solid)":PRI_BG[ins.prioritas]||"var(--green-card)",border:`2px solid ${ins.selesai?"var(--border)":(PRI_COL[ins.prioritas]||"var(--accent)")+"40"}`,borderRadius:14,padding:"14px 16px",marginBottom:12,position:"relative",opacity:ins.selesai?.75:1}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:ins.selesai?"var(--accent-light)":PRI_COL[ins.prioritas]||"var(--accent)",borderRadius:"14px 14px 0 0"}}/>
              {/* Header baris */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,flexWrap:"wrap",gap:6}}>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{background:ins.selesai?"var(--accent-light)":PRI_COL[ins.prioritas]||"var(--accent)",color:"#fff",borderRadius:6,padding:"2px 9px",fontSize:10.5,fontWeight:800}}>
                    {ins.selesai?"✓":ins.prioritas==="Penting"?"🚨":ins.prioritas==="Info"?"ℹ️":"📋"} {ins.selesai?"Selesai":ins.prioritas}
                  </span>
                  {ins.targetRegu!=="Semua"&&<Bdg text={"Regu "+ins.targetRegu} color="var(--tx4)"/>}
                  <span style={{fontSize:10,color:"var(--tx3)"}}>{fmtDT(ins.ts)}</span>
                  {ins.editedAt&&<span style={{fontSize:9,color:"var(--tx3)"}}>(diedit)</span>}
                </div>
                {/* Admin: edit + arsip + hapus */}
                {isAdmin&&(
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    <button onClick={()=>openEdit(ins)} style={{background:"rgba(0,120,212,.1)",border:"1px solid var(--border)",borderRadius:6,padding:"3px 8px",fontSize:10,color:"var(--accent)",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✏️ Edit</button>
                    <button onClick={()=>toggleAktif(ins.id)} style={{background:"rgba(255,204,0,.07)",border:"1px solid #fcd34d",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#ffcc00",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Arsipkan</button>
                    <button onClick={()=>hapus(ins.id)} style={{background:"rgba(255,50,50,.1)",border:"1px solid #fca5a5",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#dc2626",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Hapus</button>
                  </div>
                )}
              </div>
              <div style={{fontSize:14,fontWeight:900,color:"var(--tx2)",marginBottom:6}}>{ins.judul}</div>
              <div style={{fontSize:12.5,color:"var(--tx)",lineHeight:1.7,whiteSpace:"pre-wrap",marginBottom:10}}>{ins.isi}</div>
              {ins.selesai&&ins.selesaiBy&&(
                <div style={{fontSize:10.5,color:"var(--ok)",marginBottom:8}}>✓ Diselesaikan oleh <strong>{ins.selesaiBy}</strong> · {fmtDT(ins.selesaiAt)}</div>
              )}
              {/* Tombol aksi selesai / belum — semua anggota bisa */}
              <div style={{display:"flex",gap:8}}>
                {!ins.selesai?(
                  <button onClick={()=>toggleSelesai(ins.id)} style={{flex:1,background:"var(--ok)",border:"none",borderRadius:9,padding:"10px",fontSize:13,fontWeight:700,color:"#fff",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    <IC n="ok" s={15} c="var(--card-solid)"/> Tandai Selesai
                  </button>
                ):(
                  <button onClick={()=>toggleSelesai(ins.id)} style={{flex:1,background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:9,padding:"10px",fontSize:13,fontWeight:800,color:"var(--accent-light)",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    ↩ Tandai Belum Selesai
                  </button>
                )}
              </div>
            </div>
          ))}
        </>
      )}

      {/* Arsip */}
      {showArsip&&(
        <>
          {arsipList.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"var(--tx3)",fontSize:13}}>Belum ada instruksi diarsipkan</div>}
          {[...arsipList].reverse().map(ins=>(
            <div key={ins.id} style={{background:"var(--card-solid)",border:"1px solid var(--border2)",borderRadius:11,padding:"10px 14px",marginBottom:8,opacity:.75}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",gap:5,marginBottom:2,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,color:"var(--tx3)",fontWeight:700}}>{ins.prioritas} · {fmtDT(ins.ts)}</span>
                    {ins.selesai&&<span style={{fontSize:10,color:"var(--ok)",fontWeight:700}}>✓ Selesai</span>}
                  </div>
                  <div style={{fontSize:12.5,fontWeight:700,color:"var(--tx3)"}}>{ins.judul}</div>
                </div>
                {isAdmin&&(
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={()=>openEdit(ins)} style={{background:"rgba(0,120,212,.1)",border:"1px solid var(--border)",borderRadius:6,padding:"3px 8px",fontSize:10,color:"var(--accent)",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✏️</button>
                    <button onClick={()=>toggleAktif(ins.id)} style={{background:"rgba(0,120,212,.1)",border:"1px solid var(--border)",borderRadius:6,padding:"3px 8px",fontSize:10,color:"var(--accent)",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Aktifkan</button>
                    <button onClick={()=>hapus(ins.id)} style={{background:"rgba(255,50,50,.1)",border:"1px solid #fca5a5",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#dc2626",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Hapus</button>
                  </div>
                )}
              </div>
            </div>
          ))}
        </>
      )}

      {/* Modal buat / edit instruksi */}
      <Modal open={open} onClose={()=>setOpen(false)} title={editItem?"Edit Instruksi":"Buat Instruksi Pimpinan"}>
        {!editItem&&<div style={{background:"rgba(255,50,50,.1)",border:"1px solid #fca5a5",borderRadius:9,padding:"9px 13px",marginBottom:14,fontSize:11.5,color:"var(--r)"}}>
          ⚠️ Instruksi akan langsung terlihat oleh semua anggota yang login
        </div>}
        <div style={{display:"flex",gap:10}}>
          <Inp label="Prioritas" value={fm.prioritas} onChange={e=>f("prioritas",e.target.value)} as="select" half>
            <option>Penting</option>
            <option>Normal</option>
            <option>Info</option>
          </Inp>
          <Inp label="Target" value={fm.targetRegu} onChange={e=>f("targetRegu",e.target.value)} as="select" half>
            <option>Semua</option>
            <option value="1">Regu 1</option>
            <option value="2">Regu 2</option>
            <option value="3">Regu 3</option>
          </Inp>
        </div>
        <Inp label="Judul Instruksi" value={fm.judul} onChange={e=>f("judul",e.target.value)} placeholder="Contoh: Siaga penuh malam ini"/>
        <Inp label="Isi Instruksi" value={fm.isi} onChange={e=>f("isi",e.target.value)} as="textarea" placeholder="Detail perintah / arahan dari pimpinan..."/>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={submit} color="#dc2626" size="lg" full>{editItem?"💾 Simpan Perubahan":"🚨 Kirim Instruksi"}</Btn>
          <Btn onClick={()=>setOpen(false)} color="var(--tx4)" variant="outline">Batal</Btn>
        </div>
      </Modal>
    </div>
  );
}

// DASHBOARD PIMPINAN TAB
// ═══════════════════════════════════════════════════════════════════════════════
function PimpinanTab({now,patrols,incidents,posAssign,instruksi,mutations,currentUser}) {

  // ── Kepatuhan patroli 7 hari terakhir ──
  const days7 = Array.from({length:7},(_,i)=>{
    const d=new Date(now); d.setDate(d.getDate()-i); return d;
  }).reverse();
  const patrolPerDay = days7.map(d=>{
    const count = patrols.filter(p=>new Date(p.ts).toDateString()===d.toDateString()).length;
    return {label:["Min","Sen","Sel","Rab","Kam","Jum","Sab"][d.getDay()], count, date:d.toISOString().slice(0,10)};
  });
  const todP = patrolPerDay[6].count;
  const kepatuhan = Math.min(100,Math.round((todP/10)*100));

  // ── Rekap insiden ──
  const actI = incidents.filter(i=>i.status!=="Selesai").length;
  const doneI = incidents.filter(i=>i.status==="Selesai").length;

  // ── Status pos ──
  const emptyPos = POS_LIST.filter(p=>!(posAssign[p]?.length));
  const filledPos = POS_LIST.filter(p=>posAssign[p]?.length>0);

  // ── Instruksi belum/sudah ──
  const myRegu = currentUser?.regu;
  const visibel = (instruksi||[]).filter(i=>i.aktif&&(i.targetRegu==="Semua"||String(i.targetRegu)===String(myRegu)));

  // ── Rekap mingguan ──
  const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate()-now.getDay());
  const weekPatrols = patrols.filter(p=>new Date(p.ts)>=startOfWeek).length;
  const weekIncidents = incidents.filter(i=>new Date(i.ts||i.createdAt||0)>=startOfWeek).length;
  const weekMutations = mutations.filter(m=>new Date(m.ts)>=startOfWeek).length;

  const barMax = Math.max(...patrolPerDay.map(d=>d.count),1);

  const systemStatus =
    emptyPos.length>1?{text:"KRITIS",color:"#dc2626",bg:"rgba(255,50,50,.1)"}:
    emptyPos.length===1?{text:"PERLU PERHATIAN",color:"#ffcc00",bg:"rgba(255,204,0,.07)"}:
    {text:"NORMAL",color:"var(--ok)",bg:"var(--green-card)"};

  return (
    <div style={{paddingBottom:8}}>

      {/* HERO */}
      <div style={{background:"linear-gradient(135deg,var(--qr-border),#00cc66)",borderRadius:16,padding:"18px 20px",marginBottom:14,color:"#fff"}}>
        <div style={{fontSize:10,opacity:.7,letterSpacing:1}}>SIPAMDAL — LAPORAN EKSEKUTIF</div>
        <div style={{fontSize:20,fontWeight:900,letterSpacing:.5,marginTop:2}}>Dashboard Pimpinan</div>
        <div style={{fontSize:10,opacity:.6}}>BBPKA II Jatinangor · {now.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
        <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10}}>
          <div style={{background:systemStatus.bg,borderRadius:8,padding:"5px 12px"}}>
            <span style={{fontSize:13,fontWeight:900,color:systemStatus.color}}>● {systemStatus.text}</span>
          </div>
          <div style={{fontSize:11,opacity:.75}}>
            {emptyPos.length===0?"Seluruh pos terisi":"Pos kosong: "+emptyPos.join(", ")}
          </div>
        </div>
      </div>

      {/* KPI UTAMA */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div style={{background:"var(--green-card)",border:"1.5px solid #bbf7d0",borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:10,color:"var(--tx3)",marginBottom:2}}>Kepatuhan Patroli</div>
          <div style={{fontSize:28,fontWeight:900,color:"var(--ok)"}}>{kepatuhan}%</div>
          <div style={{fontSize:10,color:"var(--tx3)"}}>{todP} patroli hari ini</div>
          <div style={{marginTop:6,height:4,background:"rgba(0,120,212,.1)",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:kepatuhan+"%",background:"var(--ok)",borderRadius:4,transition:"width .6s"}}/>
          </div>
        </div>
        <div style={{background:actI>0?"rgba(255,50,50,.1)":"var(--green-card)",border:`1.5px solid ${actI>0?"rgba(255,50,50,.3)":"var(--green-border)"}`,borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:10,color:"var(--tx3)",marginBottom:2}}>Insiden Aktif</div>
          <div style={{fontSize:28,fontWeight:900,color:actI>0?"#dc2626":"var(--ok)"}}>{actI}</div>
          <div style={{fontSize:10,color:"var(--tx3)"}}>{doneI} selesai</div>
        </div>
        <div style={{background:"rgba(0,120,212,.1)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:10,color:"var(--tx3)",marginBottom:2}}>Pos Terisi</div>
          <div style={{fontSize:28,fontWeight:900,color:"var(--accent)"}}>{filledPos.length}<span style={{fontSize:13,fontWeight:600,color:"var(--tx3)"}}>/{POS_LIST.length}</span></div>
          <div style={{fontSize:10,color:emptyPos.length>0?"#dc2626":"var(--tx4)"}}>{emptyPos.length>0?`⚠ ${emptyPos.length} kosong`:"Semua terisi ✓"}</div>
        </div>
        <div style={{background:"rgba(167,139,250,.1)",border:"1.5px solid #ddd6fe",borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:10,color:"var(--tx3)",marginBottom:2}}>Instruksi Aktif</div>
          <div style={{fontSize:28,fontWeight:900,color:"#a78bfa"}}>{visibel.length}</div>
          <div style={{fontSize:10,color:"var(--tx3)"}}>untuk regu ini</div>
        </div>
      </div>

      {/* GRAFIK PATROLI 7 HARI */}
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border2)",borderRadius:12,padding:"14px",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:13,color:"var(--tx2)",marginBottom:12}}>📊 Patroli 7 Hari Terakhir</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
          {patrolPerDay.map((d,i)=>{
            const h = barMax===0?0:Math.max(4,Math.round((d.count/barMax)*72));
            const isToday = i===6;
            return (
              <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{fontSize:9,fontWeight:800,color:isToday?"var(--accent)":"var(--tx4)"}}>{d.count>0?d.count:""}</div>
                <div style={{width:"100%",height:h,background:isToday?"var(--accent)":"var(--border)",borderRadius:"3px 3px 0 0",transition:"height .4s"}}/>
                <div style={{fontSize:9,color:isToday?"var(--accent)":"var(--tx4)",fontWeight:isToday?800:400}}>{d.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* STATUS POS DETAIL */}
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border2)",borderRadius:12,padding:"14px",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:13,color:"var(--tx2)",marginBottom:10}}>📍 Status Pos Real-Time</div>
        {POS_LIST.map(p=>{
          const filled=posAssign[p]?.length>0;
          return (
            <div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--border)"}}>
              <div>
                <div style={{fontSize:12.5,fontWeight:700,color:"var(--tx2)"}}>{p}</div>
                {filled&&<div style={{fontSize:10.5,color:"var(--tx3)"}}>{posAssign[p].join(", ")}</div>}
              </div>
              <span style={{fontSize:11,fontWeight:800,color:filled?"var(--ok)":"#dc2626",background:filled?"var(--green-card)":"rgba(255,50,50,.1)",borderRadius:6,padding:"3px 9px"}}>
                {filled?"✓ Terisi":"⚠ Kosong"}
              </span>
            </div>
          );
        })}
      </div>

      {/* REKAP INSIDEN */}
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border2)",borderRadius:12,padding:"14px",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:13,color:"var(--tx2)",marginBottom:10}}>🚨 Rekap Insiden</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:actI>0?12:0}}>
          <div style={{textAlign:"center",background:"rgba(255,50,50,.1)",borderRadius:8,padding:"10px 8px"}}>
            <div style={{fontSize:22,fontWeight:900,color:"#dc2626"}}>{actI}</div>
            <div style={{fontSize:10,color:"var(--tx3)"}}>Aktif / Proses</div>
          </div>
          <div style={{textAlign:"center",background:"var(--green-card)",borderRadius:8,padding:"10px 8px"}}>
            <div style={{fontSize:22,fontWeight:900,color:"var(--ok)"}}>{doneI}</div>
            <div style={{fontSize:10,color:"var(--tx3)"}}>Selesai</div>
          </div>
        </div>
        {actI>0&&(
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"var(--tx3)",marginBottom:6}}>Insiden aktif:</div>
            {incidents.filter(i=>i.status!=="Selesai").slice(0,3).map(inc=>(
              <div key={inc.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
                <div style={{fontSize:12,fontWeight:700,color:"var(--tx2)",flex:1}}>{inc.type||inc.judul||"Insiden"}</div>
                <span style={{fontSize:10,fontWeight:800,color:"#ffcc00",background:"rgba(255,204,0,.07)",borderRadius:5,padding:"2px 7px"}}>{inc.status}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* REKAP MINGGUAN */}
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border2)",borderRadius:12,padding:"14px",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:13,color:"var(--tx2)",marginBottom:10}}>📅 Rekap Minggu Ini</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div style={{textAlign:"center",background:"var(--green-card)",borderRadius:8,padding:"10px 6px"}}>
            <div style={{fontSize:20,fontWeight:900,color:"var(--ok)"}}>{weekPatrols}</div>
            <div style={{fontSize:9,color:"var(--tx3)"}}>Patroli</div>
          </div>
          <div style={{textAlign:"center",background:"rgba(255,50,50,.1)",borderRadius:8,padding:"10px 6px"}}>
            <div style={{fontSize:20,fontWeight:900,color:"#dc2626"}}>{weekIncidents}</div>
            <div style={{fontSize:9,color:"var(--tx3)"}}>Insiden</div>
          </div>
          <div style={{textAlign:"center",background:"rgba(167,139,250,.1)",borderRadius:8,padding:"10px 6px"}}>
            <div style={{fontSize:20,fontWeight:900,color:"#a78bfa"}}>{weekMutations}</div>
            <div style={{fontSize:9,color:"var(--tx3)"}}>Serah Terima</div>
          </div>
        </div>
      </div>

      {/* INSTRUKSI AKTIF */}
      {visibel.length>0&&(
        <div style={{background:"var(--card-solid)",border:"1px solid var(--border2)",borderRadius:12,padding:"14px",marginBottom:4}}>
          <div style={{fontWeight:800,fontSize:13,color:"var(--tx2)",marginBottom:10}}>📋 Instruksi Aktif ({visibel.length})</div>
          {visibel.map(ins=>{
            const col=ins.prioritas==="Penting"?"#dc2626":ins.prioritas==="Info"?"var(--ok)":"var(--accent)";
            const bg=ins.prioritas==="Penting"?"rgba(255,50,50,.1)":ins.prioritas==="Info"?"var(--green-card)":"var(--green-card)";
            return (
              <div key={ins.id} style={{borderLeft:`3px solid ${col}`,paddingLeft:10,marginBottom:10}}>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
                  <span style={{fontSize:10,fontWeight:800,color:col,background:bg,borderRadius:4,padding:"1px 6px"}}>{ins.prioritas}</span>
                  <span style={{fontSize:10,color:"var(--tx3)"}}>{fmtDT(ins.ts)}</span>
                </div>
                <div style={{fontSize:12.5,fontWeight:800,color:"var(--tx2)"}}>{ins.judul}</div>
                <div style={{fontSize:11,color:"var(--tx)",lineHeight:1.5,marginTop:2}}>{ins.isi.slice(0,100)}{ins.isi.length>100?"…":""}</div>
              </div>
            );
          })}
        </div>
      )}

    </div>
  );
}
