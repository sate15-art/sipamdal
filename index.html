  async function writeAuditLog(entry) {

        ts: serverTimestamp(),
        tsLocal: new Date().toISOString(),
      });
    } catch(e) {

      try {
        const q = JSON.parse(localStorage.getItem("audit_queue")||"[]");
        q.push({...entry, tsLocal: new Date().toISOString()});
        localStorage.setItem("audit_queue", JSON.stringify(q.slice(-50)));
      } catch{}
    }
  }

  // Flush antrian audit log offline saat kembali online
  window.addEventListener("online", async () => {
    try {
      const q = JSON.parse(localStorage.getItem("audit_queue")||"[]");
      if (!q.length) return;
      for (const entry of q) {

// useLS: localStorage (offline fallback)
function useLS(key, init) {
  const [v, sv] = useState(() => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch{return init;} });
  const set = (x) => { sv(x); try{localStorage.setItem(key,JSON.stringify(x));}catch{} };
  return [v, set];
}

// useFS: Firebase Firestore realtime sync + localStorage fallback
// key = koleksi Firestore, misal "pad_inc", "pad_pkg", dst.
// Data disimpan sebagai array di satu doc: "sipamdal/{key}" → {items:[...]}
function useFS(key, init) {
  const lsKey = key;
  const [v, sv] = useState(() => {
    try { const s=localStorage.getItem(lsKey); return s?JSON.parse(s):init; } catch{return init;}
  });

  useEffect(() => {
    const fb = window.__FB;
    if (!fb) return;
    const { db, doc, collection, onSnapshot } = fb;
    const ref = doc(db, "sipamdal", key);
    const unsub = onSnapshot(ref, snap => {
      if (snap.exists()) {
        const data = snap.data().items ?? init;
        sv(data);
        try { localStorage.setItem(lsKey, JSON.stringify(data)); } catch{}
      }
    }, () => {});
    return () => unsub();
  }, [key]);

  const set = (x) => {
    sv(x);
    try { localStorage.setItem(lsKey, JSON.stringify(x)); } catch{}
    const fb = window.__FB;
    if (!fb) return;
    const { db, doc, setDoc } = fb;
    setDoc(doc(db, "sipamdal", key), { items: x }).catch(err => {
      console.error("Firebase save error:", key, err.code, err.message);
    });
  };

  return [v, set];
}

// Kompres foto agar tidak melebihi batas Firestore (1MB)
function kompressFoto(dataUrl, maxW=400, quality=0.25) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ratio = Math.min(1, maxW / img.width);
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      const compressed = canvas.toDataURL("image/jpeg", quality);
      // Jika masih > 100KB, kompres lagi
      if (compressed.length > 130000) {
        const canvas2 = document.createElement("canvas");
        canvas2.width = Math.floor(canvas.width * 0.6);
        canvas2.height = Math.floor(canvas.height * 0.6);
        canvas2.getContext("2d").drawImage(canvas, 0, 0, canvas2.width, canvas2.height);
        resolve(canvas2.toDataURL("image/jpeg", 0.2));
      } else {
        resolve(compressed);
      }
    };
    img.src = dataUrl;
  });
}

  if (ms <= 0) return "00:00:00";
  const h = Math.floor(ms / 3600000);

// ─── QR SVG ───────────────────────────────────────────────────────────────────
function QRSvg({ value, size=120 }) {
  const h = value.split("").reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0, 0);
  const N=21, cell=size/N, grid=[];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) {
    const finder=(r<7&&c<7)||(r<7&&c>=14)||(r>=14&&c<7);
    const inner=(r>=2&&r<=4&&c>=2&&c<=4)||(r>=2&&r<=4&&c>=16&&c<=18)||(r>=16&&r<=18&&c>=2&&c<=4);
    const timing=(r===6||c===6)&&!finder;
    let filled=finder||inner;
    if(timing) filled=(r+c)%2===0;
    if(!finder&&!timing) filled=(Math.abs((h*(r*N+c+7))|0)%255)>120;
    grid.push({r,c,filled});
  }
  return (
    <svg width={size} height={size} style={{background:"#fff",borderRadius:8,display:"block"}}>
      {grid.map(({r,c,filled})=>filled&&<rect key={`${r}-${c}`} x={c*cell+.5} y={r*cell+.5} width={cell-.5} height={cell-.5} fill="#1e3a5f" rx=".5"/>)}
    </svg>
  );
}

function CamScanner({onScan,onClose}) {
  const vRef=useRef(), cRef=useRef(), streamRef=useRef(), animRef=useRef();
  const [err,setErr]=useState(null);
  const [live,setLive]=useState(false);
  const [hit,setHit]=useState(null);
  const hasBD=typeof window!=="undefined"&&!!window.BarcodeDetector;

  const stop=useCallback(()=>{
    streamRef.current?.getTracks().forEach(t=>t.stop()); streamRef.current=null;
    if(animRef.current) cancelAnimationFrame(animRef.current);
    setLive(false);
  },[]);

  const scan=useCallback(()=>{
    const v=vRef.current,c=cRef.current;
    if(!v||!c||v.readyState<2){animRef.current=requestAnimationFrame(scan);return;}
    const ctx=c.getContext("2d"); c.width=v.videoWidth; c.height=v.videoHeight; ctx.drawImage(v,0,0);
    if(window.BarcodeDetector){
      new window.BarcodeDetector({formats:["qr_code"]}).detect(c).then(bs=>{
        if(bs.length){
          const area=decQR(bs[0].rawValue)||ALL_AREAS.find(a=>bs[0].rawValue.includes(a));
          if(area&&ALL_AREAS.includes(area)){setHit(area);stop();setTimeout(()=>onScan(area),400);return;}
        }
        animRef.current=requestAnimationFrame(scan);
      }).catch(()=>{animRef.current=requestAnimationFrame(scan);});
    } else { animRef.current=requestAnimationFrame(scan); }
  },[onScan,stop]);

  const start=async()=>{
    setErr(null);
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}});
      streamRef.current=s; vRef.current.srcObject=s; await vRef.current.play(); setLive(true);
    }catch(e){setErr("Kamera tidak dapat diakses. Pastikan izin kamera diberikan.");}
  };

  useEffect(()=>{ start(); return()=>stop(); },[]);
  useEffect(()=>{ if(live&&vRef.current) vRef.current.onloadedmetadata=()=>{animRef.current=requestAnimationFrame(scan);}; },[live,scan]);

  return (
    <div>
      <div style={{position:"relative",background:"#0f172a",minHeight:240,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        <video ref={vRef} style={{width:"100%",maxHeight:260,objectFit:"cover",display:live?"block":"none"}} playsInline muted/>
        <canvas ref={cRef} style={{display:"none"}}/>
        {live&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <div style={{width:190,height:190,border:"2.5px solid #3b82f6",borderRadius:14,boxShadow:"0 0 0 9999px rgba(0,0,0,.5)",position:"relative"}}>
              <div style={{position:"absolute",top:"50%",left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#3b82f6,transparent)",animation:"sl 2s ease-in-out infinite"}}/>
            </div>
          </div>
        )}
        {hit&&<div style={{position:"absolute",bottom:12,left:"50%",transform:"translateX(-50%)",background:"#16a34a",color:"#fff",borderRadius:8,padding:"8px 18px",fontWeight:700,fontSize:14,whiteSpace:"nowrap"}}>✓ {hit}</div>}
        {!live&&!hit&&<div style={{textAlign:"center",color:"#fff",padding:24}}><IC n="cam" s={44} c="#3b82f6"/><div style={{marginTop:10,fontSize:13}}>Memulai kamera...</div></div>}
      </div>
      <div style={{padding:"14px 18px 18px"}}>
        {!hasBD&&live&&<div style={{background:"#fffbeb",border:"1px solid #fbbf24",borderRadius:9,padding:"9px 13px",marginBottom:10,fontSize:12.5,color:"#92400e"}}>⚠ Browser ini belum mendukung scan otomatis. Pilih gedung dari daftar.</div>}
        {err&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:9,padding:"9px 13px",marginBottom:10,fontSize:12.5,color:"#b91c1c"}}>{err}</div>}
        <div style={{fontSize:11.5,fontWeight:700,color:"#3b82f6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Atau pilih gedung manual:</div>
        <div style={{maxHeight:210,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
          {Object.entries(PATROL_AREAS).map(([pos,areas])=>(
            <div key={pos}>
              <div style={{fontSize:10.5,color:"#9ca3af",fontWeight:700,padding:"3px 0 2px",textTransform:"uppercase",letterSpacing:.5}}>{pos}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:4}}>
                {areas.map(a=>(
                  <button key={a} onClick={()=>{stop();onScan(a);}} style={{background:"#f0f5ff",border:"1.5px solid #bfdbfe",borderRadius:7,color:"#1d4ed8",fontSize:12,fontWeight:600,padding:"6px 10px",cursor:"pointer",fontFamily:"inherit"}}>{a}</button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          {live?<Btn onClick={stop} color="#6b7280" variant="outline">Stop Kamera</Btn>:<Btn onClick={start} color="#1d4ed8"><IC n="cam" s={13}/> Aktifkan</Btn>}
          <Btn onClick={()=>{stop();onClose();}} color="#6b7280" variant="outline">Tutup</Btn>
        </div>
      </div>
      <style>{`@keyframes sl{0%,100%{transform:translateY(-70px)}50%{transform:translateY(70px)}}`}</style>
    </div>
  );
}

  const actI=incidents.filter(i=>i.status!=="Selesai").length;

  // ── Hitung mundur piket selesai ──

    .sort((a,b)=>b.ts-a.ts)[0];
  const msSincePatrol = lastPatrol ? now - lastPatrol.ts : Infinity;
  const patrolOverdue = msSincePatrol > 3600000; // > 1 jam

  // ── Alert: rolling pos – cek apakah sudah rolling dalam 2 jam terakhir ──

    .sort((a,b)=>b.ts-a.ts)[0];
  const msSinceRolling = lastRolling ? now - lastRolling.ts : Infinity;
  const rollingOverdue = msSinceRolling > 7200000; // > 2 jam

  // ── Alert: belum ada mutasi/serah terima ──

// QR codes for each pos check-in
const POS_QR_PREFIX = "BBPKA2-POS-";
const encPosQR = (pos) => POS_QR_PREFIX + pos.replace(/ /g,"_");
const decPosQR = (v) => v && v.startsWith(POS_QR_PREFIX) ? v.replace(POS_QR_PREFIX,"").replace(/_/g," ") : null;

// ─── POS ──────────────────────────────────────────────────────────────────────
function PosTab({reguHari,posAssign,setPosAssign,posRollingLog,setPosRollingLog,toast,canEdit,isAdmin}) {
  const members=REGU[reguHari]||[];
  const [mode,setMode]=useState("assign");   // "assign" | "rolling"
  const [scanOpen,setScanOpen]=useState(false);
  const [confirm,setConfirm]=useState(null);
  const [selectedMember,setSelectedMember]=useState("");
  const [rollingFrom,setRollingFrom]=useState("");
  const [rollingTo,setRollingTo]=useState("");
  const [viewPosQR,setViewPosQR]=useState(null);

  // ── Tempatkan anggota ke pos (scan QR / manual) ──
  const onScanPos=(raw)=>{
    setScanOpen(false);
    const pos = decPosQR(raw) || POS_LIST.find(p=>raw.includes(p));
    if(!pos||!POS_LIST.includes(pos)){toast("QR tidak dikenali!",false);return;}
    if(mode==="rolling"){
      setRollingTo(pos); return;
    }
    const asgn=posAssign[pos]||[]; const cap=POS_CAP[pos]||1;
    if(asgn.length>=cap){toast(`${pos} sudah penuh!`,false);return;}
    setConfirm({pos,type:"assign"}); setSelectedMember("");
  };

  const doAssign=()=>{
    if(!selectedMember){toast("Pilih anggota!",false);return;}
    const updated={...posAssign,[confirm.pos]:[...(posAssign[confirm.pos]||[]),selectedMember]};
    setPosAssign(updated); setConfirm(null); toast(`${selectedMember} → ${confirm.pos}!`);
  };

  // ── Rolling pos: pindah anggota dari pos lama ke pos baru ──
  const doRolling=()=>{
    if(!rollingFrom||!rollingTo){toast("Pilih anggota & pos tujuan!",false);return;}
    if(rollingFrom===rollingTo){toast("Pos asal dan tujuan sama!",false);return;}
    // Cari siapa yg ada di rollingFrom pos
    const fromPos = Object.entries(posAssign).find(([,ms])=>ms?.includes(rollingFrom))?.[0];
    const toAsgn = posAssign[rollingTo]||[]; const cap=POS_CAP[rollingTo]||1;
    if(toAsgn.length>=cap){toast(`${rollingTo} sudah penuh!`,false);return;}
    const updated = {...posAssign};
    if(fromPos) updated[fromPos]=(updated[fromPos]||[]).filter(x=>x!==rollingFrom);
    updated[rollingTo]=[...(updated[rollingTo]||[]),rollingFrom];
    setPosAssign(updated);
    const log={id:Date.now(),ts:Date.now(),member:rollingFrom,fromPos:fromPos||"—",toPos:rollingTo};
    setPosRollingLog([...(posRollingLog||[]),log]);
    toast(`Rolling: ${rollingFrom} → ${rollingTo}!`);
    setRollingFrom(""); setRollingTo("");
  };

  const removeFromPos=(pos,m)=>{
    if(!canEdit) return;
    const updated={...posAssign,[pos]:(posAssign[pos]||[]).filter(x=>x!==m)};
    setPosAssign(updated); toast(`${m} dilepas dari ${pos}`);
  };

  // Log rolling hari ini
  const todayRolling=(posRollingLog||[]).filter(r=>new Date(r.ts).toDateString()===new Date().toDateString());
  const allAssigned=Object.values(posAssign).flat();

  return (
    <div>
      <PH title="Penempatan Pos" sub={`Regu ${reguHari}: ${members.join(", ")}`} action={canEdit&&(
        <div style={{display:"flex",gap:6}}>
          <Btn onClick={()=>setScanOpen(true)} color="#1d4ed8" size="sm"><IC n="cam" s={12}/> Scan</Btn>
        </div>
      )}/>
      {!canEdit&&<ReadOnlyBanner reguHari={reguHari}/>}

      {/* Tab Mode */}
      {canEdit&&<div style={{display:"flex",gap:0,marginBottom:14,background:"#f1f5f9",borderRadius:10,padding:3}}>
        {[["assign","📍 Penempatan"],["rolling","🔄 Rolling Pos"]].map(([v,l])=>(
          <button key={v} onClick={()=>setMode(v)} style={{flex:1,padding:"8px 0",fontSize:12.5,fontWeight:700,borderRadius:8,border:"none",cursor:"pointer",background:mode===v?"#fff":"transparent",color:mode===v?"#1d4ed8":"#6b7280",boxShadow:mode===v?"0 1px 6px rgba(0,0,0,.08)":"none",fontFamily:"inherit",transition:"all .15s"}}>
            {l}
          </button>
        ))}
      </div>}

      {/* ── MODE: PENEMPATAN ── */}
      {mode==="assign"&&(
        <>
          {canEdit&&<div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#1d4ed8"}}>
            📋 Scan QR di pos atau ketuk <strong>+ Tambah</strong> untuk menempatkan anggota.
            {isAdmin&&<span> Tombol <strong>QR</strong> untuk lihat kode QR pos.</span>}
          </div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {POS_LIST.map(pos=>{
              const col=POS_COL[pos], cap=POS_CAP[pos], asgn=posAssign[pos]||[];
              const isFull=asgn.length>=cap;
              return (
                <div key={pos} style={{background:"#fff",border:`1.5px solid ${isFull?col+"60":col+"28"}`,borderRadius:12,overflow:"hidden"}}>
                  <div style={{background:isFull?col:col+"cc",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,fontWeight:800,color:"#fff",lineHeight:1.3}}>{pos}</span>
                    <span style={{background:"rgba(255,255,255,.25)",color:"#fff",borderRadius:5,padding:"2px 6px",fontSize:10,whiteSpace:"nowrap"}}>{asgn.length}/{cap}</span>
                  </div>
                  <div style={{padding:10}}>
                    {asgn.length===0&&<div style={{fontSize:11,color:"#9ca3af",textAlign:"center",padding:"8px 0"}}>Belum ada</div>}
                    {asgn.map(m=>(
                      <div key={m} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #f1f5f9"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <IC n="ok" s={12} c={col}/>
                          <span style={{fontSize:12.5,fontWeight:700,color:"#1e3a8a"}}>{m}</span>
                        </div>
                        {canEdit&&<button onClick={()=>removeFromPos(pos,m)} style={{background:"none",border:"none",color:"#fca5a5",cursor:"pointer",fontSize:14,padding:2}}>✕</button>}
                      </div>
                    ))}
                    <div style={{marginTop:8,display:"flex",gap:5,justifyContent:"center",flexWrap:"wrap"}}>
                      {canEdit&&!isFull&&<Btn onClick={()=>{setConfirm({pos,type:"assign"});setSelectedMember("");}} color={col} size="sm"><IC n="plus" s={11}/> Tambah</Btn>}
                      {isAdmin&&<Btn onClick={()=>setViewPosQR(pos)} color="#6b7280" variant="outline" size="sm"><IC n="qr" s={11}/> QR</Btn>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* ── MODE: ROLLING POS ── */}
      {mode==="rolling"&&canEdit&&(
        <div>
          <div style={{background:"#ecfeff",border:"1.5px solid #67e8f9",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:800,color:"#0e7490",marginBottom:10}}>🔄 Pindah / Rolling Pos Jaga</div>
            <Inp label="Anggota yang dipindah" value={rollingFrom} onChange={e=>setRollingFrom(e.target.value)} as="select">
              <option value="">— Pilih Anggota —</option>
              {members.map(m=>{
                const curPos=Object.entries(posAssign).find(([,ms])=>ms?.includes(m))?.[0]||"Belum ditempatkan";
                return <option key={m} value={m}>{m} ({curPos})</option>;
              })}
            </Inp>
            <Inp label="Pindah ke pos" value={rollingTo} onChange={e=>setRollingTo(e.target.value)} as="select">
              <option value="">— Pilih Pos Tujuan —</option>
              {POS_LIST.map(p=>{
                const asgn=posAssign[p]||[]; const cap=POS_CAP[p]||1;
                return <option key={p} value={p} disabled={asgn.length>=cap}>{p} ({asgn.length}/{cap})</option>;
              })}
            </Inp>
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <Btn onClick={doRolling} color="#0891b2" size="lg" full><IC n="rot" s={14}/> Konfirmasi Rolling</Btn>
              {isAdmin&&<Btn onClick={()=>setScanOpen(true)} color="#6b7280" variant="outline">Scan QR</Btn>}
            </div>
          </div>

          {/* Log rolling hari ini */}
          {todayRolling.length>0&&(
            <div style={{background:"#fff",border:"1.5px solid #dbeafe",borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:12,fontWeight:800,color:"#0891b2",marginBottom:8}}>Log Rolling Hari Ini ({todayRolling.length})</div>
              {[...todayRolling].reverse().map(r=>(
                <div key={r.id} style={{padding:"6px 0",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:13}}>🔄</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12.5,fontWeight:700,color:"#1e3a8a"}}>{r.member}: {r.fromPos} → {r.toPos}</div>
                    <div style={{fontSize:10.5,color:"#6b7280"}}>{fmtT(r.ts)}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
          {todayRolling.length===0&&<div style={{color:"#9ca3af",fontSize:12,textAlign:"center",padding:"20px 0"}}>Belum ada rolling hari ini</div>}
        </div>
      )}

      {/* Scanner Modal */}
      <Modal open={scanOpen} onClose={()=>setScanOpen(false)} title="Scan QR Pos" noPad>
        <CamScanner
          onScan={onScanPos}
          onClose={()=>setScanOpen(false)}
          customAreas={POS_LIST}
          customDecode={raw=>{ const p=decPosQR(raw)||POS_LIST.find(p=>raw.includes(p)); return POS_LIST.includes(p)?p:null; }}
        />
      </Modal>

      {/* Confirm assign */}
      <Modal open={!!confirm} onClose={()=>setConfirm(null)} title={`Tempatkan ke ${confirm?.pos}`}>
        {confirm&&(
          <div>
            <div style={{background:POS_COL[confirm.pos]+"14",borderRadius:10,padding:"12px",marginBottom:14,textAlign:"center",border:`1.5px solid ${POS_COL[confirm.pos]}30`}}>
              <div style={{fontSize:11,color:"#6b7280"}}>Pos Tujuan</div>
              <div style={{fontSize:18,fontWeight:900,color:POS_COL[confirm.pos]}}>{confirm.pos}</div>
              <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>Kapasitas: {POS_CAP[confirm.pos]} · Terisi: {(posAssign[confirm.pos]||[]).length}</div>
            </div>
            <Inp label="Pilih Anggota" value={selectedMember} onChange={e=>setSelectedMember(e.target.value)} as="select">
              <option value="">— Pilih Anggota —</option>
              {members.filter(m=>!allAssigned.includes(m)).map(m=><option key={m}>{m}</option>)}
            </Inp>
            <div style={{display:"flex",gap:8}}><Btn onClick={doAssign} color={POS_COL[confirm.pos]} size="lg" full><IC n="ok" s={14}/> Tempatkan</Btn><Btn onClick={()=>setConfirm(null)} color="#6b7280" variant="outline">Batal</Btn></div>
          </div>
        )}
      </Modal>

      {/* QR Pos — hanya admin */}
      {isAdmin&&<Modal open={!!viewPosQR} onClose={()=>setViewPosQR(null)} title={`QR Pos: ${viewPosQR}`}>
        {viewPosQR&&(
          <div style={{textAlign:"center"}}>
            <div style={{background:"#fff",border:`2px solid ${POS_COL[viewPosQR]}`,borderRadius:14,padding:18,display:"inline-block",marginBottom:10}}>
              <QRSvg value={encPosQR(viewPosQR)} size={190}/>
              <div style={{marginTop:8,fontSize:13,fontWeight:800,color:"#1e3a8a"}}>{viewPosQR}</div>
              <div style={{fontSize:10,color:"#6b7280"}}>BBPKA II Jatinangor — Scan untuk penempatan</div>
            </div>
            <div style={{color:"#6b7280",fontSize:12,marginBottom:12}}>Screenshot & cetak, tempel di {viewPosQR}</div>
            <Btn onClick={()=>setViewPosQR(null)} color="#1d4ed8">Tutup</Btn>
          </div>
        )}
      </Modal>}
    </div>
  );
}

// ─── STAND JAGA ───────────────────────────────────────────────────────────────

  const doConfirm=()=>{ setStandJaga([...standJaga,{id:Date.now(),ts:Date.now(),area:confirm.area,pos:confirm.pos,officer:officer||"—",notes}]); setConfirm(null); toast(`Stand jaga ${confirm.area} dicatat!`); };
  const todS=standJaga.filter(s=>new Date(s.ts).toDateString()===new Date().toDateString());
  return (
    <div>
      <PH title="Stand Jaga" sub="Scan QR untuk mencatat posisi stand jaga" action={canEdit&&<Btn onClick={()=>setScanOpen(true)} color="#1d4ed8"><IC n="cam" s={13}/> Scan QR</Btn>}/>
      {!canEdit&&<ReadOnlyBanner reguHari={reguHari}/>}
      <div style={{background:"#fff",border:"1.5px solid #dbeafe",borderRadius:12,padding:"12px 14px"}}>
        <div style={{fontSize:12,fontWeight:800,color:"#1d4ed8",marginBottom:10}}>Log Hari Ini ({todS.length})</div>
        {todS.length===0&&<div style={{fontSize:12,color:"#9ca3af"}}>Belum ada stand jaga</div>}
        {[...todS].reverse().map(s=>(
          <div key={s.id} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid #f1f5f9",alignItems:"center"}}>
            <div style={{width:34,height:34,background:"#eff6ff",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IC n="shield" s={16} c="#3b82f6"/></div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:"#1e3a8a"}}>{s.area}</div>
              <div style={{fontSize:11,color:"#6b7280"}}>{s.pos} · {s.officer}</div>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:"#1d4ed8"}}>{fmtT(s.ts)}</div>
          </div>

      </div>
      <Modal open={scanOpen} onClose={()=>setScanOpen(false)} title="Scan QR — Stand Jaga" noPad><CamScanner onScan={onScan} onClose={()=>setScanOpen(false)}/></Modal>
      <Modal open={!!confirm} onClose={()=>setConfirm(null)} title="Konfirmasi Stand Jaga">
        {confirm&&(
          <div>
            <div style={{background:"#eff6ff",borderRadius:10,padding:"12px 16px",marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:12,color:"#6b7280"}}>Gedung Pos</div>
              <div style={{fontSize:20,fontWeight:900,color:"#1d4ed8"}}>{confirm.area}</div>
              <div style={{fontSize:12,color:"#6b7280"}}>{confirm.pos}</div>
            </div>
            <Inp label="Nama Petugas" value={officer} onChange={e=>setOfficer(e.target.value)} as="select"><option value="">— Pilih —</option>{members.map(m=><option key={m}>{m}</option>)}</Inp>
            <Inp label="Catatan (opsional)" value={notes} onChange={e=>setNotes(e.target.value)} as="textarea" placeholder="Kondisi pos..."/>
            <div style={{display:"flex",gap:8}}><Btn onClick={doConfirm} color="#16a34a" size="lg" full><IC n="ok" s={14}/> Konfirmasi</Btn><Btn onClick={()=>setConfirm(null)} color="#6b7280" variant="outline">Batal</Btn></div>
          </div>
        )}
      </Modal>
    </div>
  );
}

// ─── PATROL ───────────────────────────────────────────────────────────────────
function PatrolTab({posAssign,patrols,setPatrols,toast,canEdit,isAdmin}) {
  const [scanOpen,setScanOpen]=useState(false);
  const [confirm,setConfirm]=useState(null);
  const [officer,setOfficer]=useState("");
  const [notes,setNotes]=useState("");
  const [photo,setPhoto]=useState(null);
  const [viewQR,setViewQR]=useState(null);
  const [viewPhoto,setViewPhoto]=useState(null);
  const [activePos,setActivePos]=useState(POS_LIST[0]);
  const fileRef=useRef();

  const onScan=(area)=>{ setScanOpen(false); const pos=getPos(area); setConfirm({area,pos:pos||"—"}); setOfficer(posAssign[pos]?.join(", ")||""); setNotes(""); setPhoto(null); };
  const doP=()=>{ setPatrols([...patrols,{id:Date.now(),ts:Date.now(),pos:confirm.pos,officer:officer||"—",areas:[confirm.area],notes,photo,qrScan:true}]); setConfirm(null); toast(`Patroli ${confirm.area} dicatat!`); };
  const handlePhoto=(e)=>{ const file=e.target.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{ kompressFoto(r.result,400,0.25).then(compressed=>setPhoto(compressed)); }; r.readAsDataURL(file); };
  const removePhoto=()=>{ setPhoto(null); if(fileRef.current) fileRef.current.value=""; };

  const todP=patrols.filter(p=>new Date(p.ts).toDateString()===new Date().toDateString());
  const areas=PATROL_AREAS[activePos]||[];
  return (
    <div>
      <PH title="Patroli QR" sub="Scan QR + foto kondisi lokasi sebagai bukti" action={canEdit&&<Btn onClick={()=>setScanOpen(true)} color="#059669"><IC n="cam" s={13}/> Scan QR</Btn>}/>
      {!canEdit&&<ReadOnlyBanner reguHari={getReguHari(new Date())}/>}
      <div style={{background:"#fff",border:"1.5px solid #dbeafe",borderRadius:12,marginBottom:14,overflow:"hidden"}}>
        <div style={{display:"flex",borderBottom:"1.5px solid #e0eaf8",overflowX:"auto"}}>
          {POS_LIST.map(p=>(
            <button key={p} onClick={()=>setActivePos(p)} style={{padding:"8px 10px",fontSize:11,fontWeight:700,background:activePos===p?"#eff6ff":"none",borderBottom:activePos===p?`2.5px solid ${POS_COL[p]}`:"none",border:"none",cursor:"pointer",color:activePos===p?POS_COL[p]:"#6b7280",whiteSpace:"nowrap",fontFamily:"inherit"}}>{p}</button>
          ))}
        </div>
        <div style={{padding:12}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10}}>
            {areas.map(area=>{
              const cnt=patrols.filter(p=>p.areas?.includes(area)).length;
              const last=patrols.filter(p=>p.areas?.includes(area)).at(-1);
              return (
                <div key={area} style={{background:"#f8faff",border:"1.5px solid #dbeafe",borderRadius:10,padding:10,textAlign:"center"}}>
                  <div style={{display:"flex",justifyContent:"center",marginBottom:6}}><QRSvg value={encQR(area)} size={76}/></div>
                  <div style={{fontSize:10.5,fontWeight:800,color:"#1e3a8a",marginBottom:2}}>{area}</div>
                  <div style={{fontSize:10,color:"#6b7280"}}>{cnt}× scan</div>
                  {last&&<div style={{fontSize:10,color:"#059669",fontWeight:700}}>{fmtT(last.ts)}</div>}
                  {last?.photo&&<div style={{marginTop:4,fontSize:10,color:"#7c3aed",fontWeight:700}}>📷 Ada foto</div>}
                  <div style={{marginTop:6,display:"flex",gap:4,justifyContent:"center"}}>
                    {canEdit&&<Btn onClick={()=>onScan(area)} color={POS_COL[activePos]} size="sm">Scan</Btn>}
                    {isAdmin&&<Btn onClick={()=>setViewQR(area)} color="#6b7280" variant="outline" size="sm"><IC n="print" s={11}/></Btn>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
      <div style={{background:"#fff",border:"1.5px solid #dbeafe",borderRadius:12,padding:"12px 14px"}}>
        <div style={{fontSize:12,fontWeight:800,color:"#1d4ed8",marginBottom:10}}>Log Patroli Hari Ini ({todP.length})</div>
        {todP.length===0&&<div style={{fontSize:11,color:"#9ca3af"}}>Belum ada patroli</div>}
        {[...todP].reverse().slice(0,15).map(p=>(
          <div key={p.id} style={{padding:"8px 0",borderBottom:"1px solid #f1f5f9"}}>
            <div style={{display:"flex",gap:9,alignItems:"center"}}>
              <div style={{width:32,height:32,background:p.photo?"#f5f3ff":"#eff6ff",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {p.photo?<span style={{fontSize:15}}>📷</span>:<IC n="qr" s={14} c="#3b82f6"/>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12.5,fontWeight:700,color:"#1e3a8a"}}>{p.areas?.join(", ")}</div>
                <div style={{fontSize:10.5,color:"#6b7280"}}>{p.pos} · {p.officer}</div>
                {p.notes&&<div style={{fontSize:10.5,color:"#374151",marginTop:1}}>📝 {p.notes}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                <span style={{fontSize:10.5,fontWeight:700,color:"#1d4ed8"}}>{fmtT(p.ts)}</span>
                {p.photo&&<button onClick={()=>setViewPhoto(p.photo)} style={{background:"#f5f3ff",border:"1px solid #c4b5fd",borderRadius:5,padding:"2px 7px",fontSize:10,color:"#7c3aed",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Lihat Foto</button>}
              </div>
            </div>
          </div>
        ))}
      </div>
      <Modal open={scanOpen} onClose={()=>setScanOpen(false)} title="Scan QR Patroli" noPad><CamScanner onScan={onScan} onClose={()=>setScanOpen(false)}/></Modal>
      <Modal open={!!confirm} onClose={()=>setConfirm(null)} title="Konfirmasi Patroli">
        {confirm&&(
          <div>
            <div style={{background:"#f0fdf4",borderRadius:10,padding:"12px",marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:12,color:"#6b7280"}}>Titik Patroli</div>
              <div style={{fontSize:20,fontWeight:900,color:"#059669"}}>{confirm.area}</div>
            </div>
            <Inp label="Petugas" value={officer} onChange={e=>setOfficer(e.target.value)} placeholder="Nama petugas"/>
            <Inp label="Catatan Kondisi" value={notes} onChange={e=>setNotes(e.target.value)} as="textarea" placeholder="Kondisi titik patroli..."/>
            {/* FOTO BUKTI PATROLI */}
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:11,color:"#3b82f6",marginBottom:6,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>📷 Foto Bukti Patroli</label>
              {!photo?(
                <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#f0fdf4",border:"2px dashed #86efac",borderRadius:10,padding:"16px 12px",cursor:"pointer",color:"#059669",fontWeight:700,fontSize:13}}>
                  <IC n="cam" s={20} c="#059669"/>
                  Ambil / Pilih Foto
                  <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}}/>
                </label>
              ):(
                <div style={{position:"relative",display:"inline-block",width:"100%"}}>
                  <img src={photo} alt="bukti patroli" style={{width:"100%",maxHeight:200,objectFit:"cover",borderRadius:10,border:"2px solid #86efac",display:"block"}}/>
                  <button onClick={removePhoto} style={{position:"absolute",top:6,right:6,background:"rgba(220,38,38,.85)",border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:800,padding:"4px 9px",cursor:"pointer",fontFamily:"inherit"}}>✕ Hapus</button>
                  <div style={{position:"absolute",bottom:6,left:6,background:"rgba(5,150,105,.85)",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#fff",fontWeight:700}}>📷 Foto siap</div>
                </div>
              )}
            </div>
            <div style={{display:"flex",gap:8}}><Btn onClick={doP} color="#059669" size="lg" full><IC n="ok" s={14}/> Catat Patroli</Btn><Btn onClick={()=>setConfirm(null)} color="#6b7280" variant="outline">Batal</Btn></div>
          </div>
        )}
      </Modal>
      <Modal open={!!viewQR} onClose={()=>setViewQR(null)} title={`Cetak QR: ${viewQR}`}>
        {viewQR&&(
          <div style={{textAlign:"center"}}>
            <div style={{background:"#fff",border:"2px solid #1e3a8a",borderRadius:14,padding:18,display:"inline-block",marginBottom:10}}>
              <QRSvg value={encQR(viewQR)} size={190}/>
              <div style={{marginTop:8,fontSize:13,fontWeight:800,color:"#1e3a8a"}}>{viewQR}</div>

// ─── PHOTO PICKER (reusable) ──────────────────────────────────────────────────
function PhotoPicker({photo, setPhoto, label="📷 Foto Bukti", color="#1d4ed8"}) {
  const ref = useRef();
  const handle = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader(); r.onload = () => { kompressFoto(r.result,400,0.25).then(compressed=>setPhoto(compressed)); }; r.readAsDataURL(file);
  };
  const remove = () => { setPhoto(null); if(ref.current) ref.current.value=""; };
  const lightBg = color==="#dc2626"?"#fef2f2":color==="#7c3aed"?"#f5f3ff":color==="#d97706"?"#fffbeb":color==="#059669"?"#f0fdf4":"#eff6ff";
  const lightBorder = color==="#dc2626"?"#fca5a5":color==="#7c3aed"?"#c4b5fd":color==="#d97706"?"#fcd34d":color==="#059669"?"#86efac":"#bfdbfe";
  return (
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontSize:11,color:color,marginBottom:6,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>{label}</label>
      {!photo?(
        <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:lightBg,border:`2px dashed ${lightBorder}`,borderRadius:10,padding:"13px 12px",cursor:"pointer",color:color,fontWeight:700,fontSize:12.5}}>
          <IC n="cam" s={18} c={color}/> Ambil / Pilih Foto (opsional)
          <input ref={ref} type="file" accept="image/*" capture="environment" onChange={handle} style={{display:"none"}}/>
        </label>
      ):(
        <div style={{position:"relative",width:"100%"}}>
          <img src={photo} alt="bukti" style={{width:"100%",maxHeight:180,objectFit:"cover",borderRadius:10,border:`2px solid ${lightBorder}`,display:"block"}}/>
          <button onClick={remove} style={{position:"absolute",top:6,right:6,background:"rgba(220,38,38,.85)",border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:800,padding:"4px 9px",cursor:"pointer",fontFamily:"inherit"}}>✕ Hapus</button>
          <div style={{position:"absolute",bottom:6,left:6,background:`${color}dd`,borderRadius:6,padding:"3px 8px",fontSize:10,color:"#fff",fontWeight:700}}>📷 Foto siap</div>
        </div>
      )}
    </div>
  );
}

function MutTab({mutations,setMutations,reguHari,toast,canEdit,patrols=[],incidents=[],packages=[],guests=[],currentUser,standJaga=[]}) {
  const [open,setOpen]=useState(false);
  const [photo,setPhoto]=useState(null);
  const [viewPhoto,setViewPhoto]=useState(null);
  const [printMut,setPrintMut]=useState(null);
  const [fm,setFm]=useState({content:"",fromRegu:reguHari,toRegu:"",incidents:"",packages:"",guests:"",notes:""});
  const f=(k,v)=>setFm(p=>({...p,[k]:v}));

  // ── Auto-isi SEMUA aktivitas hari ini ───────────────────────────────────
  const buatAutoLaporan = () => {
    const today = new Date().toDateString();
    const nama = currentUser?.name || "";

    // Patroli
    const patrolHari = patrols.filter(p => new Date(p.ts).toDateString() === today);
    const patrolSaya = patrolHari.filter(p => p.officer && p.officer.includes(nama));

    // Insiden hari ini
    const insidenHari = incidents.filter(i => new Date(i.ts).toDateString() === today);
    const insidenAktif = incidents.filter(i => i.status !== "Selesai");
    const insidenSelesaiHari = incidents.filter(i => i.status === "Selesai" && new Date(i.ts).toDateString() === today);

    // Paket hari ini
    const paketMasukHari = packages.filter(p => new Date(p.ts).toDateString() === today);
    const paketDiambilHari = packages.filter(p => p.takenAt && new Date(p.takenAt).toDateString() === today);
    const paketPending = packages.filter(p => p.status === "Belum Diambil");

    // Tamu hari ini
    const tamuMasukHari = guests.filter(g => new Date(g.ts).toDateString() === today);
    const tamuKeluarHari = guests.filter(g => g.checkOut && new Date(g.checkOut).toDateString() === today);
    const tamuAda = guests.filter(g => g.status === "Masih Ada");

    let isi = "═══ LAPORAN SHIFT " + new Date().toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) + " ═══\n\n";

    // 1. PATROLI
    isi += "📡 PATROLI (" + patrolHari.length + "x hari ini):\n";
    if (patrolHari.length > 0) {
      patrolHari.forEach((p, i) => {
        isi += "  " + (i+1) + ". " + (p.areas||[]).join(", ") + " — " + fmtT(p.ts) + " — " + (p.officer||"—");
        if (p.notes) isi += " — Ket: " + p.notes;
        isi += "\n";
      });
    } else {
      isi += "  Belum ada patroli tercatat.\n";
    }
    isi += "\n";

    // 2. INSIDEN
    isi += "⚠️ INSIDEN:\n";
    if (insidenHari.length > 0) {
      insidenHari.forEach(inc => {
        isi += "  - [" + inc.category + "] " + inc.title + " — " + inc.pos + " — " + fmtT(inc.ts) + " — Status: " + inc.status + "\n";
        if (inc.desc) isi += "    Ket: " + inc.desc + "\n";
      });
    } else {
      isi += "  Tidak ada insiden.\n";
    }
    if (insidenAktif.length > 0) {
      isi += "  ⚡ Masih aktif: " + insidenAktif.map(i => i.title).join(", ") + "\n";
    }
    isi += "\n";

    // 3. PAKET & KURIR
    isi += "📦 PAKET & KURIR:\n";
    if (paketMasukHari.length > 0) {
      isi += "  Masuk hari ini (" + paketMasukHari.length + "):\n";
      paketMasukHari.forEach(p => {
        isi += "  - " + p.type + " untuk " + p.recipient + " dari " + (p.sender||"—") + " — " + fmtT(p.ts) + " — " + p.status + "\n";
      });
    } else {
      isi += "  Tidak ada paket masuk.\n";
    }
    if (paketDiambilHari.length > 0) {
      isi += "  Diambil/diantar (" + paketDiambilHari.length + "): " + paketDiambilHari.map(p=>p.recipient).join(", ") + "\n";
    }
    if (paketPending.length > 0) {
      isi += "  ⏳ Belum diambil: " + paketPending.map(p=>p.recipient+" ("+p.type+")").join(", ") + "\n";
    }
    isi += "\n";

    // 4. TAMU & PESERTA
    isi += "🏠 TAMU & PESERTA:\n";
    if (tamuMasukHari.length > 0) {
      isi += "  Masuk hari ini (" + tamuMasukHari.length + "):\n";
      tamuMasukHari.forEach(g => {
        isi += "  - " + g.name + " (" + g.type + ")" + (g.institution ? " — " + g.institution : "") + (g.room ? " — " + g.room : "") + " — " + fmtT(g.ts) + "\n";
        if (g.purpose) isi += "    Keperluan: " + g.purpose + "\n";
      });
    } else {
      isi += "  Tidak ada tamu masuk.\n";
    }
    if (tamuKeluarHari.length > 0) {
      isi += "  Keluar hari ini (" + tamuKeluarHari.length + "): " + tamuKeluarHari.map(g=>g.name).join(", ") + "\n";
    }
    if (tamuAda.length > 0) {
      isi += "  ⏳ Masih di dalam (" + tamuAda.length + "): " + tamuAda.map(g=>g.name+(g.room?" ("+g.room+")":"")).join(", ") + "\n";
    } else {
      isi += "  Tidak ada tamu/peserta yang masih di dalam.\n";
    }
    isi += "\n";

    // 5. STAND JAGA
    const standHari = standJaga.filter(s => new Date(s.ts).toDateString() === today);
    if (standHari.length > 0) {
      isi += "\ud83d\udee1 STAND JAGA (" + standHari.length + "x):\n";
      standHari.forEach(s => {
        isi += "  - " + s.area + " \u2014 " + fmtT(s.ts) + " \u2014 " + (s.officer||"\u2014") + "\n";
      });
      isi += "\n";
    }

    // Rolling shift dihapus dari sistem

    // Ringkasan
    isi += "\u2500\u2500\u2500 RINGKASAN \u2500\u2500\u2500\n";
    isi += "Patroli: " + patrolHari.length + "x | Stand: " + standHari.length + "x | Insiden: " + insidenHari.length + " (" + insidenAktif.length + " aktif) | Paket: " + paketMasukHari.length + " masuk/" + paketPending.length + " pending | Tamu: " + tamuMasukHari.length + " masuk/" + tamuAda.length + " masih ada";

    f("content", isi.trim());
    f("incidents", insidenAktif.length > 0 ? insidenAktif.length + " aktif — " + insidenAktif.map(i=>i.title).join(", ") : "Tidak ada");
    f("packages", paketPending.length > 0 ? paketPending.length + " belum diambil — " + paketPending.map(p=>p.recipient).join(", ") : "Tidak ada");
    f("guests", tamuAda.length > 0 ? tamuAda.length + " orang — " + tamuAda.map(g=>g.name).join(", ") : "Tidak ada");
    toast("Laporan lengkap berhasil diisi otomatis!");
  };

  const submit=()=>{
    if(!fm.content){toast("Isi laporan!",false);return;}
    setMutations([...mutations,{...fm,photo,id:Date.now(),ts:Date.now()}]);
    setFm({content:"",fromRegu:reguHari,toRegu:"",incidents:"",packages:"",guests:"",notes:""}); setPhoto(null);
    setOpen(false); toast("Mutasi disimpan!");
  };
  return (
    <div>
      <PH title="Serah Terima Mutasi" sub="Laporan pergantian shift antar regu" action={canEdit&&(
        <div style={{display:"flex",gap:7}}>
          <Btn onClick={()=>{setOpen(true);setTimeout(buatAutoLaporan,100);}} color="#059669" size="sm">⚡ Auto</Btn>
          <Btn onClick={()=>setOpen(true)} color="#1d4ed8"><IC n="plus" s={13}/> Buat Manual</Btn>
        </div>
      )}/>
      {!canEdit&&<ReadOnlyBanner reguHari={reguHari}/>}
      {mutations.length===0&&<div style={{color:"#9ca3af",fontSize:13}}>Belum ada mutasi.</div>}
      {[...mutations].reverse().map(m=>(
        <div key={m.id} style={{background:"#fff",border:"1.5px solid #dbeafe",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:4}}>
            <div style={{display:"flex",gap:7,alignItems:"center"}}><Bdg text={`Regu ${m.fromRegu}`} color="#1d4ed8"/><IC n="arr" s={13} c="#9ca3af"/>{m.toRegu&&<Bdg text={`Regu ${m.toRegu}`} color="#059669"/>}{m.photo&&<Bdg text="📷" color="#7c3aed"/>}</div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{fontSize:10.5,color:"#9ca3af"}}>{fmtDT(m.ts)}</span>
              <Btn onClick={()=>setPrintMut(m)} color="#1d4ed8" variant="outline" size="sm"><IC n="print" s={11}/> Cetak</Btn>
            </div>
          </div>
          <div style={{background:"#f8faff",borderRadius:8,padding:"8px 10px",marginBottom:7,fontSize:12.5,color:"#374151",whiteSpace:"pre-wrap",lineHeight:1.65}}>{m.content}</div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:m.photo?7:0}}>
            {m.incidents&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,padding:"4px 8px"}}><div style={{fontSize:9.5,color:"#9ca3af"}}>INSIDEN</div><div style={{fontSize:11.5,color:"#dc2626",fontWeight:700}}>{m.incidents}</div></div>}
            {m.packages&&<div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:6,padding:"4px 8px"}}><div style={{fontSize:9.5,color:"#9ca3af"}}>PAKET</div><div style={{fontSize:11.5,color:"#d97706",fontWeight:700}}>{m.packages}</div></div>}
            {m.guests&&<div style={{background:"#f5f3ff",border:"1px solid #c4b5fd",borderRadius:6,padding:"4px 8px"}}><div style={{fontSize:9.5,color:"#9ca3af"}}>TAMU</div><div style={{fontSize:11.5,color:"#7c3aed",fontWeight:700}}>{m.guests}</div></div>}
          </div>
          {m.photo&&<button onClick={()=>setViewPhoto(m.photo)} style={{display:"flex",alignItems:"center",gap:5,background:"#f5f3ff",border:"1px solid #c4b5fd",borderRadius:6,padding:"4px 9px",fontSize:11,color:"#7c3aed",fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:6}}>
            <img src={m.photo} alt="" style={{width:30,height:20,objectFit:"cover",borderRadius:3}}/> Lihat Foto
          </button>}
          {m.notes&&<div style={{fontSize:11.5,color:"#6b7280",marginTop:4}}>📝 {m.notes}</div>}
        </div>
      ))}
      <Modal open={!!viewPhoto} onClose={()=>setViewPhoto(null)} title="Foto Mutasi">
        {viewPhoto&&<div style={{textAlign:"center"}}><img src={viewPhoto} alt="mutasi" style={{width:"100%",maxHeight:400,objectFit:"contain",borderRadius:10,marginBottom:14}}/><Btn onClick={()=>setViewPhoto(null)} color="#1d4ed8">Tutup</Btn></div>}
      </Modal>
      <Modal open={!!printMut} onClose={()=>setPrintMut(null)} title="Laporan Mutasi" wide noPad>
        {printMut&&<MutPrint m={printMut} onClose={()=>setPrintMut(null)}/>}
      </Modal>
      <Modal open={open} onClose={()=>{setOpen(false);setPhoto(null);}} title="Buat Laporan Mutasi">
        {/* Tombol auto-isi */}
        <div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#1d4ed8"}}>⚡ Isi Otomatis</div>
            <div style={{fontSize:10.5,color:"#6b7280"}}>Laporan terisi dari data patroli, insiden, paket & tamu hari ini</div>
          </div>
          <Btn onClick={buatAutoLaporan} color="#1d4ed8" size="sm">Isi Otomatis</Btn>
        </div>
        <div style={{display:"flex",gap:10}}><Inp label="Dari Regu" value={fm.fromRegu} onChange={e=>f("fromRegu",e.target.value)} as="select" half>{[1,2,3].map(r=><option key={r} value={r}>Regu {r}</option>)}</Inp><Inp label="Kepada Regu" value={fm.toRegu} onChange={e=>f("toRegu",e.target.value)} as="select" half><option value="">— Pilih —</option>{[1,2,3].map(r=><option key={r} value={r}>Regu {r}</option>)}</Inp></div>
        <Inp label="Laporan Kejadian" value={fm.content} onChange={e=>f("content",e.target.value)} as="textarea" placeholder="Klik 'Isi Otomatis' atau ketik manual..."/>
        <div style={{display:"flex",gap:10}}><Inp label="Insiden" value={fm.incidents} onChange={e=>f("incidents",e.target.value)} placeholder="Detail" half/><Inp label="Paket" value={fm.packages} onChange={e=>f("packages",e.target.value)} placeholder="Jumlah" half/><Inp label="Tamu" value={fm.guests} onChange={e=>f("guests",e.target.value)} placeholder="Nama" half/></div>
        <Inp label="Catatan Tambahan" value={fm.notes} onChange={e=>f("notes",e.target.value)} as="textarea" placeholder="Pesan untuk regu berikutnya..."/>
        <PhotoPicker photo={photo} setPhoto={setPhoto} label="📷 Foto Kondisi Laporan" color="#1d4ed8"/>
        <div style={{display:"flex",gap:8}}><Btn onClick={submit} color="#1d4ed8" size="lg">Simpan</Btn><Btn onClick={()=>setOpen(false)} color="#6b7280" variant="outline" size="lg">Batal</Btn></div>
      </Modal>
    </div>
  );
}

// ─── ABSEN TAB ────────────────────────────────────────────────────────────────
function AbsenTab({absen,setAbsen,liburData,setLiburData,reguHari,toast,canEdit,isAdmin,now}) {
  const todayKey = now.toISOString().slice(0,10);
  const todayLabel = now.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const members = REGU[reguHari]||[];
  const [viewDate,setViewDate] = useState(todayKey);

  // absen structure: { "YYYY-MM-DD": { "Nama": {status:"Hadir"|"Izin"|"Sakit"|"Alpa"|"Libur", ket:"..."} } }
  const todayAbsen = absen[viewDate] || {};
  const isToday = viewDate === todayKey;
  const isHarilibur = isHariLibur(new Date(viewDate));

  // Set status absen anggota
  const setStatus=(nama,status,ket="")=>{
    if(!canEdit&&!isAdmin){toast("Tidak bisa edit",false);return;}
    const updated={...absen,[viewDate]:{...todayAbsen,[nama]:{status,ket,ts:Date.now()}}};
    setAbsen(updated); toast(`${nama}: ${status}`);
  };

  // Set libur tambahan manual untuk tanggal tertentu
  const toggleLiburTambahan=(nama)=>{
    if(!isAdmin){toast("Hanya admin yang bisa menetapkan libur tambahan",false);return;}
    const cur=liburData[viewDate]||[];
    const next=cur.includes(nama)?cur.filter(x=>x!==nama):[...cur,nama];
    setLiburData({...liburData,[viewDate]:next});
    toast(cur.includes(nama)?`${nama} dihapus dari libur tambahan`:`${nama} ditetapkan libur tambahan`);
  };

  const STATUS_COL={Hadir:"#059669",Izin:"#d97706",Sakit:"#7c3aed",Alpa:"#dc2626",Libur:"#0891b2"};
  const STATUS_BG ={Hadir:"#f0fdf4",Izin:"#fffbeb",Sakit:"#f5f3ff",Alpa:"#fef2f2",Libur:"#ecfeff"};
  const statusList=["Hadir","Izin","Sakit","Alpa","Libur"];

  // Statistik
  const allDays=Object.keys(absen).sort();
  const allMembers=Object.values(REGU).flat();

  // Buat daftar tanggal 7 hari terakhir untuk navigasi
  const navDays=[];
  for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);navDays.push(d.toISOString().slice(0,10));}

  const liburTambahanHari=liburData[viewDate]||[];
  const reguViewDate = getReguHari(new Date(viewDate));
  const membersView = REGU[reguViewDate]||[];

  // Rekap bulan ini
  const thisMonth = now.toISOString().slice(0,7);
  const rekapBulan = {};
  allMembers.forEach(nm=>{
    rekapBulan[nm]={Hadir:0,Izin:0,Sakit:0,Alpa:0,Libur:0};
    Object.entries(absen).forEach(([dt,da])=>{
      if(dt.startsWith(thisMonth)&&da[nm]) rekapBulan[nm][da[nm].status]=(rekapBulan[nm][da[nm].status]||0)+1;
    });
  });

  return (
    <div>
      <PH title="Absensi Anggota" sub={`Regu ${reguHari} · ${todayLabel}`}/>
      {!canEdit&&!isAdmin&&<ReadOnlyBanner reguHari={reguHari}/>}

      {/* Navigasi tanggal */}
      <div style={{display:"flex",gap:5,overflowX:"auto",marginBottom:14,paddingBottom:2}}>
        {navDays.map(d=>{
          const isS=d===viewDate;
          const libH=isHariLibur(new Date(d));
          return (
            <button key={d} onClick={()=>setViewDate(d)} style={{flexShrink:0,padding:"6px 10px",borderRadius:9,border:`1.5px solid ${isS?"#1d4ed8":libH?"#fbbf24":"#e0eaf8"}`,background:isS?"#1d4ed8":libH?"#fef9c3":"#fff",color:isS?"#fff":libH?"#92400e":"#374151",fontWeight:isS?800:600,fontSize:11.5,cursor:"pointer",fontFamily:"inherit"}}>
              <div>{new Date(d).toLocaleDateString("id-ID",{day:"numeric",month:"short"})}</div>
              <div style={{fontSize:9,opacity:.7}}>{new Date(d).toLocaleDateString("id-ID",{weekday:"short"})}</div>
            </button>
          );
        })}
      </div>

      {/* Header tanggal yang dipilih */}
      <div style={{background:isHarilibur?"linear-gradient(135deg,#fef3c7,#fde68a)":"linear-gradient(135deg,#1e3a8a,#2563eb)",borderRadius:12,padding:"12px 16px",marginBottom:14,color:isHarilibur?"#92400e":"#fff"}}>

// Simpan PIN anggota ke Firestore (koleksi sipamdal_pins)
async function savePinToFS(name, pin) {
  const fb = window.__FB;
  if (!fb) return;
  const { db, doc, setDoc } = fb;
  await setDoc(doc(db, "sipamdal_pins", name), { pin, updatedAt: new Date().toISOString() });
}

// Baca PIN dari Firestore, fallback ke localStorage
async function getPinFromFS(name) {
  const fb = window.__FB;
  if (!fb) return null;
  try {
    const { db, doc, getDocs, collection } = fb;
    const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
    const snap = await getDoc(doc(db, "sipamdal_pins", name));
    if (snap.exists()) return snap.data().pin;
  } catch{}
  return null;
}

// Catat login ke Firestore
function recordLogin(name, regu, isAdmin) {
  const fb = window.__FB;
  if (!fb) return;
  fb.writeAuditLog({ action: "LOGIN", actor: name, regu: regu||0, isAdmin: !!isAdmin, detail: "Berhasil login" });
  // Simpan riwayat login ke koleksi login_history
  const { db, addDoc, collection, serverTimestamp } = fb;
  addDoc(collection(db, "sipamdal_login_history"), {
    name, regu: regu||0, isAdmin: !!isAdmin,
    ts: serverTimestamp(), tsLocal: new Date().toISOString(),
    device: navigator.userAgent.slice(0,80)
  }).catch(()=>{});
}

// Catat aksi data (patroli, insiden, dll)
function auditAction(actor, regu, action, detail) {
  const fb = window.__FB;
  if (!fb) return;
  fb.writeAuditLog({ action, actor, regu: regu||0, detail });
}
