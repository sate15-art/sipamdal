<script type="module" id="fb-init">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    collection, doc, setDoc, deleteDoc, onSnapshot,
    getDocs, addDoc, serverTimestamp, query, orderBy, limit,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDq4WcKgbt5tNZh5wWghOjxCW38y5-siKo",
    authDomain: "sipamdal.firebaseapp.com",
    projectId: "sipamdal",
    storageBucket: "sipamdal.firebasestorage.app",
    messagingSenderId: "586437675903",
    appId: "1:586437675903:web:5a1359dd13c8bd5014a84a"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const auth = getAuth(app);

  // Auth anonim — combined with probe start below

  // ── Audit log helper ──────────────────────────────────────────────────────────
  async function writeAuditLog(entry) {
    try {
      await addDoc(collection(db, "sipamdal_audit"), {
        ...entry, ts: serverTimestamp(), tsLocal: new Date().toISOString()
      });
    } catch {
      try {
        const q = JSON.parse(localStorage.getItem("audit_queue")||"[]");
        q.push({...entry, tsLocal: new Date().toISOString()});
        localStorage.setItem("audit_queue", JSON.stringify(q.slice(-50)));
      } catch {}
    }
  }

  // Flush antrian saat kembali online
  window.addEventListener("online", async () => {
    try {
      const q = JSON.parse(localStorage.getItem("audit_queue")||"[]");
      if (!q.length) return;
      for (const entry of q)
        await addDoc(collection(db, "sipamdal_audit"), {...entry, ts:serverTimestamp(), flushed:true});
      localStorage.removeItem("audit_queue");
    } catch {}
  });

  // ── Expose ke Babel script ────────────────────────────────────────────────────
  window.__FB = { db, collection, doc, getDoc, setDoc, deleteDoc, onSnapshot, getDocs, addDoc, serverTimestamp, query, orderBy, limit, writeAuditLog };

  // ── Signal ke React bahwa FB sudah siap + track koneksi ──────────────────────
  // Gunakan onSnapshot ke doc kecil sebagai probe koneksi
  const probe = doc(db, "sipamdal", "pad_pos");
  let unsubProbe = null;
  function startProbe() {
    if (unsubProbe) return;
    unsubProbe = onSnapshot(probe,
      () => { window.__FB_ONLINE = true;  window.dispatchEvent(new Event("fb_online")); },
      () => { window.__FB_ONLINE = false; window.dispatchEvent(new Event("fb_offline")); }
    );
  }
  // Mulai probe setelah auth selesai
  signInAnonymously(auth).then(startProbe).catch(startProbe);
  window.addEventListener("offline", () => {
    window.__FB_ONLINE = false;
    window.dispatchEvent(new Event("fb_offline"));
  });
</script>

// useLS: localStorage (offline fallback)
function useLS(key, init) {
  const [v, sv] = useState(() => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch{return init;} });
  const set = (x) => { sv(x); try{localStorage.setItem(key,JSON.stringify(x));}catch{} };
  return [v, set];
}

// useFS: Firebase Firestore realtime sync + localStorage fallback
// key = koleksi Firestore, misal "pad_inc", "pad_pkg", dst.
// Data disimpan sebagai array di satu doc: "sipamdal/{key}" → {items:[...]}
function useFS(key, init) {
  const lsKey = key;
  const [v, sv] = useState(() => {
    try { const s=localStorage.getItem(lsKey); return s?JSON.parse(s):init; } catch{return init;}
  });

  useEffect(() => {
    const fb = window.__FB;
    if (!fb) return;
    const { db, doc, collection, onSnapshot } = fb;
    const ref = doc(db, "sipamdal", key);
    const unsub = onSnapshot(ref, snap => {
      if (snap.exists()) {
        const data = snap.data().items ?? init;
        sv(data);
        try { localStorage.setItem(lsKey, JSON.stringify(data)); } catch{}
      }
    }, () => {});
    return () => unsub();
  }, [key]);

  const set = (x) => {
    sv(x);
    try { localStorage.setItem(lsKey, JSON.stringify(x)); } catch{}
    const fb = window.__FB;
    if (!fb) return;
    const { db, doc, setDoc } = fb;
    setDoc(doc(db, "sipamdal", key), { items: x }).catch(err => {
      console.error("Firebase save error:", key, err.code, err.message);
    });
  };

  return [v, set];
}

// ─── useCollection: setiap item = 1 dokumen Firestore terpisah ───────────────
// Dipakai untuk koleksi yang item-nya bisa besar (ada foto base64).
// Firestore path: sipamdal_col/{colName}/{itemId}
// Tidak ada limit 1MB karena setiap patroli/insiden/dll = dokumen sendiri.
function useCollection(colName, init=[]) {
  const lsKey = "col_" + colName;
  const [v, sv] = useState(() => {
    try { const s=localStorage.getItem(lsKey); return s?JSON.parse(s):init; } catch{return init;}
  });

  useEffect(() => {
    const fb = window.__FB;
    if (!fb) return;
    const { db, collection, onSnapshot, query, orderBy } = fb;
    const ref = collection(db, "sipamdal_col_" + colName);
    const q = query(ref, orderBy("ts", "asc"));
    const unsub = onSnapshot(q, snap => {
      const items = snap.docs.map(d => ({...d.data(), _docId: d.id}));
      sv(items);
      try { localStorage.setItem(lsKey, JSON.stringify(items)); } catch{}
    }, () => {});
    return () => unsub();
  }, [colName]);

  // set(newArray) — bandingkan dengan state lama, add/delete selisihnya
  const set = (newArr) => {
    sv(newArr);
    try { localStorage.setItem(lsKey, JSON.stringify(newArr)); } catch{}
    const fb = window.__FB;
    if (!fb) return;
    const { db, collection, doc, setDoc, deleteDoc } = fb;
    const col = collection(db, "sipamdal_col_" + colName);

    // Item yang ada di newArr tapi belum punya _docId = item baru → addDoc
    // Item yang hilang dari newArr = dihapus → deleteDoc
    const newIds = new Set(newArr.map(it => it._docId).filter(Boolean));

    // Baca _docId yang sebelumnya ada di state lama
    let oldIds = new Set();
    try {
      const s = localStorage.getItem(lsKey + "_prev");
      if (s) JSON.parse(s).forEach(id => oldIds.add(id));
    } catch{}

    // Simpan ID saat ini sebagai "prev" untuk next call
    try { localStorage.setItem(lsKey + "_prev", JSON.stringify([...newIds])); } catch{}

    newArr.forEach(item => {
      const { _docId, ...data } = item;
      if (_docId) {
        // Update dokumen yang sudah ada
        setDoc(doc(col, _docId), data).catch(e => console.error("FS set error:", e));
      } else {
        // Dokumen baru — gunakan id item sebagai docId
        const docId = String(item.id || Date.now());
        setDoc(doc(col, docId), data).then(() => {
          // Update _docId di state lokal
          sv(prev => prev.map(it => (it.id === item.id && !it._docId) ? {...it, _docId: docId} : it));
        }).catch(e => console.error("FS add error:", e));
      }
    });

    // Hapus dokumen yang tidak ada lagi di newArr
    oldIds.forEach(id => {
      if (!newIds.has(id)) {
        deleteDoc(doc(col, id)).catch(() => {});
      }
    });
  };

  return [v, set];
}

// Kompres foto agar aman dikirim ke Firebase Firestore
// Target: base64 < 700.000 karakter (~525KB decoded) — jauh di bawah limit 1MB Firestore
function kompressFoto(dataUrl, maxW=800, quality=0.7) {
  const TARGET_SIZE = 700000; // ~525KB decoded, aman untuk Firestore
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      // Langkah 1: Resize proporsional, maks maxW px di sisi terpanjang
      let w = img.width, h = img.height;
      const longestSide = Math.max(w, h);
      if (longestSide > maxW) {
        const r = maxW / longestSide;
        w = Math.round(w * r);
        h = Math.round(h * r);
      }

      // Langkah 2: Gambar ke canvas
      const canvas = document.createElement("canvas");
      canvas.width  = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);

      // Langkah 3: Coba quality awal, lalu turunkan bertahap sampai di bawah target
      let result = canvas.toDataURL("image/jpeg", quality);

      // Iterasi turunkan quality jika masih terlalu besar
      let q = quality;
      while (result.length > TARGET_SIZE && q > 0.05) {
        q = Math.round((q - 0.1) * 100) / 100;
        if (q < 0.05) q = 0.05;
        result = canvas.toDataURL("image/jpeg", q);
      }

      // Langkah 4: Jika MASIH terlalu besar setelah quality minimum,
      // kecilkan resolusi dan coba lagi (worst-case: foto sangat besar)
      if (result.length > TARGET_SIZE) {
        let scale = 0.7;
        while (result.length > TARGET_SIZE && scale > 0.2) {
          const c2 = document.createElement("canvas");
          c2.width  = Math.max(1, Math.round(w * scale));
          c2.height = Math.max(1, Math.round(h * scale));
          c2.getContext("2d").drawImage(canvas, 0, 0, c2.width, c2.height);
          result = c2.toDataURL("image/jpeg", 0.15);
          scale  = Math.round((scale - 0.1) * 10) / 10;
        }
      }

      resolve(result);
    };
    img.onerror = () => resolve(dataUrl); // fallback jika gagal load
    img.src = dataUrl;
  });
}

// ─── QR SVG ───────────────────────────────────────────────────────────────────
function QRSvg({ value, size=120 }) {
  const h = value.split("").reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0, 0);
  const N=21, cell=size/N, grid=[];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) {
    const finder=(r<7&&c<7)||(r<7&&c>=14)||(r>=14&&c<7);
    const inner=(r>=2&&r<=4&&c>=2&&c<=4)||(r>=2&&r<=4&&c>=16&&c<=18)||(r>=16&&r<=18&&c>=2&&c<=4);
    const timing=(r===6||c===6)&&!finder;
    let filled=finder||inner;
    if(timing) filled=(r+c)%2===0;
    if(!finder&&!timing) filled=(Math.abs((h*(r*N+c+7))|0)%255)>120;
    grid.push({r,c,filled});
  }
  return (
    <svg width={size} height={size} style={{background:"var(--card-solid)",borderRadius:8,display:"block"}}>
      {grid.map(({r,c,filled})=>filled&&<rect key={`${r}-${c}`} x={c*cell+.5} y={r*cell+.5} width={cell-.5} height={cell-.5} fill="var(--border2)" rx=".5"/>)}
    </svg>
  );
}

function CamScanner({onScan,onClose,customDecode}) {
  const vRef=useRef(), cRef=useRef(), streamRef=useRef(), animRef=useRef();
  const onScanRef=useRef(onScan);
  const decodeRef=useRef(customDecode);
  useEffect(()=>{ onScanRef.current=onScan; },[onScan]);
  useEffect(()=>{ decodeRef.current=customDecode; },[customDecode]);

  const [err,setErr]=useState(null);
  const [live,setLive]=useState(false);
  const [hit,setHit]=useState(null);
  const [jsQRLoaded,setJsQRLoaded]=useState(!!window.jsQR);
  const hasBD=typeof window!=="undefined"&&!!window.BarcodeDetector;

  // Muat jsQR sebagai fallback jika BarcodeDetector tidak tersedia
  useEffect(()=>{
    if(hasBD||window.jsQR) return;
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js";
    s.onload=()=>setJsQRLoaded(true);
    document.head.appendChild(s);
  },[]);

  const decodeRaw=useCallback((raw)=>{
    const cd=decodeRef.current;
    if(cd) return cd(raw);
    return decQR(raw)||ALL_AREAS.find(a=>raw.includes(a))||null;
  },[]);

  const stop=useCallback(()=>{
    streamRef.current?.getTracks().forEach(t=>t.stop()); streamRef.current=null;
    if(animRef.current) cancelAnimationFrame(animRef.current);
    setLive(false);
  },[]);

  const handleResult=useCallback((raw)=>{
    const result=decodeRaw(raw);
    if(result){ setHit(result); stop(); setTimeout(()=>onScanRef.current(result),400); }
  },[decodeRaw,stop]);

  const scan=useCallback(()=>{
    const v=vRef.current, c=cRef.current;
    if(!v||!c||v.readyState<2){ animRef.current=requestAnimationFrame(scan); return; }
    c.width=v.videoWidth||320; c.height=v.videoHeight||240;
    c.getContext("2d").drawImage(v,0,0);

    if(window.BarcodeDetector){
      new window.BarcodeDetector({formats:["qr_code"]}).detect(c).then(bs=>{
        if(bs.length) handleResult(bs[0].rawValue);
        else animRef.current=requestAnimationFrame(scan);
      }).catch(()=>{ animRef.current=requestAnimationFrame(scan); });
    } else if(window.jsQR){
      const ctx=c.getContext("2d");
      const img=ctx.getImageData(0,0,c.width,c.height);
      const code=window.jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"});
      if(code&&code.data) handleResult(code.data);
      else animRef.current=requestAnimationFrame(scan);
    } else {
      // jsQR belum dimuat, tunggu sebentar
      animRef.current=requestAnimationFrame(scan);
    }
  },[handleResult]);

  const startScan=useCallback(()=>{
    if(animRef.current) cancelAnimationFrame(animRef.current);
    animRef.current=requestAnimationFrame(scan);
  },[scan]);

  const start=async()=>{
    setErr(null); setHit(null);
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}}});
      streamRef.current=s;
      const v=vRef.current; v.srcObject=s;
      v.onloadedmetadata=()=>{ v.play().then(()=>{ setLive(true); startScan(); }).catch(()=>{}); };
      if(v.readyState>=1){ v.play().then(()=>{ setLive(true); startScan(); }).catch(()=>{}); }
    }catch(e){ setErr("Kamera tidak dapat diakses. Pastikan izin kamera diberikan."); }
  };

  useEffect(()=>{ start(); return()=>stop(); },[]);

  return (
    <div>
      <div style={{position:"relative",background:"var(--card-solid)",minHeight:240,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        <video ref={vRef} style={{width:"100%",maxHeight:260,objectFit:"cover",display:live?"block":"none"}} playsInline muted/>
        <canvas ref={cRef} style={{display:"none"}}/>
        {live&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <div style={{width:190,height:190,border:"2px solid var(--accent)",borderRadius:14,boxShadow:"0 0 0 9999px rgba(0,0,0,.5)",position:"relative"}}>
              <div style={{position:"absolute",top:"50%",left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,var(--accent-light),transparent)",animation:"sl 2s ease-in-out infinite"}}/>
            </div>
          </div>
        )}
        {hit&&<div style={{position:"absolute",bottom:12,left:"50%",transform:"translateX(-50%)",background:"var(--ok)",color:"#fff",borderRadius:8,padding:"8px 18px",fontWeight:700,fontSize:14,whiteSpace:"nowrap"}}>✓ {hit}</div>}
        {!live&&!hit&&!err&&<div style={{textAlign:"center",color:"var(--tx2)",padding:24}}><IC n="cam" s={44} c="var(--accent-light)"/><div style={{marginTop:10,fontSize:13}}>Memulai kamera...</div></div>}
      </div>
      <div style={{padding:"14px 18px 18px"}}>
        {!hasBD&&live&&!jsQRLoaded&&<div style={{background:"rgba(255,204,0,.07)",border:"1px solid #fbbf24",borderRadius:9,padding:"9px 13px",marginBottom:10,fontSize:12.5,color:"#ffcc00"}}>⏳ Memuat decoder QR... harap tunggu sebentar.</div>}
        {!hasBD&&live&&jsQRLoaded&&<div style={{background:"rgba(74,222,128,.07)",border:"1px solid rgba(52,211,153,.4)",borderRadius:9,padding:"9px 13px",marginBottom:10,fontSize:12.5,color:"var(--ok)"}}>✓ Decoder QR aktif — arahkan ke kode QR.</div>}
        {err&&<div style={{background:"rgba(251,113,133,.1)",border:"1px solid rgba(251,113,133,.4)",borderRadius:9,padding:"9px 13px",marginBottom:10,fontSize:12.5,color:"var(--r)"}}>{err}</div>}
        <div style={{fontSize:11.5,fontWeight:700,color:"var(--accent-light)",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Atau pilih manual:</div>
        <div style={{maxHeight:210,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
          {customDecode
            ? /* Mode Pos — tampilkan daftar POS_LIST */
              POS_LIST.map(pos=>(
                <button key={pos} onClick={()=>{stop();onScan(pos);}} style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:8,color:"var(--accent-light)",fontSize:13,fontWeight:600,padding:"10px 14px",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                  📍 {pos}
                </button>
              ))
            : /* Mode Patroli/Stand — tampilkan area per pos */
              Object.entries(PATROL_AREAS).map(([pos,areas])=>(
                <div key={pos}>
                  <div style={{fontSize:10.5,color:"var(--tx3)",fontWeight:700,padding:"3px 0 2px",textTransform:"uppercase",letterSpacing:.5}}>{pos}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:4}}>
                    {areas.map(a=>(
                      <button key={a} onClick={()=>{stop();onScan(a);}} style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:7,color:"var(--accent-light)",fontSize:12,fontWeight:600,padding:"6px 10px",cursor:"pointer",fontFamily:"inherit"}}>{a}</button>
                    ))}
                  </div>
                </div>
              ))
          }
        </div>
        <div style={{display:"flex",gap:8}}>
          {live?<Btn onClick={stop} color="var(--tx4)" variant="outline">Stop Kamera</Btn>:<Btn onClick={start} color="var(--accent)"><IC n="cam" s={13}/> Aktifkan</Btn>}
          <Btn onClick={()=>{stop();onClose();}} color="var(--tx4)" variant="outline">Tutup</Btn>
        </div>
      </div>
      <style>{`@keyframes sl{0%,100%{transform:translateY(-70px)}50%{transform:translateY(70px)}}`}</style>
    </div>
  );
}

function PH({title,sub,action}) {

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:10}}>

    <div style={{background:"rgba(255,204,0,.07)",border:"1.5px solid #fcd34d",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:18}}>🔒</span>

}
function DashTab({now,reguHari,posAssign,incidents,packages,guests,patrols,standJaga,mutations,posRollingLog,liburData,setLiburData,instruksi,currentUser,setTab,canEdit,isAdmin}) {
  const pending=packages.filter(p=>p.status==="Belum Diambil").length;
  const staying=guests.filter(g=>g.status==="Masih Ada").length;
  const todP=patrols.filter(p=>new Date(p.ts).toDateString()===now.toDateString()).length;
  const actI=incidents.filter(i=>i.status!=="Selesai").length;

  // ── Hitung mundur piket selesai ──

  // ── Alert: pos kosong ──
  const emptyPos = POS_LIST.filter(p => !(posAssign[p]?.length));
  const posKosong = emptyPos.length > 0;

  // ── Alert: patroli – cek apakah sudah patroli dalam 1 jam terakhir ──
  const lastPatrol = patrols.filter(p=>new Date(p.ts).toDateString()===now.toDateString())
    .sort((a,b)=>b.ts-a.ts)[0];
  const msSincePatrol = lastPatrol ? now - lastPatrol.ts : Infinity;
  const patrolOverdue = msSincePatrol > 3600000; // > 1 jam

  // ── Alert: rolling pos – cek apakah sudah rolling dalam 2 jam terakhir ──
  // Rolling pos dicatat di posRolling (dipisah dari penempatan biasa)
  const lastRolling = (posRollingLog||[]).filter(r=>new Date(r.ts).toDateString()===now.toDateString())
    .sort((a,b)=>b.ts-a.ts)[0];
  const msSinceRolling = lastRolling ? now - lastRolling.ts : Infinity;
  const rollingOverdue = msSinceRolling > 7200000; // > 2 jam

  // ── Alert: belum ada mutasi/serah terima ──
  const todayMut = mutations.filter(m => new Date(m.ts).toDateString() === now.toDateString());
  const noMutasi = todayMut.length === 0;

  const alerts = [
    ...(posKosong    ? [{icon:"⚠️", msg:`Pos kosong: ${emptyPos.join(", ")}`, col:"var(--r)", bg:"rgba(251,113,133,.1)", tab:"pos"}] : []),
    ...(patrolOverdue? [{icon:"🔍", msg: todP===0 ? "Belum ada patroli hari ini" : `Patroli terakhir ${Math.floor(msSincePatrol/60000)} menit lalu — saatnya patroli!`, col:"#ffcc00", bg:"rgba(255,204,0,.07)", tab:"patrol"}] : []),
    ...(rollingOverdue&&canEdit? [{icon:"🔄", msg: lastRolling ? `Sudah ${Math.floor(msSinceRolling/60000)} menit belum rolling pos — ingatkan anggota!` : "Belum ada rolling pos hari ini — ingatkan anggota!", col:"var(--accent)", bg:"rgba(0,170,255,.1)", tab:"pos"}] : []),
    ...(noMutasi     ? [{icon:"📋", msg:"Belum ada laporan serah terima shift hari ini", col:"#a78bfa", bg:"rgba(167,139,250,.1)", tab:"mutation"}] : []),
  ];

  const cards=[
    {l:"Paket Belum Diambil",v:pending,col:"#ffcc00",bg:"rgba(255,204,0,.07)",icon:"pkg",t:"package"},
    {l:"Tamu Menginap",v:staying,col:"#a78bfa",bg:"rgba(167,139,250,.1)",icon:"ppl",t:"guest"},
    {l:"Patroli Hari Ini",v:todP,col:"var(--ok)",bg:"var(--green-card)",icon:"qr",t:"patrol"},
    {l:"Insiden Aktif",v:actI,col:"var(--r)",bg:"rgba(251,113,133,.1)",icon:"alert",t:"incident"},
  ];
  return (
    <div>
      {/* Hero card anggota: Status Operasional simpel */}
      {!isAdmin && (()=>{
        const myPos = POS_LIST.find(p=>(posAssign[p]||[]).includes(currentUser?.name));
        const statusColor = actI > 0 ? "#ff4444" : posKosong ? "#ffd700" : "var(--accent-light)";
        const statusText  = actI > 0 ? "ADA INSIDEN AKTIF" : posKosong ? "POS BELUM TERISI" : "KONDISI NORMAL";
        const posKosongCount = POS_LIST.filter(p=>!(posAssign[p]?.length>0)).length;
        return (
          <div style={{background:"var(--status-card-bg)",border:`2px solid ${statusColor}55`,borderRadius:14,padding:"16px",marginBottom:14,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-30,right:-30,width:100,height:100,background:statusColor,borderRadius:"50%",opacity:.06,pointerEvents:"none"}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <div style={{fontSize:9.5,letterSpacing:2.5,color:"var(--tx3)",fontWeight:700,marginBottom:3,textTransform:"uppercase"}}>Status Operasional</div>
                <div style={{fontSize:15,fontWeight:900,color:statusColor,letterSpacing:1}}>{statusText}</div>
              </div>
              <div style={{width:44,height:44,borderRadius:"50%",background:statusColor+"18",border:`2px solid ${statusColor}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>
                {actI > 0 ? "🚨" : posKosong ? "⚠️" : "✅"}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>

                {label:"Paket Tunggu",  val: pending, col: pending>0?"#ffd700":"var(--accent-light)", icon:"📦", tab:"package"},

                <div key={item.label} onClick={()=>setTab(item.tab)} style={{background:"var(--stat-inner)",border:`1px solid ${item.col}30`,borderRadius:10,padding:"8px 6px",textAlign:"center",cursor:"pointer"}}>
                  <div style={{fontSize:18,marginBottom:2}}>{item.icon}</div>
                  <div style={{fontSize:20,fontWeight:900,color:item.col,lineHeight:1}}>{item.val}</div>
                  <div style={{fontSize:9,color:"var(--tx3)",marginTop:2,lineHeight:1.2}}>{item.label}</div>

            </div>
            {myPos && (
              <div style={{marginTop:10,padding:"7px 10px",background:"var(--green-card)",borderRadius:8,border:"1px solid var(--dark-border2)",display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:13}}>📍</span>
                <span style={{fontSize:11.5,color:"var(--accent-light)",fontWeight:700}}>Pos kamu: {myPos}</span>
              </div>
            )}
          </div>
        );
      })()}
      {/* Hero card admin: Regu + Status Pos */}
      {isAdmin && (
      <div style={{background:"var(--admin-card-bg)",border:`1.5px solid ${posKosong?"#ff3333":"var(--border)"}`,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
          <div style={{flex:"0 0 auto"}}>
            <div style={{fontSize:9,letterSpacing:3,color:"var(--accent)",marginBottom:3}}>JADWAL JAGA HARI INI</div>
            <div style={{fontSize:22,fontWeight:900,color:"var(--accent-light)",letterSpacing:2,textShadow:"none"}}>{fmtDate(now).split(",")[0].toUpperCase()}, REGU {reguHari}</div>
            <div style={{fontSize:10,color:"var(--accent)",marginTop:3,lineHeight:1.6}}>{REGU[reguHari]?.join(" · ")}</div>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:9,letterSpacing:2,color:posKosong?"#ff3333":"var(--accent)",marginBottom:5}}>{posKosong?"⚠ POS KOSONG":"STATUS POS"}</div>
            {POS_LIST.map(p=>{
              const angg = posAssign[p];
              const ok = angg?.length > 0;
              return (
                <div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,gap:4}}>
                  <span style={{fontSize:9,color:"var(--tx3)",whiteSpace:"nowrap"}}>{p.replace("Pos ","").replace("Gedung ","Gdg ")}</span>
                  <span style={{fontSize:9,fontWeight:700,color:ok?"var(--accent-light)":"#ff3333",flexShrink:0,textAlign:"right"}}>{ok ? angg[0]+(angg.length>1?` +${angg.length-1}`:"") : "⚠ KOSONG"}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
      )}

      {/* ── ADMIN SUMMARY CARDS ── Ringkasan cepat untuk admin */}
      {isAdmin && (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {
              label:"Tamu Aktif",
              value: staying,
              icon:"👥",
              color: staying>0?"#a78bfa":"var(--tx4)",
              bg: staying>0?"rgba(167,139,250,.1)":"var(--card-solid)",
              border: staying>0?"rgba(167,139,250,.35)":"var(--border)",
              tab:"guest",
              sub: staying>0?`${staying} masih di dalam`:"Tidak ada tamu"
            },
            {
              label:"Insiden Hari Ini",
              value: incidents.filter(i=>new Date(i.ts||i.createdAt||0).toDateString()===now.toDateString()).length,
              icon:"🚨",
              color: actI>0?"var(--r)":"var(--ok)",
              bg: actI>0?"rgba(251,113,133,.08)":"var(--green-card)",
              border: actI>0?"rgba(251,113,133,.35)":"var(--green-border)",
              tab:"incident",
              sub: actI>0?`${actI} belum selesai`:"Semua aman"
            },
            {
              label:"Paket Menunggu",
              value: pending,
              icon:"📦",
              color: pending>0?"#ffd700":"var(--ok)",
              bg: pending>0?"rgba(255,204,0,.07)":"var(--green-card)",
              border: pending>0?"rgba(255,204,0,.35)":"var(--green-border)",
              tab:"package",
              sub: pending>0?`${pending} belum diambil`:"Semua selesai"
            },
            {
              label:"Patroli Hari Ini",
              value: todP,
              icon:"🛡",
              color: todP>0?"var(--ok)":"var(--r)",
              bg: todP>0?"var(--green-card)":"rgba(251,113,133,.08)",
              border: todP>0?"var(--green-border)":"rgba(251,113,133,.35)",
              tab:"patrol",
              sub: todP>0?`${todP}× tercatat`:"Belum ada patroli"
            },
          ].map(card=>(
            <div key={card.label} onClick={()=>setTab(card.tab)}
              style={{background:card.bg,border:`1.5px solid ${card.border}`,borderRadius:13,padding:"12px 14px",cursor:"pointer",display:"flex",flexDirection:"column",gap:4,
                transition:"transform .12s"}}              onTouchStart={e=>e.currentTarget.style.transform="scale(.97)"}

              <div style={{fontSize:10,color:"var(--tx4)"}}>{card.sub}</div>

      {/* Alert notifikasi */}

        <div style={{marginBottom:14}}>
          {alerts.map((a,i)=>(
            <div key={i} onClick={()=>setTab(a.tab)} style={{background:a.bg,border:`1.5px solid ${a.col}40`,borderRadius:10,padding:"10px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
              <span style={{fontSize:18,flexShrink:0}}>{a.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12.5,fontWeight:800,color:a.col}}>{a.msg}</div>

        const todayKey = now.toISOString().slice(0,10);
        const liburHariIni = liburData?.[todayKey] || [];

        const jenis = HARI_MERAH.has(todayKey)?"📅 Libur Nasional / Hari Merah":now.getDay()===0?"📅 Hari Minggu":"📅 Hari Sabtu";
        return (
          <LiburBanner
            jenis={jenis}

            todayKey={todayKey}
            liburData={liburData}

            isAdmin={isAdmin}

        );

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {cards.map(c=>(
          <div key={c.l} onClick={()=>setTab(c.t)} style={{background:c.bg,border:`1.5px solid ${c.col}22`,borderRadius:12,padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,background:c.col+"18",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IC n={c.icon} s={18} c={c.col}/></div>
            <div><div style={{fontSize:24,fontWeight:900,color:c.col}}>{c.v}</div><div style={{fontSize:10.5,color:"var(--tx3)"}}>{c.l}</div></div>
          </div>

      </div>
      {/* Aksi Cepat */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:9,letterSpacing:3,color:"var(--tx3)",marginBottom:8,letterSpacing:1}}> AKSI CEPAT</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[
            {icon:"🔍",label:"Catat Patroli",tab:"patrol",col:"var(--accent-light)",bg:"var(--green-card)"},
            {icon:"⚠️",label:"Laporkan Insiden",tab:"incident",col:"#ff3333",bg:"rgba(255,50,50,.08)"},
            {icon:"📋",label:"Serah Terima",tab:"mutation",col:"#ffcc00",bg:"rgba(255,204,0,.08)"},
          ].map(a=>(
            <button key={a.tab} onClick={()=>setTab(a.tab)} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:a.bg,border:`1px solid ${a.col}40`,borderRadius:8,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>

            </button>
          ))}
        </div>
      </div>

      {/* Status Patroli per Pos */}
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:9,letterSpacing:3,color:"var(--accent)"}}>▶ STATUS PATROLI HARI INI</div>
          <button onClick={()=>setTab("patrol")} style={{fontSize:9,color:"var(--accent)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>LIHAT SEMUA →</button>
        </div>
        {POS_LIST.map(p=>{
          const posPatrols = patrols.filter(pt=>pt.pos===p && new Date(pt.ts).toDateString()===now.toDateString());
          const last = posPatrols.sort((a,b)=>b.ts-a.ts)[0];
          const minsAgo = last ? Math.floor((now - last.ts)/60000) : null;
          const overdue = !last || minsAgo > 60;
          return (
            <div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"var(--tx)"}}>{p}</div>
                <div style={{fontSize:9,color:"var(--tx3)"}}>{posAssign[p]?.join(", ")||"—"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                {last
                  ? <span style={{fontSize:10,fontWeight:700,color:overdue?"#ffcc00":"var(--accent-light)"}}>{minsAgo < 60 ? `${minsAgo} mnt lalu` : `${Math.floor(minsAgo/60)}j ${minsAgo%60}m lalu`}</span>
                  : <span style={{fontSize:10,fontWeight:700,color:"#ff3333"}}>⚠ Belum patroli</span>
                }
                <div style={{fontSize:9,color:"var(--tx3)"}}>{last?`${posPatrols.length}x hari ini`:""}</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Widget Instruksi di Dashboard */}
      {(()=>{
        const PRI_COL2 = {Penting:"var(--r)", Normal:"var(--accent)", Info:"var(--ok)"};
        const PRI_BG2  = {Penting:"rgba(251,113,133,.08)", Normal:"var(--green-card)", Info:"var(--green-card)"};
        const myRegu = currentUser?.regu;
        const visibel = (instruksi||[]).filter(i=>i.aktif && (i.targetRegu==="Semua"||String(i.targetRegu)===String(myRegu)));
        if(visibel.length===0) return null;
        return (
          <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden",marginBottom:4}}>
            <div style={{background:"linear-gradient(90deg,#be123c,#fb7185)",padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:12,fontWeight:800,color:"#fff"}}>🚨 Instruksi Pimpinan ({visibel.length})</div>
              <button onClick={()=>setTab("instruksi")} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:6,padding:"3px 9px",fontSize:10.5,color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Lihat Semua →</button>
            </div>
            {visibel.slice(0,3).map(ins=>(
              <div key={ins.id} style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",borderLeft:`3px solid ${PRI_COL2[ins.prioritas]||"var(--accent)"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:3,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,fontWeight:800,color:PRI_COL2[ins.prioritas]||"var(--accent)",background:PRI_BG2[ins.prioritas]||"var(--green-card)",borderRadius:4,padding:"1px 6px"}}>{ins.prioritas==="Penting"?"🚨":ins.prioritas==="Info"?"ℹ️":"📋"} {ins.prioritas}</span>
                      <span style={{fontSize:10,color:"var(--tx3)"}}>{fmtDT(ins.ts)}</span>
                    </div>
                    <div style={{fontSize:13,fontWeight:800,color:"var(--tx2)"}}>{ins.judul}</div>
                    <div style={{fontSize:11.5,color:"var(--tx)",marginTop:2,lineHeight:1.5}}>{ins.isi.slice(0,120)}{ins.isi.length>120?"…":""}</div>
                  </div>
                  {ins.selesai?(
                    <span style={{flexShrink:0,background:"var(--green-card)",border:"1px solid rgba(52,211,153,.4)",borderRadius:6,padding:"3px 8px",fontSize:10,color:"var(--ok)",fontWeight:700}}>✓ Selesai</span>
                  ):(
                    <span style={{flexShrink:0,background:"rgba(251,113,133,.1)",border:"1px solid rgba(251,113,133,.4)",borderRadius:6,padding:"3px 8px",fontSize:10,color:"var(--r)",fontWeight:700}}>⏳ Aktif</span>
                  )}
                </div>
              </div>
            ))}
            {visibel.length>3&&<div style={{padding:"8px 14px",fontSize:11,color:"var(--tx3)",textAlign:"center"}}>+{visibel.length-3} instruksi lainnya</div>}
          </div>
        );
      })()}
    </div>
  );
}

// QR codes for each pos check-in
const POS_QR_PREFIX = "BBPKA2-POS-";
const encPosQR = (pos) => POS_QR_PREFIX + pos.replace(/ /g,"_");
const decPosQR = (v) => v && v.startsWith(POS_QR_PREFIX) ? v.replace(POS_QR_PREFIX,"").replace(/_/g," ") : null;

// ─── POS ──────────────────────────────────────────────────────────────────────
function PosTab({reguHari,posAssign,setPosAssign,posRollingLog,setPosRollingLog,toast,canEdit,isAdmin,currentUser}) {
  const members=REGU[reguHari]||[];
  const [mode,setMode]=useState("assign");
  const [confirm,setConfirm]=useState(null);
  const [selectedMember,setSelectedMember]=useState("");
  const [rollingFrom,setRollingFrom]=useState("");
  const [rollingTo,setRollingTo]=useState("");

  const doAssign=()=>{
    const nameToAssign = isAdmin ? selectedMember : (currentUser?.name||"");
    if(!nameToAssign){toast(isAdmin?"Pilih anggota!":"Tidak ada pengguna login!",false);return;}
    const asgn=posAssign[confirm.pos]||[]; const cap=POS_CAP[confirm.pos]||1;
    if(asgn.includes(nameToAssign)){toast(`${nameToAssign} sudah ada di ${confirm.pos}!`,false);return;}
    if(asgn.length>=cap){toast(`${confirm.pos} sudah penuh!`,false);return;}
    const updated={...posAssign};
    // Lepas dari pos lain dulu
    POS_LIST.forEach(p=>{ if(updated[p]) updated[p]=updated[p].filter(m=>m!==nameToAssign); });
    updated[confirm.pos]=[...(updated[confirm.pos]||[]),nameToAssign];
    setPosAssign(updated); setConfirm(null); toast(`✓ ${nameToAssign} → ${confirm.pos}!`);
  };

  // ── Rolling pos: pindah anggota dari pos lama ke pos baru ──
  const doRolling=()=>{
    if(!rollingFrom||!rollingTo){toast("Pilih anggota & pos tujuan!",false);return;}
    if(rollingFrom===rollingTo){toast("Pos asal dan tujuan sama!",false);return;}
    const fromPos = Object.entries(posAssign).find(([,ms])=>ms?.includes(rollingFrom))?.[0];
    if(fromPos===rollingTo){toast("Anggota sudah ada di pos tujuan!",false);return;}
    const toAsgn = posAssign[rollingTo]||[]; const cap=POS_CAP[rollingTo]||1;
    const updated = {...posAssign};

    // Jika pos tujuan penuh tapi kapasitas 1: lakukan SWAP
    if(toAsgn.length>=cap && cap===1 && toAsgn.length===1){
      const displaced = toAsgn[0]; // orang yang ada di pos tujuan
      // Pindahkan displaced ke fromPos
      if(fromPos) {
        updated[fromPos]=(updated[fromPos]||[]).filter(x=>x!==rollingFrom);
        updated[fromPos]=[...(updated[fromPos]||[]),displaced];
      }
      updated[rollingTo]=[rollingFrom];
      setPosAssign(updated);
      const log={id:Date.now(),ts:Date.now(),member:rollingFrom,fromPos:fromPos||"—",toPos:rollingTo,swap:displaced};
      setPosRollingLog([...(posRollingLog||[]),log]);
      toast(`🔄 Tukar: ${rollingFrom} ↔ ${displaced}!`);
      setRollingFrom(""); setRollingTo("");
      return;
    }

    if(toAsgn.length>=cap){toast(`${rollingTo} sudah penuh (${toAsgn.length}/${cap})!`,false);return;}
    if(fromPos) updated[fromPos]=(updated[fromPos]||[]).filter(x=>x!==rollingFrom);
    updated[rollingTo]=[...(updated[rollingTo]||[]),rollingFrom];
    setPosAssign(updated);
    const log={id:Date.now(),ts:Date.now(),member:rollingFrom,fromPos:fromPos||"—",toPos:rollingTo};
    setPosRollingLog([...(posRollingLog||[]),log]);
    toast(`Rolling: ${rollingFrom} → ${rollingTo}!`);
    setRollingFrom(""); setRollingTo("");
  };

  const removeFromPos=(pos,m)=>{
    if(!canEdit) return;
    const updated={...posAssign,[pos]:(posAssign[pos]||[]).filter(x=>x!==m)};
    setPosAssign(updated); toast(`${m} dilepas dari ${pos}`);
  };

  // Log rolling hari ini
  const todayRolling=(posRollingLog||[]).filter(r=>new Date(r.ts).toDateString()===new Date().toDateString());
  const allAssigned=Object.values(posAssign).flat();

  return (
    <div>
      <PH title="Penempatan Pos" sub={`Regu ${reguHari}: ${members.join(", ")}`}/>
      {!canEdit&&<ReadOnlyBanner reguHari={reguHari}/>}

      {/* Tab Mode */}
      {canEdit&&<div style={{display:"flex",gap:0,marginBottom:14,background:"var(--card-solid)",borderRadius:10,padding:3}}>
        {[["assign","📍 Penempatan"],["rolling","🔄 Rolling Pos"]].map(([v,l])=>(
          <button key={v} onClick={()=>setMode(v)} style={{flex:1,padding:"8px 0",fontSize:12.5,fontWeight:700,borderRadius:8,border:"none",cursor:"pointer",background:mode===v?"var(--card-solid)":"transparent",color:mode===v?"var(--accent)":"var(--tx4)",boxShadow:mode===v?"0 1px 6px rgba(0,0,0,.08)":"none",fontFamily:"inherit",transition:"all .15s"}}>
            {l}
          </button>
        ))}
      </div>}

      {/* ── MODE: PENEMPATAN ── */}
      {mode==="assign"&&(
        <>
          {canEdit&&<div style={{background:"rgba(0,120,212,.1)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"var(--accent)"}}>
            📋 Ketuk <strong>+ Tambah</strong> untuk menempatkan anggota ke pos.
          </div>}

          {/* ── POS CARDS — model tap lingkaran ── */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
            {POS_LIST.map((pos,pi)=>{
              const col=POS_COL[pos], cap=POS_CAP[pos], asgn=posAssign[pos]||[];
              const isFull=asgn.length>=cap;
              const isEmpty=asgn.length===0;
              return (
                <div key={pos} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                  {/* Lingkaran tap */}
                  <button
                    onClick={()=>{
                      if(!canEdit) return;
                      if(isAdmin){setConfirm({pos,type:"assign"});setSelectedMember("");}
                      else {
                        const myName=currentUser?.name; if(!myName) return;
                        if((posAssign[pos]||[]).includes(myName)){toast(`${myName} sudah di ${pos}!`,false);return;}
                        if(isFull){toast(`${pos} sudah penuh!`,false);return;}
                        const upd={...posAssign};
                        POS_LIST.forEach(p2=>{if(upd[p2])upd[p2]=upd[p2].filter(m=>m!==myName);});
                        upd[pos]=[...(upd[pos]||[]),myName];
                        setPosAssign(upd); toast(`✓ ${myName} → ${pos}!`);
                      }
                    }}
                    style={{
                      width:70, height:70, borderRadius:"50%",
                      background: isFull ? col+"33" : isEmpty ? "var(--card-solid)" : col+"1a",
                      border: `2.5px solid ${isFull ? col : isEmpty ? "var(--border)" : col+"88"}`,
                      boxShadow: isFull ? `0 0 16px ${col}55` : "0 2px 8px rgba(0,0,0,.15)",
                      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                      cursor: canEdit&&!isFull ? "pointer" : "default",
                      transition:"all .2s cubic-bezier(.34,1.56,.64,1)",
                      position:"relative", padding:0,
                    }}
                    onMouseEnter={e=>{ if(canEdit&&!isFull) e.currentTarget.style.transform="scale(1.08)"; }}
                    onMouseLeave={e=>{ e.currentTarget.style.transform="scale(1)"; }}
                    onTouchStart={e=>{ if(canEdit&&!isFull) e.currentTarget.style.transform="scale(1.06)"; }}
                    onTouchEnd={e=>{ e.currentTarget.style.transform="scale(1)"; }}
                  >
                    {/* Badge jumlah */}
                    <div style={{
                      fontSize:18, fontWeight:800,
                      color: isFull ? col : isEmpty ? "var(--tx3)" : col,
                      lineHeight:1,
                    }}>{asgn.length}/{cap}</div>
                    {/* Ikon status */}
                    <div style={{fontSize:11,marginTop:2}}>
                      {isFull ? "✅" : isEmpty ? "➕" : "👤"}
                    </div>
                    {/* Hapus anggota — x kecil di pojok */}
                    {canEdit && asgn.length>0 && (
                      <div style={{position:"absolute",top:-4,right:-4}}>
                        <button onClick={e=>{e.stopPropagation();removeFromPos(pos,asgn[asgn.length-1]);}}
                          style={{width:18,height:18,borderRadius:"50%",background:"#ff3333",border:"none",color:"#fff",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
                      </div>
                    )}
                  </button>
                  {/* Nama pos */}
                  <div style={{fontSize:9.5,fontWeight:700,color: isFull?col:"var(--tx2)",textAlign:"center",lineHeight:1.3,maxWidth:72}}>{pos}</div>
                  {/* Nama anggota */}
                  {asgn.length>0&&(
                    <div style={{fontSize:9,color:"var(--tx3)",textAlign:"center",lineHeight:1.3}}>
                      {asgn.join(", ")}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* ── MODE: ROLLING POS ── */}
      {mode==="rolling"&&canEdit&&(
        <div>
          <div style={{background:"rgba(0,170,255,.1)",border:"1.5px solid #67e8f9",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:800,color:"var(--accent)",marginBottom:10}}>🔄 Pindah / Rolling Pos Jaga</div>
            <Inp label="Anggota yang dipindah" value={rollingFrom} onChange={e=>setRollingFrom(e.target.value)} as="select">
              <option value="">— Pilih Anggota —</option>
              {members.map(m=>{
                const curPos=Object.entries(posAssign).find(([,ms])=>ms?.includes(m))?.[0]||"Belum ditempatkan";
                return <option key={m} value={m}>{m} ({curPos})</option>;
              })}
            </Inp>
            <Inp label="Pindah ke pos" value={rollingTo} onChange={e=>setRollingTo(e.target.value)} as="select">
              <option value="">— Pilih Pos Tujuan —</option>
              {POS_LIST.map(p=>{
                const asgn=posAssign[p]||[]; const cap=POS_CAP[p]||1;
                const memberDiSini = rollingFrom && asgn.includes(rollingFrom);
                // Sembunyikan pos asal anggota yang akan di-rolling
                if(memberDiSini) return null;
                const efektif = asgn.length;
                const bisaSwap = efektif >= cap && cap === 1 && asgn.length === 1;
                const penuh = efektif >= cap && !bisaSwap;
                const label = bisaSwap
                  ? `🔄 ${p} (${asgn.length}/${cap}) — Tukar`
                  : penuh
                    ? `${p} (${asgn.length}/${cap}) — Penuh`
                    : `${p} (${asgn.length}/${cap})`;
                return (
                  <option key={p} value={p} disabled={penuh}>{label}</option>
                );
              })}
            </Inp>
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <Btn onClick={doRolling} color="var(--accent)" size="lg" full><IC n="rot" s={14}/> Konfirmasi Rolling</Btn>
            </div>
          </div>

          {/* Log rolling hari ini */}
          {todayRolling.length>0&&(
            <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:12,fontWeight:800,color:"var(--accent)",marginBottom:8}}>Log Rolling Hari Ini ({todayRolling.length})</div>
              {[...todayRolling].reverse().map(r=>(
                <div key={r.id} style={{padding:"6px 0",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:13}}>{r.swap?"↔":"🔄"}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12.5,fontWeight:700,color:"var(--tx2)"}}>
                      {r.swap
                        ? `${r.member} ↔ ${r.swap}: ${r.fromPos} ⇄ ${r.toPos}`
                        : `${r.member}: ${r.fromPos} → ${r.toPos}`
                      }
                    </div>
                    <div style={{fontSize:10.5,color:"var(--tx3)"}}>{fmtT(r.ts)}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
          {todayRolling.length===0&&<div style={{color:"var(--tx3)",fontSize:12,textAlign:"center",padding:"20px 0"}}>Belum ada rolling hari ini</div>}
        </div>
      )}

      {/* CamScanner pos dihapus — penempatan via tombol Tambah */}
      {/* Confirm assign */}
      <Modal open={!!confirm} onClose={()=>setConfirm(null)} title={`Tempatkan ke ${confirm?.pos}`} bottom>
        {confirm&&(
          <div>
            <div style={{background:POS_COL[confirm.pos]+"14",borderRadius:10,padding:"12px",marginBottom:14,textAlign:"center",border:`1.5px solid ${POS_COL[confirm.pos]}30`}}>
              <div style={{fontSize:11,color:"var(--tx3)"}}>Pos Tujuan</div>
              <div style={{fontSize:18,fontWeight:900,color:POS_COL[confirm.pos]}}>{confirm.pos}</div>
              <div style={{fontSize:11,color:"var(--tx3)",marginTop:2}}>Kapasitas: {POS_CAP[confirm.pos]} · Terisi: {(posAssign[confirm.pos]||[]).length}</div>
            </div>
            {isAdmin ? (
              <Inp label="Pilih Anggota" value={selectedMember} onChange={e=>setSelectedMember(e.target.value)} as="select">
                <option value="">— Pilih Anggota —</option>
                {members.filter(m=>!allAssigned.includes(m)).map(m=><option key={m}>{m}</option>)}
              </Inp>
            ) : (
              <div style={{background:"var(--pill-active)",border:"1px solid var(--accent)",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:18}}>👤</span>
                <div>
                  <div style={{fontSize:11,color:"var(--tx3)"}}>Ditempatkan sebagai</div>
                  <div style={{fontSize:14,fontWeight:700,color:"var(--accent-light)"}}>{currentUser?.name}</div>
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:8}}><Btn onClick={doAssign} color={POS_COL[confirm.pos]} size="lg" full><IC n="ok" s={14}/> Tempatkan</Btn><Btn onClick={()=>setConfirm(null)} color="var(--tx4)" variant="outline">Batal</Btn></div>
          </div>
        )}
      </Modal>

      {/* QR Pos modal dihapus — tidak lagi digunakan */}
    </div>
  );
}

// ─── STAND JAGA ───────────────────────────────────────────────────────────────
function StandTab({standJaga,setStandJaga,posAssign,reguHari,toast,canEdit,currentUser,isAdmin=false}) {
  const [confirm,setConfirm]=useState(null);
  const [officer,setOfficer]=useState("");
  const [notes,setNotes]=useState("");
  const members=REGU[reguHari]||[];
  const onScan=(area)=>{ const pos=getPos(area); setConfirm({area,pos:pos||"—"}); setOfficer(currentUser?.name||posAssign[pos]?.join(", ")||""); setNotes(""); };
  const doConfirm=()=>{ setStandJaga([...standJaga,{id:Date.now(),ts:Date.now(),area:confirm.area,pos:confirm.pos,officer:officer||"—",notes}]); setConfirm(null); toast(`Stand jaga ${confirm.area} dicatat!`); };
  const todS=standJaga.filter(s=>new Date(s.ts).toDateString()===new Date().toDateString());
  return (
    <div>
      <PH title="Stand Jaga" sub="Ketuk nama gedung untuk mencatat posisi stand jaga"/>
      {!canEdit&&<ReadOnlyBanner reguHari={reguHari}/>}

      {/* Circle tap menu gedung per pos */}
      {canEdit&&(
        <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,padding:"14px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:800,color:"var(--accent)",marginBottom:14,textTransform:"uppercase",letterSpacing:.5}}>Pilih Gedung / Area</div>
          {Object.entries(PATROL_AREAS).map(([pos,areas])=>(
            <div key={pos} style={{marginBottom:16}}>
              <div style={{fontSize:10.5,fontWeight:800,color:POS_COL[pos]||"var(--accent)",textTransform:"uppercase",letterSpacing:.6,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:POS_COL[pos]||"var(--accent)",flexShrink:0}}/>
                {pos}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                {areas.map(area=>{
                  const col=POS_COL[pos]||"var(--accent)";
                  const recentStand=todS.filter(s=>s.area===area).at(-1);
                  return (
                    <div key={area} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,width:76}}>
                      <button
                        onClick={()=>onScan(area)}
                        style={{
                          width:70,height:70,borderRadius:"50%",
                          background:recentStand?`${col}20`:"var(--card2)",
                          border:`2.5px solid ${recentStand?col:col+"50"}`,
                          cursor:"pointer",
                          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                          gap:2,padding:6,
                          boxShadow:recentStand?`0 0 10px ${col}44`:"none",
                          transition:"all .15s",
                          position:"relative",
                        }}>
                        {recentStand&&<div style={{position:"absolute",top:2,right:2,width:10,height:10,borderRadius:"50%",background:"var(--ok)",border:"2px solid var(--card-solid)"}}/>}
                        <span style={{fontSize:9.5,fontWeight:800,color:recentStand?col:"var(--tx2)",textAlign:"center",lineHeight:1.25,wordBreak:"break-word"}}>{area}</span>
                        {recentStand&&<span style={{fontSize:8.5,color:"var(--ok)",fontWeight:700}}>{fmtT(recentStand.ts)}</span>}
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
        <div style={{fontSize:12,fontWeight:800,color:"var(--accent)",marginBottom:10}}>Log Hari Ini ({todS.length})</div>
        {todS.length===0&&<div style={{fontSize:12,color:"var(--tx3)"}}>Belum ada stand jaga</div>}
        {[...todS].reverse().map(s=>(
          <div key={s.id} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid var(--border)",alignItems:"center"}}>
            <div style={{width:34,height:34,background:"rgba(0,120,212,.1)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IC n="shield" s={16} c="var(--accent-light)"/></div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:"var(--tx2)"}}>{s.area}</div>
              <div style={{fontSize:11,color:"var(--tx3)"}}>{s.pos} · {s.officer}</div>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:"var(--accent)"}}>{fmtT(s.ts)}</div>
          </div>
        ))}
      </div>
      {/* CamScanner dihapus — diganti tap lingkaran gedung */}
      <Modal open={!!confirm} onClose={()=>setConfirm(null)} title="Konfirmasi Stand Jaga" bottom>
        {confirm&&(
          <div>
            <div style={{background:"rgba(0,120,212,.1)",borderRadius:10,padding:"12px 16px",marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:12,color:"var(--tx3)"}}>Gedung Pos</div>
              <div style={{fontSize:20,fontWeight:900,color:"var(--accent)"}}>{confirm.area}</div>
              <div style={{fontSize:12,color:"var(--tx3)"}}>{confirm.pos}</div>
            </div>
            {/* Nama petugas: otomatis dari login, admin bisa pilih semua */}
            {isAdmin ? (
              <Inp label="Nama Petugas" value={officer} onChange={e=>setOfficer(e.target.value)} as="select">
                <option value="">— Pilih Anggota —</option>
                {members.map(m=><option key={m}>{m}</option>)}
              </Inp>
            ) : (
              <div style={{marginBottom:11}}>
                <label style={{display:"block",fontSize:11,color:"var(--accent)",marginBottom:4,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>Nama Petugas</label>
                <div style={{background:"var(--card2)",border:"1.5px solid var(--border2)",borderRadius:9,padding:"9px 12px",fontSize:13.5,color:"var(--tx)",display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:14}}>👤</span>
                  <span style={{fontWeight:700}}>{officer||currentUser?.name||"—"}</span>
                  <span style={{marginLeft:"auto",fontSize:10,color:"var(--tx3)",background:"var(--card3)",borderRadius:5,padding:"2px 7px"}}>Login aktif</span>
                </div>
              </div>
            )}
            <Inp label="Catatan (opsional)" value={notes} onChange={e=>setNotes(e.target.value)} as="textarea" placeholder="Kondisi pos..."/>
            <div style={{display:"flex",gap:8}}><Btn onClick={doConfirm} color="var(--ok)" size="lg" full><IC n="ok" s={14}/> Konfirmasi</Btn><Btn onClick={()=>setConfirm(null)} color="var(--tx4)" variant="outline">Batal</Btn></div>
          </div>
        )}
      </Modal>
    </div>
  );
}

// ─── PATROL ───────────────────────────────────────────────────────────────────
const CHECKLIST_ITEMS = [
  {id:"jendela", emoji:"🪟", label:"Jendela"},
  {id:"pintu",   emoji:"🚪", label:"Pintu"},
  {id:"lampu",   emoji:"💡", label:"Lampu"},
  {id:"inventaris", emoji:"📦", label:"Barang Inventaris"},
  {id:"umum",    emoji:"✅", label:"Kondisi Umum"},
];
const CHECKLIST_ITEMS_SIMPLE = [
  {id:"umum", emoji:"✅", label:"Kondisi Umum"},
];
// Checklist khusus area-area di Pos Utama (menggantikan jendela/pintu)
const CHECKLIST_ITEMS_POS_UTAMA = [
  {id:"tv",          emoji:"📺", label:"TV"},
  {id:"dispenser",   emoji:"🚰", label:"Dispenser"},
  {id:"senter",      emoji:"🔦", label:"Senter"},
  {id:"apar",        emoji:"🧯", label:"APAR"},
  {id:"komputer",    emoji:"💻", label:"Komputer"},
  {id:"police_line", emoji:"🚧", label:"Police Line"},
  {id:"lampu",       emoji:"💡", label:"Lampu"},
  {id:"umum",        emoji:"✅", label:"Kondisi Umum"},
];
// Area-area yang masuk wilayah Pos Utama
const PATROL_AREAS_POS_UTAMA = new Set(PATROL_AREAS["Pos Utama"] || []);
const getChecklistItems = (area) => {
  if (AREA_SIMPLE_CHECKLIST.has(area)) return CHECKLIST_ITEMS_SIMPLE;
  if (PATROL_AREAS_POS_UTAMA.has(area)) return CHECKLIST_ITEMS_POS_UTAMA;
  return CHECKLIST_ITEMS;
};
const CHECKLIST_STATUS = ["—","Baik","Rusak","Kurang"];
const CHECKLIST_COL    = {"—":"var(--tx4)","Baik":"var(--ok)","Rusak":"var(--r)","Kurang":"#f8c100"};

function PatrolTab({posAssign,patrols,setPatrols,toast,canEdit,isAdmin,currentUser}) {
  const [confirm,setConfirm]=useState(null);
  const [officer,setOfficer]=useState("");
  const [notes,setNotes]=useState("");
  const [photo,setPhoto]=useState(null);
  const [viewPhoto,setViewPhoto]=useState(null);
  const [checklist,setChecklist]=useState({});
  const fileRef=useRef();

  const onScan=(area)=>{
    const pos=getPos(area);
    setConfirm({area,pos:pos||"—",isManual:false});
    setOfficer(currentUser?.name||posAssign[pos]?.join(", ")||"");
    setNotes("");
    setPhoto(null);
    setChecklist({});
  };

  const onManual=(area)=>{
    const pos=getPos(area);
    setConfirm({area,pos:pos||"—",isManual:false});
    setOfficer(currentUser?.name||posAssign[pos]?.join(", ")||"");
    setNotes("");
    setPhoto(null);
    setChecklist({});
  };

  const doP=()=>{
    if(!photo){toast("📷 Foto bukti wajib diisi!",false);return;}
    setPatrols([...patrols,{id:Date.now(),ts:Date.now(),pos:confirm.pos,officer:officer||"—",areas:[confirm.area],notes,photo,checklist,qrScan:true,isManual:false}]);
    setConfirm(null);
    toast(`Patroli ${confirm.area} dicatat!`);
  };
  const handlePhoto=(e)=>{ const file=e.target.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{ kompressFoto(r.result).then(compressed=>setPhoto(compressed)); }; r.readAsDataURL(file); };
  const removePhoto=()=>{ setPhoto(null); if(fileRef.current) fileRef.current.value=""; };

  const [clearConfirmOpen, setClearConfirmOpen] = useState(false);
  const todayStr = new Date().toDateString();
  const todP=patrols.filter(p=>new Date(p.ts).toDateString()===todayStr);
  // doneAreas hanya dari patroli HARI INI — reset otomatis tiap hari/regu
  const doneAreas=ALL_AREAS.filter(a=>todP.some(p=>p.areas?.includes(a)));
  const progressPct=Math.round((doneAreas.length/ALL_AREAS.length)*100);

  const handleClearPatroli = () => {
    // Hapus semua patroli hari ini (clear progress regu yang sudah selesai)
    setPatrols(patrols.filter(p=>new Date(p.ts).toDateString()!==todayStr));
    setClearConfirmOpen(false);
    toast("✅ Progress patroli hari ini telah direset!");
  };

  return (
    <div>
      <PH title="Patroli Gedung" sub="Ketuk lingkaran gedung + foto bukti wajib sebagai validasi"
        action={isAdmin && (
          <Btn onClick={()=>setClearConfirmOpen(true)} color="var(--r)" variant="outline" size="sm">
            🔄 Reset Regu
          </Btn>
        )}
      />
      <div style={{background:"rgba(0,120,212,.07)",border:"1px solid rgba(0,120,212,.25)",borderRadius:10,padding:"8px 13px",marginBottom:12,display:"flex",alignItems:"center",gap:8,fontSize:11.5,color:"var(--accent)"}}>
        <span>🏃</span>
        <span>Semua anggota piket dapat mencatat patroli di seluruh gedung</span>
      </div>

      {/* ── Progress Bar ── */}
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
          <span style={{fontSize:11,fontWeight:700,color:"var(--tx3)",textTransform:"uppercase",letterSpacing:.5}}>Progress Patroli Hari Ini</span>
          <span style={{fontSize:12,fontWeight:800,color:progressPct===100?"var(--ok)":"var(--accent)"}}>{doneAreas.length}/{ALL_AREAS.length} <span style={{fontWeight:500,color:"var(--tx3)"}}>gedung</span> · <span style={{color:progressPct===100?"var(--ok)":"var(--accent)"}}>{progressPct}%</span></span>
        </div>
        <div style={{height:7,background:"var(--card2)",borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${progressPct}%`,background:progressPct===100?"var(--ok)":"linear-gradient(90deg,var(--accent),var(--accent-light))",borderRadius:99,transition:"width .5s cubic-bezier(.22,1,.36,1)"}}/>
        </div>
      </div>

      <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,marginBottom:14,overflow:"hidden"}}>
        <div style={{padding:14}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
            {Object.entries(PATROL_AREAS).flatMap(([pos,areas])=>
              areas.map(area=>({area,pos}))
            ).map(({area,pos})=>{
              const cnt=todP.filter(p=>p.areas?.includes(area)).length;
              const last=todP.filter(p=>p.areas?.includes(area)).at(-1);
              const done = cnt > 0;
              const recentlyScanned = last && (Date.now()-last.ts)<3600000;
              return (
                <div key={area} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                  <button
                    onClick={()=>onScan(area)}
                    className="patrol-circle"
                    style={{
                      width:"100%",aspectRatio:"1",borderRadius:"50%",
                      background: done ? "rgba(74,222,128,.10)" : "var(--card2)",
                      border: done ? `2.5px solid var(--ok)` : `2px solid var(--border2)`,
                      cursor:"pointer",
                      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                      gap:2,padding:6,
                      boxShadow: done
                        ? "0 0 14px rgba(74,222,128,.35), 0 2px 6px rgba(0,0,0,.15)"
                        : "0 2px 6px rgba(0,0,0,.12)",
                      transition:"all .2s cubic-bezier(.22,1,.36,1)",
                    }}>
                    <span style={{fontSize:9,fontWeight:900,color:done?"var(--ok)":"var(--tx2)",textAlign:"center",lineHeight:1.25,wordBreak:"break-word",letterSpacing:-.1}}>{area}</span>
                    <div style={{display:"flex",alignItems:"center",gap:2}}>
                      <span style={{fontSize:9,color:done?"var(--ok)":"var(--tx3)",fontWeight:700}}>{cnt}×</span>
                      {done&&<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><polyline points="1.5,4.5 3.5,6.5 7.5,2.5" stroke="var(--ok)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    </div>
                  </button>
                  {last&&<div style={{fontSize:9,color:"var(--ok)",fontWeight:700,textAlign:"center"}}>{fmtT(last.ts)}</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
        <div style={{fontSize:12,fontWeight:800,color:"var(--accent)",marginBottom:10}}>Log Patroli Hari Ini ({todP.length})</div>
        {todP.length===0&&<div style={{fontSize:11,color:"var(--tx3)"}}>Belum ada patroli</div>}
        {[...todP].reverse().slice(0,15).map(p=>(
          <div key={p.id} style={{padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
            <div style={{display:"flex",gap:9,alignItems:"center"}}>
              <div style={{width:32,height:32,background:p.photo?"rgba(167,139,250,.1)":"var(--green-card)",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {p.photo?<span style={{fontSize:15}}>📷</span>:<IC n="qr" s={14} c="var(--accent-light)"/>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12.5,fontWeight:700,color:"var(--tx2)"}}>{p.areas?.join(", ")}</div>
                <div style={{fontSize:10.5,color:"var(--tx3)"}}>{p.pos} · {p.officer}</div>
                {p.checklist&&Object.keys(p.checklist).filter(k=>p.checklist[k]!=="—").length>0&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                    {CHECKLIST_ITEMS.filter(i=>p.checklist?.[i.id]&&p.checklist[i.id]!=="—").map(i=>(
                      <span key={i.id} style={{fontSize:9,fontWeight:700,color:CHECKLIST_COL[p.checklist[i.id]],background:CHECKLIST_COL[p.checklist[i.id]]+"18",borderRadius:4,padding:"1px 5px"}}>{i.emoji} {i.label}: {p.checklist[i.id]}</span>
                    ))}
                  </div>
                )}
                {p.notes&&<div style={{fontSize:10.5,color:"var(--tx)",marginTop:2}}>📝 {p.notes}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                <span style={{fontSize:10.5,fontWeight:700,color:"var(--accent)"}}>{fmtT(p.ts)}</span>
                {p.photo&&<button onClick={()=>setViewPhoto(p.photo)} style={{background:"rgba(167,139,250,.1)",border:"1px solid #c4b5fd",borderRadius:5,padding:"2px 7px",fontSize:10,color:"#a78bfa",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Lihat Foto</button>}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Modal konfirmasi reset patroli per ganti regu — Admin only */}
      <Modal open={clearConfirmOpen} onClose={()=>setClearConfirmOpen(false)} title="🔄 Reset Progress Patroli" bottom>
        <div style={{textAlign:"center",padding:"10px 0 6px"}}>
          <div style={{fontSize:40,marginBottom:12}}>🔄</div>
          <div style={{fontSize:15,fontWeight:800,color:"var(--tx)",marginBottom:8}}>Reset Progress Patroli Hari Ini?</div>
          <div style={{fontSize:12.5,color:"var(--tx3)",lineHeight:1.6,marginBottom:6}}>
            Semua catatan patroli hari ini akan dihapus sehingga lingkaran gedung kembali kosong untuk regu berikutnya.
          </div>
          <div style={{background:"rgba(251,113,133,.08)",border:"1.5px solid #fca5a5",borderRadius:10,padding:"10px 14px",marginBottom:18,fontSize:12,color:"var(--r)",fontWeight:700}}>
            ⚠️ Tindakan ini tidak dapat dibatalkan!<br/>
            <span style={{fontWeight:400,fontSize:11}}>Gunakan saat pergantian regu piket.</span>
          </div>
          <div style={{display:"flex",gap:10}}>
            <Btn onClick={()=>setClearConfirmOpen(false)} color="var(--tx4)" variant="outline" size="lg" full>Batal</Btn>
            <Btn onClick={handleClearPatroli} color="var(--r)" size="lg" full>Ya, Reset Sekarang</Btn>
          </div>
        </div>
      </Modal>

      <Modal open={!!confirm} onClose={()=>setConfirm(null)} title="Checklist Patroli" bottom>
        {confirm&&(
          <div>
            {/* Header gedung — circle + nama */}
            <div style={{display:"flex",alignItems:"center",gap:14,background:"var(--card2)",border:"1px solid var(--border2)",borderRadius:14,padding:"14px 16px",marginBottom:18}}>
              <div style={{
                width:64,height:64,borderRadius:"50%",flexShrink:0,
                background:`${POS_COL[confirm.pos]||"var(--accent)"}18`,
                border:`2.5px solid ${POS_COL[confirm.pos]||"var(--accent)"}`,
                display:"flex",alignItems:"center",justifyContent:"center",
              }}>
                <span style={{fontSize:10,fontWeight:900,color:POS_COL[confirm.pos]||"var(--accent)",textAlign:"center",lineHeight:1.3,padding:4}}>{confirm.area}</span>
              </div>
              <div>
                <div style={{fontSize:18,fontWeight:900,color:"var(--tx)"}}>{confirm.area}</div>
                <div style={{fontSize:12,color:"var(--tx3)",marginTop:2}}>{confirm.pos}</div>
              </div>
            </div>

            {/* Checklist kondisi */}
            <div style={{fontSize:12,fontWeight:800,color:"var(--tx3)",letterSpacing:.7,textTransform:"uppercase",marginBottom:10}}>Cek Kondisi</div>
            <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:16}}>
              {getChecklistItems(confirm.area).map(item=>{
                const cur=checklist[item.id]||"—";
                const idx=CHECKLIST_STATUS.indexOf(cur);
                const next=CHECKLIST_STATUS[(idx+1)%CHECKLIST_STATUS.length];
                const col=CHECKLIST_COL[cur];
                return (
                  <button key={item.id}
                    onClick={()=>setChecklist(c=>({...c,[item.id]:next}))}
                    style={{
                      display:"flex",alignItems:"center",gap:12,
                      background:"var(--card2)",border:`1.5px solid ${cur==="—"?"var(--border)":col+"55"}`,
                      borderRadius:12,padding:"14px 16px",cursor:"pointer",
                      fontFamily:"inherit",textAlign:"left",transition:"all .15s",
                      boxShadow:cur!=="—"?`0 0 0 1px ${col}22`:"none",
                    }}>
                    {/* Checkbox visual */}
                    <div style={{
                      width:24,height:24,borderRadius:7,border:`2px solid ${cur==="—"?"var(--border2)":col}`,
                      background:cur==="—"?"transparent":`${col}22`,
                      display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
                      transition:"all .15s",
                    }}>
                      {cur!=="—"&&<svg width="13" height="13" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke={col} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    </div>
                    <span style={{fontSize:17}}>{item.emoji}</span>
                    <span style={{flex:1,fontSize:16,fontWeight:600,color:"var(--tx)"}}>{item.label}</span>
                    <span style={{fontSize:13,fontWeight:700,color:col,minWidth:50,textAlign:"right"}}>{cur}</span>
                  </button>
                );
              })}
            </div>

            {/* Petugas */}
            {isAdmin ? (
              <Inp label="Petugas" value={officer} onChange={e=>setOfficer(e.target.value)} as="select">
                <option value="">— Pilih Anggota —</option>
                {Object.values(REGU).flat().map(m=><option key={m} value={m}>{m}</option>)}
              </Inp>
            ) : (
              <div style={{display:"flex",alignItems:"center",gap:10,background:"var(--card2)",border:"1.5px solid var(--border2)",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
                <span style={{fontSize:18}}>👤</span>
                <span style={{flex:1,fontSize:14,fontWeight:700,color:"var(--tx)"}}>{officer||currentUser?.name||"—"}</span>
                <span style={{fontSize:10,color:"var(--tx3)"}}>Login aktif</span>
              </div>
            )}

            {/* Catatan */}
            <Inp label="Catatan (Opsional)" value={notes} onChange={e=>setNotes(e.target.value)} as="textarea" placeholder="Kondisi khusus, temuan, dll..."/>

            {/* Foto bukti */}
            <div style={{marginBottom:16}}>
              <label style={{display:"block",fontSize:11,color:photo?"var(--ok)":"var(--r)",marginBottom:7,fontWeight:800,letterSpacing:.5,textTransform:"uppercase"}}>📸 Foto Bukti — WAJIB</label>
              {!photo?(
                <label style={{
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,
                  background:"rgba(251,113,133,.06)",
                  border:"2px solid rgba(251,113,133,.35)",
                  borderRadius:12,padding:"20px 12px",cursor:"pointer",
                  transition:"all .15s",
                }}>

// ─── PHOTO PICKER (reusable) ──────────────────────────────────────────────────
function PhotoPicker({photo, setPhoto, label="📷 Foto Bukti", color="var(--accent)"}) {
  const ref = useRef();
  const handle = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader(); r.onload = () => { kompressFoto(r.result).then(compressed=>setPhoto(compressed)); }; r.readAsDataURL(file);
  };
  const remove = () => { setPhoto(null); if(ref.current) ref.current.value=""; };
  const lightBg = color==="var(--r)"?"rgba(251,113,133,.1)":color==="#a78bfa"?"rgba(167,139,250,.1)":color==="#ffcc00"?"rgba(255,204,0,.07)":color==="var(--ok)"?"var(--green-card)":"var(--green-card)";
  const lightBorder = color==="var(--r)"?"rgba(251,113,133,.35)":color==="#a78bfa"?"rgba(167,139,250,.35)":color==="#ffcc00"?"rgba(255,204,0,.35)":color==="var(--ok)"?"var(--green-border)":"var(--border2)";
  return (
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontSize:11,color:color,marginBottom:6,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>{label}</label>
      {!photo?(
        <label style={{
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,
          background:lightBg,
          border:`2px solid ${lightBorder}`,
          borderRadius:12,padding:"18px 12px",cursor:"pointer",
          transition:"all .15s",
        }}>
          <div style={{
            width:48,height:48,borderRadius:12,
            background:`${color === "var(--accent)" ? "rgba(201,165,42,.15)" : lightBg}`,
            border:`1.5px solid ${lightBorder}`,
            display:"flex",alignItems:"center",justifyContent:"center",
          }}>
            <IC n="cam" s={24} c={color}/>
          </div>
          <span style={{color:color,fontWeight:700,fontSize:13}}>Ambil / Pilih Foto</span>
          <span style={{color:"rgba(255,255,255,.3)",fontSize:10.5,fontWeight:500}}>(opsional)</span>
          <input ref={ref} type="file" accept="image/*" capture="environment" onChange={handle} style={{display:"none"}}/>
        </label>
      ):(
        <div style={{position:"relative",width:"100%"}}>
          <img src={photo} alt="bukti" style={{width:"100%",maxHeight:180,objectFit:"cover",borderRadius:10,border:`2px solid ${lightBorder}`,display:"block"}}/>
          <button onClick={remove} style={{position:"absolute",top:6,right:6,background:"rgba(251,113,133,.85)",border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:800,padding:"4px 9px",cursor:"pointer",fontFamily:"inherit"}}>✕ Hapus</button>
          <div style={{position:"absolute",bottom:6,left:6,background:`${color}dd`,borderRadius:6,padding:"3px 8px",fontSize:10,color:"#fff",fontWeight:700}}>📷 Foto siap</div>
        </div>
      )}
    </div>
  );
}

  </div>;
}
