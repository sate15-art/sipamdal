// INVENTARIS TAB
// ═══════════════════════════════════════════════════════════════════════════════
const DEFAULT_INVENTARIS = [
  {id:"inv1", nama:"TV", jumlah:"1 unit"},
  {id:"inv2", nama:"Dispenser", jumlah:"1 unit"},
  {id:"inv3", nama:"Senter", jumlah:"2 unit"},
  {id:"inv4", nama:"APAR", jumlah:"1 unit"},
  {id:"inv5", nama:"Komputer", jumlah:"1 unit"},
  {id:"inv6", nama:"Police Line", jumlah:"1 unit"},
];

function InventarisTab({inventarisDaftar, setInventarisDaftar, inventarisCek, setInventarisCek, toast, isAdmin, canEdit, now}) {
  const todayKey = now.toISOString().slice(0,10);
  const cekHari = inventarisCek[todayKey] || {};
  const [editOpen, setEditOpen] = useState(false);
  const [editItem, setEditItem] = useState(null); // {id, nama, jumlah} or null for new
  const [formNama, setFormNama] = useState("");
  const [formJumlah, setFormJumlah] = useState("");

  const STATUS_OPTS = ["Lengkap","Kurang","Rusak"];
  const STATUS_COLOR = {Lengkap:"var(--ok)", Kurang:"#ffcc00", Rusak:"var(--r)"};
  const STATUS_BG = {Lengkap:"var(--green-card)", Kurang:"rgba(255,204,0,.07)", Rusak:"rgba(251,113,133,.08)"};

  const setCekStatus = (id, status) => {
    const updated = {...inventarisCek, [todayKey]: {...cekHari, [id]: {...(cekHari[id]||{}), status, waktu: new Date().toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})}}};
    setInventarisCek(updated);
    toast("Status diperbarui!");
  };

  const setCekKet = (id, ket) => {
    const updated = {...inventarisCek, [todayKey]: {...cekHari, [id]: {...(cekHari[id]||{}), ket}}};
    setInventarisCek(updated);
  };

  const openEdit = (item) => {
    setEditItem(item);
    setFormNama(item ? item.nama : "");
    setFormJumlah(item ? item.jumlah : "");
    setEditOpen(true);
  };

  const saveEdit = () => {
    if (!formNama.trim()) return toast("Nama barang wajib diisi!", false);
    if (editItem) {
      setInventarisDaftar(inventarisDaftar.map(x => x.id === editItem.id ? {...x, nama:formNama.trim(), jumlah:formJumlah.trim()} : x));
      toast("Barang diperbarui!");
    } else {
      const newId = "inv" + Date.now();
      setInventarisDaftar([...inventarisDaftar, {id:newId, nama:formNama.trim(), jumlah:formJumlah.trim()||"-"}]);
      toast("Barang ditambahkan!");
    }
    setEditOpen(false);
  };

  const hapusItem = (id) => {
    if (!window.confirm("Hapus barang ini?")) return;
    setInventarisDaftar(inventarisDaftar.filter(x => x.id !== id));
    toast("Barang dihapus!");
  };

  const totalCek = inventarisDaftar.filter(b => cekHari[b.id]?.status).length;
  const adaMasalah = inventarisDaftar.filter(b => cekHari[b.id]?.status && cekHari[b.id]?.status !== "Lengkap").length;

  return (
    <div style={{padding:"14px 12px",maxWidth:600,margin:"0 auto"}}>
      <PH title="Inventaris Barang" sub="Cek & kelola barang per shift"
        action={isAdmin && <Btn onClick={()=>openEdit(null)} color="var(--accent)" size="sm"><IC n="plus" s={12}/> Tambah</Btn>}
      />

      {/* Ringkasan */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <div style={{flex:1,background:"rgba(0,120,212,.1)",borderRadius:12,padding:"10px 12px",textAlign:"center",border:"1px solid var(--border)"}}>
          <div style={{fontSize:20,fontWeight:800,color:"var(--accent)"}}>{totalCek}/{inventarisDaftar.length}</div>
          <div style={{fontSize:11,color:"var(--accent-light)",fontWeight:600}}>Sudah Dicek</div>
        </div>
        <div style={{flex:1,background: adaMasalah>0?"rgba(251,113,133,.1)":"var(--green-card)",borderRadius:12,padding:"10px 12px",textAlign:"center",border:`1.5px solid ${adaMasalah>0?"rgba(255,50,50,.3)":"var(--green-border)"}`}}>
          <div style={{fontSize:20,fontWeight:800,color: adaMasalah>0?"var(--r)":"var(--ok)"}}>{adaMasalah}</div>
          <div style={{fontSize:11,color: adaMasalah>0?"var(--r)":"var(--ok)",fontWeight:600}}>Ada Masalah</div>
        </div>
        <div style={{flex:1,background:"var(--card-solid)",borderRadius:12,padding:"10px 12px",textAlign:"center",border:"1px solid var(--border2)"}}>
          <div style={{fontSize:14,fontWeight:800,color:"var(--tx)"}}>{now.toLocaleDateString("id-ID",{day:"numeric",month:"short"})}</div>
          <div style={{fontSize:11,color:"var(--tx3)",fontWeight:600}}>Tanggal Cek</div>
        </div>
      </div>

      {/* Daftar Barang */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {inventarisDaftar.map((b,i) => {
          const cek = cekHari[b.id] || {};
          const hasStatus = !!cek.status;
          return (
            <div key={b.id} style={{background:"var(--card-solid)",borderRadius:14,border:`1.5px solid ${hasStatus ? (STATUS_COLOR[cek.status]+"33") : "var(--border)"}`,padding:"12px 14px",boxShadow:"0 1px 4px rgba(30,58,138,.06)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom: hasStatus?8:0}}>
                <div style={{width:28,height:28,borderRadius:8,background:"rgba(0,120,212,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:"var(--accent)",fontSize:12,flexShrink:0}}>{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:13,color:"var(--tx2)"}}>{b.nama}</div>
                  <div style={{fontSize:11,color:"var(--tx3)"}}>{b.jumlah}</div>
                </div>
                {hasStatus && (
                  <div style={{background:STATUS_BG[cek.status],border:`1px solid ${STATUS_COLOR[cek.status]}44`,borderRadius:8,padding:"3px 8px",fontSize:11,fontWeight:700,color:STATUS_COLOR[cek.status]}}>
                    {cek.status}
                    {cek.waktu && <span style={{fontWeight:400,color:"var(--tx3)",marginLeft:4}}>{cek.waktu}</span>}
                  </div>
                )}
                {isAdmin && (
                  <div style={{display:"flex",gap:4,flexShrink:0}}>
                    <button onClick={()=>openEdit(b)} style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 6px",cursor:"pointer",color:"var(--accent-light)",fontSize:10,fontWeight:700}}>Edit</button>
                    <button onClick={()=>hapusItem(b.id)} style={{background:"rgba(251,113,133,.1)",border:"1px solid #fecaca",borderRadius:6,padding:"4px 6px",cursor:"pointer",color:"var(--r)",fontSize:10,fontWeight:700}}>✕</button>
                  </div>
                )}
              </div>

              {/* Tombol status */}
              {canEdit && (
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {STATUS_OPTS.map(s => (
                    <button key={s} onClick={()=>setCekStatus(b.id,s)}
                      style={{flex:1,minWidth:70,padding:"6px 4px",borderRadius:8,border:`1.5px solid ${cek.status===s ? STATUS_COLOR[s] : "var(--border)"}`,
                        background: cek.status===s ? STATUS_BG[s] : "var(--card-solid)",
                        color: cek.status===s ? STATUS_COLOR[s] : "var(--tx4)",
                        fontWeight: cek.status===s ? 700 : 500,
                        fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>
                      {s}
                    </button>
                  ))}
                </div>
              )}

              {/* Keterangan jika ada masalah */}
              {hasStatus && cek.status !== "Lengkap" && canEdit && (
                <input value={cek.ket||""} onChange={e=>setCekKet(b.id,e.target.value)}
                  placeholder="Keterangan masalah..."
                  style={{width:"100%",marginTop:6,padding:"6px 10px",borderRadius:8,border:"1.5px solid #fca5a5",fontSize:11,fontFamily:"inherit",boxSizing:"border-box",color:"var(--tx)"}}/>
              )}
              {hasStatus && cek.status !== "Lengkap" && !canEdit && cek.ket && (
                <div style={{marginTop:6,fontSize:11,color:"var(--r)",fontStyle:"italic"}}>📝 {cek.ket}</div>
              )}
            </div>
          );
        })}
      </div>

      {/* Modal tambah/edit barang (admin only) */}
      <Modal open={editOpen} onClose={()=>setEditOpen(false)} title={editItem?"Edit Barang":"Tambah Barang"}>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:"var(--tx)",display:"block",marginBottom:4}}>Nama Barang *</label>
            <input value={formNama} onChange={e=>setFormNama(e.target.value)}
              placeholder="Contoh: Senter, APAR, Handy Talky..."
              style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid var(--border)",fontSize:13,fontFamily:"inherit",boxSizing:"border-box",color:"var(--tx)"}}/>
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:"var(--tx)",display:"block",marginBottom:4}}>Jumlah</label>
            <input value={formJumlah} onChange={e=>setFormJumlah(e.target.value)}
              placeholder="Contoh: 2 unit, 1 set..."
              style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1px solid var(--border)",fontSize:13,fontFamily:"inherit",boxSizing:"border-box",color:"var(--tx)"}}/>
          </div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <Btn onClick={saveEdit} color="var(--accent)" size="lg" style={{flex:1}}>Simpan</Btn>
            <Btn onClick={()=>setEditOpen(false)} color="var(--tx4)" variant="outline" size="lg" style={{flex:1}}>Batal</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
}

// ─── SEARCH TAB ───────────────────────────────────────────────────────────────
function SearchTab({ packages, guests, mutations, incidents, patrols }) {
  const [query, setQuery] = React.useState("");
  const [filter, setFilter] = React.useState("semua");
  const inp = React.useRef(null);

  React.useEffect(() => { setTimeout(() => inp.current && inp.current.focus(), 120); }, []);

  const q = query.trim().toLowerCase();

  const results = React.useMemo(() => {
    if (!q) return [];
    const out = [];

    if (filter === "semua" || filter === "paket") {
      packages.forEach(p => {
        const hit = [p.recipient, p.sender, p.notes, p.type]
          .filter(Boolean).some(v => v.toLowerCase().includes(q));
        if (hit) out.push({ kind: "paket", icon: "📦", title: p.recipient, sub: `Dari: ${p.sender || "—"} · ${p.type}`, status: p.status, ts: p.ts, color: p.status === "Belum Diambil" ? "#ffd700" : "var(--accent)", badge: p.status });
      });
    }

    if (filter === "semua" || filter === "tamu") {
      guests.forEach(g => {
        const hit = [g.name, g.institution, g.purpose, g.room, g.vehicle]
          .filter(Boolean).some(v => v.toLowerCase().includes(q));
        if (hit) out.push({ kind: "tamu", icon: "👤", title: g.name, sub: `${g.institution || ""}${g.vehicle ? " · 🚗 " + g.vehicle : ""}${g.room ? " · " + g.room : ""}`, status: g.status, ts: g.ts, color: g.status === "Masih Ada" ? "#b39dfa" : "var(--tx4)", badge: g.status });
      });
    }

    if (filter === "semua" || filter === "kendaraan") {
      guests.forEach(g => {
        if (!g.vehicle) return;
        if (g.vehicle.toLowerCase().includes(q)) {
          out.push({ kind: "kendaraan", icon: "🚗", title: g.vehicle, sub: `Pemilik: ${g.name}${g.institution ? " · " + g.institution : ""}`, status: g.status, ts: g.ts, color: "var(--accent-light)", badge: g.vehicle });
        }
      });
    }

    if (filter === "semua" || filter === "insiden") {
      incidents.forEach(i => {
        const hit = [i.title, i.desc, i.location, i.reportedBy]
          .filter(Boolean).some(v => v.toLowerCase().includes(q));
        if (hit) out.push({ kind: "insiden", icon: "⚠️", title: i.title || "Insiden", sub: `${i.location || ""}${i.reportedBy ? " · " + i.reportedBy : ""}`, status: i.status, ts: i.ts, color: i.status === "Selesai" ? "var(--tx4)" : "#ff4444", badge: i.status });
      });
    }

    if (filter === "semua" || filter === "mutasi") {
      mutations.forEach(m => {
        const hit = [m.note, m.fromName, m.toName, String(m.fromRegu||"")]
          .filter(Boolean).some(v => v.toLowerCase().includes(q));
        if (hit) out.push({ kind: "mutasi", icon: "📋", title: `Mutasi Regu ${m.fromRegu || ""}`, sub: m.note || m.fromName || "", status: null, ts: m.ts, color: "var(--accent-light)", badge: null });
      });
    }

    return out.sort((a, b) => (b.ts || 0) - (a.ts || 0));
  }, [q, filter, packages, guests, mutations, incidents]);

  const FILTERS = [
    { id: "semua", label: "Semua" },
    { id: "tamu", label: "👤 Tamu" },
    { id: "paket", label: "📦 Paket" },
    { id: "kendaraan", label: "🚗 Kendaraan" },
    { id: "insiden", label: "⚠️ Insiden" },
    { id: "mutasi", label: "📋 Mutasi" },
  ];

  return (
    <div>
      <PH title="Pencarian" sub="Cari tamu, paket, kendaraan, insiden" />

      {/* Search input */}
      <div style={{ position: "relative", marginBottom: 12 }}>
        <input
          ref={inp}
          value={query}
          onChange={e => setQuery(e.target.value)}
          placeholder="Ketik nama, no. kendaraan, penerima paket..."
          style={{
            width: "100%", boxSizing: "border-box",
            padding: "11px 40px 11px 14px",
            background: "var(--card-solid)", border: "2px solid #1e5c38",
            borderRadius: 12, fontSize: 14, fontWeight: 600,
            color: "var(--tx)", fontFamily: "inherit", outline: "none",
          }}
          onFocus={e => e.target.style.borderColor = "var(--accent-light)"}
          onBlur={e => e.target.style.borderColor = "var(--border)"}
        />
        {query
          ? <button onClick={() => setQuery("")} style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "var(--tx3)", fontSize: 18, cursor: "pointer", padding: 0 }}>✕</button>
          : <span style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", fontSize: 16 }}>🔍</span>
        }
      </div>

      {/* Filter chips */}
      <div style={{ display: "flex", gap: 7, overflowX: "auto", paddingBottom: 4, marginBottom: 14, scrollbarWidth: "none" }}>
        {FILTERS.map(f => (
          <button key={f.id} onClick={() => setFilter(f.id)} style={{
            flexShrink: 0, padding: "5px 12px", borderRadius: 20,
            background: filter === f.id ? "var(--pill-active)" : "var(--card-solid)",
            border: `1.5px solid ${filter === f.id ? "var(--accent-light)" : "var(--border)"}`,
            color: filter === f.id ? "var(--accent-light)" : "var(--tx3)",
            fontSize: 11.5, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
            whiteSpace: "nowrap",
          }}>{f.label}</button>
        ))}
      </div>

      {/* Results */}
      {!q && (
        <div style={{ textAlign: "center", padding: "40px 20px", color: "var(--tx4)" }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>🔍</div>
          <div style={{ fontSize: 13, fontWeight: 700 }}>Mulai ketik untuk mencari</div>
          <div style={{ fontSize: 11.5, marginTop: 6, color: "#3a6a4e" }}>Tamu · Paket · Kendaraan · Insiden</div>
        </div>
      )}

      {q && results.length === 0 && (
        <div style={{ textAlign: "center", padding: "40px 20px", color: "var(--tx4)" }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>😕</div>
          <div style={{ fontSize: 13, fontWeight: 700 }}>Tidak ditemukan</div>
          <div style={{ fontSize: 11.5, marginTop: 6 }}>Coba kata kunci lain</div>
        </div>
      )}

      {q && results.length > 0 && (
        <>
          <div style={{ fontSize: 11.5, color: "var(--tx3)", fontWeight: 700, marginBottom: 10 }}>
            {results.length} hasil untuk "<span style={{ color: "var(--accent-light)" }}>{query}</span>"
          </div>
          {results.map((r, i) => (
            <div key={i} style={{
              background: "var(--card-solid)", border: "1.5px solid #1e5c38",
              borderRadius: 12, padding: "11px 14px", marginBottom: 8,
              borderLeft: `4px solid ${r.color}`,
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 3 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <span style={{ fontSize: 18 }}>{r.icon}</span>
                  <span style={{ fontSize: 13.5, fontWeight: 800, color: "var(--tx)" }}>{r.title}</span>
                </div>
                {r.badge && (
                  <span style={{ fontSize: 10, fontWeight: 700, color: r.color, background: r.color + "22", borderRadius: 8, padding: "2px 7px", border: `1px solid ${r.color}44`, flexShrink: 0 }}>{r.badge}</span>
                )}
              </div>
              {r.sub && <div style={{ fontSize: 11.5, color: "var(--tx3)", paddingLeft: 25 }}>{r.sub}</div>}
              <div style={{ fontSize: 10.5, color: "var(--tx4)", paddingLeft: 25, marginTop: 2 }}>{fmtDT(r.ts)}</div>
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// ─── KELUAR SEMENTARA ────────────────────────────────────────────────────────
function KeluarTab({ keluarData, setKeluarData, toast, canEdit, isAdmin, now }) {
  const [open, setOpen] = useState(false);
  const [fm, setFm] = useState({ nama:"", tujuan:"Makan Malam", keterangan:"", estimasi:"" });
  const f = (k,v) => setFm(p=>({...p,[k]:v}));

  const TUJUAN_LIST = ["Makan Malam","Makan Siang","Hiburan / Jalan-jalan","Warung Kopi","Minimarket","Lainnya"];
  const TUJUAN_ICON = {"Makan Malam":"🍽","Makan Siang":"🍱","Hiburan / Jalan-jalan":"🎭","Warung Kopi":"☕","Minimarket":"🏪","Lainnya":"📍"};

  const sedangDiLuar = keluarData.filter(k => !k.kembali);
  const sudahKembali = keluarData.filter(k => k.kembali);

  const submit = () => {
    if (!fm.nama.trim()) { toast("Nama peserta wajib diisi!", false); return; }
    const entry = { ...fm, id: Date.now(), tsKeluar: Date.now(), kembali: null, tsKembali: null };
    setKeluarData([...keluarData, entry]);
    setFm({ nama:"", tujuan:"Makan Malam", keterangan:"", estimasi:"" });
    setOpen(false);
    toast(`${fm.nama} dicatat keluar — ${fm.tujuan}`);
  };

  const tandaiKembali = (id) => {
    if (!canEdit && !isAdmin) { toast("Tidak bisa edit", false); return; }
    setKeluarData(keluarData.map(k => k.id === id ? { ...k, kembali: true, tsKembali: Date.now() } : k));
    const item = keluarData.find(k => k.id === id);
    toast(`${item?.nama} sudah kembali ✓`);
  };

  const hapus = (id) => {
    if (!isAdmin) { toast("Hanya admin yang bisa hapus", false); return; }
    setKeluarData(keluarData.filter(k => k.id !== id));
    toast("Data dihapus");
  };

  // Hitung durasi keluar
  const durasi = (tsKeluar) => {
    const mnt = Math.floor((now - new Date(tsKeluar)) / 60000);
    if (mnt < 60) return `${mnt} menit`;
    return `${Math.floor(mnt/60)}j ${mnt%60}m`;
  };

  return (
    <div>
      <PH title="Peserta Keluar Sementara" sub="Catat peserta yang keluar malam/sore hari"
        action={canEdit && (

// ─── CIRCULAR LANDING PAGE (Anggota) ─────────────────────────────────────────
function CircularLandingPage({ currentUser, onNavigate, now, reguHari, incidents, packages, posAssign, instruksi, patrols, mutations }) {
  const [activeMenu, setActiveMenu] = React.useState(null);
  const [entered, setEntered]       = React.useState(false);
  const [notifIdx, setNotifIdx]     = React.useState(0);

  React.useEffect(() => {
    const t = setTimeout(() => setEntered(true), 60);
    return () => clearTimeout(t);
  }, []);

  // ── Kalkulasi kondisi ──────────────────────────────────────────────────────
  const actI       = incidents.filter(i => i.status !== "Selesai").length;
  const pending    = packages.filter(p => p.status === "Belum Diambil").length;
  const instruksiAktif = (instruksi || []).filter(i =>
    i.aktif && (i.targetRegu === "Semua" || String(i.targetRegu) === String(currentUser?.regu))
  ).length;

  const todayStr   = new Date().toISOString().slice(0,10);
  const myPatrols  = (patrols || []).filter(p => p.date === todayStr && p.officer === currentUser?.name);
  const myMutToday = (mutations || []).filter(m => m.date === todayStr && (m.from === currentUser?.name || m.to === currentUser?.name));

  // Jam terakhir patroli
  const lastPatrol = myPatrols.length > 0
    ? myPatrols.sort((a,b) => b.time?.localeCompare(a.time))[0]
    : null;
  const minsLastPatrol = lastPatrol
    ? Math.floor((Date.now() - new Date(`${todayStr}T${lastPatrol.time}`)) / 60000)
    : null;

  // ── Status kondisi ──────────────────────────────────────────────────────────
  let STATUS = "AMAN";
  let statusColor = "#4ade80";
  let statusBg    = "linear-gradient(135deg, #14532d, #166534)";
  let statusGlow  = "rgba(74,222,128,0.35)";
  let statusEmoji = "✅";
  let statusLabel = "Kondisi Aman";

  if (actI > 0) {
    STATUS = "KRITIS"; statusColor = "#fc3e36";
    statusBg = "linear-gradient(135deg, #7f1d1d, #991b1b)";
    statusGlow = "rgba(252,62,54,0.4)";
    statusEmoji = "🚨"; statusLabel = `${actI} Insiden Aktif`;
  } else if (instruksiAktif > 0) {
    STATUS = "WASPADA"; statusColor = "#fb923c";
    statusBg = "linear-gradient(135deg, #7c2d12, #9a3412)";
    statusGlow = "rgba(251,146,60,0.35)";
    statusEmoji = "⚠️"; statusLabel = `${instruksiAktif} Instruksi`;
  } else if (pending > 0) {
    STATUS = "PERHATIAN"; statusColor = "#f8c100";
    statusBg = "linear-gradient(135deg, #713f12, #854d0e)";
    statusGlow = "rgba(248,193,0,0.35)";
    statusEmoji = "📦"; statusLabel = `${pending} Paket Belum Diambil`;
  } else if (myPatrols.length === 0) {
    STATUS = "PERHATIAN"; statusColor = "#f8c100";
    statusBg = "linear-gradient(135deg, #713f12, #854d0e)";
    statusGlow = "rgba(248,193,0,0.35)";
    statusEmoji = "🔍"; statusLabel = "Belum Ada Patroli";
  } else if (minsLastPatrol !== null && minsLastPatrol > 120) {
    STATUS = "PERHATIAN"; statusColor = "#f8c100";
    statusBg = "linear-gradient(135deg, #713f12, #854d0e)";
    statusGlow = "rgba(248,193,0,0.35)";
    statusEmoji = "🔍"; statusLabel = `Patroli ${minsLastPatrol}m lalu`;
  }

  // ── Notifikasi real-time ───────────────────────────────────────────────────
  const NOTIFS = [];
  if (actI > 0)          NOTIFS.push({ color:"#fc3e36", icon:"🚨", text:`${actI} insiden aktif belum selesai`, tab:"incident" });
  if (pending > 0)       NOTIFS.push({ color:"#f8c100", icon:"📦", text:`${pending} paket belum diambil`, tab:"package" });
  if (instruksiAktif > 0) NOTIFS.push({ color:"#fb923c", icon:"📋", text:`${instruksiAktif} instruksi dari pimpinan`, tab:"instruksi" });
  if (minsLastPatrol === null) NOTIFS.push({ color:"#a78bfa", icon:"🔍", text:"Belum ada patroli hari ini", tab:"patrol" });
  else if (minsLastPatrol > 120) NOTIFS.push({ color:"#a78bfa", icon:"🔍", text:`Patroli terakhir ${minsLastPatrol} menit lalu`, tab:"patrol" });
  if (myMutToday.length === 0) NOTIFS.push({ color:"#4ade80", icon:"📋", text:"Belum ada laporan serah terima shift", tab:"mutation" });
  if (NOTIFS.length === 0) NOTIFS.push({ color:"#4ade80", icon:"✅", text:"Semua aman, tidak ada notifikasi", tab:"dashboard" });

  // Auto-rotate notifikasi setiap 3 detik
  React.useEffect(() => {
    if (NOTIFS.length <= 1) return;
    const t = setInterval(() => setNotifIdx(i => (i + 1) % NOTIFS.length), 3000);
    return () => clearInterval(t);
  }, [NOTIFS.length]);

  const curNotif = NOTIFS[notifIdx % NOTIFS.length];

  // ── Menu di sekeliling lingkaran ────────────────────────────────────────────
  const MENUS = [
    { id: "guest",     label: "Tamu & Asrama", emoji: "👥",  color: "#0078d4", angle: 270 },
    { id: "patrol",    label: "Patroli",    emoji: "🚶",  color: "#4ade80", angle: 330 },
    { id: "pos",       label: "Penempatan", emoji: "📍",  color: "#a78bfa", angle: 30  },
    { id: "search",    label: "Cari",       emoji: "🔎",  color: "#38bdf8", angle: 90  },
    { id: "package",   label: "Paket",      emoji: "📦",  color: "#f8c100", angle: 150, badge: pending > 0 ? pending : null },
    { id: "keluar",    label: "Keluar Masuk", emoji: "🚗",  color: "#fb923c", angle: 210 },
  ];

  const RADIUS   = 132;
  const BTN_SIZE = 68;
  const CENTER   = 175;

  const greetHour = now.getHours();
  const greet = greetHour < 11 ? "Selamat Pagi" : greetHour < 15 ? "Selamat Siang" : greetHour < 18 ? "Selamat Sore" : "Selamat Malam";

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 250,
      background: "var(--dk)",
      display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center",
      overflow: "hidden",
      paddingBottom: 0,
      animation: "circlePageIn .2s ease both",
    }}>
      {/* Ambient glow — warna sesuai status */}
      <div style={{
        position: "absolute", inset: 0, pointerEvents: "none",
        background: `radial-gradient(ellipse 70% 55% at 50% 52%, ${statusGlow} 0%, transparent 70%)`,
        transition: "background 1s ease",
      }}/>

      {/* Greeting */}
      <div style={{
        textAlign: "center", marginBottom: 12, zIndex: 2,
        animation: entered ? "welcomeFadeIn .6s ease both" : "none",
        animationDelay: ".1s",
      }}>
        <div style={{ fontSize: 10.5, letterSpacing: 3, color: "var(--tx3)", fontWeight: 700, textTransform: "uppercase", marginBottom: 3 }}>{greet}</div>
        <div style={{ fontSize: 21, fontWeight: 900, color: "var(--tx)", lineHeight: 1.2 }}>{currentUser?.name}</div>
      </div>

      {/* Lingkaran */}
      <div style={{
        position: "relative",
        width: CENTER * 2, height: CENTER * 2,
        animation: entered ? "circleIn .5s cubic-bezier(.22,1,.36,1) both" : "none",
        animationDelay: ".15s", flexShrink: 0,
      }}>
        {/* Ring luar */}
        <div style={{ position:"absolute", inset:0, borderRadius:"50%", border:`1.5px solid ${statusColor}30`, transition:"border .8s" }}/>
        {/* Ring tengah dashed */}
        <div style={{ position:"absolute", inset:22, borderRadius:"50%", border:`1px dashed ${statusColor}20`, transition:"border .8s" }}/>

        {/* ── LINGKARAN TENGAH — Indikator Status ─────────────────────── */}
        <div onClick={() => onNavigate("dashboard")} style={{
          position: "absolute", top:"50%", left:"50%",
          transform: "translate(-50%, -50%)",
          width: 112, height: 112, borderRadius: "50%",
          background: statusBg,
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          cursor: "pointer",
          animation: "centerPulse 3s ease-in-out infinite",
          boxShadow: `0 0 0 3px ${statusColor}40, 0 8px 36px rgba(0,0,0,.5)`,
          zIndex: 5, userSelect: "none",
          transition: "background 1s, box-shadow 1s",
        }}>
          <div style={{ fontSize: 28, lineHeight: 1 }}>{statusEmoji}</div>
          <div style={{ fontSize: 9.5, fontWeight: 900, color: statusColor, letterSpacing: 1, marginTop: 4, textTransform: "uppercase", transition: "color 1s" }}>{STATUS}</div>
          <div style={{ fontSize: 7.5, color: "rgba(255,255,255,.5)", marginTop: 2, textAlign:"center", padding:"0 8px", lineHeight:1.3 }}>tap → dashboard</div>
        </div>

        {/* ── Menu tombol ──────────────────────────────────────────────── */}
        {MENUS.map((m, idx) => {
          const rad = (m.angle * Math.PI) / 180;
          const x   = CENTER + RADIUS * Math.cos(rad);
          const y   = CENTER + RADIUS * Math.sin(rad);
          const isActive = activeMenu === m.id;
          return (
            <div key={m.id}
              onClick={() => { setActiveMenu(m.id); setTimeout(() => { onNavigate(m.id); setActiveMenu(null); }, 180); }}
              style={{
                position: "absolute", left: x, top: y,
                width: BTN_SIZE, height: BTN_SIZE,
                transform: `translate(-50%, -50%) scale(${isActive ? 1.15 : 1})`,
                transition: "transform .15s cubic-bezier(.34,1.56,.64,1)",
                borderRadius: "50%",
                background: isActive ? m.color : "var(--card-solid)",
                border: `2px solid ${m.color}`,
                boxShadow: isActive ? `0 0 0 7px ${m.color}22, 0 6px 24px rgba(0,0,0,.4)` : "0 4px 16px rgba(0,0,0,.3)",
                display: "flex", flexDirection: "column",
                alignItems: "center", justifyContent: "center",
                cursor: "pointer", zIndex: 4, userSelect: "none",
                animation: entered ? `menuBtnIn .4s cubic-bezier(.22,1,.36,1) both` : "none",
                animationDelay: `${.2 + idx * .06}s`,
              }}
            >
              <div style={{ fontSize: 20, lineHeight: 1 }}>{m.emoji}</div>
              <div style={{ fontSize: 8, fontWeight: 800, color: isActive ? "#fff" : m.color, marginTop: 3, textAlign:"center", lineHeight:1.2, maxWidth:56 }}>{m.label}</div>
              {m.badge && (
                <div style={{ position:"absolute", top:-4, right:-4, width:17, height:17, background:"#fc3e36", borderRadius:"50%", fontSize:8.5, fontWeight:900, color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", border:"2px solid var(--dk)" }}>{m.badge}</div>
              )}
              {isActive && (
                <div style={{ position:"absolute", bottom:"110%", left:"50%", transform:"translateX(-50%)", background:m.color, color:"#fff", borderRadius:8, padding:"4px 10px", fontSize:10.5, fontWeight:700, whiteSpace:"nowrap", pointerEvents:"none", boxShadow:"0 4px 12px rgba(0,0,0,.3)" }}>
                  {m.label}
                  <div style={{ position:"absolute", top:"100%", left:"50%", transform:"translateX(-50%)", width:0, height:0, borderLeft:"5px solid transparent", borderRight:"5px solid transparent", borderTop:`6px solid ${m.color}` }}/>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* ── Notifikasi real-time (ganti tombol Buka Dashboard) ───────── */}
      <div
        onClick={() => onNavigate(curNotif.tab)}
        style={{
          marginTop: 18, width: "82%", maxWidth: 320,
          background: `${curNotif.color}12`,
          border: `1px solid ${curNotif.color}40`,
          borderRadius: 14, padding: "10px 16px",
          display: "flex", alignItems: "center", gap: 10,
          cursor: "pointer", userSelect: "none", flexShrink: 0,
          marginBottom: 28,
          animation: entered ? "welcomeFadeIn .4s ease both" : "none",
          transition: "background .5s, border .5s",
          animationDelay: ".5s",
        }}
      >
        <div style={{ fontSize: 20, flexShrink: 0 }}>{curNotif.icon}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: curNotif.color, transition:"color .5s" }}>{curNotif.text}</div>
          {NOTIFS.length > 1 && (
            <div style={{ display:"flex", gap:4, marginTop:5 }}>
              {NOTIFS.map((_,i) => (
                <div key={i} style={{ width: i === notifIdx % NOTIFS.length ? 14 : 5, height:5, borderRadius:3, background: i === notifIdx % NOTIFS.length ? curNotif.color : "var(--border2)", transition:"all .3s" }}/>
              ))}
            </div>
          )}
        </div>
        <div style={{ fontSize:10, color:"var(--tx3)", flexShrink:0 }}>→</div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [currentUser, setCurrentUser] = useLS("pad_user", null);
  const [userPins, setUserPins] = useLS("pad_pins", DEFAULT_PINS);
  const [tab, setTab] = useState("dashboard");
  const [tabKey, setTabKey] = useState(0);
  const [now, setNow] = useState(new Date());
  const [moreOpen, setMoreOpen] = useState(false);
  const [themeModalOpen, setThemeModalOpen] = useState(false);
  const [fbOnline, setFbOnline] = useState(false);
  const [showLanding, setShowLanding] = useState(false);
  const [theme, setTheme] = useLS("pad_theme", "dark");
  const [colorTheme, setColorTheme] = useLS("pad_color_theme", "gold");

  // Apply theme class to <html>
  useEffect(() => {
    const root = document.documentElement;
    if (theme === "light") root.classList.add("light");
    else root.classList.remove("light");
    applyColorTheme(colorTheme, theme !== "light");
  }, [theme, colorTheme]);

  // Apply color theme on mount
  useEffect(() => { applyColorTheme(colorTheme, theme !== "light"); }, []);

  // toggleTheme: use direct value (useLS does not support functional updater)
  const inactiveTimer = useRef(null);

  // ── Track status koneksi Firebase via custom event dari module script ──
  useEffect(() => {
    // Sync state awal dengan window.__FB_ONLINE (mungkin sudah di-set sebelum React mount)
    if (window.__FB_ONLINE !== undefined) setFbOnline(window.__FB_ONLINE);

    const onOnline  = () => setFbOnline(true);
    const onOffline = () => setFbOnline(false);
    window.addEventListener("fb_online",  onOnline);
    window.addEventListener("fb_offline", onOffline);
    // Fallback: cek setiap 5 detik
    const poll = setInterval(() => {
      if (window.__FB_ONLINE !== undefined) setFbOnline(window.__FB_ONLINE);
    }, 5000);
    return () => {
      window.removeEventListener("fb_online",  onOnline);
      window.removeEventListener("fb_offline", onOffline);
      clearInterval(poll);
    };
  }, []);
  const AUTO_LOGOUT_MS = 15 * 60 * 1000; // 15 menit

  useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);

  // ── BACK BUTTON HANDLER ──────────────────────────────────────────────────────
  // Strategi: gunakan 1 history entry saja (replaceState), abortController untuk
  // intercept popstate SEBELUM browser sempat "keluar" dari halaman.
  // Cara paling reliable di Android WebView / Chrome mobile:
  // Selalu pushState dummy di depan, tangkap popstate → cegah keluar → putuskan arah.
  useEffect(() => {
    // Selalu ada 1 entry "penjaga" di atas current
    const pushGuard = () => window.history.pushState({guard: true}, "");
    pushGuard();

    const handler = () => {
      // Segera push guard baru agar berikutnya juga tertangkap
      pushGuard();

      if (moreOpen) { setMoreOpen(false); return; }

      if (!currentUser?.isAdmin) {
        // Anggota: back selalu ke circle
        setShowLanding(true);
        setTab("dashboard");
      } else {
        // Admin: back antar tab, atau biarkan keluar di home
        setTab(t => {
          if (t !== "dashboard") return "dashboard";
          return t;
        });
      }
    };

    window.addEventListener("popstate", handler);
    return () => {
      window.removeEventListener("popstate", handler);
    };
  // eslint-disable-next-line
  }, [moreOpen, currentUser]);

  // Auto-logout setelah 15 menit tidak aktif
  const resetTimer = useCallback(() => {
    if (inactiveTimer.current) clearTimeout(inactiveTimer.current);
    if (!currentUser) return;
    inactiveTimer.current = setTimeout(() => {
      auditAction(currentUser.name, currentUser.regu, "AUTO_LOGOUT", "Tidak aktif 15 menit");
      setCurrentUser(null);
      setTab("dashboard");
      setShowLanding(false);
    }, AUTO_LOGOUT_MS);
  }, [currentUser]);

  useEffect(() => {
    const events = ["touchstart","click","keydown","scroll"];
    events.forEach(e => window.addEventListener(e, resetTimer, {passive:true}));
    resetTimer();
    return () => {
      events.forEach(e => window.removeEventListener(e, resetTimer));
      if (inactiveTimer.current) clearTimeout(inactiveTimer.current);
    };
  }, [resetTimer]);

  const canEdit = true; // Semua pengguna bisa mencatat patroli di semua gedung
  const ACTIVE_NAV = isAdmin ? NAV_TABS_ADMIN : NAV_TABS;

      {/* MORE DRAWER */}
      {moreOpen && (
        <div style={{ position: "fixed", inset: 0, zIndex: 500, background: "var(--scrim)", backdropFilter: "blur(4px)" }} onClick={() => setMoreOpen(false)}>
          <div style={{ position: "absolute", bottom: 64, left: 0, right: 0, background: "var(--mica-bg)", backdropFilter: "blur(24px) saturate(1.5)", borderTop: "1px solid var(--border)", borderRadius: "16px 16px 0 0", padding: "14px 14px 10px" }} onClick={e => e.stopPropagation()}>
            <div style={{ width: 32, height: 3, background: "var(--border2)", borderRadius: 4, margin: "0 auto 14px" }} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 7 }}>
              {MORE_TABS.map(t => {
                const isTheme = t.id === "theme";
                const isActive = isTheme ? false : tab === t.id;
                return (
                  <button key={t.id} onClick={() => { if(isTheme){ setThemeModalOpen(true); setMoreOpen(false); } else { goTab(t.id); } }}
                    style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 13px",
                      background: isActive ? "var(--pill-active)" : isTheme ? "var(--card2)" : "var(--card)",
                      border: `1px solid ${isActive ? "var(--accent)" : isTheme ? "var(--border2)" : "var(--border)"}`,
                      borderRadius: 10, cursor: "pointer", fontFamily: "inherit", textAlign: "left", transition: "all .1s" }}>
                    {isTheme
                      ? <span style={{fontSize:17}}>🎨</span>
                      : <IC n={t.icon} s={17} c={isActive ? "var(--accent-light)" : "var(--tx3)"} />}
                    <span style={{ fontSize: 12, fontWeight: 600, color: isActive ? "var(--accent-light)" : isTheme ? "var(--accent)" : "var(--tx2)" }}>{t.label}</span>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* THEME MODAL */}
      {themeModalOpen && (
        <div style={{ position:"fixed", inset:0, zIndex:600, background:"var(--scrim)", backdropFilter:"blur(6px)" }} onClick={()=>setThemeModalOpen(false)}>
          <div style={{ position:"absolute", bottom:64, left:0, right:0, background:"var(--mica-bg)", backdropFilter:"blur(24px) saturate(1.5)", borderTop:"1px solid var(--border)", borderRadius:"16px 16px 0 0", padding:"16px 16px 20px" }} onClick={e=>e.stopPropagation()}>
            <div style={{ width:32, height:3, background:"var(--border2)", borderRadius:4, margin:"0 auto 14px" }}/>
            <div style={{ fontSize:13, fontWeight:800, color:"var(--accent)", marginBottom:14, textAlign:"center" }}>🎨 Tema Warna Aplikasi</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginBottom:14 }}>
              {COLOR_THEMES.map(t => {
                const isActive = (colorTheme||"gold") === t.id;
                const isDark = theme !== "light";
                const col = isDark ? t.dark.accent : t.light.accent;
                return (
                  <button key={t.id} onClick={()=>setColorTheme(t.id)}
                    style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:5,
                      padding:"10px 6px", borderRadius:12, cursor:"pointer", fontFamily:"inherit",
                      border: isActive ? "2.5px solid "+col : "2px solid var(--border)",
                      background: isActive ? col+"18" : "var(--card2)",
                      boxShadow: isActive ? "0 0 0 3px "+col+"30" : "none",
                      transition:"all .15s" }}>
                    <div style={{ width:28, height:28, borderRadius:"50%", background:col,
                      boxShadow: isActive ? "0 0 8px "+col+"80" : "none",
                      border: isActive ? "2px solid #fff3" : "none", transition:"all .2s" }}/>
                    <span style={{ fontSize:9, fontWeight: isActive?800:600, color: isActive?col:"var(--tx3)", textAlign:"center", lineHeight:1.2 }}>{t.label}</span>
                    {isActive && <div style={{ width:5, height:5, borderRadius:"50%", background:col }}/>}
                  </button>
                );
              })}
            </div>
            <div style={{ fontSize:11, color:"var(--tx3)", textAlign:"center", marginBottom:10 }}>
              Aktif: <span style={{ color:"var(--accent)", fontWeight:700 }}>{COLOR_THEMES.find(t=>t.id===(colorTheme||"gold"))?.emoji} {COLOR_THEMES.find(t=>t.id===(colorTheme||"gold"))?.label}</span>
            </div>
            <button onClick={()=>setThemeModalOpen(false)} style={{ width:"100%", padding:"11px", background:"var(--card2)", border:"1px solid var(--border2)", borderRadius:10, color:"var(--tx2)", fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>Tutup</button>
          </div>
        </div>
      )}

      {/* CONTENT */}
      <main style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column" }}>
        <div key={tabKey} className="tab-view" style={{ flex: 1, overflowY: "auto", padding: "14px 14px 0", WebkitOverflowScrolling: "touch" }}>
        {tab === "search" && <SearchTab packages={packages} guests={guests} mutations={mutations} incidents={incidents} patrols={patrols} />}
        {tab === "pimpinan" && <PimpinanTab now={now} patrols={patrols} incidents={incidents} posAssign={posAssign} instruksi={instruksi} mutations={mutations} currentUser={currentUser} />}
        {tab === "dashboard" && <DashTab now={now} reguHari={reguHari} posAssign={posAssign} incidents={incidents} packages={packages} guests={guests} patrols={patrols} standJaga={standJaga} mutations={mutations} posRollingLog={posRollingLog} liburData={liburData} setLiburData={setLiburData} instruksi={instruksi} currentUser={currentUser} setTab={setTab} canEdit={canEdit} isAdmin={isAdmin} />}
        {tab === "jadwal" && <JadwalTab now={now} liburData={liburData} isAdmin={isAdmin} setTab={setTab} />}
        {tab === "pos" && <PosTab reguHari={reguHari} posAssign={posAssign} setPosAssign={setPosAssign} posRollingLog={posRollingLog} setPosRollingLog={setPosRollingLog} toast={toast} canEdit={canEdit} isAdmin={isAdmin} currentUser={currentUser} />}
        {tab === "patrol" && <PatrolTab posAssign={posAssign} patrols={patrols} setPatrols={setPatrols} toast={toast} canEdit={canEdit} isAdmin={isAdmin} currentUser={currentUser} />}
        {tab === "incident" && <IncTab incidents={incidents} setIncidents={setIncidents} posAssign={posAssign} toast={toast} canEdit={canEdit} />}
        {tab === "package" && <PkgTab packages={packages} setPackages={setPackages} toast={toast} canEdit={canEdit} />}
        {tab === "guest" && <GuestTab guests={guests} setGuests={setGuests} toast={toast} canEdit={canEdit} />}
        {tab === "keluar" && <KeluarTab keluarData={keluarData} setKeluarData={setKeluarData} toast={toast} canEdit={canEdit} isAdmin={isAdmin} now={now} />}
        {tab === "mutation" && <MutTab mutations={mutations} setMutations={setMutations} reguHari={reguHari} toast={toast} canEdit={canEdit} patrols={patrols} incidents={incidents} packages={packages} guests={guests} currentUser={currentUser} standJaga={standJaga} rollings={rollings} inventarisDaftar={inventarisDaftar} inventarisCek={inventarisCek} />}
        {tab === "absen" && <AbsenTab absen={absen} setAbsen={setAbsen} liburData={liburData} setLiburData={setLiburData} reguHari={reguHari} toast={toast} canEdit={canEdit} isAdmin={isAdmin} now={now} />}
        {tab === "instruksi" && <InstruksiTab instruksi={instruksi} setInstruksi={setInstruksi} toast={toast} isAdmin={isAdmin} currentUser={currentUser} />}
        {tab === "profile" && <ProfileTab currentUser={currentUser} patrols={patrols} standJaga={standJaga} incidents={incidents} mutations={mutations} onLogout={handleLogout} toast={toast} userPins={userPins} setUserPins={setUserPins} colorTheme={colorTheme} setColorTheme={setColorTheme} theme={theme} />}
        {tab === "members" && <AdminMemberTab patrols={patrols} standJaga={standJaga} incidents={incidents} mutations={mutations} />}
        {tab === "inventaris" && <InventarisTab inventarisDaftar={inventarisDaftar} setInventarisDaftar={setInventarisDaftar} inventarisCek={inventarisCek} setInventarisCek={setInventarisCek} toast={toast} isAdmin={isAdmin} canEdit={canEdit} now={now} />}
        </div>
      </main>

      {/* CIRCLE HOME OVERLAY — anggota */}
      {showLanding && !isAdmin && (
        <CircularLandingPage
          currentUser={currentUser}
          now={now}
          reguHari={reguHari}
          incidents={incidents}
          packages={packages}
          posAssign={posAssign}
          instruksi={instruksi}
          patrols={patrols}
          mutations={mutations}
          onNavigate={(tabId) => { setShowLanding(false); setTab(tabId); setTabKey(k=>k+1); }}
        />
      )}

      {/* BOTTOM NAV — disembunyikan saat circle landing aktif */}
      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 300, background: "var(--mica-bg)", backdropFilter: "blur(20px) saturate(1.4)", borderTop: "1px solid var(--border)", display: (showLanding && !isAdmin) ? "none" : "flex", height: 60, boxShadow: "0 -1px 0 var(--border)" }}>
        {ACTIVE_NAV.map(t => {
          const isCircleBtn = t.id === "circle";
          const isMoreBtn = t.id === "more";
          const active = isCircleBtn ? showLanding : isMoreBtn ? moreOpen : (!showLanding && tab === t.id);
          // Badge per tab
          const badge = t.id === "incident" && activeI > 0 ? activeI
                      : t.id === "instruksi" && instruksiAktif > 0 ? instruksiAktif
                      : null;
          return (
            <button key={t.id} onClick={() => {
              if (isCircleBtn) { setShowLanding(true); setMoreOpen(false); }
              else if (t.id === "more") { setMoreOpen(o => !o); setShowLanding(false); }
              else { setTab(t.id); setShowLanding(false); setMoreOpen(false); }
            }} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 2, background: active ? "var(--pill-active)" : "none", border: "none", cursor: "pointer", color: active ? "var(--accent-light)" : "var(--tx2)", transition: "all .15s", fontFamily: "inherit", position: "relative", margin: "5px 2px", borderRadius: 9 }}>
              {badge && <div style={{ position: "absolute", top: 4, right: "calc(50% - 18px)", minWidth: 16, height: 16, background: "var(--r)", borderRadius: 8, fontSize: 8.5, color: "#fff", fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 3px" }}>{badge}</div>}
              <IC n={t.icon} s={19} c={active ? "var(--accent-light)" : "var(--tx2)"} />
              <span style={{ fontSize: 8.5, fontWeight: active ? 700 : 500, color: active ? "var(--accent-light)" : "var(--tx3)", lineHeight: 1.2, textAlign:"center" }}>{t.label}</span>
              {active && <div style={{ position: "absolute", top: 0, left: "30%", right: "30%", height: 2, background: "var(--accent-light)", borderRadius: "0 0 2px 2px" }} />}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

// Register Service Worker
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
