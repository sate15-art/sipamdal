function getReguHari(date) {
  const OFFSET = 6 * 3600000;
  const d = new Date(new Date(date).getTime() - OFFSET); d.setHours(0,0,0,0);
  const s = new Date(new Date(JADWAL_START).getTime() - OFFSET); s.setHours(0,0,0,0);
  const diff = Math.round((d - s) / 86400000);
  const urut = [3, 1, 2];
  return urut[((diff % 3) + 3) % 3];
}

// useLS: localStorage (offline fallback)
function useLS(key, init) {
  const [v, sv] = useState(() => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch{return init;} });
  const set = (x) => { sv(x); try{localStorage.setItem(key,JSON.stringify(x));}catch{} };
  return [v, set];
}

// useFS: Firebase Firestore realtime sync + localStorage fallback
// key = koleksi Firestore, misal "pad_inc", "pad_pkg", dst.
// Data disimpan sebagai array di satu doc: "sipamdal/{key}" → {items:[...]}
function useFS(key, init) {
  const lsKey = key;
  const [v, sv] = useState(() => {
    try { const s=localStorage.getItem(lsKey); return s?JSON.parse(s):init; } catch{return init;}
  });

  useEffect(() => {
    const fb = window.__FB;
    if (!fb) return;
    const { db, doc, collection, onSnapshot } = fb;
    const ref = doc(db, "sipamdal", key);
    const unsub = onSnapshot(ref, snap => {
      if (snap.exists()) {
        const data = snap.data().items ?? init;
        sv(data);
        try { localStorage.setItem(lsKey, JSON.stringify(data)); } catch{}
      }
    }, () => {});
    return () => unsub();
  }, [key]);

  const set = (x) => {
    sv(x);
    try { localStorage.setItem(lsKey, JSON.stringify(x)); } catch{}
    const fb = window.__FB;
    if (!fb) return;
    const { db, doc, setDoc } = fb;
    // Strip foto base64 sebelum kirim ke Firestore agar tidak melebihi batas 1MB
    let xForDB = x;
    if (Array.isArray(x)) {
      xForDB = x.map(item => {
        if (item && item.photo && item.photo.length > 100) {
          return {...item, photo: "[foto-lokal]"};
        }
        return item;
      });
    }
    setDoc(doc(db, "sipamdal", key), { items: xForDB }).catch(err => {
      console.error("Firebase save error:", key, err.code, err.message);
    });
  };

  return [v, set];
}

// Kompres foto agar tidak melebihi batas Firestore (1MB)
function kompressFoto(dataUrl, maxW=800, quality=0.6) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ratio = Math.min(1, maxW / img.width);
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.src = dataUrl;
  });
}

function formatCountdown(ms) {
  if (ms <= 0) return "00:00:00";
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return [h, m, s].map(v => String(v).padStart(2, "0")).join(":");
}

// ─── QR SVG ───────────────────────────────────────────────────────────────────
function QRSvg({ value, size=120 }) {
  const h = value.split("").reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0, 0);
  const N=21, cell=size/N, grid=[];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) {
    const finder=(r<7&&c<7)||(r<7&&c>=14)||(r>=14&&c<7);
    const inner=(r>=2&&r<=4&&c>=2&&c<=4)||(r>=2&&r<=4&&c>=16&&c<=18)||(r>=16&&r<=18&&c>=2&&c<=4);
    const timing=(r===6||c===6)&&!finder;
    let filled=finder||inner;
    if(timing) filled=(r+c)%2===0;
    if(!finder&&!timing) filled=(Math.abs((h*(r*N+c+7))|0)%255)>120;
    grid.push({r,c,filled});
  }
  return (
    <svg width={size} height={size} style={{background:"#fff",borderRadius:8,display:"block"}}>
      {grid.map(({r,c,filled})=>filled&&<rect key={`${r}-${c}`} x={c*cell+.5} y={r*cell+.5} width={cell-.5} height={cell-.5} fill="#1e3a5f" rx=".5"/>)}
    </svg>
  );
}

// ─── CAMERA QR SCANNER ────────────────────────────────────────────────────────
function CamScanner({onScan,onClose}) {
  const vRef=useRef(), cRef=useRef(), streamRef=useRef(), animRef=useRef();
  const [err,setErr]=useState(null);
  const [live,setLive]=useState(false);
  const [hit,setHit]=useState(null);
  const hasBD=typeof window!=="undefined"&&!!window.BarcodeDetector;

  const stop=useCallback(()=>{
    streamRef.current?.getTracks().forEach(t=>t.stop()); streamRef.current=null;
    if(animRef.current) cancelAnimationFrame(animRef.current);
    setLive(false);
  },[]);

  const scan=useCallback(()=>{
    const v=vRef.current,c=cRef.current;
    if(!v||!c||v.readyState<2){animRef.current=requestAnimationFrame(scan);return;}
    const ctx=c.getContext("2d"); c.width=v.videoWidth; c.height=v.videoHeight; ctx.drawImage(v,0,0);
    if(window.BarcodeDetector){
      new window.BarcodeDetector({formats:["qr_code"]}).detect(c).then(bs=>{
        if(bs.length){
          const area=decQR(bs[0].rawValue)||ALL_AREAS.find(a=>bs[0].rawValue.includes(a));
          if(area&&ALL_AREAS.includes(area)){setHit(area);stop();setTimeout(()=>onScan(area),400);return;}
        }
        animRef.current=requestAnimationFrame(scan);
      }).catch(()=>{animRef.current=requestAnimationFrame(scan);});
    } else { animRef.current=requestAnimationFrame(scan); }
  },[onScan,stop]);

  const start=async()=>{
    setErr(null);
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}});
      streamRef.current=s; vRef.current.srcObject=s; await vRef.current.play(); setLive(true);
    }catch(e){setErr("Kamera tidak dapat diakses. Pastikan izin kamera diberikan.");}
  };

  useEffect(()=>{ start(); return()=>stop(); },[]);
  useEffect(()=>{ if(live&&vRef.current) vRef.current.onloadedmetadata=()=>{animRef.current=requestAnimationFrame(scan);}; },[live,scan]);

  return (
    <div>
      <div style={{position:"relative",background:"#0f172a",minHeight:240,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        <video ref={vRef} style={{width:"100%",maxHeight:260,objectFit:"cover",display:live?"block":"none"}} playsInline muted/>
        <canvas ref={cRef} style={{display:"none"}}/>
        {live&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <div style={{width:190,height:190,border:"2.5px solid #3b82f6",borderRadius:14,boxShadow:"0 0 0 9999px rgba(0,0,0,.5)",position:"relative"}}>
              <div style={{position:"absolute",top:"50%",left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#3b82f6,transparent)",animation:"sl 2s ease-in-out infinite"}}/>
            </div>
          </div>
        )}
        {hit&&<div style={{position:"absolute",bottom:12,left:"50%",transform:"translateX(-50%)",background:"#16a34a",color:"#fff",borderRadius:8,padding:"8px 18px",fontWeight:700,fontSize:14,whiteSpace:"nowrap"}}>✓ {hit}</div>}
        {!live&&!hit&&<div style={{textAlign:"center",color:"#fff",padding:24}}><IC n="cam" s={44} c="#3b82f6"/><div style={{marginTop:10,fontSize:13}}>Memulai kamera...</div></div>}
      </div>
      <div style={{padding:"14px 18px 18px"}}>
        {!hasBD&&live&&<div style={{background:"#fffbeb",border:"1px solid #fbbf24",borderRadius:9,padding:"9px 13px",marginBottom:10,fontSize:12.5,color:"#92400e"}}>⚠ Browser ini belum mendukung scan otomatis. Pilih gedung dari daftar.</div>}
        {err&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:9,padding:"9px 13px",marginBottom:10,fontSize:12.5,color:"#b91c1c"}}>{err}</div>}

        <div style={{maxHeight:210,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
          {Object.entries(PATROL_AREAS).map(([pos,areas])=>(
            <div key={pos}>
              <div style={{fontSize:10.5,color:"#9ca3af",fontWeight:700,padding:"3px 0 2px",textTransform:"uppercase",letterSpacing:.5}}>{pos}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:4}}>
                {areas.map(a=>(
                  <button key={a} onClick={()=>{stop();onScan(a);}} style={{background:"#f0f5ff",border:"1.5px solid #bfdbfe",borderRadius:7,color:"#1d4ed8",fontSize:12,fontWeight:600,padding:"6px 10px",cursor:"pointer",fontFamily:"inherit"}}>{a}</button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          {live?<Btn onClick={stop} color="#6b7280" variant="outline">Stop Kamera</Btn>:<Btn onClick={start} color="#1d4ed8"><IC n="cam" s={13}/> Aktifkan</Btn>}
          <Btn onClick={()=>{stop();onClose();}} color="#6b7280" variant="outline">Tutup</Btn>
        </div>
      </div>
      <style>{`@keyframes sl{0%,100%{transform:translateY(-70px)}50%{transform:translateY(70px)}}`}</style>
    </div>
  );
}

function DashTab({now,shift,reguHari,posAssign,incidents,packages,guests,patrols,standJaga,mutations,setTab,canEdit}) {
  const pending=packages.filter(p=>p.status==="Belum Diambil").length;
  const staying=guests.filter(g=>g.status==="Masih Ada").length;
  const todP=patrols.filter(p=>new Date(p.ts).toDateString()===now.toDateString()).length;
  const actI=incidents.filter(i=>i.status!=="Selesai").length;
  const todS=standJaga.filter(s=>new Date(s.ts).toDateString()===now.toDateString());

  // ── Hitung mundur piket selesai ──
  const shiftEnd = getShiftEnd(now);
  const remaining = shiftEnd - now;
  const cdColor = remaining < 3600000 ? "#dc2626" : remaining < 7200000 ? "#d97706" : "#fff";

  // ── Alert: pos kosong ──
  const emptyPos = POS_LIST.filter(p => !(posAssign[p]?.length));
  const posKosong = emptyPos.length > 0;

  // ── Alert: belum ada patroli hari ini ──
  const noPatrol = todP === 0;

  // ── Alert: belum ada rolling hari ini ──
  // Rolling = mutasi yang ada field toRegu yang berbeda dengan fromRegu hari ini
  const todayMut = mutations.filter(m => new Date(m.ts).toDateString() === now.toDateString());
  const noRolling = todayMut.length === 0;

  const alerts = [
    ...(posKosong ? [{icon:"⚠️", msg:`Pos kosong: ${emptyPos.join(", ")}`, col:"#dc2626", bg:"#fef2f2", tab:"pos"}] : []),
    ...(noPatrol  ? [{icon:"🔍", msg:"Belum ada patroli hari ini", col:"#d97706", bg:"#fffbeb", tab:"patrol"}] : []),
    ...(noRolling ? [{icon:"🔄", msg:"Belum ada laporan rolling/mutasi shift", col:"#7c3aed", bg:"#f5f3ff", tab:"mutation"}] : []),
  ];

  const cards=[
    {l:"Paket Belum Diambil",v:pending,col:"#d97706",bg:"#fffbeb",icon:"pkg",t:"package"},
    {l:"Tamu Menginap",v:staying,col:"#7c3aed",bg:"#f5f3ff",icon:"ppl",t:"guest"},
    {l:"Patroli Hari Ini",v:todP,col:"#059669",bg:"#f0fdf4",icon:"qr",t:"patrol"},
    {l:"Insiden Aktif",v:actI,col:"#dc2626",bg:"#fef2f2",icon:"alert",t:"incident"},
  ];
  return (
    <div>
      {/* Hero card: jam + countdown */}
      <div style={{background:"linear-gradient(135deg,#1e3a8a,#2563eb)",borderRadius:16,padding:"18px 20px",marginBottom:14,color:"#fff"}}>
        <div style={{fontSize:11,opacity:.7,marginBottom:2}}>Jadwal Jaga Hari Ini</div>
        <div style={{fontSize:26,fontWeight:900,letterSpacing:1}}>REGU {reguHari}</div>
        <div style={{fontSize:12,opacity:.8,marginTop:2}}>{REGU[reguHari]?.join(" · ")}</div>
        <div style={{marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontSize:10,opacity:.6,marginBottom:2}}>JAM SEKARANG</div>
            <div style={{fontSize:30,fontWeight:900,letterSpacing:2,fontVariantNumeric:"tabular-nums",lineHeight:1}}>{now.toLocaleTimeString("id-ID")}</div>
            <div style={{fontSize:10,opacity:.55,marginTop:3}}>{fmtDate(now)}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,opacity:.6,marginBottom:2}}>PIKET SELESAI PUKUL 06:00</div>
            <div style={{fontSize:28,fontWeight:900,fontVariantNumeric:"tabular-nums",color:cdColor,letterSpacing:1,lineHeight:1,textShadow:cdColor!=="fff"?"0 0 14px rgba(255,255,255,.3)":"none"}}>
              {formatCountdown(remaining)}
            </div>
            <div style={{fontSize:10,opacity:.55,marginTop:3}}>
              {remaining < 3600000 ? "⚠ Kurang dari 1 jam!" : remaining < 3600000*3 ? "Segera siapkan serah terima" : "sisa waktu piket"}

      </div>

      {/* Alert notifikasi */}
      {canEdit && alerts.length > 0 && (
        <div style={{marginBottom:14}}>
          {alerts.map((a,i)=>(
            <div key={i} onClick={()=>setTab(a.tab)} style={{background:a.bg,border:`1.5px solid ${a.col}40`,borderRadius:10,padding:"10px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
              <span style={{fontSize:18,flexShrink:0}}>{a.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12.5,fontWeight:800,color:a.col}}>{a.msg}</div>
                <div style={{fontSize:10.5,color:"#6b7280"}}>Tap untuk buka →</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {cards.map(c=>(
          <div key={c.l} onClick={()=>setTab(c.t)} style={{background:c.bg,border:`1.5px solid ${c.col}22`,borderRadius:12,padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,background:c.col+"18",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IC n={c.icon} s={18} c={c.col}/></div>
            <div><div style={{fontSize:24,fontWeight:900,color:c.col}}>{c.v}</div><div style={{fontSize:10.5,color:"#6b7280"}}>{c.l}</div></div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div style={{background:"#fff",border:`1.5px solid ${posKosong?"#fca5a5":"#dbeafe"}`,borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:12,fontWeight:800,color:posKosong?"#dc2626":"#1d4ed8",marginBottom:8}}>
            {posKosong?"⚠ ":""}Penempatan Pos
          </div>
          {POS_LIST.map(p=>{
            const filled=posAssign[p]?.length>0;
            return (
              <div key={p} style={{padding:"4px 0",borderBottom:"1px solid #f1f5f9"}}>
                <div style={{fontSize:10,color:"#9ca3af"}}>{p}</div>
                <div style={{fontSize:11.5,fontWeight:700,color:filled?"#1e3a8a":"#ef4444"}}>{posAssign[p]?.join(", ")||"⚠ Kosong"}</div>
              </div>
            );
          })}
        </div>
        <div style={{background:"#fff",border:"1.5px solid #dbeafe",borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:12,fontWeight:800,color:"#1d4ed8",marginBottom:8}}>Stand Jaga ({todS.length})</div>
          {todS.length===0&&<div style={{fontSize:11,color:"#9ca3af"}}>Belum ada</div>}
          {[...todS].reverse().slice(0,4).map(s=>(
            <div key={s.id} style={{padding:"4px 0",borderBottom:"1px solid #f1f5f9"}}>
              <div style={{fontSize:11.5,fontWeight:700,color:"#1e3a8a"}}>{s.area}</div>
              <div style={{fontSize:10,color:"#6b7280"}}>{s.officer} · {fmtT(s.ts)}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// QR codes for each pos check-in
const POS_QR_PREFIX = "BBPKA2-POS-";
const encPosQR = (pos) => POS_QR_PREFIX + pos.replace(/ /g,"_");
const decPosQR = (v) => v && v.startsWith(POS_QR_PREFIX) ? v.replace(POS_QR_PREFIX,"").replace(/_/g," ") : null;

// ─── POS ──────────────────────────────────────────────────────────────────────
function PosTab({reguHari,posAssign,setPosAssign,toast,canEdit}) {
  const members=REGU[reguHari]||[];
  const [scanOpen,setScanOpen]=useState(false);
  const [scanPos,setScanPos]=useState(null); // pos yang sedang di-scan
  const [confirm,setConfirm]=useState(null); // {pos, scanned}
  const [selectedMember,setSelectedMember]=useState("");
  const [viewPosQR,setViewPosQR]=useState(null);

  // Scan QR pos: QR pos berisi kode pos, setelah scan pilih anggota yang akan ditempatkan
  const onScanPos=(raw)=>{
    setScanOpen(false);
    const pos = decPosQR(raw) || POS_LIST.find(p=>raw.includes(p));
    if(!pos||!POS_LIST.includes(pos)){toast("QR tidak dikenali!",false);return;}
    const asgn=posAssign[pos]||[]; const cap=POS_CAP[pos]||1;
    if(asgn.length>=cap){toast(`${pos} sudah penuh!`,false);return;}
    setConfirm({pos}); setSelectedMember("");
  };

  const doAssign=()=>{
    if(!selectedMember){toast("Pilih anggota!",false);return;}
    const updated={...posAssign,[confirm.pos]:[...(posAssign[confirm.pos]||[]),selectedMember]};
    setPosAssign(updated); setConfirm(null); toast(`${selectedMember} ditempatkan di ${confirm.pos}!`);
  };

  const removeFromPos=(pos,m)=>{
    if(!canEdit) return;
    const updated={...posAssign,[pos]:(posAssign[pos]||[]).filter(x=>x!==m)};
    setPosAssign(updated); toast(`${m} dilepas dari ${pos}`);
  };

  return (
    <div>
      <PH title="Penempatan Pos" sub={`Regu ${reguHari}: ${members.join(", ")}`} action={canEdit&&<Btn onClick={()=>setScanOpen(true)} color="#1d4ed8"><IC n="cam" s={13}/> Scan QR Pos</Btn>}/>
      {!canEdit&&<ReadOnlyBanner reguHari={reguHari}/>}
      {canEdit&&<div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#1d4ed8"}}>
        📋 Scan QR yang terpasang di setiap pos untuk menempatkan anggota. Atau lihat QR pos dengan tombol <strong>QR</strong> di bawah.
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {POS_LIST.map(pos=>{
          const col=POS_COL[pos], cap=POS_CAP[pos], asgn=posAssign[pos]||[];
          const isFull=asgn.length>=cap;
          return (
            <div key={pos} style={{background:"#fff",border:`1.5px solid ${isFull?col+"60":col+"28"}`,borderRadius:12,overflow:"hidden"}}>
              <div style={{background:isFull?col:col+"cc",padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11,fontWeight:800,color:"#fff",lineHeight:1.3}}>{pos}</span>
                <span style={{background:"rgba(255,255,255,.25)",color:"#fff",borderRadius:5,padding:"2px 6px",fontSize:10,whiteSpace:"nowrap"}}>{asgn.length}/{cap}</span>
              </div>
              <div style={{padding:10}}>
                {asgn.length===0&&<div style={{fontSize:11,color:"#9ca3af",textAlign:"center",padding:"8px 0"}}>Belum ada</div>}
                {asgn.map(m=>(
                  <div key={m} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #f1f5f9"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <IC n="ok" s={12} c={col}/>
                      <span style={{fontSize:12.5,fontWeight:700,color:"#1e3a8a"}}>{m}</span>
                    </div>
                    {canEdit&&<button onClick={()=>removeFromPos(pos,m)} style={{background:"none",border:"none",color:"#fca5a5",cursor:"pointer",fontSize:14,padding:2}}>✕</button>}
                  </div>
                ))}
                <div style={{marginTop:8,display:"flex",gap:5,justifyContent:"center",flexWrap:"wrap"}}>
                  {canEdit&&!isFull&&<Btn onClick={()=>{setConfirm({pos});setSelectedMember("");}} color={col} size="sm"><IC n="plus" s={11}/> Tambah</Btn>}
                  <Btn onClick={()=>setViewPosQR(pos)} color="#6b7280" variant="outline" size="sm"><IC n="qr" s={11}/> QR</Btn>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Scanner Modal */}
      <Modal open={scanOpen} onClose={()=>setScanOpen(false)} title="Scan QR Pos" noPad>
        <CamScanner
          onScan={onScanPos}
          onClose={()=>setScanOpen(false)}
          customAreas={POS_LIST}
          customDecode={raw=>{ const p=decPosQR(raw)||POS_LIST.find(p=>raw.includes(p)); return POS_LIST.includes(p)?p:null; }}
        />
      </Modal>

      {/* Confirm assign member */}
      <Modal open={!!confirm} onClose={()=>setConfirm(null)} title={`Tempatkan ke ${confirm?.pos}`}>
        {confirm&&(
          <div>
            <div style={{background:POS_COL[confirm.pos]+"14",borderRadius:10,padding:"12px",marginBottom:14,textAlign:"center",border:`1.5px solid ${POS_COL[confirm.pos]}30`}}>
              <div style={{fontSize:11,color:"#6b7280"}}>Pos Tujuan</div>
              <div style={{fontSize:18,fontWeight:900,color:POS_COL[confirm.pos]}}>{confirm.pos}</div>
              <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>Kapasitas: {POS_CAP[confirm.pos]} orang · Terisi: {(posAssign[confirm.pos]||[]).length}</div>
            </div>
            <Inp label="Pilih Anggota" value={selectedMember} onChange={e=>setSelectedMember(e.target.value)} as="select">
              <option value="">— Pilih Anggota —</option>
              {members.filter(m=>!Object.values(posAssign).flat().includes(m)).map(m=><option key={m}>{m}</option>)}
            </Inp>
            <div style={{display:"flex",gap:8}}><Btn onClick={doAssign} color={POS_COL[confirm.pos]} size="lg" full><IC n="ok" s={14}/> Tempatkan</Btn><Btn onClick={()=>setConfirm(null)} color="#6b7280" variant="outline">Batal</Btn></div>
          </div>
        )}
      </Modal>

      {/* QR Pos untuk dicetak/ditempel di pos */}
      <Modal open={!!viewPosQR} onClose={()=>setViewPosQR(null)} title={`QR Pos: ${viewPosQR}`}>
        {viewPosQR&&(
          <div style={{textAlign:"center"}}>
            <div style={{background:"#fff",border:`2px solid ${POS_COL[viewPosQR]}`,borderRadius:14,padding:18,display:"inline-block",marginBottom:10}}>
              <QRSvg value={encPosQR(viewPosQR)} size={190}/>
              <div style={{marginTop:8,fontSize:13,fontWeight:800,color:"#1e3a8a"}}>{viewPosQR}</div>
              <div style={{fontSize:10,color:"#6b7280"}}>BBPKA II Jatinangor — Scan untuk penempatan</div>
            </div>
            <div style={{color:"#6b7280",fontSize:12,marginBottom:12}}>Screenshot & cetak, tempel di {viewPosQR}</div>
            <Btn onClick={()=>setViewPosQR(null)} color="#1d4ed8">Tutup</Btn>
          </div>
        )}
      </Modal>
    </div>
  );
}

// ─── STAND JAGA ───────────────────────────────────────────────────────────────
function StandTab({standJaga,setStandJaga,posAssign,reguHari,toast,canEdit}) {
  const [scanOpen,setScanOpen]=useState(false);

  const [notes,setNotes]=useState("");
  const members=REGU[reguHari]||[];
  const onScan=(area)=>{ setScanOpen(false); const pos=getPos(area); setConfirm({area,pos:pos||"—"}); setOfficer(posAssign[pos]?.join(", ")||""); setNotes(""); };
  const doConfirm=()=>{ setStandJaga([...standJaga,{id:Date.now(),ts:Date.now(),area:confirm.area,pos:confirm.pos,officer:officer||"—",notes}]); setConfirm(null); toast(`Stand jaga ${confirm.area} dicatat!`); };
  const todS=standJaga.filter(s=>new Date(s.ts).toDateString()===new Date().toDateString());
  return (
    <div>
      <PH title="Stand Jaga" sub="Scan QR untuk mencatat posisi stand jaga" action={canEdit&&<Btn onClick={()=>setScanOpen(true)} color="#1d4ed8"><IC n="cam" s={13}/> Scan QR</Btn>}/>

        {[...todS].reverse().map(s=>(
          <div key={s.id} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid #f1f5f9",alignItems:"center"}}>
            <div style={{width:34,height:34,background:"#eff6ff",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IC n="shield" s={16} c="#3b82f6"/></div>

              <div style={{fontSize:13,fontWeight:700,color:"#1e3a8a"}}>{s.area}</div>

            </div>
            <div style={{fontSize:11,fontWeight:700,color:"#1d4ed8"}}>{fmtT(s.ts)}</div>

// ─── PATROL ───────────────────────────────────────────────────────────────────
function PatrolTab({posAssign,patrols,setPatrols,toast,canEdit}) {

  const [officer,setOfficer]=useState("");
  const [notes,setNotes]=useState("");
  const [photo,setPhoto]=useState(null);
  const [viewQR,setViewQR]=useState(null);
  const [viewPhoto,setViewPhoto]=useState(null);
  const [activePos,setActivePos]=useState(POS_LIST[0]);
  const fileRef=useRef();

  const onScan=(area)=>{ setScanOpen(false); const pos=getPos(area); setConfirm({area,pos:pos||"—"}); setOfficer(posAssign[pos]?.join(", ")||""); setNotes(""); setPhoto(null); };
  const doP=()=>{ setPatrols([...patrols,{id:Date.now(),ts:Date.now(),pos:confirm.pos,officer:officer||"—",areas:[confirm.area],notes,photo,qrScan:true}]); setConfirm(null); toast(`Patroli ${confirm.area} dicatat!`); };
  const handlePhoto=(e)=>{ const file=e.target.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{ kompressFoto(r.result,800,0.5).then(compressed=>setPhoto(compressed)); }; r.readAsDataURL(file); };
  const removePhoto=()=>{ setPhoto(null); if(fileRef.current) fileRef.current.value=""; };

  const todP=patrols.filter(p=>new Date(p.ts).toDateString()===new Date().toDateString());
  const areas=PATROL_AREAS[activePos]||[];
  return (
    <div>

      {!canEdit&&<ReadOnlyBanner reguHari={getReguHari(new Date())}/>}
      <div style={{background:"#fff",border:"1.5px solid #dbeafe",borderRadius:12,marginBottom:14,overflow:"hidden"}}>

        </div>
        <div style={{padding:12}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10}}>
            {areas.map(area=>{
              const cnt=patrols.filter(p=>p.areas?.includes(area)).length;
              const last=patrols.filter(p=>p.areas?.includes(area)).at(-1);

                <div key={area} style={{background:"#f8faff",border:"1.5px solid #dbeafe",borderRadius:10,padding:10,textAlign:"center"}}>
                  <div style={{display:"flex",justifyContent:"center",marginBottom:6}}><QRSvg value={encQR(area)} size={76}/></div>
                  <div style={{fontSize:10.5,fontWeight:800,color:"#1e3a8a",marginBottom:2}}>{area}</div>
                  <div style={{fontSize:10,color:"#6b7280"}}>{cnt}× scan</div>
                  {last&&<div style={{fontSize:10,color:"#059669",fontWeight:700}}>{fmtT(last.ts)}</div>}
                  {last?.photo&&<div style={{marginTop:4,fontSize:10,color:"#7c3aed",fontWeight:700}}>📷 Ada foto</div>}

        </div>
      </div>
      <div style={{background:"#fff",border:"1.5px solid #dbeafe",borderRadius:12,padding:"12px 14px"}}>
        <div style={{fontSize:12,fontWeight:800,color:"#1d4ed8",marginBottom:10}}>Log Patroli Hari Ini ({todP.length})</div>
        {todP.length===0&&<div style={{fontSize:11,color:"#9ca3af"}}>Belum ada patroli</div>}
        {[...todP].reverse().slice(0,15).map(p=>(
          <div key={p.id} style={{padding:"8px 0",borderBottom:"1px solid #f1f5f9"}}>
            <div style={{display:"flex",gap:9,alignItems:"center"}}>
              <div style={{width:32,height:32,background:p.photo?"#f5f3ff":"#eff6ff",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {p.photo?<span style={{fontSize:15}}>📷</span>:<IC n="qr" s={14} c="#3b82f6"/>}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12.5,fontWeight:700,color:"#1e3a8a"}}>{p.areas?.join(", ")}</div>
                <div style={{fontSize:10.5,color:"#6b7280"}}>{p.pos} · {p.officer}</div>
                {p.notes&&<div style={{fontSize:10.5,color:"#374151",marginTop:1}}>📝 {p.notes}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                <span style={{fontSize:10.5,fontWeight:700,color:"#1d4ed8"}}>{fmtT(p.ts)}</span>
                {p.photo&&<button onClick={()=>setViewPhoto(p.photo)} style={{background:"#f5f3ff",border:"1px solid #c4b5fd",borderRadius:5,padding:"2px 7px",fontSize:10,color:"#7c3aed",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Lihat Foto</button>}

      <Modal open={!!confirm} onClose={()=>setConfirm(null)} title="Konfirmasi Patroli">
        {confirm&&(
          <div>
            <div style={{background:"#f0fdf4",borderRadius:10,padding:"12px",marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:12,color:"#6b7280"}}>Titik Patroli</div>
              <div style={{fontSize:20,fontWeight:900,color:"#059669"}}>{confirm.area}</div>
            </div>
            <Inp label="Petugas" value={officer} onChange={e=>setOfficer(e.target.value)} placeholder="Nama petugas"/>
            <Inp label="Catatan Kondisi" value={notes} onChange={e=>setNotes(e.target.value)} as="textarea" placeholder="Kondisi titik patroli..."/>
            {/* FOTO BUKTI PATROLI */}
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:11,color:"#3b82f6",marginBottom:6,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>📷 Foto Bukti Patroli</label>
              {!photo?(
                <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"#f0fdf4",border:"2px dashed #86efac",borderRadius:10,padding:"16px 12px",cursor:"pointer",color:"#059669",fontWeight:700,fontSize:13}}>
                  <IC n="cam" s={20} c="#059669"/>
                  Ambil / Pilih Foto
                  <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{display:"none"}}/>
                </label>
              ):(
                <div style={{position:"relative",display:"inline-block",width:"100%"}}>

                  <button onClick={removePhoto} style={{position:"absolute",top:6,right:6,background:"rgba(220,38,38,.85)",border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:800,padding:"4px 9px",cursor:"pointer",fontFamily:"inherit"}}>✕ Hapus</button>

          </div>
        )}
      </Modal>
      <Modal open={!!viewQR} onClose={()=>setViewQR(null)} title={`Cetak QR: ${viewQR}`}>

            <div style={{background:"#fff",border:"2px solid #1e3a8a",borderRadius:14,padding:18,display:"inline-block",marginBottom:10}}>

              <div style={{fontSize:10,color:"#6b7280"}}>BBPKA II Jatinangor</div>

            <Btn onClick={()=>setViewQR(null)} color="#1d4ed8">Tutup</Btn>
          </div>
        )}
      </Modal>
      <Modal open={!!viewPhoto} onClose={()=>setViewPhoto(null)} title="Foto Bukti Patroli">
        {viewPhoto&&(
          <div style={{textAlign:"center"}}>
            <img src={viewPhoto} alt="bukti patroli" style={{width:"100%",maxHeight:400,objectFit:"contain",borderRadius:10,marginBottom:14}}/>
            <Btn onClick={()=>setViewPhoto(null)} color="#1d4ed8">Tutup</Btn>
          </div>
        )}

  );
}

// ─── PHOTO PICKER (reusable) ──────────────────────────────────────────────────
function PhotoPicker({photo, setPhoto, label="📷 Foto Bukti", color="#1d4ed8"}) {
  const ref = useRef();
  const handle = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader(); r.onload = () => setPhoto(r.result); r.readAsDataURL(file);
  };
  const remove = () => { setPhoto(null); if(ref.current) ref.current.value=""; };
  const lightBg = color==="#dc2626"?"#fef2f2":color==="#7c3aed"?"#f5f3ff":color==="#d97706"?"#fffbeb":color==="#059669"?"#f0fdf4":"#eff6ff";
  const lightBorder = color==="#dc2626"?"#fca5a5":color==="#7c3aed"?"#c4b5fd":color==="#d97706"?"#fcd34d":color==="#059669"?"#86efac":"#bfdbfe";
  return (
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontSize:11,color:color,marginBottom:6,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>{label}</label>
      {!photo?(
        <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:lightBg,border:`2px dashed ${lightBorder}`,borderRadius:10,padding:"13px 12px",cursor:"pointer",color:color,fontWeight:700,fontSize:12.5}}>
          <IC n="cam" s={18} c={color}/> Ambil / Pilih Foto (opsional)
          <input ref={ref} type="file" accept="image/*" capture="environment" onChange={handle} style={{display:"none"}}/>
        </label>
      ):(
        <div style={{position:"relative",width:"100%"}}>
          <img src={photo} alt="bukti" style={{width:"100%",maxHeight:180,objectFit:"cover",borderRadius:10,border:`2px solid ${lightBorder}`,display:"block"}}/>
          <button onClick={remove} style={{position:"absolute",top:6,right:6,background:"rgba(220,38,38,.85)",border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:800,padding:"4px 9px",cursor:"pointer",fontFamily:"inherit"}}>✕ Hapus</button>
          <div style={{position:"absolute",bottom:6,left:6,background:`${color}dd`,borderRadius:6,padding:"3px 8px",fontSize:10,color:"#fff",fontWeight:700}}>📷 Foto siap</div>
        </div>
      )}
    </div>
  );
}

            <img src={inc.photo} alt="" style={{width:40,height:28,objectFit:"cover",borderRadius:4}}/> Lihat Foto Bukti

// ─── PACKAGE ──────────────────────────────────────────────────────────────────

function GuestTab({guests,setGuests,toast,canEdit}) {

  const [viewPhoto,setViewPhoto]=useState(null);

  const submit=()=>{
    if(!fm.name){toast("Nama wajib!",false);return;}
    setGuests([...guests,{...fm,photo,id:Date.now(),ts:Date.now()}]);
    setFm({name:"",institution:"",purpose:"",type:"Tamu Harian",room:"",status:"Masih Ada"}); setPhoto(null);
    setOpen(false); toast("Tamu dicatat!");

  const co=(id)=>{ if(!canEdit) return; setGuests(guests.map(g=>g.id===id?{...g,status:"Sudah Keluar",checkOut:Date.now()}:g));toast("Tamu check-out!");};
  const staying=guests.filter(g=>g.status==="Masih Ada");

      {gone.length>0&&<><div style={{fontSize:12,fontWeight:700,color:"#9ca3af",marginBottom:7}}>Riwayat</div>{[...gone].reverse().map(g=><GC key={g.id} g={g} co={co} canEdit={canEdit} onViewPhoto={setViewPhoto}/>)}</>}

// ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
function LoginScreen({ onLogin, userPins }) {
  const [step, setStep] = useState("select"); // select | pin
  const [selected, setSelected] = useState(null);
  const [pin, setPin] = useState("");
  const [err, setErr] = useState("");
  // userPins passed as prop
  const [shake, setShake] = useState(false);

  const doShake = () => { setShake(true); setTimeout(() => setShake(false), 500); };

  const handleSelect = (member) => { setSelected(member); setPin(""); setErr(""); setStep("pin"); };
  const handleAdminSelect = () => { setSelected({ name: "Admin", regu: 0, isAdmin: true }); setPin(""); setErr(""); setStep("pin"); };

  const handlePinInput = (d) => {
    if (pin.length >= 4) return;
    const np = pin + d;
    setPin(np);
    if (np.length === 4) {
      setTimeout(() => {
        const correctPin = selected.isAdmin ? "0000" : (userPins[selected.name] || "1234");
        if (np === correctPin) { onLogin(selected); }
        else { setErr("PIN salah. Coba lagi."); setPin(""); doShake(); }
      }, 200);
    }
  };

                    {name}
                  </button>

              </div>
            </div>
          ))}
          <div style={{ borderTop: "1px solid rgba(255,255,255,.12)", marginTop: 18, paddingTop: 14, textAlign: "center" }}>
            <button onClick={handleAdminSelect} style={{ background: "rgba(255,255,255,.08)", border: "1.5px solid rgba(255,255,255,.2)", borderRadius: 10, padding: "10px 24px", color: "rgba(255,255,255,.7)", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
              🔐 Masuk sebagai Admin

      {step === "pin" && (

          {selected.isAdmin && <div style={{ fontSize: 11, color: "rgba(255,255,255,.5)", marginBottom: 24 }}>Akses Penuh</div>}

// ─── PROFILE / PROGRES TAB ────────────────────────────────────────────────────
function ProfileTab({ currentUser, patrols, standJaga, incidents, mutations, onLogout, onChangePin, toast, userPins, setUserPins }) {
  const [changePinOpen, setChangePinOpen] = useState(false);
  const [oldPin, setOldPin] = useState("");
  const [newPin, setNewPin] = useState("");
  const [confirmPin, setConfirmPin] = useState("");
  // userPins & setUserPins passed as props

  const name = currentUser.name;
  const today = new Date();

  // Statistik aktivitas user ini
  const myPatrols = patrols.filter(p => p.officer && p.officer.includes(name));
  const myPatrolsToday = myPatrols.filter(p => new Date(p.ts).toDateString() === today.toDateString());
  const myStand = standJaga.filter(s => s.officer && s.officer.includes(name));
  const myStandToday = myStand.filter(s => new Date(s.ts).toDateString() === today.toDateString());
  const myIncidents = incidents.filter(i => i.officer && i.officer.includes(name));
  const myMutations = mutations.filter(m => m.fromRegu === currentUser.regu);

  const reguColors = { 1: "#1d4ed8", 2: "#059669", 3: "#7c3aed" };
  const col = reguColors[currentUser.regu] || "#1d4ed8";

  // Hitung skor keaktifan (hari ini)
  const score = myPatrolsToday.length * 10 + myStandToday.length * 5;

  const handleChangePin = () => {
    // Baca langsung dari localStorage agar tidak stale
    let freshPins = { ...DEFAULT_PINS };
    try { const s = localStorage.getItem("pad_pins"); if (s) freshPins = { ...DEFAULT_PINS, ...JSON.parse(s) }; } catch {}
    const correctOld = (freshPins[name] || "1234").trim();
    const inputOld = oldPin.trim();
    if (inputOld !== correctOld) { toast("PIN lama salah! (default: 1234)", false); return; }
    if (newPin.trim().length !== 4 || !/^\d{4}$/.test(newPin.trim())) { toast("PIN baru harus 4 angka!", false); return; }
    if (newPin.trim() !== confirmPin.trim()) { toast("Konfirmasi PIN tidak cocok!", false); return; }
    const updated = { ...freshPins, [name]: newPin.trim() };
    setUserPins(updated);
    setChangePinOpen(false); setOldPin(""); setNewPin(""); setConfirmPin("");
    toast("PIN berhasil diubah!");
  };

  const statCard = (label, value, sub, color, bg) => (
    <div style={{ background: bg, border: `1.5px solid ${color}20`, borderRadius: 12, padding: "12px 14px", textAlign: "center" }}>
      <div style={{ fontSize: 28, fontWeight: 900, color }}>{value}</div>
      <div style={{ fontSize: 10.5, fontWeight: 700, color, marginBottom: 2 }}>{label}</div>
      {sub && <div style={{ fontSize: 10, color: "#9ca3af" }}>{sub}</div>}
    </div>
  );

  return (
    <div>
      {/* Profile Card */}
      <div style={{ background: `linear-gradient(135deg,${col},${col}cc)`, borderRadius: 16, padding: "20px", marginBottom: 16, color: "#fff", position: "relative" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 56, height: 56, background: "rgba(255,255,255,.25)", borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>👤</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 20, fontWeight: 900 }}>{name}</div>
            <div style={{ fontSize: 12, opacity: .8, marginTop: 2 }}>Regu {currentUser.regu} · BBPKA II Jatinangor</div>
            <div style={{ marginTop: 6, display: "inline-block", background: "rgba(255,255,255,.2)", borderRadius: 7, padding: "3px 10px", fontSize: 11, fontWeight: 700 }}>
              🏆 Skor Hari Ini: {score} poin
            </div>
          </div>
        </div>
      </div>

      {/* Statistik Hari Ini */}
      <div style={{ fontSize: 12, fontWeight: 800, color: "#1d4ed8", marginBottom: 8 }}>📊 Aktivitas Hari Ini</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
        {statCard("Patroli", myPatrolsToday.length, "scan hari ini", "#059669", "#f0fdf4")}
        {statCard("Stand Jaga", myStandToday.length, "pos hari ini", "#1d4ed8", "#eff6ff")}
      </div>

      {/* Statistik Total */}
      <div style={{ fontSize: 12, fontWeight: 800, color: "#1d4ed8", marginBottom: 8 }}>📈 Total Rekap</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
        {statCard("Patroli", myPatrols.length, "semua waktu", "#059669", "#f0fdf4")}
        {statCard("Stand Jaga", myStand.length, "semua waktu", "#0891b2", "#ecfeff")}
        {statCard("Insiden", myIncidents.length, "dilaporkan", "#dc2626", "#fef2f2")}
      </div>

      {/* Log Patroli Terbaru */}
      <div style={{ background: "#fff", border: "1.5px solid #dbeafe", borderRadius: 12, padding: "12px 14px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: "#1d4ed8", marginBottom: 10 }}>🗓 Log Patroli Terbaru</div>
        {myPatrols.length === 0 && <div style={{ fontSize: 12, color: "#9ca3af" }}>Belum ada patroli</div>}
        {[...myPatrols].reverse().slice(0, 8).map(p => (
          <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 9, padding: "6px 0", borderBottom: "1px solid #f1f5f9" }}>
            <div style={{ width: 30, height: 30, background: p.photo?"#f5f3ff":"#f0fdf4", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              {p.photo?<span style={{fontSize:14}}>📷</span>:<IC n="qr" s={13} c="#059669" />}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#1e3a8a" }}>{p.areas?.join(", ")}</div>
              <div style={{ fontSize: 10.5, color: "#6b7280" }}>{p.pos}{p.photo&&<span style={{color:"#7c3aed",marginLeft:6}}>📷 Ada foto</span>}</div>
            </div>
            <div style={{ fontSize: 10.5, fontWeight: 700, color: "#059669" }}>{fmtDT(p.ts)}</div>
          </div>
        ))}
      </div>

      {/* Log Stand Jaga Terbaru */}
      <div style={{ background: "#fff", border: "1.5px solid #dbeafe", borderRadius: 12, padding: "12px 14px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: "#1d4ed8", marginBottom: 10 }}>🛡 Log Stand Jaga Terbaru</div>
        {myStand.length === 0 && <div style={{ fontSize: 12, color: "#9ca3af" }}>Belum ada stand jaga</div>}
        {[...myStand].reverse().slice(0, 5).map(s => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 9, padding: "6px 0", borderBottom: "1px solid #f1f5f9" }}>
            <div style={{ width: 30, height: 30, background: "#eff6ff", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><IC n="shield" s={13} c="#1d4ed8" /></div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#1e3a8a" }}>{s.area}</div>
              <div style={{ fontSize: 10.5, color: "#6b7280" }}>{s.pos}</div>
            </div>
            <div style={{ fontSize: 10.5, fontWeight: 700, color: "#1d4ed8" }}>{fmtDT(s.ts)}</div>
          </div>
        ))}
      </div>

      {/* Aksi */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        <Btn onClick={() => setChangePinOpen(true)} color="#7c3aed" variant="outline" full>🔑 Ganti PIN</Btn>
        <Btn onClick={onLogout} color="#dc2626" variant="outline" full>Keluar</Btn>
      </div>

      <Modal open={changePinOpen} onClose={() => setChangePinOpen(false)} title="Ganti PIN">
        <Inp label="PIN Lama" value={oldPin} onChange={e => setOldPin(e.target.value.replace(/[^0-9]/g,"").slice(0,4))} type="tel" placeholder="Ketik 4 angka" />
        <Inp label="PIN Baru (4 digit)" value={newPin} onChange={e => setNewPin(e.target.value.replace(/[^0-9]/g,"").slice(0,4))} type="tel" placeholder="Ketik 4 angka" />
        <Inp label="Konfirmasi PIN Baru" value={confirmPin} onChange={e => setConfirmPin(e.target.value.replace(/[^0-9]/g,"").slice(0,4))} type="tel" placeholder="Ulangi PIN baru" />
        <div style={{ display: "flex", gap: 8 }}><Btn onClick={handleChangePin} color="#7c3aed" size="lg">Simpan</Btn><Btn onClick={() => setChangePinOpen(false)} color="#6b7280" variant="outline" size="lg">Batal</Btn></div>
      </Modal>
    </div>
  );
}

// ─── ADMIN MEMBER PROGRESS VIEW ───────────────────────────────────────────────
function AdminMemberTab({ patrols, standJaga, incidents, mutations }) {
  const [selectedMember, setSelectedMember] = useState(null);
  const today = new Date();
  const reguColors = { 1: "#1d4ed8", 2: "#059669", 3: "#7c3aed" };

  const getMemberStats = (name) => {
    const myP = patrols.filter(p => p.officer && p.officer.includes(name));
    const myPT = myP.filter(p => new Date(p.ts).toDateString() === today.toDateString());
    const myS = standJaga.filter(s => s.officer && s.officer.includes(name));
    const myST = myS.filter(s => new Date(s.ts).toDateString() === today.toDateString());
    const myI = incidents.filter(i => i.officer && i.officer.includes(name));
    return { patrols: myP.length, patrolsToday: myPT.length, stand: myS.length, standToday: myST.length, incidents: myI.length, score: myPT.length * 10 + myST.length * 5 };
  };

  if (selectedMember) {
    const m = selectedMember;
    const stats = getMemberStats(m.name);
    const myP = patrols.filter(p => p.officer && p.officer.includes(m.name));
    const myS = standJaga.filter(s => s.officer && s.officer.includes(m.name));
    const col = reguColors[m.regu];
    return (
      <div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
          <button onClick={() => setSelectedMember(null)} style={{ background: "#eff6ff", border: "1.5px solid #bfdbfe", borderRadius: 8, padding: "6px 12px", fontSize: 12, color: "#1d4ed8", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>← Kembali</button>
          <h2 style={{ margin: 0, fontSize: 16, fontWeight: 900, color: "#1e3a8a" }}>{m.name}</h2>
        </div>
        <div style={{ background: `linear-gradient(135deg,${col},${col}bb)`, borderRadius: 14, padding: "16px 18px", marginBottom: 14, color: "#fff" }}>
          <div style={{ fontSize: 18, fontWeight: 900 }}>{m.name}</div>
          <div style={{ fontSize: 12, opacity: .8 }}>Regu {m.regu} · Skor Hari Ini: {stats.score} poin</div>
          <div style={{ display: "flex", gap: 10, marginTop: 10, flexWrap: "wrap" }}>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.patrolsToday}</div><div style={{ fontSize: 10 }}>Patroli Hari Ini</div></div>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.standToday}</div><div style={{ fontSize: 10 }}>Stand Hari Ini</div></div>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.patrols}</div><div style={{ fontSize: 10 }}>Total Patroli</div></div>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.incidents}</div><div style={{ fontSize: 10 }}>Insiden</div></div>
          </div>
        </div>
        <div style={{ background: "#fff", border: "1.5px solid #dbeafe", borderRadius: 12, padding: "12px 14px", marginBottom: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "#059669", marginBottom: 8 }}>Log Patroli ({myP.length})</div>
          {myP.length === 0 && <div style={{ fontSize: 12, color: "#9ca3af" }}>Belum ada</div>}
          {[...myP].reverse().slice(0, 10).map(p => (
            <div key={p.id} style={{ padding: "6px 0", borderBottom: "1px solid #f1f5f9", fontSize: 12 }}>
              <div style={{ fontWeight: 700, color: "#1e3a8a" }}>{p.areas?.join(", ")}</div>
              <div style={{ color: "#6b7280", fontSize: 10.5 }}>{fmtDT(p.ts)} · {p.pos}</div>
            </div>
          ))}
        </div>
        <div style={{ background: "#fff", border: "1.5px solid #dbeafe", borderRadius: 12, padding: "12px 14px" }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "#1d4ed8", marginBottom: 8 }}>Log Stand Jaga ({myS.length})</div>
          {myS.length === 0 && <div style={{ fontSize: 12, color: "#9ca3af" }}>Belum ada</div>}
          {[...myS].reverse().slice(0, 10).map(s => (
            <div key={s.id} style={{ padding: "6px 0", borderBottom: "1px solid #f1f5f9", fontSize: 12 }}>
              <div style={{ fontWeight: 700, color: "#1e3a8a" }}>{s.area}</div>
              <div style={{ color: "#6b7280", fontSize: 10.5 }}>{fmtDT(s.ts)} · {s.pos}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div>
      <PH title="Progres Anggota" sub="Rekap aktivitas seluruh anggota" />
      {[1, 2, 3].map(r => (
        <div key={r} style={{ marginBottom: 18 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: reguColors[r], marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: reguColors[r] }} />
            REGU {r}
          </div>
          {REGU[r].map(name => {
            const stats = getMemberStats(name);
            return (
              <div key={name} onClick={() => setSelectedMember({ name, regu: r })} style={{ background: "#fff", border: `1.5px solid ${reguColors[r]}20`, borderRadius: 12, padding: "12px 14px", marginBottom: 8, cursor: "pointer", display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 42, height: 42, background: `${reguColors[r]}15`, borderRadius: 11, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>👤</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 800, color: "#1e3a8a" }}>{name}</div>
                  <div style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>
                    Hari ini: {stats.patrolsToday} patroli · {stats.standToday} stand jaga
                  </div>
                  <div style={{ fontSize: 11, color: "#9ca3af" }}>Total: {stats.patrols} patroli · {stats.incidents} insiden</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 18, fontWeight: 900, color: reguColors[r] }}>{stats.score}</div>
                  <div style={{ fontSize: 9.5, color: "#9ca3af" }}>poin</div>
                </div>
                <IC n="arr" s={14} c="#d1d5db" />
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [currentUser, setCurrentUser] = useLS("pad_user", null);
  const [userPins, setUserPins] = useLS("pad_pins", DEFAULT_PINS);
  const [tab, setTab] = useState("dashboard");
  const [now, setNow] = useState(new Date());
  const [moreOpen, setMoreOpen] = useState(false);
  useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);

  const shift = getShift(now);
  const reguHari = getReguHari(now);

  const [posAssign, setPosAssign] = useData("pad_pos", {});
  const [incidents, setIncidents] = useData("pad_inc", []);
  const [packages, setPackages] = useData("pad_pkg", []);
  const [guests, setGuests] = useData("pad_guest", []);
  const [patrols, setPatrols] = useData("pad_patrol", []);
  const [mutations, setMutations] = useData("pad_mut", []);
  const [standJaga, setStandJaga] = useData("pad_stand", []);
  const [notif, setNotif] = useState(null);

  const toast = (msg, ok = true) => { setNotif({ msg, ok }); setTimeout(() => setNotif(null), 3000); };

  const handleLogin = (user) => { setCurrentUser(user); setTab("dashboard"); };
  const handleLogout = () => { setCurrentUser(null); setTab("dashboard"); };

  if (!currentUser) return <LoginScreen onLogin={handleLogin} userPins={userPins} />;

  const isAdmin = currentUser.isAdmin;
  // canEdit: admin selalu bisa, anggota hanya bisa jika regu-nya piket hari ini
  const canEdit = isAdmin || (!currentUser.isAdmin && currentUser.regu === reguHari);
  const ACTIVE_NAV = isAdmin ? NAV_TABS_ADMIN : NAV_TABS;

  const MORE_TABS = [
    { id: "pos", label: "Penempatan Pos", icon: "pos" },
    { id: "stand", label: "Stand Jaga", icon: "shield" },
    { id: "package", label: "Paket & Kurir", icon: "pkg" },
    { id: "guest", label: "Tamu & Asrama", icon: "ppl" },
    { id: "mutation", label: "Mutasi Laporan", icon: "file" },
    { id: "profile", label: isAdmin ? "Admin" : "Profil Saya", icon: "ppl" },
  ];

  const pending = packages.filter(p => p.status === "Belum Diambil").length;
  const activeI = incidents.filter(i => i.status !== "Selesai").length;

  const goTab = (t) => { setTab(t); setMoreOpen(false); };

  return (
    <div style={{ minHeight: "100vh", background: "#eef3fb", fontFamily: "'Segoe UI',system-ui,sans-serif", display: "flex", flexDirection: "column", paddingBottom: 64 }}>
      {/* HEADER */}
      <header style={{ background: "linear-gradient(135deg,#1e3a8a 0%,#2563eb 70%,#3b82f6 100%)", position: "sticky", top: 0, zIndex: 200, height: 52, display: "flex", alignItems: "center", padding: "0 14px", gap: 10, boxShadow: "0 2px 14px rgba(30,58,138,.2)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 28, height: 28, background: "rgba(255,255,255,.22)", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center" }}><IC n="shield" s={15} c="#fff" /></div>
          <div><div style={{ fontSize: 13, fontWeight: 900, color: "#fff", letterSpacing: .5 }}>SIPAMDAL</div><div style={{ fontSize: 8.5, color: "rgba(255,255,255,.65)", letterSpacing: 1 }}>BBPKA II JATINANGOR</div></div>
        </div>
        <div style={{ flex: 1 }} />
        {pending > 0 && <div style={{ background: "#fbbf24", color: "#78350f", borderRadius: 20, padding: "2px 8px", fontSize: 10.5, fontWeight: 800 }}>📦{pending}</div>}
        {activeI > 0 && <div style={{ background: "#ef4444", color: "#fff", borderRadius: 20, padding: "2px 8px", fontSize: 10.5, fontWeight: 800 }}>⚠{activeI}</div>}
        <div style={{ textAlign: "right", cursor: "pointer" }} onClick={() => goTab("profile")}>
          <div style={{ fontSize: 11, fontWeight: 800, color: "#fff" }}>{currentUser.name}</div>
          <div style={{ fontSize: 8.5, color: "rgba(255,255,255,.55)" }}>{fmtDS(now)} · {isAdmin ? "Admin" : `Regu ${reguHari}`} · {window.__FB ? <span style={{color:"#86efac"}}>●</span> : <span style={{color:"#fca5a5"}}>○</span>}</div>
        </div>
      </header>

      {/* TOAST */}
      {notif && <div style={{ position: "fixed", top: 60, left: "50%", transform: "translateX(-50%)", zIndex: 9999, background: notif.ok ? "#16a34a" : "#dc2626", color: "#fff", borderRadius: 10, padding: "9px 18px", fontWeight: 700, fontSize: 13, boxShadow: "0 4px 20px rgba(0,0,0,.2)", whiteSpace: "nowrap" }}>{notif.ok ? "✓ " : "✕ "}{notif.msg}</div>}

      {/* MORE DRAWER */}
      {moreOpen && (
        <div style={{ position: "fixed", inset: 0, zIndex: 500, background: "rgba(0,0,0,.4)" }} onClick={() => setMoreOpen(false)}>
          <div style={{ position: "absolute", bottom: 64, left: 0, right: 0, background: "#fff", borderRadius: "20px 20px 0 0", padding: "16px 16px 10px" }} onClick={e => e.stopPropagation()}>
            <div style={{ width: 36, height: 4, background: "#e2e8f0", borderRadius: 4, margin: "0 auto 14px" }} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {MORE_TABS.map(t => (
                <button key={t.id} onClick={() => goTab(t.id)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", background: tab === t.id ? "#eff6ff" : "#f8faff", border: `1.5px solid ${tab === t.id ? "#bfdbfe" : "#e0eaf8"}`, borderRadius: 12, cursor: "pointer", fontFamily: "inherit", textAlign: "left" }}>
                  <IC n={t.icon} s={18} c={tab === t.id ? "#1d4ed8" : "#6b7280"} />
                  <span style={{ fontSize: 12.5, fontWeight: 700, color: tab === t.id ? "#1d4ed8" : "#374151" }}>{t.label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* CONTENT */}
      <main style={{ flex: 1, padding: "14px 14px 0", overflowY: "auto" }}>
        {tab === "dashboard" && <DashTab now={now} shift={shift} reguHari={reguHari} posAssign={posAssign} incidents={incidents} packages={packages} guests={guests} patrols={patrols} standJaga={standJaga} mutations={mutations} setTab={setTab} canEdit={canEdit} />}
        {tab === "jadwal" && <JadwalTab now={now} />}
        {tab === "pos" && <PosTab reguHari={reguHari} posAssign={posAssign} setPosAssign={setPosAssign} toast={toast} canEdit={canEdit} />}
        {tab === "stand" && <StandTab standJaga={standJaga} setStandJaga={setStandJaga} posAssign={posAssign} reguHari={reguHari} toast={toast} canEdit={canEdit} />}
        {tab === "patrol" && <PatrolTab posAssign={posAssign} patrols={patrols} setPatrols={setPatrols} toast={toast} canEdit={canEdit} />}
        {tab === "incident" && <IncTab incidents={incidents} setIncidents={setIncidents} posAssign={posAssign} toast={toast} canEdit={canEdit} />}
        {tab === "package" && <PkgTab packages={packages} setPackages={setPackages} toast={toast} canEdit={canEdit} />}
        {tab === "guest" && <GuestTab guests={guests} setGuests={setGuests} toast={toast} canEdit={canEdit} />}
        {tab === "mutation" && <MutTab mutations={mutations} setMutations={setMutations} reguHari={reguHari} toast={toast} canEdit={canEdit} />}
        {tab === "profile" && <ProfileTab currentUser={currentUser} patrols={patrols} standJaga={standJaga} incidents={incidents} mutations={mutations} onLogout={handleLogout} toast={toast} userPins={userPins} setUserPins={setUserPins} />}
        {tab === "members" && <AdminMemberTab patrols={patrols} standJaga={standJaga} incidents={incidents} mutations={mutations} />}
      </main>

      {/* BOTTOM NAV */}
      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 300, background: "#fff", borderTop: "1.5px solid #e0eaf8", display: "flex", height: 64, boxShadow: "0 -2px 16px rgba(30,58,138,.08)" }}>
        {ACTIVE_NAV.map(t => {
          const active = t.id === "more" ? moreOpen : tab === t.id;
          return (
            <button key={t.id} onClick={() => { if (t.id === "more") { setMoreOpen(v => !v); } else { setTab(t.id); setMoreOpen(false); } }} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 3, background: "none", border: "none", cursor: "pointer", color: active ? "#1d4ed8" : "#9ca3af", transition: "color .15s", fontFamily: "inherit", position: "relative" }}>
              {t.id === "incident" && activeI > 0 && <div style={{ position: "absolute", top: 8, right: "calc(50% - 14px)", width: 16, height: 16, background: "#ef4444", borderRadius: 8, fontSize: 9, color: "#fff", fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center" }}>{activeI}</div>}
              <IC n={t.icon} s={22} c={active ? "#1d4ed8" : "#9ca3af"} />
              <span style={{ fontSize: 10, fontWeight: active ? 800 : 600 }}>{t.label}</span>
              {active && t.id !== "more" && <div style={{ position: "absolute", bottom: 0, left: "20%", right: "20%", height: 3, background: "#1d4ed8", borderRadius: 3 }} />}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

// Register Service Worker
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
