<script type="module" id="fb-init">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    collection, doc, setDoc, deleteDoc, onSnapshot,
    getDocs, addDoc, serverTimestamp, query, orderBy, limit,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDq4WcKgbt5tNZh5wWghOjxCW38y5-siKo",
    authDomain: "sipamdal.firebaseapp.com",
    projectId: "sipamdal",
    storageBucket: "sipamdal.firebasestorage.app",
    messagingSenderId: "586437675903",
    appId: "1:586437675903:web:5a1359dd13c8bd5014a84a"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const auth = getAuth(app);

  // Auth anonim — combined with probe start below

  // ── Audit log helper ──────────────────────────────────────────────────────────
  async function writeAuditLog(entry) {
    try {
      await addDoc(collection(db, "sipamdal_audit"), {
        ...entry, ts: serverTimestamp(), tsLocal: new Date().toISOString()
      });
    } catch {
      try {
        const q = JSON.parse(localStorage.getItem("audit_queue")||"[]");
        q.push({...entry, tsLocal: new Date().toISOString()});
        localStorage.setItem("audit_queue", JSON.stringify(q.slice(-50)));
      } catch {}
    }
  }

  // ── Expose ke Babel script ────────────────────────────────────────────────────
  window.__FB = { db, collection, doc, getDoc, setDoc, deleteDoc, onSnapshot, getDocs, addDoc, serverTimestamp, query, orderBy, limit, writeAuditLog };

  // ── Signal ke React bahwa FB sudah siap + track koneksi ──────────────────────
  // Gunakan onSnapshot ke doc kecil sebagai probe koneksi
  const probe = doc(db, "sipamdal", "pad_pos");
  let unsubProbe = null;
  let wasOffline = false; // lacak apakah sebelumnya offline

  function startProbe() {
    if (unsubProbe) return;
    unsubProbe = onSnapshot(probe,
      async () => {
        // Firebase berhasil terhubung
        const nowOnline = !window.__FB_ONLINE; // baru saja kembali online
        window.__FB_ONLINE = true;
        window.dispatchEvent(new Event("fb_online"));

        // Jika sebelumnya offline, catat kembali online + flush antrian
        if (wasOffline) {
          wasOffline = false;
          const tsOnline = new Date().toISOString();
          try {
            // Catat event KEMBALI_ONLINE ke Firestore
            await addDoc(collection(db, "sipamdal_audit"), {
              action: "KEMBALI_ONLINE",
              info: "Koneksi Firebase pulih",
              tsLocal: tsOnline,
              ts: serverTimestamp()
            });
          } catch {}
          // Flush antrian yang tersimpan saat offline
          try {
            const q = JSON.parse(localStorage.getItem("audit_queue") || "[]");
            if (q.length) {
              for (const entry of q) {
                await addDoc(collection(db, "sipamdal_audit"), { ...entry, ts: serverTimestamp(), flushed: true });
              }
              localStorage.removeItem("audit_queue");
            }
          } catch {}
        }
      },
      () => {
        // Firebase terputus
        window.__FB_ONLINE = false;
        wasOffline = true;
        window.dispatchEvent(new Event("fb_offline"));
        // Catat event OFFLINE ke antrian lokal
        try {
          const q = JSON.parse(localStorage.getItem("audit_queue") || "[]");
          q.push({ action: "KONEKSI_OFFLINE", info: "Koneksi Firebase terputus", tsLocal: new Date().toISOString() });
          localStorage.setItem("audit_queue", JSON.stringify(q.slice(-50)));
        } catch {}
      }
    );
  }

  // Mulai probe setelah auth selesai
  signInAnonymously(auth).then(startProbe).catch(startProbe);
  window.addEventListener("offline", () => {
    window.__FB_ONLINE = false;
    wasOffline = true;
    window.dispatchEvent(new Event("fb_offline"));
  });
</script>

function getReguHari(date) {
  const OFFSET = 6 * 3600000;
  const d = new Date(new Date(date).getTime() - OFFSET); d.setHours(0,0,0,0);

// useLS: localStorage (offline fallback)
function useLS(key, init) {
  const [v, sv] = useState(() => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch{return init;} });
  const set = (x) => { sv(x); try{localStorage.setItem(key,JSON.stringify(x));}catch{} };
  return [v, set];
}

// useFS: Firebase Firestore realtime sync + localStorage fallback
// key = koleksi Firestore, misal "pad_inc", "pad_pkg", dst.
// Data disimpan sebagai array di satu doc: "sipamdal/{key}" → {items:[...]}
function useFS(key, init) {
  const lsKey = key;
  const [v, sv] = useState(() => {
    try { const s=localStorage.getItem(lsKey); return s?JSON.parse(s):init; } catch{return init;}
  });

  useEffect(() => {
    const fb = window.__FB;
    if (!fb) return;
    const { db, doc, collection, onSnapshot } = fb;
    const ref = doc(db, "sipamdal", key);
    const unsub = onSnapshot(ref, snap => {
      if (snap.exists()) {
        const data = snap.data().items ?? init;
        sv(data);
        try { localStorage.setItem(lsKey, JSON.stringify(data)); } catch{}
      }
    }, () => {});
    return () => unsub();
  }, [key]);

  const set = (x) => {
    sv(x);
    try { localStorage.setItem(lsKey, JSON.stringify(x)); } catch{}
    const fb = window.__FB;
    if (!fb) return;
    const { db, doc, setDoc } = fb;
    setDoc(doc(db, "sipamdal", key), { items: x }).catch(err => {
      console.error("Firebase save error:", key, err.code, err.message);
    });
  };

  return [v, set];
}

// Kompres foto agar tidak melebihi batas Firestore (1MB) + tambah timestamp overlay
function kompressFoto(dataUrl, maxW=1280, quality=0.82) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ratio = Math.min(1, maxW / img.width);
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      // ── Timestamp overlay ────────────────────────────────────────
      const now = new Date();
      const pad = (n) => String(n).padStart(2,"0");
      const tgl = `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
      const jam = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      const stampText = `SIPAMDAL  ${tgl}  ${jam}`;
      const fontSize = Math.max(10, Math.floor(canvas.width / 26));
      ctx.font = `bold ${fontSize}px sans-serif`;
      ctx.textBaseline = "bottom";
      const txtW = ctx.measureText(stampText).width;
      const padX = 7, padY = 5;
      const bx = canvas.width - txtW - padX*2 - 4;
      const by = canvas.height - fontSize - padY*2 - 4;
      ctx.fillStyle = "rgba(0,0,0,0.58)";
      ctx.fillRect(bx, by, txtW + padX*2, fontSize + padY*2 + 2);
      ctx.fillStyle = "#ffff00";
      ctx.fillText(stampText, bx + padX, canvas.height - padY - 4);
      // ─────────────────────────────────────────────────────────────

      const compressed = canvas.toDataURL("image/jpeg", quality);
      // Jika masih > 100KB, kompres lagi
      if (compressed.length > 700000) {
        const canvas2 = document.createElement("canvas");
        canvas2.width = Math.floor(canvas.width * 0.75);
        canvas2.height = Math.floor(canvas.height * 0.75);
        canvas2.getContext("2d").drawImage(canvas, 0, 0, canvas2.width, canvas2.height);
        resolve(canvas2.toDataURL("image/jpeg", 0.7));
      } else {
        resolve(compressed);
      }
    };
    img.src = dataUrl;
  });
}

function getShiftEnd(now) {

  end.setDate(end.getDate() + 1);
  end.setHours(6, 0, 0, 0);

function formatCountdown(ms) {
  if (ms <= 0) return "00:00:00";
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return [h, m, s].map(v => String(v).padStart(2, "0")).join(":");
}

// ─── QR SVG ───────────────────────────────────────────────────────────────────
function QRSvg({ value, size=120 }) {
  const [svgData, setSvgData] = useState(null);
  useEffect(() => {
    const generate = () => {
      try {
        const QRC = window.qrcodegen.QrCode;
        const code = QRC.encodeText(value, QRC.Ecc.MEDIUM);
        const n = code.size;
        let d = "";
        for (let y = 0; y < n; y++) {
          for (let x = 0; x < n; x++) {
            if (code.getModule(x, y)) d += `M${x},${y}h1v1h-1z`;
          }
        }
        setSvgData({ d, n });
      } catch(e) { setSvgData(null); }
    };
    if (window.qrcodegen) { generate(); return; }
    if (window._qrLoading) { const t=setInterval(()=>{ if(window.qrcodegen){clearInterval(t);generate();} },100); return ()=>clearInterval(t); }
    window._qrLoading = true;
    const sc = document.createElement("script");
    sc.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodegen/1.8.0/qrcodegen.min.js";
    sc.onload = () => { window._qrLoading=false; generate(); };
    document.head.appendChild(sc);
  }, [value]);

  if (!svgData) return (
    <div style={{width:size,height:size,background:"#fff",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:10,color:"#999"}}>QR...</div>
    </div>
  );
  const { d, n } = svgData;
  const pad = 4;
  return (
    <svg width={size} height={size} viewBox={`${-pad} ${-pad} ${n+pad*2} ${n+pad*2}`}
      style={{background:"#fff",borderRadius:8,display:"block"}} shapeRendering="crispEdges">
      <path d={d} fill="#000"/>
    </svg>
  );
}

// ─── CAMERA QR SCANNER ────────────────────────────────────────────────────────
function CamScanner({onScan,onClose,customDecode}) {
  const vRef      = useRef(null);
  const cRef      = useRef(null);
  const stateRef  = useRef({ stream:null, raf:null, active:false, done:false });
  const cbRef     = useRef({ onScan, customDecode });
  cbRef.current   = { onScan, customDecode };

  const [status, setStatus] = useState("idle"); // idle | starting | live | hit | err
  const [hitText, setHitText] = useState("");
  const [errMsg,  setErrMsg]  = useState("");
  const [jsReady, setJsReady] = useState(!!window.jsQR);

  /* ── muat jsQR jika perlu ─────────────────────────────────── */
  useEffect(()=>{
    if(window.BarcodeDetector||window.jsQR){setJsReady(true);return;}
    const sc=document.createElement("script");
    sc.src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js";
    sc.onload=()=>{setJsReady(true);};
    document.head.appendChild(sc);
  },[]);

  /* ── hard stop: matikan stream + batalkan RAF ─────────────── */
  const hardStop = useCallback(()=>{
    const st = stateRef.current;
    st.active = false;
    if(st.raf){ cancelAnimationFrame(st.raf); st.raf=null; }
    if(st.stream){ st.stream.getTracks().forEach(t=>t.stop()); st.stream=null; }
    if(vRef.current){ vRef.current.srcObject=null; }
    setStatus(s=> s==="live"||s==="starting" ? "idle" : s);
  },[]);

  /* ── decode satu frame ────────────────────────────────────── */
  const decodeFrame = useCallback(()=>{
    const st = stateRef.current;
    if(!st.active||st.done) return;

    const v=vRef.current, c=cRef.current;
    if(!v||!c||v.readyState<2){ st.raf=requestAnimationFrame(decodeFrame); return; }

    const W=v.videoWidth||320, H=v.videoHeight||240;
    if(c.width!==W) c.width=W;
    if(c.height!==H) c.height=H;
    const ctx=c.getContext("2d",{willReadFrequently:true});
    ctx.drawImage(v,0,0,W,H);

    const tryResult=(raw)=>{
      if(!raw||st.done) return false;
      const {customDecode:cd}=cbRef.current;
      const result = cd ? cd(raw) : (decQR(raw)||ALL_AREAS.find(a=>raw.includes(a))||null);
      if(!result) return false;
      st.done=true; st.active=false;
      if(st.raf){cancelAnimationFrame(st.raf);st.raf=null;}
      // jangan matikan stream dulu — biarkan terlihat saat hit
      setHitText(result);
      setStatus("hit");
      setTimeout(()=>{
        hardStop();
        cbRef.current.onScan(result);
      },500);
      return true;
    };

    if(window.BarcodeDetector){
      new window.BarcodeDetector({formats:["qr_code"]}).detect(c)
        .then(bs=>{ if(!bs.length||!tryResult(bs[0].rawValue)) { if(st.active) st.raf=requestAnimationFrame(decodeFrame); } })
        .catch(()=>{ if(st.active) st.raf=requestAnimationFrame(decodeFrame); });
    } else if(window.jsQR){
      const img=ctx.getImageData(0,0,W,H);
      const code=window.jsQR(img.data,W,H,{inversionAttempts:"dontInvert"});
      if(!code||!tryResult(code.data)){
        if(st.active) st.raf=requestAnimationFrame(decodeFrame);
      }
    } else {
      if(st.active) st.raf=requestAnimationFrame(decodeFrame);
    }
  },[hardStop]);

  /* ── mulai kamera ─────────────────────────────────────────── */
  const start = useCallback(async()=>{
    const st=stateRef.current;
    if(st.stream||st.active) return;
    setStatus("starting"); setErrMsg(""); setHitText("");
    st.done=false; st.active=false;
    try{
      const stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}}
      });
      st.stream=stream;
      const v=vRef.current;
      if(!v){stream.getTracks().forEach(t=>t.stop());st.stream=null;return;}
      v.srcObject=stream;
      const go=()=>{
        v.play().then(()=>{
          st.active=true;
          setStatus("live");
          st.raf=requestAnimationFrame(decodeFrame);
        }).catch(()=>{});
      };
      if(v.readyState>=1) go(); else v.onloadedmetadata=go;
    }catch(e){
      setStatus("err");
      setErrMsg("Kamera tidak dapat diakses. Pastikan izin kamera diberikan.");
    }
  },[decodeFrame]);

  /* ── mount: mulai otomatis; unmount: selalu stop ─────────── */
  useEffect(()=>{
    start();
    return ()=>{ stateRef.current.done=true; hardStop(); };
  },[]);   // eslint-disable-line

  const handleManual=(val)=>{ hardStop(); cbRef.current.onScan(val); };

  const isLive   = status==="live";
  const isHit    = status==="hit";
  const isErr    = status==="err";
  const isStart  = status==="starting"||status==="idle";
  const hasBD    = !!window.BarcodeDetector;

  return (
    <div>
      {/* Viewfinder */}
      <div style={{position:"relative",background:"#000",minHeight:240,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        <video ref={vRef} style={{width:"100%",maxHeight:270,objectFit:"cover",display:(isLive||isHit)?"block":"none"}} playsInline muted/>
        <canvas ref={cRef} style={{display:"none"}}/>

        {/* Overlay + scanning line */}
        {isLive&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <div style={{width:200,height:200,position:"relative"}}>
              {/* Sudut bingkai */}
              {[["0%","0%","0","0"],["0%","auto","0","0"],["auto","0%","0","0"],["auto","auto","0","0"]].map(([t,b,r,l],i)=>(
                <div key={i} style={{position:"absolute",top:t,bottom:b,right:r,left:l,width:28,height:28,
                  borderTop:t==="0%"?"3px solid var(--accent-light)":"none",
                  borderBottom:b==="0%"?"3px solid var(--accent-light)":"none",
                  borderLeft:l==="0%"?"3px solid var(--accent-light)":"none",
                  borderRight:r==="0%"?"3px solid var(--accent-light)":"none",
                  borderRadius:i===0?"8px 0 0 0":i===1?"0 0 0 8px":i===2?"0 8px 0 0":"0 0 8px 0"
                }}/>
              ))}
              {/* Garis scan */}
              <div style={{position:"absolute",left:4,right:4,height:2,background:"var(--accent-light)",opacity:.85,animation:"sl 1.8s ease-in-out infinite"}}/>
              {/* Area gelap di luar bingkai */}
              <div style={{position:"absolute",inset:-9999,boxShadow:"inset 0 0 0 9999px rgba(0,0,0,.55)",pointerEvents:"none"}}/>
            </div>
          </div>
        )}

        {/* Hit */}
        {isHit&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,.5)"}}>
          <div style={{background:"var(--ok)",color:"#fff",borderRadius:12,padding:"14px 24px",fontWeight:800,fontSize:15,textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:6}}>✓</div>{hitText}
          </div>
        </div>}

        {/* Starting / idle */}
        {isStart&&<div style={{textAlign:"center",color:"#fff",padding:28}}>
          <IC n="cam" s={44} c="var(--accent-light)"/>
          <div style={{marginTop:10,fontSize:13}}>{status==="starting"?"Memulai kamera...":"Kamera siap"}</div>
        </div>}

        {/* Error */}
        {isErr&&<div style={{textAlign:"center",color:"#fca5a5",padding:24,fontSize:12.5}}>
          <div style={{fontSize:30,marginBottom:8}}>📵</div>{errMsg}
        </div>}
      </div>

      {/* Info + manual */}
      <div style={{padding:"12px 16px 16px"}}>
        {/* Status decoder */}
        {isLive&&!hasBD&&(
          jsReady
            ? <div style={{background:"rgba(74,222,128,.08)",border:"1px solid #86efac",borderRadius:8,padding:"7px 12px",marginBottom:10,fontSize:12,color:"var(--ok)"}}>✓ Decoder aktif — arahkan kamera ke QR code</div>
            : <div style={{background:"rgba(255,204,0,.08)",border:"1px solid #fbbf24",borderRadius:8,padding:"7px 12px",marginBottom:10,fontSize:12,color:"#ffcc00"}}>⏳ Memuat decoder QR...</div>
        )}

        {/* Pilih manual */}
        <div style={{fontSize:11,fontWeight:700,color:"var(--tx3)",marginBottom:7,textTransform:"uppercase",letterSpacing:.5}}>Pilih manual:</div>
        <div style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:5,marginBottom:12}}>
          {customDecode
            ? POS_LIST.map(pos=>(
                <button key={pos} onClick={()=>handleManual(pos)} style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:8,color:"var(--accent-light)",fontSize:13,fontWeight:600,padding:"10px 14px",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                  📍 {pos}
                </button>
              ))
            : Object.entries(PATROL_AREAS).map(([pos,areas])=>(
                <div key={pos}>
                  <div style={{fontSize:10,color:"var(--tx3)",fontWeight:700,padding:"3px 0 2px",textTransform:"uppercase",letterSpacing:.5}}>{pos}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:4}}>
                    {areas.map(a=>(
                      <button key={a} onClick={()=>handleManual(a)} style={{background:"var(--card2)",border:"1px solid var(--border)",borderRadius:7,color:"var(--accent-light)",fontSize:12,fontWeight:600,padding:"6px 10px",cursor:"pointer",fontFamily:"inherit"}}>{a}</button>
                    ))}
                  </div>
                </div>
              ))
          }
        </div>

        {/* Tombol */}
        <div style={{display:"flex",gap:8}}>
          {isLive
            ? <Btn onClick={hardStop} color="var(--tx4)" variant="outline">⏹ Stop Kamera</Btn>
            : <Btn onClick={start} color="var(--accent)"><IC n="cam" s={13}/> Aktifkan</Btn>
          }
          <Btn onClick={()=>{hardStop();onClose();}} color="var(--tx4)" variant="outline">Tutup</Btn>
        </div>
      </div>
      <style>{`@keyframes sl{0%,100%{transform:translateY(-80px)}50%{transform:translateY(80px)}}`}</style>
    </div>
  );
}

// ─── PAGE HEADER ─────────────────────────────────────────────────────────────
function PH({title,sub,action}) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:10}}>
      <div><h2 style={{margin:0,fontSize:18,fontWeight:900,color:"var(--tx2)"}}>{title}</h2>{sub&&<p style={{color:"var(--tx3)",fontSize:12,margin:"4px 0 0"}}>{sub}</p>}</div>
      {action}
    </div>
  );
}

// ─── READ ONLY BANNER ─────────────────────────────────────────────────────────
function ReadOnlyBanner({reguHari}) {
  return (
    <div style={{background:"rgba(229,62,62,.07)",border:"1.5px solid rgba(229,62,62,.4)",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:18}}>🔒</span>
      <div>
        <div style={{fontSize:12.5,fontWeight:800,color:"#e53e3e"}}>Mode Baca Saja</div>
        <div style={{fontSize:11,color:"var(--tx3)"}}>Hanya Regu {reguHari} (piket hari ini) yang dapat mengisi data.</div>

}
function DashTab({now,shift,reguHari,posAssign,incidents,packages,guests,patrols,standJaga,mutations,posRollingLog,liburData,setLiburData,instruksi,currentUser,setTab,canEdit,isAdmin}) {
  const pending=packages.filter(p=>p.status==="Belum Diambil").length;
  const staying=guests.filter(g=>g.status==="Masih Ada").length;
  const todP=patrols.filter(p=>new Date(p.ts).toDateString()===now.toDateString()).length;
  const actI=incidents.filter(i=>i.status!=="Selesai").length;
  const todS=standJaga.filter(s=>new Date(s.ts).toDateString()===now.toDateString());

  // ── Hitung mundur piket selesai ──

  // ── Alert: pos kosong ──
  const emptyPos = POS_LIST.filter(p => !(posAssign[p]?.length));
  const posKosong = emptyPos.length > 0;

  // ── Alert: patroli – cek apakah sudah patroli dalam 1 jam terakhir ──
  const lastPatrol = patrols.filter(p=>new Date(p.ts).toDateString()===now.toDateString())
    .sort((a,b)=>b.ts-a.ts)[0];
  const msSincePatrol = lastPatrol ? now - lastPatrol.ts : Infinity;
  const patrolOverdue = msSincePatrol > 3600000; // > 1 jam

  // ── Alert: rolling pos – cek apakah sudah rolling dalam 2 jam terakhir ──
  // Rolling pos dicatat di posRolling (dipisah dari penempatan biasa)
  const lastRolling = (posRollingLog||[]).filter(r=>new Date(r.ts).toDateString()===now.toDateString())
    .sort((a,b)=>b.ts-a.ts)[0];
  const msSinceRolling = lastRolling ? now - lastRolling.ts : Infinity;
  const rollingOverdue = msSinceRolling > 7200000; // > 2 jam

  // ── Alert: belum ada mutasi/serah terima ──
  const todayMut = mutations.filter(m => new Date(m.ts).toDateString() === now.toDateString());
  const noMutasi = todayMut.length === 0;

  const alerts = [
    ...(posKosong    ? [{icon:"🔴", msg:`POS BELUM TERISI: ${emptyPos.join(", ")}`, col:"#e53e3e", bg:"rgba(229,62,62,.1)", tab:"pos"}] : []),
    ...(patrolOverdue? [{icon:"⚡", msg: todP===0 ? "Belum ada patroli hari ini" : `Patroli terakhir ${Math.floor(msSincePatrol/60000)} menit lalu — saatnya patroli!`, col:"#ff9900", bg:"rgba(255,153,0,.09)", tab:"patrol"}] : []),
    ...(rollingOverdue&&canEdit? [{icon:"🔄", msg:`Sudah ${msSinceRolling===Infinity?"--":Math.floor(msSinceRolling/60000)} menit belum rolling pos`, col:"var(--accent)", bg:"rgba(91,155,213,.09)", tab:"pos"}] : []),
    ...(noMutasi     ? [{icon:"📋", msg:"Belum ada laporan serah terima shift hari ini", col:"var(--tx2)", bg:"var(--card)", tab:"mutation"}] : []),
  ];

  const cards=[
    {l:"Paket Menunggu",v:pending,col:"#ff9900",bg:"rgba(255,153,0,.07)",icon:"pkg",t:"package"},
    {l:"Tamu Menginap",v:staying,col:"#8b8bff",bg:"rgba(139,139,255,.08)",icon:"ppl",t:"guest"},
    {l:"Patroli Hari Ini",v:todP,col:"var(--ok)",bg:"var(--green-card)",icon:"qr",t:"patrol"},
    {l:"Insiden Aktif",v:actI,col:"#e53e3e",bg:"rgba(229,62,62,.09)",icon:"alert",t:"incident"},
  ];
  return (
    <div>
      {/* Hero card anggota: Status Operasional simpel */}
      {!isAdmin && (()=>{
        const myPos = POS_LIST.find(p=>(posAssign[p]||[]).includes(currentUser?.name));
        const statusColor = actI > 0 ? "#ff4444" : posKosong ? "#ffd700" : "var(--accent-light)";
        const statusText  = actI > 0 ? "ADA INSIDEN AKTIF" : posKosong ? "POS BELUM TERISI" : "KONDISI NORMAL";
        const posKosongCount = POS_LIST.filter(p=>!(posAssign[p]?.length>0)).length;
        return (
          <div style={{background:"var(--status-card-bg)",border:`2px solid ${statusColor}55`,borderRadius:14,padding:"16px",marginBottom:14,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-30,right:-30,width:100,height:100,background:statusColor,borderRadius:"50%",opacity:.06,pointerEvents:"none"}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div>
                <div style={{fontSize:9.5,letterSpacing:2.5,color:"var(--tx2)",fontWeight:700,marginBottom:3,textTransform:"uppercase"}}>Status Operasional</div>
                <div style={{fontSize:15,fontWeight:900,color:statusColor,letterSpacing:1}}>{statusText}</div>
              </div>
              <div style={{width:44,height:44,borderRadius:"50%",background:statusColor+"18",border:`2px solid ${statusColor}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>
                {actI > 0 ? "🚨" : posKosong ? "⚠️" : "✅"}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[
                {label:"Insiden Aktif", val: actI, col: actI>0?"#e53e3e":"var(--accent-light)", icon:"⚠️", tab:"incident"},
                {label:"Paket Tunggu",  val: pending, col: pending>0?"#ff9900":"var(--accent-light)", icon:"📦", tab:"package"},
                {label:"Pos Kosong",   val: posKosongCount, col: posKosong?"#e53e3e":"var(--accent-light)", icon:"🏠", tab:"pos"},
              ].map(item=>(
                <div key={item.label} onClick={()=>setTab(item.tab)} style={{background:"var(--stat-inner)",border:`1px solid ${item.col}30`,borderRadius:10,padding:"10px 6px",textAlign:"center",cursor:"pointer", className: item.val > 0 && item.label==="Pos Kosong" ? "pos-empty-card" : ""}}>
                  <div className="stat-number" style={{color:item.col,fontSize:28}}>{item.val}</div>
                  <div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:.6,color:"var(--tx2)",marginTop:4}}>{item.label}</div>
                </div>
              ))}
            </div>
            {myPos && (
              <div style={{marginTop:10,padding:"7px 10px",background:"var(--green-card)",borderRadius:8,border:"1px solid var(--dark-border2)",display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:13}}>📍</span>
                <span style={{fontSize:11.5,color:"var(--accent-light)",fontWeight:700}}>Pos kamu: {myPos}</span>
              </div>
            )}
          </div>
        );
      })()}
      {/* Hero card admin: Regu + Status Pos */}
      {isAdmin && (
      <div style={{background:"var(--admin-card-bg)",border:`1.5px solid ${posKosong?"#ff3333":"var(--border)"}`,borderRadius:12,padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
          <div style={{flex:"0 0 auto"}}>
            <div style={{fontSize:9,letterSpacing:3,color:"var(--accent)",marginBottom:3}}>JADWAL JAGA HARI INI</div>
            <div style={{fontSize:22,fontWeight:900,color:"var(--accent-light)",letterSpacing:2,textShadow:"none"}}>{fmtDate(now).split(",")[0].toUpperCase()}, REGU {reguHari}</div>
            <div style={{fontSize:10,color:"var(--accent)",marginTop:3,lineHeight:1.6}}>{REGU[reguHari]?.join(" · ")}</div>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:9,letterSpacing:2,color:posKosong?"#e53e3e":"var(--accent)",marginBottom:5}}>{posKosong?"⚠ POS KOSONG":"STATUS POS"}</div>
            {POS_LIST.map(p=>{
              const angg = posAssign[p];
              const ok = angg?.length > 0;
              return (
                <div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,gap:4}}>
                  <span style={{fontSize:9,color:"var(--tx3)",whiteSpace:"nowrap"}}>{p.replace("Pos ","").replace("Gedung ","Gdg ")}</span>
                  <span style={{fontSize:9,fontWeight:700,color:ok?"var(--ok)":"#e53e3e",flexShrink:0,textAlign:"right"}}>{ok ? angg[0]+(angg.length>1?` +${angg.length-1}`:"") : "⚠ KOSONG"}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
      )}

      {/* Alert notifikasi */}
      {alerts.length > 0 && (
        <div style={{marginBottom:14}}>
          {alerts.map((a,i)=>{
            const isCritical = a.col==="#e53e3e";
            const isWarn = a.col==="#ff9900";
            const iconClass = isCritical ? "icon-glow-red" : isWarn ? "icon-blink-orange" : "";
            return (
            <div key={i} onClick={()=>setTab(a.tab)} className={isCritical?"alert-critical":""} style={{background:a.bg,border:`1.5px solid ${a.col}40`,borderLeft:`3px solid ${a.col}`,borderRadius:10,padding:"10px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
              <span className={iconClass} style={{fontSize:18,flexShrink:0}}>{a.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12.5,fontWeight:800,color:a.col}}>{a.msg}</div>
                <div style={{fontSize:10.5,color:"var(--tx2)"}}>Tap untuk buka →</div>
              </div>
            </div>
            );
          })}
        </div>
      )}
      {/* Libur tambahan hari ini — tap untuk setting */}
      {(()=>{
        const todayKey = now.toISOString().slice(0,10);
        const liburHariIni = liburData?.[todayKey] || [];
        if(!isHariLibur(now) && liburHariIni.length===0) return null;
        const jenis = HARI_MERAH.has(todayKey)?"📅 Libur Nasional / Hari Merah":now.getDay()===0?"📅 Hari Minggu":"📅 Hari Sabtu";
        return (
          <LiburBanner
            jenis={jenis}
            liburHariIni={liburHariIni}
            todayKey={todayKey}
            liburData={liburData}
            setLiburData={setLiburData}
            isAdmin={isAdmin}
          />
        );
      })()}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {cards.map(c=>{
          const isCritical = c.t==="incident" && c.v > 0;
          const isWarn = (c.t==="package"||c.t==="guest") && c.v > 0;
          return (
          <div key={c.l} onClick={()=>setTab(c.t)} style={{background:"var(--card-solid)",border:`1.5px solid ${c.col}30`,borderRadius:12,padding:"14px 16px",cursor:"pointer",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,right:0,width:60,height:60,background:c.col,opacity:.05,borderRadius:"0 12px 0 60px",pointerEvents:"none"}}/>
            <span className={isCritical?"icon-glow-red":isWarn?"icon-glow-orange":""}><IC n={c.icon} s={14} c={c.col}/></span>
            <div className={`stat-number${isCritical?" stat-critical":""}`} style={{color:c.col,marginTop:8}}>{c.v}</div>
            <div className="stat-label">{c.l}</div>
          </div>
          );
        })}
      </div>
      {/* Aksi Cepat — digantikan oleh FAB */}

      {/* Status Patroli per Pos */}
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:9,letterSpacing:3,color:"var(--accent)"}}>▶ STATUS PATROLI HARI INI</div>
          <button onClick={()=>setTab("patrol")} style={{fontSize:9,color:"var(--accent)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>LIHAT SEMUA →</button>
        </div>
        {POS_LIST.map(p=>{
          const posPatrols = patrols.filter(pt=>pt.pos===p && new Date(pt.ts).toDateString()===now.toDateString());
          const last = posPatrols.sort((a,b)=>b.ts-a.ts)[0];
          const minsAgo = last ? Math.floor((now - last.ts)/60000) : null;
          const overdue = !last || minsAgo > 60;
          return (
            <div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"var(--tx)"}}>{p}</div>
                <div style={{fontSize:9,color:"var(--tx2)"}}>{posAssign[p]?.join(", ")||"—"}</div>
              </div>
              <div style={{textAlign:"right"}}>
                {last
                  ? <span style={{fontSize:10,fontWeight:700,color:overdue?"#ffcc00":"var(--accent-light)"}}>{minsAgo < 60 ? `${minsAgo} mnt lalu` : `${Math.floor(minsAgo/60)}j ${minsAgo%60}m lalu`}</span>
                  : <span style={{fontSize:10,fontWeight:700,color:"#e53e3e"}}><span className="icon-glow-red">⚠</span> Belum patroli</span>
                }
                <div style={{fontSize:9,color:"var(--tx3)"}}>{last?`${posPatrols.length}x hari ini`:""}</div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Widget Instruksi di Dashboard */}
      {(()=>{
        const PRI_COL2 = {Penting:"#dc2626", Normal:"var(--accent)", Info:"var(--ok)"};
        const PRI_BG2  = {Penting:"rgba(220,38,38,.08)", Normal:"var(--green-card)", Info:"var(--green-card)"};
        const myRegu = currentUser?.regu;
        const visibel = (instruksi||[]).filter(i=>i.aktif && (i.targetRegu==="Semua"||String(i.targetRegu)===String(myRegu)));
        if(visibel.length===0) return null;
        return (
          <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden",marginBottom:4}}>
            <div style={{background:"linear-gradient(90deg,#dc2626,#ef4444)",padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:12,fontWeight:800,color:"#fff"}}>🚨 Instruksi Pimpinan ({visibel.length})</div>
              <button onClick={()=>setTab("instruksi")} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:6,padding:"3px 9px",fontSize:10.5,color:"#fff",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Lihat Semua →</button>
            </div>
            {visibel.slice(0,3).map(ins=>(
              <div key={ins.id} style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",borderLeft:`3px solid ${PRI_COL2[ins.prioritas]||"var(--accent)"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:3,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,fontWeight:800,color:PRI_COL2[ins.prioritas]||"var(--accent)",background:PRI_BG2[ins.prioritas]||"var(--green-card)",borderRadius:4,padding:"1px 6px"}}>{ins.prioritas==="Penting"?"🚨":ins.prioritas==="Info"?"ℹ️":"📋"} {ins.prioritas}</span>
                      <span style={{fontSize:10,color:"var(--tx3)"}}>{fmtDT(ins.ts)}</span>
                    </div>
                    <div style={{fontSize:13,fontWeight:800,color:"var(--tx2)"}}>{ins.judul}</div>
                    <div style={{fontSize:11.5,color:"var(--tx)",marginTop:2,lineHeight:1.5}}>{ins.isi.slice(0,120)}{ins.isi.length>120?"…":""}</div>
                  </div>
                  {ins.selesai?(
                    <span style={{flexShrink:0,background:"var(--green-card)",border:"1px solid #86efac",borderRadius:6,padding:"3px 8px",fontSize:10,color:"var(--ok)",fontWeight:700}}>✓ Selesai</span>
                  ):(
                    <span style={{flexShrink:0,background:"rgba(255,50,50,.1)",border:"1px solid #fca5a5",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#dc2626",fontWeight:700}}>⏳ Aktif</span>
                  )}
                </div>
              </div>
            ))}
            {visibel.length>3&&<div style={{padding:"8px 14px",fontSize:11,color:"var(--tx3)",textAlign:"center"}}>+{visibel.length-3} instruksi lainnya</div>}
          </div>
        );
      })()}
    </div>
  );
}

// ─── JADWAL PIKET ─────────────────────────────────────────────────────────────
function JadwalTab({now,liburData,isAdmin,setTab}) {
  const days=[]; for(let i=-1;i<=13;i++){const d=new Date(now);d.setDate(d.getDate()+i);days.push(d);}
  const RC={1:"var(--accent)",2:"var(--ok)",3:"#a78bfa"};
  const RB={1:"var(--pill-active)",2:"var(--green-card)",3:"rgba(167,139,250,.1)"};
  const rToday=getReguHari(now);
  return (
    <div>
      <PH title="Jadwal Piket Otomatis" sub="14 Apr=Regu 2 · 15 Apr=Regu 3 · berputar"/>
      <div style={{background:`linear-gradient(135deg,${RC[rToday]},${RC[rToday]}cc)`,borderRadius:14,padding:"16px 18px",marginBottom:14,color:"#fff"}}>
        <div style={{fontSize:11,opacity:.75}}>HARI INI — {fmtDate(now)}</div>
        <div style={{fontSize:26,fontWeight:900,marginTop:2}}>REGU {rToday}</div>
        <div style={{marginTop:7,display:"flex",flexWrap:"wrap",gap:6}}>
          {REGU[rToday].map(m=><span key={m} style={{background:"rgba(255,255,255,.23)",borderRadius:7,padding:"3px 10px",fontSize:12,fontWeight:700}}>{m}</span>)}
        </div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {[1,2,3].map(r=>(
          <div key={r} style={{background:RB[r],border:`1.5px solid ${RC[r]}30`,borderRadius:9,padding:"6px 10px",flex:1}}>
            <div style={{fontSize:11,fontWeight:800,color:RC[r]}}>REGU {r}</div>
            <div style={{fontSize:10,color:"var(--tx3)",marginTop:2}}>{REGU[r].join(", ")}</div>
          </div>
        ))}
      </div>
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 70px 1.5fr",background:"var(--accent)",padding:"8px 12px"}}>
          {["Tanggal","Regu","Anggota"].map(h=><div key={h} style={{fontSize:10,fontWeight:800,color:"#fff",textTransform:"uppercase"}}>{h}</div>)}
        </div>
        {days.map((d,i)=>{
          const r=getReguHari(d);
          const isT=d.toDateString()===now.toDateString();
          const libur=isHariLibur(d);
          const dKey=d.toISOString().slice(0,10);
          const liburTambahan=(liburData&&liburData[dKey])||[];
          return (
            <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 70px 1.5fr",padding:"8px 12px",borderBottom:"1px solid var(--border)",background:libur?"rgba(255,200,0,.12)":isT?RB[r]:i%2===0?"var(--card-solid)":"var(--card-solid)",alignItems:"center"}}>
              <div>
                <div style={{fontSize:12,fontWeight:isT?800:600,color:libur?"#ffcc00":isT?RC[r]:"var(--tx)"}}>
                  {d.toLocaleDateString("id-ID",{day:"numeric",month:"short"})}
                  {isT&&<span style={{marginLeft:5,fontSize:9,background:RC[r],color:"#fff",borderRadius:4,padding:"1px 5px"}}>HARI INI</span>}
                  {libur&&<span style={{marginLeft:5,fontSize:9,background:"var(--y)",color:"#1a1a1a",borderRadius:4,padding:"1px 5px"}}>LIBUR</span>}
                </div>
                <div style={{fontSize:10,color:libur?"var(--tx3)":"var(--tx4)"}}>{d.toLocaleDateString("id-ID",{weekday:"long"})}</div>
                {liburTambahan.length>0&&<div style={{fontSize:9,color:"#ffcc00",marginTop:1}}>🏖 Libur: {liburTambahan.join(", ")}</div>}
              </div>
              <Bdg text={`Regu ${r}`} color={libur?"#ffcc00":RC[r]}/>
              <div style={{fontSize:11,color:"var(--tx)"}}>{REGU[r].join(", ")}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// QR codes for each pos check-in
const POS_QR_PREFIX = "BBPKA2-POS-";
const encPosQR = (pos) => POS_QR_PREFIX + pos.replace(/ /g,"_");
const decPosQR = (v) => v && v.startsWith(POS_QR_PREFIX) ? v.replace(POS_QR_PREFIX,"").replace(/_/g," ") : null;

// ─── POS ──────────────────────────────────────────────────────────────────────
function PosTab({reguHari,posAssign,setPosAssign,posRollingLog,setPosRollingLog,toast,canEdit,isAdmin,currentUser}) {
  const members=REGU[reguHari]||[];
  const [mode,setMode]=useState("assign");   // "assign" | "rolling"
  const [scanOpen,setScanOpen]=useState(false);
  const [confirm,setConfirm]=useState(null);
  const [selectedMember,setSelectedMember]=useState("");
  const [rollingFrom,setRollingFrom]=useState("");
  const [rollingTo,setRollingTo]=useState("");
  const [viewPosQR,setViewPosQR]=useState(null);

  // ── Tempatkan anggota ke pos (scan QR / manual) ──
  const onScanPos=(raw)=>{
    setScanOpen(false);
    const pos = decPosQR(raw) || POS_LIST.find(p=>raw.includes(p));
    if(!pos||!POS_LIST.includes(pos)){toast("QR tidak dikenali!",false);return;}
    if(mode==="rolling"){
      setRollingTo(pos); return;
    }
    const asgn=posAssign[pos]||[]; const cap=POS_CAP[pos]||1;
    if(asgn.length>=cap){toast(`${pos} sudah penuh!`,false);return;}
    // Langsung assign nama yang sedang login
    const myName = currentUser?.name;
    if(!myName){toast("Tidak ada pengguna login!",false);return;}
    if(asgn.includes(myName)){toast(`${myName} sudah ada di ${pos}!`,false);return;}
    // Cek apakah sudah di pos lain, lepas dulu
    const updated={...posAssign};
    POS_LIST.forEach(p=>{ if(updated[p]) updated[p]=updated[p].filter(m=>m!==myName); });
    updated[pos]=[...(updated[pos]||[]),myName];
    setPosAssign(updated);
    toast(`✓ ${myName} → ${pos}!`);
  };

  const doAssign=()=>{
    const nameToAssign = isAdmin ? selectedMember : (currentUser?.name||"");
    if(!nameToAssign){toast(isAdmin?"Pilih anggota!":"Tidak ada pengguna login!",false);return;}
    const asgn=posAssign[confirm.pos]||[]; const cap=POS_CAP[confirm.pos]||1;
    if(asgn.includes(nameToAssign)){toast(`${nameToAssign} sudah ada di ${confirm.pos}!`,false);return;}
    if(asgn.length>=cap){toast(`${confirm.pos} sudah penuh!`,false);return;}
    const updated={...posAssign};
    // Lepas dari pos lain dulu
    POS_LIST.forEach(p=>{ if(updated[p]) updated[p]=updated[p].filter(m=>m!==nameToAssign); });
    updated[confirm.pos]=[...(updated[confirm.pos]||[]),nameToAssign];
    setPosAssign(updated); setConfirm(null); toast(`✓ ${nameToAssign} → ${confirm.pos}!`);
  };

  // ── Rolling pos: tukar posisi dua anggota ──
  const doRolling=()=>{
    if(!rollingFrom||!rollingTo){toast("Pilih anggota & pos tujuan!",false);return;}
    if(rollingFrom===rollingTo){toast("Pilih anggota yang berbeda!",false);return;}
    // Temukan pos masing-masing anggota
    const fromPos = Object.entries(posAssign).find(([,ms])=>ms?.includes(rollingFrom))?.[0];
    const toPos   = Object.entries(posAssign).find(([,ms])=>ms?.includes(rollingTo))?.[0];
    if(!fromPos){toast(`${rollingFrom} belum ditempatkan di pos mana pun!`,false);return;}
    if(!toPos){toast(`${rollingTo} belum ditempatkan di pos mana pun!`,false);return;}
    if(fromPos===toPos){toast("Kedua anggota sudah ada di pos yang sama!",false);return;}
    // Tukar posisi
    const updated={...posAssign};
    updated[fromPos]=[...(updated[fromPos]||[]).filter(x=>x!==rollingFrom),rollingTo];
    updated[toPos]=[...(updated[toPos]||[]).filter(x=>x!==rollingTo),rollingFrom];
    setPosAssign(updated);
    const log={id:Date.now(),ts:Date.now(),member:`${rollingFrom} ⇄ ${rollingTo}`,fromPos,toPos};
    setPosRollingLog([...(posRollingLog||[]),log]);
    toast(`🔄 ${rollingFrom} (${fromPos}) ⇄ ${rollingTo} (${toPos})`);
    setRollingFrom(""); setRollingTo("");
  };

  const removeFromPos=(pos,m)=>{
    if(!canEdit) return;
    const updated={...posAssign,[pos]:(posAssign[pos]||[]).filter(x=>x!==m)};
    setPosAssign(updated); toast(`${m} dilepas dari ${pos}`);
  };

  // Log rolling hari ini
  const todayRolling=(posRollingLog||[]).filter(r=>new Date(r.ts).toDateString()===new Date().toDateString());
  const allAssigned=Object.values(posAssign).flat();

  return (
    <div>
      <PH title="Penempatan Pos" sub={`Regu ${reguHari}: ${members.join(", ")}`} action={isAdmin&&(
        <div style={{display:"flex",gap:6}}>
          <Btn onClick={()=>setScanOpen(true)} color="var(--accent)" size="sm"><IC n="qr" s={12}/> QR</Btn>
        </div>
      )}/>
      {!canEdit&&<ReadOnlyBanner reguHari={reguHari}/>}

      {/* Tab Mode */}
      {canEdit&&<div style={{display:"flex",gap:0,marginBottom:14,background:"var(--card-solid)",borderRadius:10,padding:3}}>
        {[["assign","📍 Penempatan"],["rolling","🔄 Rolling Pos"]].map(([v,l])=>(
          <button key={v} onClick={()=>setMode(v)} style={{flex:1,padding:"8px 0",fontSize:12.5,fontWeight:700,borderRadius:8,border:"none",cursor:"pointer",background:mode===v?"var(--card-solid)":"transparent",color:mode===v?"var(--accent)":"var(--tx4)",boxShadow:mode===v?"0 1px 6px rgba(0,0,0,.08)":"none",fontFamily:"inherit",transition:"all .15s"}}>
            {l}
          </button>
        ))}
      </div>}

      {/* ── MODE: PENEMPATAN ── */}
      {mode==="assign"&&(
        <>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {POS_LIST.map(pos=>{
              const col=POS_COL[pos], cap=POS_CAP[pos], asgn=posAssign[pos]||[];
              const isFull=asgn.length>=cap;
              const isEmpty=asgn.length===0;
              return (
                <div key={pos} className={isEmpty&&canEdit?"pos-empty-card":""} style={{background:"var(--card-solid)",border:`1.5px solid ${isEmpty&&canEdit?"#e53e3e":isFull?col+"60":col+"28"}`,borderRadius:12,overflow:"hidden",transition:"box-shadow .3s"}}>
                  <button onClick={()=>{
                    if(!canEdit) return;
                    if(isAdmin){setConfirm({pos,type:"assign"});setSelectedMember("");}
                    else { const myName=currentUser?.name; if(!myName) return; if((posAssign[pos]||[]).includes(myName)){toast(`${myName} sudah di ${pos}!`,false);return;} const upd={...posAssign}; POS_LIST.forEach(p2=>{if(upd[p2])upd[p2]=upd[p2].filter(m=>m!==myName);}); upd[pos]=[...(upd[pos]||[]),myName]; setPosAssign(upd); toast(`✓ ${myName} → ${pos}!`); }
                  }} disabled={!canEdit||isFull} style={{width:"100%",background:isFull?col:isEmpty&&canEdit?"#e53e3e":col+"cc",padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",border:"none",cursor:canEdit&&!isFull?"pointer":"default",fontFamily:"inherit",transition:"opacity .15s"}}>
                    <span style={{fontSize:12.5,fontWeight:800,color:"#fff",lineHeight:1.3,textAlign:"left"}}>{pos}</span>
                    <span style={{background:"rgba(255,255,255,.25)",color:"#fff",borderRadius:5,padding:"3px 8px",fontSize:11,whiteSpace:"nowrap"}}>{asgn.length}/{cap}</span>
                  </button>
                  <div style={{padding:10}}>
                    {asgn.length===0&&<div style={{fontSize:11,color:canEdit?"#e53e3e":"var(--tx3)",textAlign:"center",padding:"8px 0",fontWeight:canEdit?700:400}}>
                      {canEdit ? "⚠ Tap nama di atas untuk mengisi" : "Belum ada"}
                    </div>}
                    {asgn.map(m=>(
                      <div key={m} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid var(--border)"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <IC n="ok" s={12} c={col}/>
                          <span style={{fontSize:12.5,fontWeight:700,color:"var(--tx2)"}}>{m}</span>
                        </div>
                        {canEdit&&<button onClick={()=>removeFromPos(pos,m)} style={{background:"none",border:"none",color:"#ff3333",cursor:"pointer",fontSize:14,padding:2}}>✕</button>}
                      </div>
                    ))}

                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* ── MODE: ROLLING POS ── */}
      {mode==="rolling"&&canEdit&&(
        <div>
          <div style={{background:"rgba(0,170,255,.1)",border:"1.5px solid #67e8f9",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:800,color:"var(--accent)",marginBottom:4}}>🔄 Tukar Posisi (Rolling)</div>
            <div style={{fontSize:11,color:"var(--tx3)",marginBottom:12}}>Pilih dua anggota yang akan saling bertukar pos.</div>
            <Inp label="Anggota A (yang dipindah)" value={rollingFrom} onChange={e=>setRollingFrom(e.target.value)} as="select">
              <option value="">— Pilih Anggota A —</option>
              {members.map(m=>{
                const curPos=Object.entries(posAssign).find(([,ms])=>ms?.includes(m))?.[0]||"Belum ditempatkan";
                return <option key={m} value={m}>{m} ({curPos})</option>;
              })}
            </Inp>
            {/* Preview panah tukar */}
            {rollingFrom&&rollingTo&&(()=>{
              const posA=Object.entries(posAssign).find(([,ms])=>ms?.includes(rollingFrom))?.[0]||"—";
              const posB=Object.entries(posAssign).find(([,ms])=>ms?.includes(rollingTo))?.[0]||"—";
              return (
                <div style={{textAlign:"center",padding:"6px 0",fontSize:12,color:"var(--accent)",fontWeight:700}}>
                  {rollingFrom} [{posA}] ⇄ {rollingTo} [{posB}]
                </div>
              );
            })()}
            <Inp label="Anggota B (ditukar dengan)" value={rollingTo} onChange={e=>setRollingTo(e.target.value)} as="select">
              <option value="">— Pilih Anggota B —</option>
              {members.filter(m=>m!==rollingFrom).map(m=>{
                const curPos=Object.entries(posAssign).find(([,ms])=>ms?.includes(m))?.[0]||"Belum ditempatkan";
                return <option key={m} value={m}>{m} ({curPos})</option>;
              })}
            </Inp>
            <div style={{display:"flex",gap:8,marginTop:4}}>
              <Btn onClick={doRolling} color="var(--accent)" size="lg" full><IC n="rot" s={14}/> Konfirmasi Rolling</Btn>
              {isAdmin&&<Btn onClick={()=>setScanOpen(true)} color="var(--tx4)" variant="outline">Scan QR</Btn>}
            </div>
          </div>

          {/* Log rolling hari ini */}
          {todayRolling.length>0&&(
            <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontSize:12,fontWeight:800,color:"var(--accent)",marginBottom:8}}>Log Rolling Hari Ini ({todayRolling.length})</div>
              {[...todayRolling].reverse().map(r=>(
                <div key={r.id} style={{padding:"6px 0",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:13}}>🔄</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12.5,fontWeight:700,color:"var(--tx2)"}}>{r.member}</div>
                    <div style={{fontSize:10.5,color:"var(--tx3)"}}>{fmtT(r.ts)}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
          {todayRolling.length===0&&<div style={{color:"var(--tx3)",fontSize:12,textAlign:"center",padding:"20px 0"}}>Belum ada rolling hari ini</div>}
        </div>
      )}

      {/* Scanner Modal */}
      <Modal open={scanOpen} onClose={()=>setScanOpen(false)} title="Scan / Pilih Pos" noPad>
        <CamScanner
          onScan={onScanPos}
          onClose={()=>setScanOpen(false)}
          customAreas={POS_LIST}
          customDecode={raw=>{ const p=decPosQR(raw)||POS_LIST.find(p=>raw.includes(p)); return POS_LIST.includes(p)?p:null; }}
        />
      </Modal>

      {/* Confirm assign */}
      <Modal open={!!confirm} onClose={()=>setConfirm(null)} title={`Tempatkan ke ${confirm?.pos}`}>
        {confirm&&(
          <div>
            <div style={{background:POS_COL[confirm.pos]+"14",borderRadius:10,padding:"12px",marginBottom:14,textAlign:"center",border:`1.5px solid ${POS_COL[confirm.pos]}30`}}>
              <div style={{fontSize:11,color:"var(--tx3)"}}>Pos Tujuan</div>
              <div style={{fontSize:18,fontWeight:900,color:POS_COL[confirm.pos]}}>{confirm.pos}</div>
              <div style={{fontSize:11,color:"var(--tx3)",marginTop:2}}>Kapasitas: {POS_CAP[confirm.pos]} · Terisi: {(posAssign[confirm.pos]||[]).length}</div>
            </div>
            {isAdmin ? (
              <Inp label="Pilih Anggota" value={selectedMember} onChange={e=>setSelectedMember(e.target.value)} as="select">
                <option value="">— Pilih Anggota —</option>
                {members.filter(m=>!allAssigned.includes(m)).map(m=><option key={m}>{m}</option>)}
              </Inp>
            ) : (
              <div style={{background:"var(--pill-active)",border:"1px solid var(--accent)",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:18}}>👤</span>
                <div>
                  <div style={{fontSize:11,color:"var(--tx3)"}}>Ditempatkan sebagai</div>
                  <div style={{fontSize:14,fontWeight:700,color:"var(--accent-light)"}}>{currentUser?.name}</div>
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:8}}><Btn onClick={doAssign} color={POS_COL[confirm.pos]} size="lg" full><IC n="ok" s={14}/> Tempatkan</Btn><Btn onClick={()=>setConfirm(null)} color="var(--tx4)" variant="outline">Batal</Btn></div>
          </div>
        )}
      </Modal>

      {/* QR Pos — hanya admin */}
      {isAdmin&&<Modal open={!!viewPosQR} onClose={()=>setViewPosQR(null)} title={`QR Pos: ${viewPosQR}`}>
        {viewPosQR&&(
          <div style={{textAlign:"center"}}>
            <div style={{background:"var(--card-solid)",border:`2px solid ${POS_COL[viewPosQR]}`,borderRadius:14,padding:18,display:"inline-block",marginBottom:10}}>
              <QRSvg value={encPosQR(viewPosQR)} size={190}/>
              <div style={{marginTop:8,fontSize:13,fontWeight:800,color:"var(--tx2)"}}>{viewPosQR}</div>
              <div style={{fontSize:10,color:"var(--tx3)"}}>BBPKA II Jatinangor — Scan untuk penempatan</div>
            </div>
            <div style={{color:"var(--tx3)",fontSize:12,marginBottom:12}}>Screenshot & cetak, tempel di {viewPosQR}</div>
            <Btn onClick={()=>setViewPosQR(null)} color="var(--accent)">Tutup</Btn>
          </div>
        )}
      </Modal>}
    </div>
  );
}

// ─── STAND JAGA ───────────────────────────────────────────────────────────────
function StandTab({standJaga,setStandJaga,posAssign,reguHari,toast,canEdit,currentUser,isAdmin=false}) {
  const [scanOpen,setScanOpen]=useState(false);
  const [confirm,setConfirm]=useState(null);
  const [officer,setOfficer]=useState("");
  const [notes,setNotes]=useState("");
  const members=REGU[reguHari]||[];
  const onScan=(area)=>{ setScanOpen(false); const pos=getPos(area); setConfirm({area,pos:pos||"—"}); setOfficer(currentUser?.name||posAssign[pos]?.join(", ")||""); setNotes(""); };
  const doConfirm=()=>{ setStandJaga([...standJaga,{id:Date.now(),ts:Date.now(),area:confirm.area,pos:confirm.pos,officer:officer||"—",notes}]); setConfirm(null); toast(`Stand jaga ${confirm.area} dicatat!`); };
  const todS=standJaga.filter(s=>new Date(s.ts).toDateString()===new Date().toDateString());
  return (
    <div>
      <PH title="Stand Jaga" sub="Scan QR untuk mencatat posisi stand jaga" action={canEdit&&<Btn onClick={()=>setScanOpen(true)} color="var(--accent)"><IC n="cam" s={13}/> Scan QR</Btn>}/>
      {!canEdit&&<ReadOnlyBanner reguHari={reguHari}/>}
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
        <div style={{fontSize:12,fontWeight:800,color:"var(--accent)",marginBottom:10}}>Log Hari Ini ({todS.length})</div>
        {todS.length===0&&<div style={{fontSize:12,color:"var(--tx3)"}}>Belum ada stand jaga</div>}
        {[...todS].reverse().map(s=>(
          <div key={s.id} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid var(--border)",alignItems:"center"}}>
            <div style={{width:34,height:34,background:"rgba(0,120,212,.1)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IC n="shield" s={16} c="var(--accent-light)"/></div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:"var(--tx2)"}}>{s.area}</div>
              <div style={{fontSize:11,color:"var(--tx3)"}}>{s.pos} · {s.officer}</div>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:"var(--accent)"}}>{fmtT(s.ts)}</div>
          </div>
        ))}
      </div>
      <Modal open={scanOpen} onClose={()=>setScanOpen(false)} title="Scan QR — Stand Jaga" noPad><CamScanner onScan={onScan} onClose={()=>setScanOpen(false)}/></Modal>
      <Modal open={!!confirm} onClose={()=>setConfirm(null)} title="Konfirmasi Stand Jaga">
        {confirm&&(
          <div>
            <div style={{background:"rgba(0,120,212,.1)",borderRadius:10,padding:"12px 16px",marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:12,color:"var(--tx3)"}}>Gedung Pos</div>
              <div style={{fontSize:20,fontWeight:900,color:"var(--accent)"}}>{confirm.area}</div>
              <div style={{fontSize:12,color:"var(--tx3)"}}>{confirm.pos}</div>
            </div>
            {/* Nama petugas: otomatis dari login, admin bisa pilih semua */}
            {isAdmin ? (
              <Inp label="Nama Petugas" value={officer} onChange={e=>setOfficer(e.target.value)} as="select">
                <option value="">— Pilih Anggota —</option>
                {members.map(m=><option key={m}>{m}</option>)}
              </Inp>
            ) : (
              <div style={{marginBottom:11}}>
                <label style={{display:"block",fontSize:11,color:"var(--accent)",marginBottom:4,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>Nama Petugas</label>
                <div style={{background:"var(--card2)",border:"1.5px solid var(--border2)",borderRadius:9,padding:"9px 12px",fontSize:13.5,color:"var(--tx)",display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:14}}>👤</span>
                  <span style={{fontWeight:700}}>{officer||currentUser?.name||"—"}</span>
                  <span style={{marginLeft:"auto",fontSize:10,color:"var(--tx3)",background:"var(--card3)",borderRadius:5,padding:"2px 7px"}}>Login aktif</span>
                </div>
              </div>
            )}
            <Inp label="Catatan (opsional)" value={notes} onChange={e=>setNotes(e.target.value)} as="textarea" placeholder="Kondisi pos..."/>
            <div style={{display:"flex",gap:8}}><Btn onClick={doConfirm} color="var(--ok)" size="lg" full><IC n="ok" s={14}/> Konfirmasi</Btn><Btn onClick={()=>setConfirm(null)} color="var(--tx4)" variant="outline">Batal</Btn></div>
          </div>
        )}
      </Modal>
    </div>
  );
}

// ─── PATROL ───────────────────────────────────────────────────────────────────
// Checklist items per patroli
const CHECKLIST_ITEMS = ["Jendela","Pintu","Lampu","Barang Inventaris","Kondisi Umum"];
const CHECKLIST_ICON  = {"Jendela":"🪟","Pintu":"🚪","Lampu":"💡","Barang Inventaris":"📦","Kondisi Umum":"✅"};

// Warna per pos
const POS_RING = {
  "Pos Asrama":    {ring:"#6aaa88",fill:"rgba(106,170,136,.10)",txt:"#6aaa88",txtLight:"#2a7050"},
  "Gedung Utama":  {ring:"#7090a8",fill:"rgba(112,144,168,.10)",txt:"#7090a8",txtLight:"#2a5070"},
  "Pos Utama":     {ring:"#5b9bd5",fill:"rgba(91,155,213,.10)", txt:"#5b9bd5",txtLight:"#1a5090"},
  "Pos Guest House":{ring:"#8882b8",fill:"rgba(136,130,184,.10)",txt:"#8882b8",txtLight:"#4a4488"},
};

function AreaCircle({area,pos,last,onTap,canEdit}) {
  const col = POS_RING[pos] || {ring:"var(--accent)",fill:"var(--pill-active)",txt:"var(--accent-light)",txtLight:"var(--accent-dim)"};
  const minsAgo = last ? Math.floor((Date.now()-last.ts)/60000) : null;
  const fresh   = minsAgo !== null && minsAgo < 60;
  // Split area name for display
  const words = area.split(" ");
  const line1 = words.slice(0,2).join(" ");
  const line2 = words.slice(2).join(" ");
  // Detect light mode
  const isLight = typeof document !== "undefined" && document.documentElement.classList.contains("light");
  const txtColor = fresh ? "var(--ok)" : (isLight ? col.txtLight : col.txt);
  const posClass = pos==="Pos Asrama"?"asrama":pos==="Gedung Utama"?"gedutama":pos==="Pos Utama"?"posutama":pos==="Pos Guest House"?"guesthouse":"";
  return (
    <button
      onClick={()=>canEdit&&onTap(area)}
      disabled={!canEdit}
      style={{
        background:"none",border:"none",cursor:canEdit?"pointer":"default",
        display:"flex",flexDirection:"column",alignItems:"center",gap:6,
        padding:4, opacity:canEdit?1:.6,
      }}
    >
      {/* Outer ring */}
      <div style={{
        width:84,height:84,borderRadius:"50%",
        border:`3px solid ${fresh?"var(--ok)":col.ring}`,
        background:fresh?"rgba(74,222,128,.1)":col.fill,
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
        position:"relative",
        boxShadow: fresh?`0 0 0 4px rgba(74,222,128,.18)`:canEdit?`0 0 0 2px ${col.ring}22`:"none",
        transition:"all .2s",
      }}>
        {/* Inner ring */}
        <div style={{
          width:62,height:62,borderRadius:"50%",
          border:`1.5px solid ${fresh?"rgba(74,222,128,.5)":col.ring+"55"}`,
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          padding:4,
        }}>
          <div className={`patrol-circle-txt-${posClass}`} style={{fontSize:9.5,fontWeight:800,color:txtColor,textAlign:"center",lineHeight:1.25,wordBreak:"break-word"}}>
            {line1}
          </div>
          {line2&&<div className={`patrol-circle-txt-${posClass}`} style={{fontSize:8.5,fontWeight:700,color:txtColor,textAlign:"center",lineHeight:1.2,opacity:.85}}>
            {line2}
          </div>}
        </div>
        {/* Fresh badge */}
        {fresh&&<div style={{position:"absolute",top:-4,right:-4,width:18,height:18,borderRadius:"50%",background:"var(--ok)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>✓</div>}
      </div>
      {/* Time label */}
      <div className="patrol-time-label" style={{fontSize:9,color:fresh?"var(--ok)":"var(--tx3)",fontWeight:700,textAlign:"center"}}>
        {minsAgo===null?"Belum":minsAgo<60?`${minsAgo}m lalu`:minsAgo<1440?`${Math.floor(minsAgo/60)}j lalu`:"Kemarin"}
      </div>
    </button>
  );
}

function PatrolTab({posAssign,patrols,setPatrols,toast,canEdit,isAdmin,currentUser}) {
  const [confirm,  setConfirm]  = useState(null);   // {area, pos}
  const [checks,   setChecks]   = useState({});      // {item: true/false}
  const [notes,    setNotes]    = useState("");
  const [officer,  setOfficer]  = useState("");
  const [photo,    setPhoto]    = useState(null);
  const [viewPhoto,setViewPhoto]= useState(null);
  const [viewLog,  setViewLog]  = useState(null);    // area name to show log
  const fileRef = useRef();

  const openArea = (area) => {
    const pos = getPos(area)||"—";
    // Cooldown 60 detik
    const last = patrols.filter(p=>p.areas?.includes(area)).at(-1);
    if(last && Date.now()-last.ts < 60000){
      toast("Baru saja dipatroli, tunggu 60 detik",false); return;
    }
    const initChecks = {};
    CHECKLIST_ITEMS.forEach(k=>{ initChecks[k]=false; });
    setChecks(initChecks);
    setNotes("");
    setPhoto(null);
    setOfficer(currentUser?.name||posAssign[pos]?.join(",")||"");
    setConfirm({area, pos});
  };

  const toggleCheck = (item) => setChecks(p=>({...p,[item]:!p[item]}));

  const doPatrol = () => {
    const checkedCount = Object.values(checks).filter(Boolean).length;
    if(checkedCount===0){ toast("Centang minimal 1 item!",false); return; }
    if(!photo){ toast("📷 Foto bukti wajib!",false); return; }
    setPatrols([...patrols,{
      id:Date.now(), ts:Date.now(),
      pos:confirm.pos, officer:officer||"—",
      areas:[confirm.area], notes,
      checks:Object.entries(checks).filter(([,v])=>v).map(([k])=>k),
      photo,
    }]);
    setConfirm(null);
    toast(`✓ Patroli ${confirm.area} dicatat!`);
  };

  const handlePhoto=(e)=>{
    const file=e.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=()=>kompressFoto(r.result,1280,0.82).then(setPhoto);
    r.readAsDataURL(file);
  };

  const todP = patrols.filter(p=>new Date(p.ts).toDateString()===new Date().toDateString());

  return (
    <div>
      <PH title="Patroli" sub="Tap gedung untuk mencatat patroli"/>
      {!canEdit&&<ReadOnlyBanner reguHari={getReguHari(new Date())}/>}

      {/* Grid lingkaran per pos */}
      {Object.entries(PATROL_AREAS).map(([pos,areas])=>{
        const col = POS_RING[pos]||{ring:"var(--accent)"};
        return (
          <div key={pos} style={{marginBottom:20}}>
            {/* Pos header */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:col.ring,flexShrink:0}}/>
              <div style={{fontSize:11,fontWeight:800,color:col.ring,letterSpacing:.8,textTransform:"uppercase"}}>{pos}</div>
              <div style={{flex:1,height:1,background:col.ring+"30"}}/>
              <div style={{fontSize:10,color:"var(--tx4)"}}>
                {areas.filter(a=>{ const l=patrols.filter(p=>p.areas?.includes(a)).at(-1); return l&&Date.now()-l.ts<3600000; }).length}/{areas.length} ✓
              </div>
            </div>
            {/* Circles */}
            <div style={{display:"flex",flexWrap:"wrap",gap:10,justifyContent:"flex-start"}}>
              {areas.map(area=>{
                const last=patrols.filter(p=>p.areas?.includes(area)).at(-1);
                return (
                  <AreaCircle key={area} area={area} pos={pos} last={last} onTap={openArea} canEdit={canEdit}/>
                );
              })}
            </div>
          </div>
        );
      })}

      {/* Log hari ini */}
      <div style={{background:"var(--card-solid)",border:"1px solid var(--border)",borderRadius:12,padding:"12px 14px",marginTop:4}}>
        <div style={{fontSize:12,fontWeight:800,color:"var(--accent)",marginBottom:10}}>Log Patroli Hari Ini ({todP.length})</div>
        {todP.length===0&&<div style={{fontSize:11,color:"var(--tx3)"}}>Belum ada patroli</div>}
        {[...todP].reverse().slice(0,15).map(p=>(

              <div style={{flex:1}}>
                <div style={{fontSize:12.5,fontWeight:700,color:"var(--tx2)"}}>{p.areas?.join(", ")}</div>
                <div style={{fontSize:10.5,color:"var(--tx3)"}}>{p.pos} · {p.officer}</div>
                {p.checks?.length>0&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                    {p.checks.map(c=>(
                      <span key={c} style={{fontSize:9.5,background:"var(--green-card)",border:"1px solid var(--green-border)",borderRadius:5,padding:"1px 6px",color:"var(--ok)",fontWeight:700}}>
                        {CHECKLIST_ICON[c]||"✓"} {c}

              <div style={{
                width:56,height:56,borderRadius:"50%",
                border:`3px solid ${POS_RING[confirm.pos]?.ring||"var(--accent)"}`,
                background:(POS_RING[confirm.pos]?.fill)||"var(--pill-active)",
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
              }}>
                <div style={{width:40,height:40,borderRadius:"50%",border:`1.5px solid ${POS_RING[confirm.pos]?.ring+"66"||"#fff3"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:9,fontWeight:900,color:POS_RING[confirm.pos]?.txt||"var(--accent-light)",textAlign:"center",lineHeight:1.2}}>{confirm.area}</span>
                </div>
              </div>
              <div>
                <div style={{fontSize:16,fontWeight:900,color:"var(--tx)"}}>{confirm.area}</div>
                <div style={{fontSize:11,color:"var(--tx3)",marginTop:2}}>{confirm.pos}</div>
              </div>
            </div>

            {/* Checklist */}
            <div style={{fontSize:11,fontWeight:800,color:"var(--tx3)",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Cek Kondisi</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
              {CHECKLIST_ITEMS.map(item=>{
                const checked=checks[item];
                return (
                  <button key={item} onClick={()=>toggleCheck(item)} style={{
                    display:"flex",alignItems:"center",gap:12,
                    background:checked?"var(--green-card)":"var(--card2)",
                    border:`1.5px solid ${checked?"var(--ok)":"var(--border2)"}`,
                    borderRadius:10,padding:"11px 14px",cursor:"pointer",
                    fontFamily:"inherit",textAlign:"left",transition:"all .15s",
                  }}>
                    <div style={{
                      width:22,height:22,borderRadius:6,flexShrink:0,
                      background:checked?"var(--ok)":"transparent",

                    </div>

            {/* Petugas */}
            {isAdmin?(
              <Inp label="Petugas" value={officer} onChange={e=>setOfficer(e.target.value)} as="select">

  );

// ─── PHOTO PICKER (reusable) ──────────────────────────────────────────────────
function PhotoPicker({photo, setPhoto, label="📷 Foto Bukti", color="var(--accent)"}) {
  const ref = useRef();
  const handle = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader(); r.onload = () => { kompressFoto(r.result,1280,0.82).then(compressed=>setPhoto(compressed)); }; r.readAsDataURL(file);
  };
  const remove = () => { setPhoto(null); if(ref.current) ref.current.value=""; };
  const lightBg = color==="#dc2626"?"rgba(255,50,50,.1)":color==="#a78bfa"?"rgba(167,139,250,.1)":color==="#ffcc00"?"rgba(255,204,0,.07)":color==="var(--ok)"?"var(--green-card)":"var(--green-card)";
  const lightBorder = color==="#dc2626"?"#ff3333":color==="#a78bfa"?"rgba(167,139,250,.4)":color==="#ffcc00"?"rgba(255,204,0,.4)":color==="var(--ok)"?"var(--green-border)":"var(--border)";
  return (
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontSize:11,color:color,marginBottom:6,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>{label}</label>
      {!photo?(
        <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:lightBg,border:`2px dashed ${lightBorder}`,borderRadius:10,padding:"18px 12px",cursor:"pointer",color:color,fontWeight:700,fontSize:13}}>
          <IC n="cam" s={20} c={color}/> Ambil / Pilih Foto (opsional)
          <input ref={ref} type="file" accept="image/*" capture="environment" onChange={handle} style={{display:"none"}}/>
        </label>
      ):(
        <div style={{position:"relative",width:"100%"}}>
          <img src={photo} alt="bukti" style={{width:"100%",maxHeight:180,objectFit:"cover",borderRadius:10,border:`2px solid ${lightBorder}`,display:"block"}}/>
          <button onClick={remove} style={{position:"absolute",top:6,right:6,background:"rgba(220,38,38,.85)",border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:800,padding:"4px 9px",cursor:"pointer",fontFamily:"inherit"}}>✕ Hapus</button>
          <div style={{position:"absolute",bottom:6,left:6,background:`${color}dd`,borderRadius:6,padding:"3px 8px",fontSize:10,color:"#fff",fontWeight:700}}>📷 Foto siap</div>
        </div>
      )}
    </div>
  );
}

// ─── INCIDENT ─────────────────────────────────────────────────────────────────
function IncTab({incidents,setIncidents,posAssign,toast,canEdit}) {
  const [open,setOpen]=useState(false);
  const [photo,setPhoto]=useState(null);
  const [viewPhoto,setViewPhoto]=useState(null);
  const [fm,setFm]=useState({title:"",desc:"",category:"Rendah",pos:POS_LIST[0],status:"Aktif"});

  const submit=()=>{
    if(!fm.title){toast("Judul wajib!",false);return;}
    setIncidents([...incidents,{...fm,photo,id:Date.now(),ts:Date.now(),officer:posAssign[fm.pos]?.join(", ")||"—"}]);

            <span style={{fontSize:10.5,color:"var(--tx3)"}}>{fmtDT(inc.ts)}</span>

            <img src={inc.photo} alt="" style={{width:40,height:28,objectFit:"cover",borderRadius:4}}/> Lihat Foto Bukti
          </button>}
          {canEdit&&inc.status!=="Selesai"&&<div style={{display:"flex",gap:7,marginTop:6}}><Btn onClick={()=>upd(inc.id,"Dalam Penanganan")} color="#ffcc00" size="sm" variant="outline">Penanganan</Btn><Btn onClick={()=>upd(inc.id,"Selesai")} color="var(--ok)" size="sm">✓ Selesai</Btn></div>}
        </div>
      ))}
      <Modal open={open} onClose={()=>{setOpen(false);setPhoto(null);}} title="Laporkan Insiden">

        <div style={{display:"flex",gap:10}}><Inp label="Kategori" value={fm.category} onChange={e=>f("category",e.target.value)} as="select" half>{INC_CAT.map(c=><option key={c}>{c}</option>)}</Inp><Inp label="Pos" value={fm.pos} onChange={e=>f("pos",e.target.value)} as="select" half>{POS_LIST.map(p=><option key={p}>{p}</option>)}</Inp></div>

      </Modal>
      <Modal open={!!viewPhoto} onClose={()=>setViewPhoto(null)} title="Foto Bukti Insiden">
        {viewPhoto&&<div style={{textAlign:"center"}}><img src={viewPhoto} alt="bukti" style={{width:"100%",maxHeight:400,objectFit:"contain",borderRadius:10,marginBottom:14}}/><Btn onClick={()=>setViewPhoto(null)} color="var(--accent)">Tutup</Btn></div>}
      </Modal>
    </div>
  );
}

// ─── PACKAGE ──────────────────────────────────────────────────────────────────
function PkgTab({packages,setPackages,toast,canEdit}) {
  const [open,setOpen]=useState(false);

  const [viewPhoto,setViewPhoto]=useState(null);
  const [fm,setFm]=useState({recipient:"",sender:"",type:"Paket",notes:"",status:"Belum Diambil"});

    if(!fm.recipient){toast("Penerima wajib!",false);return;}

    setFm({recipient:"",sender:"",type:"Paket",notes:"",status:"Belum Diambil"}); setPhoto(null);
