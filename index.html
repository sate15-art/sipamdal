                style={{ background: pressedKey === String(d) ? "rgba(255,255,255,.35)" : d === "⌫" ? "rgba(239,68,68,.25)" : d === "" ? "transparent" : "rgba(255,255,255,.15)", border: `1.5px solid ${d === "" ? "transparent" : d === "⌫" ? "rgba(239,68,68,.4)" : "rgba(255,255,255,.2)"}`, borderRadius: 12, height: 56, fontSize: d === "⌫" ? 18 : 22, fontWeight: 700, color: "#fff", cursor: d === "" ? "default" : "pointer", fontFamily: "inherit", transition: "all .12s", transform: pressedKey === String(d) ? "scale(.92)" : "scale(1)" }}>
                {d}
              </button>
            ))}
          </div>
          <div style={{ marginTop: 16, fontSize: 11, color: "rgba(255,255,255,.35)" }}>
            {selected.isAdmin ? "PIN Admin default: 000000" : "PIN default: 123456"}
          </div>
        </div>
      )}
      <div style={{ marginTop: 32, fontSize: 11, color: "rgba(255,255,255,.35)", textAlign: "center", letterSpacing: .5 }}>
        Dikembangkan oleh <span style={{ color: "#93c5fd", fontWeight: 700 }}>Rukman Abu Hamzah</span>
      </div>
      <style>{`
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
        @keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-24px) scale(1.05)}}
        @keyframes logoPulse{0%,100%{box-shadow:0 6px 24px rgba(0,0,0,.35),0 0 0 0 rgba(255,255,255,.15)}60%{box-shadow:0 6px 24px rgba(0,0,0,.35),0 0 0 10px rgba(255,255,255,0)}}
        @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes avatarPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
      `}</style>
    </div>
  );
}

// ─── PROFILE / PROGRES TAB ────────────────────────────────────────────────────
function ProfileTab({ currentUser, patrols, standJaga, incidents, mutations, onLogout, onChangePin, toast, userPins, setUserPins }) {
  const [changePinOpen, setChangePinOpen] = useState(false);
  const [oldPin, setOldPin] = useState("");
  const [newPin, setNewPin] = useState("");
  const [confirmPin, setConfirmPin] = useState("");
  // userPins & setUserPins passed as props

  const name = currentUser.name;
  const today = new Date();

  // Statistik aktivitas user ini
  const myPatrols = patrols.filter(p => p.officer && p.officer.includes(name));
  const myPatrolsToday = myPatrols.filter(p => new Date(p.ts).toDateString() === today.toDateString());
  const myStand = standJaga.filter(s => s.officer && s.officer.includes(name));
  const myStandToday = myStand.filter(s => new Date(s.ts).toDateString() === today.toDateString());
  const myIncidents = incidents.filter(i => i.officer && i.officer.includes(name));
  const myMutations = mutations.filter(m => m.fromRegu === currentUser.regu);

  const reguColors = { 1: "#1d4ed8", 2: "#059669", 3: "#7c3aed" };
  const col = reguColors[currentUser.regu] || "#1d4ed8";

  // Hitung skor keaktifan (hari ini)
  const score = myPatrolsToday.length * 10 + myStandToday.length * 5;

  const handleChangePin = async () => {
    let freshPins = { ...DEFAULT_PINS };
    try { const s = localStorage.getItem("pad_pins"); if (s) freshPins = { ...DEFAULT_PINS, ...JSON.parse(s) }; } catch {}
    let correctOld = await getPinFromFS(name).catch(()=>null);
    if (!correctOld) correctOld = (freshPins[name] || "123456").trim();
    const inputOld = oldPin.trim();
    if (inputOld !== correctOld) { toast("PIN lama salah! (default: 123456)", false); return; }
    if (newPin.trim().length !== 6 || !/^\d{6}$/.test(newPin.trim())) { toast("PIN baru harus 6 angka!", false); return; }
    if (newPin.trim() !== confirmPin.trim()) { toast("Konfirmasi PIN tidak cocok!", false); return; }
    await savePinToFS(name, newPin.trim()).catch(()=>{});
    const updated = { ...freshPins, [name]: newPin.trim() };
    setUserPins(updated);
    auditAction(name, currentUser.regu, "GANTI_PIN", "PIN berhasil diubah");
    setChangePinOpen(false); setOldPin(""); setNewPin(""); setConfirmPin("");
    toast("PIN berhasil diubah!");
  };

  const statCard = (label, value, sub, color, bg) => (
    <div style={{ background: bg, border: `1.5px solid ${color}20`, borderRadius: 12, padding: "12px 14px", textAlign: "center" }}>
      <div style={{ fontSize: 28, fontWeight: 900, color }}>{value}</div>
      <div style={{ fontSize: 10.5, fontWeight: 700, color, marginBottom: 2 }}>{label}</div>
      {sub && <div style={{ fontSize: 10, color: "#9ca3af" }}>{sub}</div>}
    </div>
  );

  return (
    <div>
      {/* Profile Card */}
      <div style={{ background: `linear-gradient(135deg,${col},${col}cc)`, borderRadius: 16, padding: "20px", marginBottom: 16, color: "#fff", position: "relative" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 56, height: 56, background: "rgba(255,255,255,.25)", borderRadius: 16, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>👤</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 20, fontWeight: 900 }}>{name}</div>
            <div style={{ fontSize: 12, opacity: .8, marginTop: 2 }}>Regu {currentUser.regu} · BBPKA II Jatinangor</div>
            <div style={{ marginTop: 6, display: "inline-block", background: "rgba(255,255,255,.2)", borderRadius: 7, padding: "3px 10px", fontSize: 11, fontWeight: 700 }}>
              🏆 Skor Hari Ini: {score} poin
            </div>
          </div>
        </div>
      </div>

      {/* Statistik Hari Ini */}
      <div style={{ fontSize: 12, fontWeight: 800, color: "#1d4ed8", marginBottom: 8 }}>📊 Aktivitas Hari Ini</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
        {statCard("Patroli", myPatrolsToday.length, "scan hari ini", "#059669", "#f0fdf4")}
        {statCard("Stand Jaga", myStandToday.length, "pos hari ini", "#1d4ed8", "#eff6ff")}
      </div>

      {/* Statistik Total */}
      <div style={{ fontSize: 12, fontWeight: 800, color: "#1d4ed8", marginBottom: 8 }}>📈 Total Rekap</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
        {statCard("Patroli", myPatrols.length, "semua waktu", "#059669", "#f0fdf4")}
        {statCard("Stand Jaga", myStand.length, "semua waktu", "#0891b2", "#ecfeff")}
        {statCard("Insiden", myIncidents.length, "dilaporkan", "#dc2626", "#fef2f2")}
      </div>

      {/* Log Patroli Terbaru */}
      <div style={{ background: "#fff", border: "1.5px solid #dbeafe", borderRadius: 12, padding: "12px 14px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: "#1d4ed8", marginBottom: 10 }}>🗓 Log Patroli Terbaru</div>
        {myPatrols.length === 0 && <div style={{ fontSize: 12, color: "#9ca3af" }}>Belum ada patroli</div>}
        {[...myPatrols].reverse().slice(0, 8).map(p => (
          <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 9, padding: "6px 0", borderBottom: "1px solid #f1f5f9" }}>
            <div style={{ width: 30, height: 30, background: p.photo?"#f5f3ff":"#f0fdf4", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              {p.photo?<span style={{fontSize:14}}>📷</span>:<IC n="qr" s={13} c="#059669" />}
            </div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#1e3a8a" }}>{p.areas?.join(", ")}</div>
              <div style={{ fontSize: 10.5, color: "#6b7280" }}>{p.pos}{p.photo&&<span style={{color:"#7c3aed",marginLeft:6}}>📷 Ada foto</span>}</div>
            </div>
            <div style={{ fontSize: 10.5, fontWeight: 700, color: "#059669" }}>{fmtDT(p.ts)}</div>
          </div>
        ))}
      </div>

      {/* Log Stand Jaga Terbaru */}
      <div style={{ background: "#fff", border: "1.5px solid #dbeafe", borderRadius: 12, padding: "12px 14px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 800, color: "#1d4ed8", marginBottom: 10 }}>🛡 Log Stand Jaga Terbaru</div>
        {myStand.length === 0 && <div style={{ fontSize: 12, color: "#9ca3af" }}>Belum ada stand jaga</div>}
        {[...myStand].reverse().slice(0, 5).map(s => (
          <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 9, padding: "6px 0", borderBottom: "1px solid #f1f5f9" }}>
            <div style={{ width: 30, height: 30, background: "#eff6ff", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><IC n="shield" s={13} c="#1d4ed8" /></div>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#1e3a8a" }}>{s.area}</div>
              <div style={{ fontSize: 10.5, color: "#6b7280" }}>{s.pos}</div>
            </div>
            <div style={{ fontSize: 10.5, fontWeight: 700, color: "#1d4ed8" }}>{fmtDT(s.ts)}</div>
          </div>
        ))}
      </div>

      {/* Aksi */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        <Btn onClick={() => setChangePinOpen(true)} color="#7c3aed" variant="outline" full>🔑 Ganti PIN</Btn>
        <Btn onClick={onLogout} color="#dc2626" variant="outline" full>Keluar</Btn>
      </div>

      <Modal open={changePinOpen} onClose={() => setChangePinOpen(false)} title="Ganti PIN">
        <Inp label="PIN Lama" value={oldPin} onChange={e => setOldPin(e.target.value.replace(/[^0-9]/g,"").slice(0,6))} type="tel" placeholder="Ketik 6 angka" />
        <Inp label="PIN Baru (6 digit)" value={newPin} onChange={e => setNewPin(e.target.value.replace(/[^0-9]/g,"").slice(0,6))} type="tel" placeholder="Ketik 6 angka" />
        <Inp label="Konfirmasi PIN Baru" value={confirmPin} onChange={e => setConfirmPin(e.target.value.replace(/[^0-9]/g,"").slice(0,6))} type="tel" placeholder="Ulangi PIN baru" />
        <div style={{ display: "flex", gap: 8 }}><Btn onClick={handleChangePin} color="#7c3aed" size="lg">Simpan</Btn><Btn onClick={() => setChangePinOpen(false)} color="#6b7280" variant="outline" size="lg">Batal</Btn></div>
      </Modal>
    </div>
  );
}

// ─── ADMIN MEMBER PROGRESS VIEW ───────────────────────────────────────────────
function AdminMemberTab({ patrols, standJaga, incidents, mutations }) {
  const [selectedMember, setSelectedMember] = useState(null);
  const [activeTab, setActiveTab] = useState("progres");
  const [auditLogs, setAuditLogs] = useState([]);
  const [loginHistory, setLoginHistory] = useState([]);
  const [loadingAudit, setLoadingAudit] = useState(false);
  const [resetTarget, setResetTarget] = useState(null);
  const [newResetPin, setNewResetPin] = useState("");
  const [pinMap, setPinMap] = useState({});
  const today = new Date();
  const reguColors = { 1: "#1d4ed8", 2: "#059669", 3: "#7c3aed" };

  const loadAudit = async () => {
    setLoadingAudit(true);
    const fb = window.__FB;
    if (!fb) { setLoadingAudit(false); return; }
    try {
      const { db, collection, query, orderBy, limit, getDocs } = fb;
      const q = query(collection(db, "sipamdal_audit"), orderBy("tsLocal","desc"), limit(50));
      const snap = await getDocs(q);
      setAuditLogs(snap.docs.map(d=>({id:d.id,...d.data()})));
      const q2 = query(collection(db, "sipamdal_login_history"), orderBy("tsLocal","desc"), limit(30));
      const snap2 = await getDocs(q2);
      setLoginHistory(snap2.docs.map(d=>({id:d.id,...d.data()})));
    } catch(e) {}
    setLoadingAudit(false);
  };

  useEffect(() => { if (activeTab==="audit") loadAudit(); }, [activeTab]);
  useEffect(() => {
    try { const s = localStorage.getItem("pad_pins"); if(s) setPinMap(JSON.parse(s)); } catch{}
  }, []);

  const handleResetPin = async () => {
    if (!resetTarget) return;
    if (newResetPin.length !== 6 || !/^\d{6}$/.test(newResetPin)) { alert("PIN harus 6 angka!"); return; }
    await savePinToFS(resetTarget.name, newResetPin).catch(()=>{});
    const updated = { ...pinMap, [resetTarget.name]: newResetPin };
    setPinMap(updated);
    try { localStorage.setItem("pad_pins", JSON.stringify(updated)); } catch{}
    auditAction("Admin", 0, "RESET_PIN", "Reset PIN " + resetTarget.name);
    alert("PIN " + resetTarget.name + " berhasil direset ke " + newResetPin);
    setResetTarget(null); setNewResetPin("");
  };

  const ACTION_COL = { LOGIN:"#16a34a", LOGOUT:"#6b7280", AUTO_LOGOUT:"#d97706", GANTI_PIN:"#7c3aed", RESET_PIN:"#dc2626" };
  const ACTION_ICON = { LOGIN:"🔐", LOGOUT:"🚪", AUTO_LOGOUT:"⏱", GANTI_PIN:"🔑", RESET_PIN:"🛠" };

  const getMemberStats = (name) => {
    const myP = patrols.filter(p => p.officer && p.officer.includes(name));
    const myPT = myP.filter(p => new Date(p.ts).toDateString() === today.toDateString());
    const myS = standJaga.filter(s => s.officer && s.officer.includes(name));
    const myST = myS.filter(s => new Date(s.ts).toDateString() === today.toDateString());
    const myI = incidents.filter(i => i.officer && i.officer.includes(name));
    return { patrols: myP.length, patrolsToday: myPT.length, stand: myS.length, standToday: myST.length, incidents: myI.length, score: myPT.length * 10 + myST.length * 5 };
  };

  if (selectedMember) {
    const m = selectedMember;
    const stats = getMemberStats(m.name);
    const myP = patrols.filter(p => p.officer && p.officer.includes(m.name));
    const myS = standJaga.filter(s => s.officer && s.officer.includes(m.name));
    const col = reguColors[m.regu];
    return (
      <div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
          <button onClick={() => setSelectedMember(null)} style={{ background: "#eff6ff", border: "1.5px solid #bfdbfe", borderRadius: 8, padding: "6px 12px", fontSize: 12, color: "#1d4ed8", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>← Kembali</button>
          <h2 style={{ margin: 0, fontSize: 16, fontWeight: 900, color: "#1e3a8a" }}>{m.name}</h2>
        </div>
        <div style={{ background: `linear-gradient(135deg,${col},${col}bb)`, borderRadius: 14, padding: "16px 18px", marginBottom: 14, color: "#fff" }}>
          <div style={{ fontSize: 18, fontWeight: 900 }}>{m.name}</div>
          <div style={{ fontSize: 12, opacity: .8 }}>Regu {m.regu} · Skor Hari Ini: {stats.score} poin</div>
          <div style={{ display: "flex", gap: 10, marginTop: 10, flexWrap: "wrap" }}>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.patrolsToday}</div><div style={{ fontSize: 10 }}>Patroli Hari Ini</div></div>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.standToday}</div><div style={{ fontSize: 10 }}>Stand Hari Ini</div></div>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.patrols}</div><div style={{ fontSize: 10 }}>Total Patroli</div></div>
            <div style={{ background: "rgba(255,255,255,.2)", borderRadius: 8, padding: "6px 12px", textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 900 }}>{stats.incidents}</div><div style={{ fontSize: 10 }}>Insiden</div></div>
          </div>
        </div>
        <div style={{ background: "#fff", border: "1.5px solid #dbeafe", borderRadius: 12, padding: "12px 14px", marginBottom: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "#059669", marginBottom: 8 }}>Log Patroli ({myP.length})</div>
          {myP.length === 0 && <div style={{ fontSize: 12, color: "#9ca3af" }}>Belum ada</div>}
          {[...myP].reverse().slice(0, 10).map(p => (
            <div key={p.id} style={{ padding: "6px 0", borderBottom: "1px solid #f1f5f9", fontSize: 12 }}>
              <div style={{ fontWeight: 700, color: "#1e3a8a" }}>{p.areas?.join(", ")}</div>
              <div style={{ color: "#6b7280", fontSize: 10.5 }}>{fmtDT(p.ts)} · {p.pos}</div>
            </div>
          ))}
        </div>
        <div style={{ background: "#fff", border: "1.5px solid #dbeafe", borderRadius: 12, padding: "12px 14px" }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: "#1d4ed8", marginBottom: 8 }}>Log Stand Jaga ({myS.length})</div>
          {myS.length === 0 && <div style={{ fontSize: 12, color: "#9ca3af" }}>Belum ada</div>}
          {[...myS].reverse().slice(0, 10).map(s => (
            <div key={s.id} style={{ padding: "6px 0", borderBottom: "1px solid #f1f5f9", fontSize: 12 }}>
              <div style={{ fontWeight: 700, color: "#1e3a8a" }}>{s.area}</div>
              <div style={{ color: "#6b7280", fontSize: 10.5 }}>{fmtDT(s.ts)} · {s.pos}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div>
      <PH title="Anggota & Keamanan" sub="Progres, audit log, dan manajemen PIN" />

      {/* Sub-tab */}
      <div style={{ display:"flex", gap:0, background:"#f1f5f9", borderRadius:10, padding:3, marginBottom:14 }}>
        {[{id:"progres",label:"📊 Progres"},{id:"audit",label:"📋 Audit Log"},{id:"pin",label:"🔑 Reset PIN"}].map(t=>(
          <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{ flex:1, border:"none", borderRadius:8, padding:"8px 4px", fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit", background: activeTab===t.id?"#fff":"transparent", color: activeTab===t.id?"#1d4ed8":"#6b7280", boxShadow: activeTab===t.id?"0 1px 4px rgba(0,0,0,.08)":"none", transition:"all .2s" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* PROGRES TAB */}
      {activeTab==="progres" && [1,2,3].map(r => (
        <div key={r} style={{ marginBottom: 18 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: reguColors[r], marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
            <div style={{ width: 10, height: 10, borderRadius: "50%", background: reguColors[r] }} />
            REGU {r}
          </div>
          {REGU[r].map(name => {
            const stats = getMemberStats(name);
            return (
              <div key={name} onClick={() => setSelectedMember({ name, regu: r })} style={{ background: "#fff", border: `1.5px solid ${reguColors[r]}20`, borderRadius: 12, padding: "12px 14px", marginBottom: 8, cursor: "pointer", display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 42, height: 42, background: `${reguColors[r]}15`, borderRadius: 11, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>👤</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 800, color: "#1e3a8a" }}>{name}</div>
                  <div style={{ fontSize: 11, color: "#6b7280", marginTop: 2 }}>Hari ini: {stats.patrolsToday} patroli · {stats.standToday} stand</div>
                  <div style={{ fontSize: 11, color: "#9ca3af" }}>Total: {stats.patrols} patroli · {stats.incidents} insiden</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 18, fontWeight: 900, color: reguColors[r] }}>{stats.score}</div>
                  <div style={{ fontSize: 9.5, color: "#9ca3af" }}>poin</div>
                </div>
                <IC n="arr" s={14} c="#d1d5db" />
              </div>
            );
          })}
        </div>
      ))}

      {/* AUDIT LOG TAB */}
      {activeTab==="audit" && (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:12, fontWeight:800, color:"#1e3a8a" }}>Riwayat Aksi ({auditLogs.length})</div>
            <button onClick={loadAudit} style={{ background:"#eff6ff", border:"1.5px solid #bfdbfe", borderRadius:7, padding:"5px 12px", fontSize:11, fontWeight:700, color:"#1d4ed8", cursor:"pointer", fontFamily:"inherit" }}>🔄 Refresh</button>
          </div>
          {loadingAudit && <div style={{ textAlign:"center", padding:20, color:"#9ca3af", fontSize:12 }}>Memuat...</div>}
          {!loadingAudit && auditLogs.length===0 && <div style={{ textAlign:"center", padding:20, color:"#9ca3af", fontSize:12 }}>Belum ada log</div>}
          {!loadingAudit && auditLogs.map(log => (
            <div key={log.id} style={{ background:"#fff", border:"1.5px solid #f1f5f9", borderRadius:10, padding:"10px 12px", marginBottom:7, display:"flex", gap:10, alignItems:"flex-start" }}>
              <span style={{ fontSize:18, flexShrink:0 }}>{ACTION_ICON[log.action]||"📝"}</span>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:11, fontWeight:800, color: ACTION_COL[log.action]||"#1d4ed8", background:(ACTION_COL[log.action]||"#1d4ed8")+"15", borderRadius:5, padding:"2px 7px" }}>{log.action}</span>
                  <span style={{ fontSize:10, color:"#9ca3af" }}>{log.tsLocal ? new Date(log.tsLocal).toLocaleString("id-ID",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : ""}</span>
                </div>
                <div style={{ fontSize:12.5, fontWeight:700, color:"#1e3a8a", marginTop:3 }}>{log.actor}{log.regu ? " · Regu "+log.regu : ""}</div>
                <div style={{ fontSize:11, color:"#6b7280", marginTop:1 }}>{log.detail}</div>
              </div>
            </div>
          ))}
          <div style={{ fontSize:12, fontWeight:800, color:"#1e3a8a", marginTop:18, marginBottom:10 }}>Riwayat Login ({loginHistory.length})</div>
          {!loadingAudit && loginHistory.map(log => (
            <div key={log.id} style={{ background:"#f0fdf4", border:"1.5px solid #bbf7d0", borderRadius:10, padding:"9px 12px", marginBottom:6 }}>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <span style={{ fontSize:12.5, fontWeight:800, color:"#16a34a" }}>{log.name}</span>
                <span style={{ fontSize:10, color:"#9ca3af" }}>{log.tsLocal ? new Date(log.tsLocal).toLocaleString("id-ID",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : ""}</span>
              </div>
              <div style={{ fontSize:10.5, color:"#6b7280", marginTop:1 }}>{log.isAdmin?"Admin":"Regu "+log.regu} · {(log.device||"").slice(0,40)}</div>
            </div>
          ))}
        </div>
      )}

      {/* RESET PIN TAB */}
      {activeTab==="pin" && (
        <div>
          <div style={{ background:"#fffbeb", border:"1.5px solid #fde68a", borderRadius:10, padding:"10px 14px", marginBottom:14, fontSize:12, color:"#92400e" }}>
            ⚠️ Reset PIN hanya untuk admin. PIN default baru: <strong>123456</strong>
          </div>
          {[1,2,3].map(r=>(
            <div key={r} style={{ marginBottom:18 }}>
              <div style={{ fontSize:12, fontWeight:800, color:reguColors[r], marginBottom:8 }}>REGU {r}</div>
              {REGU[r].map(name=>(
                <div key={name} style={{ background:"#fff", border:"1.5px solid #e5e7eb", borderRadius:11, padding:"10px 14px", marginBottom:7, display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontSize:18 }}>👤</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:800, color:"#1e3a8a" }}>{name}</div>
                    <div style={{ fontSize:10, color:"#9ca3af" }}>PIN tersimpan di Firestore</div>
                  </div>
                  <button onClick={()=>setResetTarget({name,regu:r})} style={{ background:"#fef2f2", border:"1.5px solid #fecaca", borderRadius:7, padding:"5px 11px", fontSize:11, fontWeight:700, color:"#dc2626", cursor:"pointer", fontFamily:"inherit" }}>Reset</button>
                </div>
              ))}
            </div>
          ))}
          {resetTarget && (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
              <div style={{ background:"#fff", borderRadius:16, padding:20, width:"100%", maxWidth:320 }}>
                <div style={{ fontSize:16, fontWeight:900, color:"#1e3a8a", marginBottom:4 }}>Reset PIN</div>
                <div style={{ fontSize:12, color:"#6b7280", marginBottom:14 }}>{resetTarget.name} · Regu {resetTarget.regu}</div>
                <input value={newResetPin} onChange={e=>setNewResetPin(e.target.value.replace(/[^0-9]/g,"").slice(0,6))} type="tel" placeholder="PIN baru 6 digit" style={{ width:"100%", border:"1.5px solid #e5e7eb", borderRadius:9, padding:"10px 12px", fontSize:15, fontFamily:"inherit", marginBottom:12, boxSizing:"border-box" }} />
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={handleResetPin} style={{ flex:1, background:"#dc2626", border:"none", borderRadius:9, padding:11, color:"#fff", fontWeight:800, fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>Simpan</button>
                  <button onClick={()=>{setResetTarget(null);setNewResetPin("");}} style={{ flex:1, background:"#f1f5f9", border:"none", borderRadius:9, padding:11, color:"#6b7280", fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit" }}>Batal</button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── BOTTOM NAV (mobile) ───────────────────────────────────────────────────────
// ─── INSTRUKSI PIMPINAN ──────────────────────────────────────────────────────

function InstruksiTab({instruksi, setInstruksi, toast, isAdmin, currentUser}) {
  const [open, setOpen] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [showArsip, setShowArsip] = useState(false);
  const [fm, setFm] = useState({judul:"", isi:"", prioritas:"Normal", targetRegu:"Semua"});
  const f = (k,v) => setFm(p=>({...p,[k]:v}));

  const PRI_COL = {Penting:"#dc2626", Normal:"#1d4ed8", Info:"#059669"};
  const PRI_BG  = {Penting:"#fef2f2", Normal:"#eff6ff", Info:"#f0fdf4"};

  const openNew = () => { setEditItem(null); setFm({judul:"",isi:"",prioritas:"Normal",targetRegu:"Semua"}); setOpen(true); };
  const openEdit = (ins) => { setEditItem(ins); setFm({judul:ins.judul,isi:ins.isi,prioritas:ins.prioritas,targetRegu:ins.targetRegu}); setOpen(true); };

  const submit = () => {
    if(!fm.judul||!fm.isi){toast("Judul & isi wajib diisi!",false);return;}
    if(editItem){
      setInstruksi(instruksi.map(i=>i.id===editItem.id?{...i,...fm,editedAt:Date.now()}:i));
      toast("Instruksi diperbarui!");
    } else {
      setInstruksi([{...fm,id:Date.now(),ts:Date.now(),aktif:true,selesai:false},...instruksi]);
      toast("Instruksi berhasil dikirim!");
    }
    setOpen(false);
  };

  const toggleAktif = (id) => {
    setInstruksi(instruksi.map(i=>i.id===id?{...i,aktif:!i.aktif}:i));
    toast("Status arsip diperbarui");
  };

  // Status selesai / belum — bisa dilakukan semua anggota
  const toggleSelesai = (id) => {
    const ins = instruksi.find(i=>i.id===id);
    const next = !ins?.selesai;
    setInstruksi(instruksi.map(i=>i.id===id?{...i,selesai:next,selesaiBy:next?(currentUser?.name||"—"):null,selesaiAt:next?Date.now():null}:i));
    toast(next?"✓ Ditandai selesai":"Dikembalikan ke belum selesai");
  };

  const hapus = (id) => {
    if(!window.confirm("Hapus instruksi ini?")) return;
    setInstruksi(instruksi.filter(i=>i.id!==id));
    toast("Instruksi dihapus");
  };

  const myRegu = currentUser?.regu;
  const aktifList = instruksi.filter(i=>i.aktif&&(i.targetRegu==="Semua"||String(i.targetRegu)===String(myRegu)));
  const arsipList = instruksi.filter(i=>!i.aktif);
  const belumSelesai = aktifList.filter(i=>!i.selesai).length;

  return (
    <div>
      <PH title="Instruksi Pimpinan" sub="Perintah & arahan dari pimpinan untuk seluruh anggota pamdal"
        action={isAdmin&&<Btn onClick={openNew} color="#dc2626"><IC n="plus" s={13}/> Buat Instruksi</Btn>}
      />

      {/* Tab aktif / arsip */}
      <div style={{display:"flex",gap:0,marginBottom:14,background:"#f1f5f9",borderRadius:10,padding:3}}>
        {[["aktif",`Aktif${belumSelesai>0?" ("+belumSelesai+" belum)":""}`],["arsip",`Arsip (${arsipList.length})`]].map(([v,l])=>(
          <button key={v} onClick={()=>setShowArsip(v==="arsip")} style={{flex:1,padding:"8px 0",fontSize:12,fontWeight:700,borderRadius:8,border:"none",cursor:"pointer",background:showArsip===(v==="arsip")?"#fff":"transparent",color:showArsip===(v==="arsip")?"#1d4ed8":"#6b7280",boxShadow:showArsip===(v==="arsip")?"0 1px 6px rgba(0,0,0,.08)":"none",fontFamily:"inherit"}}>
            {l}
          </button>
        ))}
      </div>

      {/* Instruksi aktif */}
      {!showArsip&&(
        <>
          {aktifList.length===0&&(
            <div style={{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:12,padding:"20px",textAlign:"center",color:"#059669",fontSize:13,fontWeight:700}}>
              ✅ Tidak ada instruksi aktif saat ini
            </div>
          )}
          {aktifList.map(ins=>(
            <div key={ins.id} style={{background:ins.selesai?"#f8faff":PRI_BG[ins.prioritas]||"#eff6ff",border:`2px solid ${ins.selesai?"#bfdbfe":(PRI_COL[ins.prioritas]||"#1d4ed8")+"40"}`,borderRadius:14,padding:"14px 16px",marginBottom:12,position:"relative",opacity:ins.selesai?.75:1}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:ins.selesai?"#93c5fd":PRI_COL[ins.prioritas]||"#1d4ed8",borderRadius:"14px 14px 0 0"}}/>
              {/* Header baris */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,flexWrap:"wrap",gap:6}}>
                <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                  <span style={{background:ins.selesai?"#3b82f6":PRI_COL[ins.prioritas]||"#1d4ed8",color:"#fff",borderRadius:6,padding:"2px 9px",fontSize:10.5,fontWeight:800}}>
                    {ins.selesai?"✓":ins.prioritas==="Penting"?"🚨":ins.prioritas==="Info"?"ℹ️":"📋"} {ins.selesai?"Selesai":ins.prioritas}
                  </span>
                  {ins.targetRegu!=="Semua"&&<Bdg text={"Regu "+ins.targetRegu} color="#6b7280"/>}
                  <span style={{fontSize:10,color:"#9ca3af"}}>{fmtDT(ins.ts)}</span>
                  {ins.editedAt&&<span style={{fontSize:9,color:"#9ca3af"}}>(diedit)</span>}
                </div>
                {/* Admin: edit + arsip + hapus */}
                {isAdmin&&(
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    <button onClick={()=>openEdit(ins)} style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#1d4ed8",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✏️ Edit</button>
                    <button onClick={()=>toggleAktif(ins.id)} style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#d97706",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Arsipkan</button>
                    <button onClick={()=>hapus(ins.id)} style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#dc2626",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Hapus</button>
                  </div>
                )}
              </div>
              <div style={{fontSize:14,fontWeight:900,color:"#1e3a8a",marginBottom:6}}>{ins.judul}</div>
              <div style={{fontSize:12.5,color:"#374151",lineHeight:1.7,whiteSpace:"pre-wrap",marginBottom:10}}>{ins.isi}</div>
              {ins.selesai&&ins.selesaiBy&&(
                <div style={{fontSize:10.5,color:"#059669",marginBottom:8}}>✓ Diselesaikan oleh <strong>{ins.selesaiBy}</strong> · {fmtDT(ins.selesaiAt)}</div>
              )}
              {/* Tombol aksi selesai / belum — semua anggota bisa */}
              <div style={{display:"flex",gap:8}}>
                {!ins.selesai?(
                  <button onClick={()=>toggleSelesai(ins.id)} style={{flex:1,background:"#059669",border:"none",borderRadius:9,padding:"10px",fontSize:13,fontWeight:800,color:"#fff",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    <IC n="ok" s={15} c="#fff"/> Tandai Selesai
                  </button>
                ):(
                  <button onClick={()=>toggleSelesai(ins.id)} style={{flex:1,background:"#fff",border:"1.5px solid #bfdbfe",borderRadius:9,padding:"10px",fontSize:13,fontWeight:800,color:"#3b82f6",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                    ↩ Tandai Belum Selesai
                  </button>
                )}
              </div>
            </div>
          ))}
        </>
      )}

      {/* Arsip */}
      {showArsip&&(
        <>
          {arsipList.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#9ca3af",fontSize:13}}>Belum ada instruksi diarsipkan</div>}
          {[...arsipList].reverse().map(ins=>(
            <div key={ins.id} style={{background:"#f8faff",border:"1.5px solid #e0eaf8",borderRadius:11,padding:"10px 14px",marginBottom:8,opacity:.75}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",gap:5,marginBottom:2,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,color:"#9ca3af",fontWeight:700}}>{ins.prioritas} · {fmtDT(ins.ts)}</span>
                    {ins.selesai&&<span style={{fontSize:10,color:"#059669",fontWeight:700}}>✓ Selesai</span>}
                  </div>
                  <div style={{fontSize:12.5,fontWeight:700,color:"#6b7280"}}>{ins.judul}</div>
                </div>
                {isAdmin&&(
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={()=>openEdit(ins)} style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#1d4ed8",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✏️</button>
                    <button onClick={()=>toggleAktif(ins.id)} style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#1d4ed8",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Aktifkan</button>
                    <button onClick={()=>hapus(ins.id)} style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,padding:"3px 8px",fontSize:10,color:"#dc2626",fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Hapus</button>
                  </div>
                )}
              </div>
            </div>
          ))}
        </>
      )}

      {/* Modal buat / edit instruksi */}
      <Modal open={open} onClose={()=>setOpen(false)} title={editItem?"Edit Instruksi":"Buat Instruksi Pimpinan"}>
        {!editItem&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:9,padding:"9px 13px",marginBottom:14,fontSize:11.5,color:"#b91c1c"}}>
          ⚠️ Instruksi akan langsung terlihat oleh semua anggota yang login
        </div>}
        <div style={{display:"flex",gap:10}}>
          <Inp label="Prioritas" value={fm.prioritas} onChange={e=>f("prioritas",e.target.value)} as="select" half>
            <option>Penting</option>
            <option>Normal</option>
            <option>Info</option>
          </Inp>
          <Inp label="Target" value={fm.targetRegu} onChange={e=>f("targetRegu",e.target.value)} as="select" half>
            <option>Semua</option>
            <option value="1">Regu 1</option>
            <option value="2">Regu 2</option>
            <option value="3">Regu 3</option>
          </Inp>
        </div>
        <Inp label="Judul Instruksi" value={fm.judul} onChange={e=>f("judul",e.target.value)} placeholder="Contoh: Siaga penuh malam ini"/>
        <Inp label="Isi Instruksi" value={fm.isi} onChange={e=>f("isi",e.target.value)} as="textarea" placeholder="Detail perintah / arahan dari pimpinan..."/>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={submit} color="#dc2626" size="lg" full>{editItem?"💾 Simpan Perubahan":"🚨 Kirim Instruksi"}</Btn>
          <Btn onClick={()=>setOpen(false)} color="#6b7280" variant="outline">Batal</Btn>
        </div>
      </Modal>
    </div>
  );
}

// DASHBOARD PIMPINAN TAB
// ═══════════════════════════════════════════════════════════════════════════════
function PimpinanTab({now,patrols,incidents,posAssign,instruksi,mutations,currentUser}) {

  // ── Kepatuhan patroli 7 hari terakhir ──
  const days7 = Array.from({length:7},(_,i)=>{
    const d=new Date(now); d.setDate(d.getDate()-i); return d;
  }).reverse();
  const patrolPerDay = days7.map(d=>{
    const count = patrols.filter(p=>new Date(p.ts).toDateString()===d.toDateString()).length;
    return {label:["Min","Sen","Sel","Rab","Kam","Jum","Sab"][d.getDay()], count, date:d.toISOString().slice(0,10)};
  });
  const todP = patrolPerDay[6].count;
  const kepatuhan = Math.min(100,Math.round((todP/10)*100));

  // ── Rekap insiden ──
  const actI = incidents.filter(i=>i.status!=="Selesai").length;
  const doneI = incidents.filter(i=>i.status==="Selesai").length;

  // ── Status pos ──
  const emptyPos = POS_LIST.filter(p=>!(posAssign[p]?.length));
  const filledPos = POS_LIST.filter(p=>posAssign[p]?.length>0);

  // ── Instruksi belum/sudah ──
  const myRegu = currentUser?.regu;
  const visibel = (instruksi||[]).filter(i=>i.aktif&&(i.targetRegu==="Semua"||String(i.targetRegu)===String(myRegu)));

  // ── Rekap mingguan ──
  const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate()-now.getDay());
  const weekPatrols = patrols.filter(p=>new Date(p.ts)>=startOfWeek).length;
  const weekIncidents = incidents.filter(i=>new Date(i.ts||i.createdAt||0)>=startOfWeek).length;
  const weekMutations = mutations.filter(m=>new Date(m.ts)>=startOfWeek).length;

  const barMax = Math.max(...patrolPerDay.map(d=>d.count),1);

  const systemStatus =
    emptyPos.length>1?{text:"KRITIS",color:"#dc2626",bg:"#fef2f2"}:
    emptyPos.length===1?{text:"PERLU PERHATIAN",color:"#d97706",bg:"#fffbeb"}:
    {text:"NORMAL",color:"#16a34a",bg:"#f0fdf4"};

  return (
    <div style={{paddingBottom:8}}>

      {/* HERO */}
      <div style={{background:"linear-gradient(135deg,#1e3a8a,#2563eb)",borderRadius:16,padding:"18px 20px",marginBottom:14,color:"#fff"}}>
        <div style={{fontSize:10,opacity:.7,letterSpacing:1}}>SIPAMDAL — LAPORAN EKSEKUTIF</div>
        <div style={{fontSize:20,fontWeight:900,letterSpacing:.5,marginTop:2}}>Dashboard Pimpinan</div>
        <div style={{fontSize:10,opacity:.6}}>BBPKA II Jatinangor · {now.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
        <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10}}>
          <div style={{background:systemStatus.bg,borderRadius:8,padding:"5px 12px"}}>
            <span style={{fontSize:13,fontWeight:900,color:systemStatus.color}}>● {systemStatus.text}</span>
          </div>
          <div style={{fontSize:11,opacity:.75}}>
            {emptyPos.length===0?"Seluruh pos terisi":"Pos kosong: "+emptyPos.join(", ")}
          </div>
        </div>
      </div>

      {/* KPI UTAMA */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <div style={{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:10,color:"#6b7280",marginBottom:2}}>Kepatuhan Patroli</div>
          <div style={{fontSize:28,fontWeight:900,color:"#16a34a"}}>{kepatuhan}%</div>
          <div style={{fontSize:10,color:"#6b7280"}}>{todP} patroli hari ini</div>
          <div style={{marginTop:6,height:4,background:"#dcfce7",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:kepatuhan+"%",background:"#16a34a",borderRadius:4,transition:"width .6s"}}/>
          </div>
        </div>
        <div style={{background:actI>0?"#fef2f2":"#f0fdf4",border:`1.5px solid ${actI>0?"#fecaca":"#bbf7d0"}`,borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:10,color:"#6b7280",marginBottom:2}}>Insiden Aktif</div>
          <div style={{fontSize:28,fontWeight:900,color:actI>0?"#dc2626":"#16a34a"}}>{actI}</div>
          <div style={{fontSize:10,color:"#6b7280"}}>{doneI} selesai</div>
        </div>
        <div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:10,color:"#6b7280",marginBottom:2}}>Pos Terisi</div>
          <div style={{fontSize:28,fontWeight:900,color:"#1d4ed8"}}>{filledPos.length}<span style={{fontSize:13,fontWeight:600,color:"#6b7280"}}>/{POS_LIST.length}</span></div>
          <div style={{fontSize:10,color:emptyPos.length>0?"#dc2626":"#6b7280"}}>{emptyPos.length>0?`⚠ ${emptyPos.length} kosong`:"Semua terisi ✓"}</div>
        </div>
        <div style={{background:"#f5f3ff",border:"1.5px solid #ddd6fe",borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:10,color:"#6b7280",marginBottom:2}}>Instruksi Aktif</div>
          <div style={{fontSize:28,fontWeight:900,color:"#7c3aed"}}>{visibel.length}</div>
          <div style={{fontSize:10,color:"#6b7280"}}>untuk regu ini</div>
        </div>
      </div>

      {/* GRAFIK PATROLI 7 HARI */}
      <div style={{background:"#fff",border:"1.5px solid #e0eaf8",borderRadius:12,padding:"14px",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:13,color:"#1e3a8a",marginBottom:12}}>📊 Patroli 7 Hari Terakhir</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
          {patrolPerDay.map((d,i)=>{
            const h = barMax===0?0:Math.max(4,Math.round((d.count/barMax)*72));
            const isToday = i===6;
            return (
              <div key={d.date} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{fontSize:9,fontWeight:800,color:isToday?"#1d4ed8":"#6b7280"}}>{d.count>0?d.count:""}</div>
                <div style={{width:"100%",height:h,background:isToday?"#2563eb":"#bfdbfe",borderRadius:"3px 3px 0 0",transition:"height .4s"}}/>
                <div style={{fontSize:9,color:isToday?"#1d4ed8":"#9ca3af",fontWeight:isToday?800:400}}>{d.label}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* STATUS POS DETAIL */}
      <div style={{background:"#fff",border:"1.5px solid #e0eaf8",borderRadius:12,padding:"14px",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:13,color:"#1e3a8a",marginBottom:10}}>📍 Status Pos Real-Time</div>
        {POS_LIST.map(p=>{
          const filled=posAssign[p]?.length>0;
          return (
            <div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #f1f5f9"}}>
              <div>
                <div style={{fontSize:12.5,fontWeight:700,color:"#1e3a8a"}}>{p}</div>
                {filled&&<div style={{fontSize:10.5,color:"#6b7280"}}>{posAssign[p].join(", ")}</div>}
              </div>
              <span style={{fontSize:11,fontWeight:800,color:filled?"#16a34a":"#dc2626",background:filled?"#f0fdf4":"#fef2f2",borderRadius:6,padding:"3px 9px"}}>
                {filled?"✓ Terisi":"⚠ Kosong"}
              </span>
            </div>
          );
        })}
      </div>

      {/* REKAP INSIDEN */}
      <div style={{background:"#fff",border:"1.5px solid #e0eaf8",borderRadius:12,padding:"14px",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:13,color:"#1e3a8a",marginBottom:10}}>🚨 Rekap Insiden</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:actI>0?12:0}}>
          <div style={{textAlign:"center",background:"#fef2f2",borderRadius:8,padding:"10px 8px"}}>
            <div style={{fontSize:22,fontWeight:900,color:"#dc2626"}}>{actI}</div>
            <div style={{fontSize:10,color:"#6b7280"}}>Aktif / Proses</div>
          </div>
          <div style={{textAlign:"center",background:"#f0fdf4",borderRadius:8,padding:"10px 8px"}}>
            <div style={{fontSize:22,fontWeight:900,color:"#16a34a"}}>{doneI}</div>
            <div style={{fontSize:10,color:"#6b7280"}}>Selesai</div>
          </div>
        </div>
        {actI>0&&(
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:6}}>Insiden aktif:</div>
            {incidents.filter(i=>i.status!=="Selesai").slice(0,3).map(inc=>(
              <div key={inc.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #f1f5f9"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#1e3a8a",flex:1}}>{inc.type||inc.judul||"Insiden"}</div>
                <span style={{fontSize:10,fontWeight:800,color:"#d97706",background:"#fffbeb",borderRadius:5,padding:"2px 7px"}}>{inc.status}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* REKAP MINGGUAN */}
      <div style={{background:"#fff",border:"1.5px solid #e0eaf8",borderRadius:12,padding:"14px",marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:13,color:"#1e3a8a",marginBottom:10}}>📅 Rekap Minggu Ini</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <div style={{textAlign:"center",background:"#f0fdf4",borderRadius:8,padding:"10px 6px"}}>
            <div style={{fontSize:20,fontWeight:900,color:"#059669"}}>{weekPatrols}</div>
            <div style={{fontSize:9,color:"#6b7280"}}>Patroli</div>
          </div>
          <div style={{textAlign:"center",background:"#fef2f2",borderRadius:8,padding:"10px 6px"}}>
            <div style={{fontSize:20,fontWeight:900,color:"#dc2626"}}>{weekIncidents}</div>
            <div style={{fontSize:9,color:"#6b7280"}}>Insiden</div>
          </div>
          <div style={{textAlign:"center",background:"#f5f3ff",borderRadius:8,padding:"10px 6px"}}>
            <div style={{fontSize:20,fontWeight:900,color:"#7c3aed"}}>{weekMutations}</div>
            <div style={{fontSize:9,color:"#6b7280"}}>Serah Terima</div>
          </div>
        </div>
      </div>

      {/* INSTRUKSI AKTIF */}
      {visibel.length>0&&(
        <div style={{background:"#fff",border:"1.5px solid #e0eaf8",borderRadius:12,padding:"14px",marginBottom:4}}>
          <div style={{fontWeight:800,fontSize:13,color:"#1e3a8a",marginBottom:10}}>📋 Instruksi Aktif ({visibel.length})</div>
          {visibel.map(ins=>{
            const col=ins.prioritas==="Penting"?"#dc2626":ins.prioritas==="Info"?"#059669":"#1d4ed8";
            const bg=ins.prioritas==="Penting"?"#fef2f2":ins.prioritas==="Info"?"#f0fdf4":"#eff6ff";
            return (
              <div key={ins.id} style={{borderLeft:`3px solid ${col}`,paddingLeft:10,marginBottom:10}}>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
                  <span style={{fontSize:10,fontWeight:800,color:col,background:bg,borderRadius:4,padding:"1px 6px"}}>{ins.prioritas}</span>
                  <span style={{fontSize:10,color:"#9ca3af"}}>{fmtDT(ins.ts)}</span>
                </div>
                <div style={{fontSize:12.5,fontWeight:800,color:"#1e3a8a"}}>{ins.judul}</div>
                <div style={{fontSize:11,color:"#374151",lineHeight:1.5,marginTop:2}}>{ins.isi.slice(0,100)}{ins.isi.length>100?"…":""}</div>
              </div>
            );
          })}
        </div>
      )}

    </div>
  );
}

function App() {
  const [currentUser, setCurrentUser] = useLS("pad_user", null);
  const [userPins, setUserPins] = useLS("pad_pins", DEFAULT_PINS);
  const [tab, setTab] = useState("dashboard");
  const [now, setNow] = useState(new Date());
  const [moreOpen, setMoreOpen] = useState(false);
  const [fbOnline, setFbOnline] = useState(false);
  const inactiveTimer = useRef(null);

  // ── Track status koneksi Firebase Firestore secara realtime ──
  useEffect(() => {
    // Tunggu __FB siap (Firebase module async)
    let tries = 0;
    const waitFB = setInterval(() => {
      tries++;
      if (window.__FB) {
        clearInterval(waitFB);
        const { db, doc, onSnapshot } = window.__FB;
        // Firestore memiliki koleksi .info/connected layaknya RTDB — 
        // cara terbaik: onSnapshot ke doc kecil, lihat apakah berhasil
        try {
          const ref = doc(db, "sipamdal", "pad_pos");
          const unsub = onSnapshot(ref,
            () => setFbOnline(true),
            () => setFbOnline(false)
          );
          // Juga listen ke online/offline browser
          const goOnline  = () => { if(window.__FB) setFbOnline(true); };
          const goOffline = () => setFbOnline(false);
          window.addEventListener("online",  goOnline);
          window.addEventListener("offline", goOffline);
          return () => { unsub(); window.removeEventListener("online",goOnline); window.removeEventListener("offline",goOffline); };
        } catch(e) { setFbOnline(false); }
      }
      if (tries > 20) { clearInterval(waitFB); setFbOnline(false); }
    }, 300);
    return () => clearInterval(waitFB);
  }, []);
  const AUTO_LOGOUT_MS = 15 * 60 * 1000; // 15 menit

  useEffect(() => { const id = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(id); }, []);

  // Auto-logout setelah 15 menit tidak aktif
  const resetTimer = useCallback(() => {
    if (inactiveTimer.current) clearTimeout(inactiveTimer.current);
    if (!currentUser) return;
    inactiveTimer.current = setTimeout(() => {
      auditAction(currentUser.name, currentUser.regu, "AUTO_LOGOUT", "Tidak aktif 15 menit");
      setCurrentUser(null);
      setTab("dashboard");
    }, AUTO_LOGOUT_MS);
  }, [currentUser]);

  useEffect(() => {
    const events = ["touchstart","click","keydown","scroll"];
    events.forEach(e => window.addEventListener(e, resetTimer, {passive:true}));
    resetTimer();
    return () => {
      events.forEach(e => window.removeEventListener(e, resetTimer));
      if (inactiveTimer.current) clearTimeout(inactiveTimer.current);
    };

        {tab === "pimpinan" && <PimpinanTab now={now} patrols={patrols} incidents={incidents} posAssign={posAssign} instruksi={instruksi} mutations={mutations} currentUser={currentUser} />}
        {tab === "dashboard" && <DashTab now={now} shift={shift} reguHari={reguHari} posAssign={posAssign} incidents={incidents} packages={packages} guests={guests} patrols={patrols} standJaga={standJaga} mutations={mutations} posRollingLog={posRollingLog} liburData={liburData} setLiburData={setLiburData} instruksi={instruksi} currentUser={currentUser} setTab={setTab} canEdit={canEdit} isAdmin={isAdmin} />}
        {tab === "jadwal" && <JadwalTab now={now} liburData={liburData} isAdmin={isAdmin} setTab={setTab} />}
        {tab === "pos" && <PosTab reguHari={reguHari} posAssign={posAssign} setPosAssign={setPosAssign} posRollingLog={posRollingLog} setPosRollingLog={setPosRollingLog} toast={toast} canEdit={canEdit} isAdmin={isAdmin} />}
        {tab === "stand" && <StandTab standJaga={standJaga} setStandJaga={setStandJaga} posAssign={posAssign} reguHari={reguHari} toast={toast} canEdit={canEdit} />}
        {tab === "patrol" && <PatrolTab posAssign={posAssign} patrols={patrols} setPatrols={setPatrols} toast={toast} canEdit={canEdit} isAdmin={isAdmin} />}
        {tab === "incident" && <IncTab incidents={incidents} setIncidents={setIncidents} posAssign={posAssign} toast={toast} canEdit={canEdit} />}
        {tab === "package" && <PkgTab packages={packages} setPackages={setPackages} toast={toast} canEdit={canEdit} />}
        {tab === "guest" && <GuestTab guests={guests} setGuests={setGuests} toast={toast} canEdit={canEdit} />}
        {tab === "mutation" && <MutTab mutations={mutations} setMutations={setMutations} reguHari={reguHari} toast={toast} canEdit={canEdit} patrols={patrols} incidents={incidents} packages={packages} guests={guests} currentUser={currentUser} standJaga={standJaga} />}
        {tab === "absen" && <AbsenTab absen={absen} setAbsen={setAbsen} liburData={liburData} setLiburData={setLiburData} reguHari={reguHari} toast={toast} canEdit={canEdit} isAdmin={isAdmin} now={now} />}
        {tab === "instruksi" && <InstruksiTab instruksi={instruksi} setInstruksi={setInstruksi} toast={toast} isAdmin={isAdmin} currentUser={currentUser} />}
        {tab === "profile" && <ProfileTab currentUser={currentUser} patrols={patrols} standJaga={standJaga} incidents={incidents} mutations={mutations} onLogout={handleLogout} toast={toast} userPins={userPins} setUserPins={setUserPins} />}
        {tab === "members" && <AdminMemberTab patrols={patrols} standJaga={standJaga} incidents={incidents} mutations={mutations} />}
      </main>

      {/* BOTTOM NAV */}
      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 300, background: "#fff", borderTop: "1.5px solid #e0eaf8", display: "flex", height: 64, boxShadow: "0 -2px 16px rgba(30,58,138,.08)" }}>
        {ACTIVE_NAV.map(t => {
          const active = t.id === "more" ? moreOpen : tab === t.id;
          return (
            <button key={t.id} onClick={() => { if (t.id === "more") { setMoreOpen(v => !v); } else { setTab(t.id); setMoreOpen(false); } }} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 3, background: "none", border: "none", cursor: "pointer", color: active ? "#1d4ed8" : "#9ca3af", transition: "color .15s", fontFamily: "inherit", position: "relative" }}>
              {t.id === "incident" && activeI > 0 && <div style={{ position: "absolute", top: 8, right: "calc(50% - 14px)", width: 16, height: 16, background: "#ef4444", borderRadius: 8, fontSize: 9, color: "#fff", fontWeight: 800, display: "flex", alignItems: "center", justifyContent: "center" }}>{activeI}</div>}
              <IC n={t.icon} s={22} c={active ? "#1d4ed8" : "#9ca3af"} />
              <span style={{ fontSize: 10, fontWeight: active ? 800 : 600 }}>{t.label}</span>
              {active && t.id !== "more" && <div style={{ position: "absolute", bottom: 0, left: "20%", right: "20%", height: 3, background: "#1d4ed8", borderRadius: 3 }} />}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

// Register Service Worker
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
