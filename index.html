// ─── QR SVG ───────────────────────────────────────────────────────────────────
function QRSvg({ value, size=120 }) {
  const h = value.split("").reduce((a,c)=>((a<<5)-a+c.charCodeAt(0))|0, 0);
  const N=21, cell=size/N, grid=[];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) {
    const finder=(r<7&&c<7)||(r<7&&c>=14)||(r>=14&&c<7);
    const inner=(r>=2&&r<=4&&c>=2&&c<=4)||(r>=2&&r<=4&&c>=16&&c<=18)||(r>=16&&r<=18&&c>=2&&c<=4);
    const timing=(r===6||c===6)&&!finder;
    let filled=finder||inner;
    if(timing) filled=(r+c)%2===0;
    if(!finder&&!timing) filled=(Math.abs((h*(r*N+c+7))|0)%255)>120;
    grid.push({r,c,filled});
  }
  return (
    <svg width={size} height={size} style={{background:"#fff",borderRadius:8,display:"block"}}>
      {grid.map(({r,c,filled})=>filled&&<rect key={`${r}-${c}`} x={c*cell+.5} y={r*cell+.5} width={cell-.5} height={cell-.5} fill="#1e3a5f" rx=".5"/>)}
    </svg>
  );
}

// ─── CAMERA QR SCANNER ────────────────────────────────────────────────────────
function CamScanner({onScan,onClose}) {
  const vRef=useRef(), cRef=useRef(), streamRef=useRef(), animRef=useRef();
  const [err,setErr]=useState(null);
  const [live,setLive]=useState(false);
  const [hit,setHit]=useState(null);
  const hasBD=typeof window!=="undefined"&&!!window.BarcodeDetector;

  const stop=useCallback(()=>{
    streamRef.current?.getTracks().forEach(t=>t.stop()); streamRef.current=null;
    if(animRef.current) cancelAnimationFrame(animRef.current);
    setLive(false);
  },[]);

  const scan=useCallback(()=>{
    const v=vRef.current,c=cRef.current;
    if(!v||!c||v.readyState<2){animRef.current=requestAnimationFrame(scan);return;}
    const ctx=c.getContext("2d"); c.width=v.videoWidth; c.height=v.videoHeight; ctx.drawImage(v,0,0);
    if(window.BarcodeDetector){
      new window.BarcodeDetector({formats:["qr_code"]}).detect(c).then(bs=>{
        if(bs.length){
          const area=decQR(bs[0].rawValue)||ALL_AREAS.find(a=>bs[0].rawValue.includes(a));
          if(area&&ALL_AREAS.includes(area)){setHit(area);stop();setTimeout(()=>onScan(area),400);return;}
        }
        animRef.current=requestAnimationFrame(scan);
      }).catch(()=>{animRef.current=requestAnimationFrame(scan);});
    } else { animRef.current=requestAnimationFrame(scan); }
  },[onScan,stop]);

  const start=async()=>{
    setErr(null);
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}}});
      streamRef.current=s; vRef.current.srcObject=s; await vRef.current.play(); setLive(true);
    }catch(e){setErr("Kamera tidak dapat diakses. Pastikan izin kamera diberikan.");}
  };

  useEffect(()=>{ start(); return()=>stop(); },[]);
  useEffect(()=>{ if(live&&vRef.current) vRef.current.onloadedmetadata=()=>{animRef.current=requestAnimationFrame(scan);}; },[live,scan]);

  return (
    <div>
      <div style={{position:"relative",background:"#0f172a",minHeight:240,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        <video ref={vRef} style={{width:"100%",maxHeight:260,objectFit:"cover",display:live?"block":"none"}} playsInline muted/>
        <canvas ref={cRef} style={{display:"none"}}/>
        {live&&(
          <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none"}}>
            <div style={{width:190,height:190,border:"2.5px solid #3b82f6",borderRadius:14,boxShadow:"0 0 0 9999px rgba(0,0,0,.5)",position:"relative"}}>
              <div style={{position:"absolute",top:"50%",left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,#3b82f6,transparent)",animation:"sl 2s ease-in-out infinite"}}/>
            </div>
          </div>
        )}
        {hit&&<div style={{position:"absolute",bottom:12,left:"50%",transform:"translateX(-50%)",background:"#16a34a",color:"#fff",borderRadius:8,padding:"8px 18px",fontWeight:700,fontSize:14,whiteSpace:"nowrap"}}>✓ {hit}</div>}
        {!live&&!hit&&<div style={{textAlign:"center",color:"#fff",padding:24}}><IC n="cam" s={44} c="#3b82f6"/><div style={{marginTop:10,fontSize:13}}>Memulai kamera...</div></div>}
      </div>
      <div style={{padding:"14px 18px 18px"}}>
        {!hasBD&&live&&<div style={{background:"#fffbeb",border:"1px solid #fbbf24",borderRadius:9,padding:"9px 13px",marginBottom:10,fontSize:12.5,color:"#92400e"}}>⚠ Browser ini belum mendukung scan otomatis. Pilih gedung dari daftar.</div>}
        {err&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:9,padding:"9px 13px",marginBottom:10,fontSize:12.5,color:"#b91c1c"}}>{err}</div>}
        <div style={{fontSize:11.5,fontWeight:700,color:"#3b82f6",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Atau pilih gedung manual:</div>
        <div style={{maxHeight:210,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
          {Object.entries(PATROL_AREAS).map(([pos,areas])=>(
            <div key={pos}>
              <div style={{fontSize:10.5,color:"#9ca3af",fontWeight:700,padding:"3px 0 2px",textTransform:"uppercase",letterSpacing:.5}}>{pos}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:4}}>
                {areas.map(a=>(
                  <button key={a} onClick={()=>{stop();onScan(a);}} style={{background:"#f0f5ff",border:"1.5px solid #bfdbfe",borderRadius:7,color:"#1d4ed8",fontSize:12,fontWeight:600,padding:"6px 10px",cursor:"pointer",fontFamily:"inherit"}}>{a}</button>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          {live?<Btn onClick={stop} color="#6b7280" variant="outline">Stop Kamera</Btn>:<Btn onClick={start} color="#1d4ed8"><IC n="cam" s={13}/> Aktifkan</Btn>}
          <Btn onClick={()=>{stop();onClose();}} color="#6b7280" variant="outline">Tutup</Btn>
        </div>
      </div>
      <style>{`@keyframes sl{0%,100%{transform:translateY(-70px)}50%{transform:translateY(70px)}}`}</style>
    </div>
  );
}

          </div>
          <div style={{fontSize:32,fontWeight:900,letterSpacing:2,fontVariantNumeric:"tabular-nums"}}>{now.toLocaleTimeString("id-ID")}</div>
        </div>
        <div style={{fontSize:11,opacity:.6,marginTop:4}}>{fmtDate(now)}</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {cards.map(c=>(

// ─── POS ──────────────────────────────────────────────────────────────────────
function PosTab({reguHari,posAssign,setPosAssign,toast}) {
  const members=REGU[reguHari]||[];
  const [draft,setDraft]=useState({...posAssign});
  const assign=(pos,m,chk)=>setDraft(prev=>{
    const cur=prev[pos]||[]; const cap=POS_CAP[pos]||1;
    if(chk&&cur.length>=cap) return prev;
    return {...prev,[pos]:chk?[...cur,m]:cur.filter(x=>x!==m)};
  });
  const auto=()=>{ const sh=[...members]; setDraft({"Pos Utama":sh.slice(0,2),"Pos Asrama":[sh[2]],"Pos Guest House":[sh[3]],"Lobby Gedung Utama":[sh[4]]}); };
  const save=()=>{ setPosAssign(draft); toast("Penempatan pos disimpan!"); };
  return (
    <div>
      <PH title="Penempatan Pos" sub={`Regu ${reguHari}: ${members.join(", ")}`} action={<div style={{display:"flex",gap:8}}><Btn onClick={auto} color="#7c3aed" variant="outline" size="sm">⚡ Auto</Btn><Btn onClick={save} color="#1d4ed8">Simpan</Btn></div>}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {POS_LIST.map(pos=>{
          const col=POS_COL[pos], cap=POS_CAP[pos], asgn=draft[pos]||[];
          return (
            <div key={pos} style={{background:"#fff",border:`1.5px solid ${col}28`,borderRadius:12,overflow:"hidden"}}>
              <div style={{background:col,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:11.5,fontWeight:800,color:"#fff"}}>{pos}</span>
                <span style={{background:"rgba(255,255,255,.25)",color:"#fff",borderRadius:5,padding:"2px 7px",fontSize:10}}>Maks {cap}</span>
              </div>
              <div style={{padding:10}}>
                {members.map(m=>{
                  const chk=asgn.includes(m);
                  const el=Object.entries(draft).some(([p,ms])=>p!==pos&&ms?.includes(m));
                  return (
                    <label key={m} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 0",cursor:el&&!chk?"not-allowed":"pointer",opacity:el&&!chk?.4:1}}>
                      <input type="checkbox" checked={chk} disabled={el&&!chk} onChange={e=>assign(pos,m,e.target.checked)} style={{accentColor:col,width:15,height:15}}/>
                      <span style={{fontSize:12.5,fontWeight:chk?700:400,color:chk?"#1e3a8a":"#6b7280"}}>{m}</span>
                      {chk&&<IC n="ok" s={12} c={col}/>}
                    </label>
                  );
                })}
                <div style={{marginTop:6,padding:"4px 8px",background:col+"12",borderRadius:6,fontSize:11,color:col,fontWeight:700}}>{asgn.length}/{cap} · {asgn.join(", ")||"Kosong"}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── INCIDENT ─────────────────────────────────────────────────────────────────
function IncTab({incidents,setIncidents,posAssign,toast}) {
  const [open,setOpen]=useState(false);
  const [fm,setFm]=useState({title:"",desc:"",category:"Rendah",pos:POS_LIST[0],photo:"",status:"Aktif"});
  const f=(k,v)=>setFm(p=>({...p,[k]:v}));
  const submit=()=>{if(!fm.title){toast("Judul wajib!",false);return;} setIncidents([...incidents,{...fm,id:Date.now(),ts:Date.now(),officer:posAssign[fm.pos]?.join(", ")||"—"}]); setFm({title:"",desc:"",category:"Rendah",pos:POS_LIST[0],photo:"",status:"Aktif"}); setOpen(false); toast("Insiden dicatat!");};
  const upd=(id,s)=>setIncidents(incidents.map(i=>i.id===id?{...i,status:s}:i));
  const photo=(e)=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>f("photo",r.result);r.readAsDataURL(file);};
  return (
    <div>
      <PH title="Laporan Insiden" sub="Rendah · Sedang · Penting" action={<Btn onClick={()=>setOpen(true)} color="#dc2626"><IC n="plus" s={13}/> Laporkan</Btn>}/>

      </div>
      {incidents.length===0&&<div style={{color:"#9ca3af",fontSize:13}}>Belum ada insiden.</div>}
      {[...incidents].reverse().map(inc=>(
        <div key={inc.id} style={{background:CAT_BG[inc.category],border:`1.5px solid ${CAT_COL[inc.category]}22`,borderRadius:12,padding:"11px 13px",marginBottom:9}}>

            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}><Bdg text={inc.category} color={CAT_COL[inc.category]}/><Bdg text={inc.status} color={inc.status==="Selesai"?"#059669":"#d97706"}/></div>
            <span style={{fontSize:10.5,color:"#9ca3af"}}>{fmtDT(inc.ts)}</span>
          </div>
          <div style={{fontSize:14,fontWeight:800,color:"#1e3a8a",marginBottom:2}}>{inc.title}</div>
          <div style={{fontSize:12.5,color:"#374151",marginBottom:4}}>{inc.desc}</div>
          <div style={{fontSize:11,color:"#6b7280"}}>Petugas: {inc.officer}</div>
          {inc.photo&&<img src={inc.photo} alt="bukti" style={{width:100,height:68,objectFit:"cover",borderRadius:7,marginTop:7}}/>}
          {inc.status!=="Selesai"&&<div style={{display:"flex",gap:7,marginTop:8}}><Btn onClick={()=>upd(inc.id,"Dalam Penanganan")} color="#d97706" size="sm" variant="outline">Penanganan</Btn><Btn onClick={()=>upd(inc.id,"Selesai")} color="#059669" size="sm">✓ Selesai</Btn></div>}
        </div>
      ))}
      <Modal open={open} onClose={()=>setOpen(false)} title="Laporkan Insiden">
        <Inp label="Judul" value={fm.title} onChange={e=>f("title",e.target.value)} placeholder="Judul insiden"/>
        <Inp label="Deskripsi" value={fm.desc} onChange={e=>f("desc",e.target.value)} as="textarea" placeholder="Detail kejadian..."/>
        <div style={{display:"flex",gap:10}}><Inp label="Kategori" value={fm.category} onChange={e=>f("category",e.target.value)} as="select" half>{INC_CAT.map(c=><option key={c}>{c}</option>)}</Inp><Inp label="Pos" value={fm.pos} onChange={e=>f("pos",e.target.value)} as="select" half>{POS_LIST.map(p=><option key={p}>{p}</option>)}</Inp></div>

        <div style={{display:"flex",gap:8}}><Btn onClick={submit} color="#dc2626" size="lg">Simpan</Btn><Btn onClick={()=>setOpen(false)} color="#6b7280" variant="outline" size="lg">Batal</Btn></div>
      </Modal>
    </div>
  );
}

        <div style={{display:"flex",gap:10}}><Inp label="Dari Regu" value={fm.fromRegu} onChange={e=>f("fromRegu",e.target.value)} as="select" half>{[1,2,3].map(r=><option key={r} value={r}>Regu {r}</option>)}</Inp><Inp label="Kepada Regu" value={fm.toRegu} onChange={e=>f("toRegu",e.target.value)} as="select" half><option value="">—</option>{[1,2,3].map(r=><option key={r} value={r}>Regu {r}</option>)}</Inp></div>

const NAV_TABS = [
  {id:"dashboard",label:"Dashboard",icon:"home"},

// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [tab,setTab]=useState("dashboard");
  const [now,setNow]=useState(new Date());
  const [moreOpen,setMoreOpen]=useState(false);
  useEffect(()=>{ const id=setInterval(()=>setNow(new Date()),1000); return()=>clearInterval(id); },[]);

  const shift=getShift(now);
  const reguHari=getReguHari(now);

  const [posAssign,setPosAssign]=useLS("pad_pos",{});
  const [incidents,setIncidents]=useLS("pad_inc",[]);
  const [packages,setPackages]=useLS("pad_pkg",[]);
  const [guests,setGuests]=useLS("pad_guest",[]);
  const [patrols,setPatrols]=useLS("pad_patrol",[]);
  const [mutations,setMutations]=useLS("pad_mut",[]);
  const [rollings,setRollings]=useLS("pad_roll",[]);
  const [standJaga,setStandJaga]=useLS("pad_stand",[]);
  const [notif,setNotif]=useState(null);

  const toast=(msg,ok=true)=>{ setNotif({msg,ok}); setTimeout(()=>setNotif(null),3000); };

  const MORE_TABS=[
    {id:"pos",label:"Penempatan Pos",icon:"pos"},
    {id:"stand",label:"Stand Jaga",icon:"shield"},
    {id:"package",label:"Paket & Kurir",icon:"pkg"},
    {id:"guest",label:"Tamu & Asrama",icon:"ppl"},
    {id:"mutation",label:"Mutasi Laporan",icon:"file"},
    {id:"rolling",label:"Rolling Shift",icon:"rot"},
  ];

  const pending=packages.filter(p=>p.status==="Belum Diambil").length;
  const activeI=incidents.filter(i=>i.status!=="Selesai").length;

  const goTab=(t)=>{ setTab(t); setMoreOpen(false); };

  return (
    <div style={{minHeight:"100vh",background:"#eef3fb",fontFamily:"'Segoe UI',system-ui,sans-serif",display:"flex",flexDirection:"column",paddingBottom:64}}>
      {/* HEADER */}
      <header style={{background:"linear-gradient(135deg,#1e3a8a 0%,#2563eb 70%,#3b82f6 100%)",position:"sticky",top:0,zIndex:200,height:52,display:"flex",alignItems:"center",padding:"0 14px",gap:10,boxShadow:"0 2px 14px rgba(30,58,138,.2)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,background:"rgba(255,255,255,.22)",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}><IC n="shield" s={15} c="#fff"/></div>
          <div><div style={{fontSize:13,fontWeight:900,color:"#fff",letterSpacing:.5}}>SIPAMDAL</div><div style={{fontSize:8.5,color:"rgba(255,255,255,.65)",letterSpacing:1}}>BBPKA II JATINANGOR</div></div>
        </div>
        <div style={{flex:1}}/>
        {pending>0&&<div style={{background:"#fbbf24",color:"#78350f",borderRadius:20,padding:"2px 8px",fontSize:10.5,fontWeight:800}}>📦{pending}</div>}
        {activeI>0&&<div style={{background:"#ef4444",color:"#fff",borderRadius:20,padding:"2px 8px",fontSize:10.5,fontWeight:800}}>⚠{activeI}</div>}
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:14,fontWeight:900,color:"#fff",letterSpacing:1.5,fontVariantNumeric:"tabular-nums"}}>{now.toLocaleTimeString("id-ID")}</div>
          <div style={{fontSize:8.5,color:"rgba(255,255,255,.55)"}}>{fmtDS(now)} · Regu {reguHari}</div>
        </div>
      </header>

      {/* TOAST */}
      {notif&&<div style={{position:"fixed",top:60,left:"50%",transform:"translateX(-50%)",zIndex:9999,background:notif.ok?"#16a34a":"#dc2626",color:"#fff",borderRadius:10,padding:"9px 18px",fontWeight:700,fontSize:13,boxShadow:"0 4px 20px rgba(0,0,0,.2)",whiteSpace:"nowrap"}}>{notif.ok?"✓ ":"✕ "}{notif.msg}</div>}

      {/* MORE DRAWER */}
      {moreOpen&&(
        <div style={{position:"fixed",inset:0,zIndex:500,background:"rgba(0,0,0,.4)"}} onClick={()=>setMoreOpen(false)}>
          <div style={{position:"absolute",bottom:64,left:0,right:0,background:"#fff",borderRadius:"20px 20px 0 0",padding:"16px 16px 10px"}} onClick={e=>e.stopPropagation()}>
            <div style={{width:36,height:4,background:"#e2e8f0",borderRadius:4,margin:"0 auto 14px"}}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {MORE_TABS.map(t=>(
                <button key={t.id} onClick={()=>goTab(t.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:tab===t.id?"#eff6ff":"#f8faff",border:`1.5px solid ${tab===t.id?"#bfdbfe":"#e0eaf8"}`,borderRadius:12,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
                  <IC n={t.icon} s={18} c={tab===t.id?"#1d4ed8":"#6b7280"}/>

                </button>

            </div>
          </div>
        </div>
      )}

      {/* CONTENT */}
      <main style={{flex:1,padding:"14px 14px 0",overflowY:"auto"}}>
        {tab==="dashboard"&&<DashTab now={now} shift={shift} reguHari={reguHari} posAssign={posAssign} incidents={incidents} packages={packages} guests={guests} patrols={patrols} standJaga={standJaga} setTab={setTab}/>}

        {tab==="pos"&&<PosTab reguHari={reguHari} posAssign={posAssign} setPosAssign={setPosAssign} toast={toast}/>}
        {tab==="stand"&&<StandTab standJaga={standJaga} setStandJaga={setStandJaga} posAssign={posAssign} reguHari={reguHari} toast={toast}/>}
        {tab==="patrol"&&<PatrolTab posAssign={posAssign} patrols={patrols} setPatrols={setPatrols} toast={toast}/>}
        {tab==="incident"&&<IncTab incidents={incidents} setIncidents={setIncidents} posAssign={posAssign} toast={toast}/>}
        {tab==="package"&&<PkgTab packages={packages} setPackages={setPackages} toast={toast}/>}
        {tab==="guest"&&<GuestTab guests={guests} setGuests={setGuests} toast={toast}/>}
        {tab==="mutation"&&<MutTab mutations={mutations} setMutations={setMutations} reguHari={reguHari} toast={toast}/>}
        {tab==="rolling"&&<RollTab rollings={rollings} setRollings={setRollings} reguHari={reguHari} toast={toast}/>}
      </main>

      {/* BOTTOM NAV */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:300,background:"#fff",borderTop:"1.5px solid #e0eaf8",display:"flex",height:64,boxShadow:"0 -2px 16px rgba(30,58,138,.08)"}}>
        {NAV_TABS.map(t=>{
          const active = t.id==="more" ? moreOpen : tab===t.id;
          return (
            <button key={t.id} onClick={()=>{ if(t.id==="more"){setMoreOpen(v=>!v);}else{setTab(t.id);setMoreOpen(false);}}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,background:"none",border:"none",cursor:"pointer",color:active?"#1d4ed8":"#9ca3af",transition:"color .15s",fontFamily:"inherit",position:"relative"}}>
              {t.id==="incident"&&activeI>0&&<div style={{position:"absolute",top:8,right:"calc(50% - 14px)",width:16,height:16,background:"#ef4444",borderRadius:8,fontSize:9,color:"#fff",fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{activeI}</div>}
              <IC n={t.icon} s={22} c={active?"#1d4ed8":"#9ca3af"}/>
              <span style={{fontSize:10,fontWeight:active?800:600}}>{t.label}</span>
              {active&&t.id!=="more"&&<div style={{position:"absolute",bottom:0,left:"20%",right:"20%",height:3,background:"#1d4ed8",borderRadius:3}}/>}
            </button>
          );
        })}
      </nav>
    </div>
  );
}

// Register Service Worker
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
